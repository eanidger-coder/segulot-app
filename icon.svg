<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="סגולות">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#211d16"/>
      <stop offset="0.55" stop-color="#161410"/>
      <stop offset="1" stop-color="#0d0b08"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="42%">
      <stop offset="0" stop-color="#e7cd8f" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#c3a462" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c3a462" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5e6b6"/>
      <stop offset="0.4" stop-color="#dabf83"/>
      <stop offset="1" stop-color="#9a7b3f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a7b3f"/>
      <stop offset="0.5" stop-color="#dabf83"/>
      <stop offset="1" stop-color="#b8975a"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="106" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.55"/>

  <circle cx="256" cy="214" r="150" fill="url(#glow)"/>

  <!-- flame -->
  <path d="M256 96 C 318 176, 336 244, 300 300 C 288 318, 268 330, 256 356 C 244 330, 224 318, 212 300 C 176 244, 194 176, 256 96 Z" fill="url(#flame)"/>
  <!-- inner flame -->
  <path d="M256 168 C 288 214, 296 256, 274 292 C 266 306, 256 314, 256 330 C 256 314, 246 306, 238 292 C 216 256, 224 214, 256 168 Z" fill="#fbf1cf" opacity="0.85"/>

  <!-- open-book base (study) -->
  <path d="M150 372 C 196 356, 236 360, 256 374 C 276 360, 316 356, 362 372 L 362 400 C 316 386, 276 390, 256 404 C 236 390, 196 386, 150 400 Z" fill="url(#gold)"/>
  <path d="M256 374 L 256 404" stroke="#0d0b08" stroke-width="4" opacity="0.5"/>
</svg>
