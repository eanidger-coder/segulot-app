בַּאֲמִירַת הָעֲשָׂרָה מִזְמוֹרִים אֵלּוּ לְכָל הַצַּדִּיקִים הָאֲמִתִּיִּים שֶׁבְּדוֹרֵנוּ. וּלְכָל הַצַּדִּיקִים הָאֲמִתִּים שׁוֹכְנֵי עָפָר. קְדוֹשִׁים אָשֵׁר בָּאָרֶץ הֵמָּה. וּבִפְרָט לְרַבֵּנוּ הַקָּדוֹשׁ צַדִּיק יְסוֹד עוֹלָם נַחַל נוֹבֵעַ מְקוֹר חָכְמָה רַבֵּנוּ נַחְמָן בֶּן פֵיגֶא שגילה תיקון זה. זְכוּתָם יָגֵן עָלֵינוּ וְעַל כָּל יִשְׂרָאֵל אָמֵן`,`לְ֭כוּ נְרַנְּנָ֣ה לַיהֹוָ֑ה נָ֝רִ֗יעָה לְצ֣וּר יִשְׁעֵֽנוּ׃`,`נְקַדְּמָ֣ה פָנָ֣יו בְּתוֹדָ֑ה בִּ֝זְמִר֗וֹת נָרִ֥יעַֽ לֽוֹ׃`,`כִּ֤י אֵ֣ל גָּד֣וֹל יְהֹוָ֑ה וּמֶ֥לֶךְ גָּ֝ד֗וֹל עַל־כׇּל־אֱלֹהִֽים׃`],numbered:!1},{heading:`מִזְמוֹר ט״ז`,verses:[`מִכְתָּ֥ם לְדָוִ֑ד שׇֽׁמְרֵ֥נִי אֵ֝֗ל כִּֽי־חָסִ֥יתִי בָֽךְ׃`,`אָמַ֣רְתְּ לַֽ֭יהֹוָה אֲדֹנָ֣י אָ֑תָּה ט֝וֹבָתִ֗י בַּל־עָלֶֽיךָ׃`,`לִ֭קְדוֹשִׁים אֲשֶׁר־בָּאָ֣רֶץ הֵ֑מָּה וְ֝אַדִּירֵ֗י כׇּל־חֶפְצִי־בָֽם׃`,`יִרְבּ֥וּ עַצְּבוֹתָם֮ אַחֵ֢ר מָ֫הָ֥רוּ בַּל־אַסִּ֣יךְ נִסְכֵּיהֶ֣ם מִדָּ֑ם וּֽבַל־אֶשָּׂ֥א אֶת־שְׁ֝מוֹתָ֗ם עַל־שְׂפָתָֽי׃`,`יְֽהֹוָ֗ה מְנָת־חֶלְקִ֥י וְכוֹסִ֑י אַ֝תָּ֗ה תּוֹמִ֥יךְ גּוֹרָלִֽי׃`,`חֲבָלִ֣ים נָֽפְלוּ־לִ֭י בַּנְּעִמִ֑ים אַף־נַ֝חֲלָ֗ת שָֽׁפְרָ֥ה עָלָֽי׃`,`אֲבָרֵ֗ךְ אֶת־יְ֭הֹוָה אֲשֶׁ֣ר יְעָצָ֑נִי אַף־לֵ֝יל֗וֹת יִסְּר֥וּנִי כִלְיוֹתָֽי׃`,`שִׁוִּ֬יתִי יְהֹוָ֣ה לְנֶגְדִּ֣י תָמִ֑יד כִּ֥י מִֽ֝ימִינִ֗י בַּל־אֶמּֽוֹט׃`,`לָכֵ֤ן&thinsp;<b>׀</b> שָׂמַ֣ח לִ֭בִּי וַיָּ֣גֶל כְּבוֹדִ֑י אַף־בְּ֝שָׂרִ֗י יִשְׁכֹּ֥ן לָבֶֽטַח׃`,`כִּ֤י&thinsp;<b>׀</b> לֹא־תַעֲזֹ֣ב נַפְשִׁ֣י לִשְׁא֑וֹל לֹֽא־תִתֵּ֥ן חֲ֝סִידְךָ֗ לִרְא֥וֹת שָֽׁחַת׃`,`תּֽוֹדִיעֵנִי֮ אֹ֤רַח חַ֫יִּ֥ים שֹׂ֣בַע שְׂ֭מָחוֹת אֶת־פָּנֶ֑יךָ נְעִמ֖וֹת בִּימִינְךָ֣ נֶֽצַח׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`]},{heading:`מִזְמוֹר ל״ב`,verses:[`לְדָוִ֗ד מַ֫שְׂכִּ֥יל אַשְׁרֵ֥י נְֽשׂוּי־פֶּ֗שַׁע כְּס֣וּי חֲטָאָֽה׃`,`אַ֥שְֽׁרֵי<span class="mam-implicit-maqaf">־</span>אָדָ֗ם לֹ֤א יַחְשֹׁ֬ב יְהֹוָ֣ה ל֣וֹ עָוֺ֑ן וְאֵ֖ין בְּרוּח֣וֹ רְמִיָּֽה׃`,`כִּֽי־הֶ֭חֱרַשְׁתִּי בָּל֣וּ עֲצָמָ֑י בְּ֝שַׁאֲגָתִ֗י כׇּל־הַיּֽוֹם׃`,`כִּ֤י&thinsp;<b>׀</b> יוֹמָ֣ם וָלַיְלָה֮ תִּכְבַּ֥ד עָלַ֗י יָ֫דֶ֥ךָ נֶהְפַּ֥ךְ לְשַׁדִּ֑י בְּחַרְבֹ֖נֵי קַ֣יִץ סֶֽלָה׃`,`חַטָּאתִ֨י אוֹדִ֪יעֲךָ֡ וַעֲ֘וֺנִ֤י לֹֽא־כִסִּ֗יתִי אָמַ֗רְתִּי אוֹדֶ֤ה עֲלֵ֣י פְ֭שָׁעַי לַיהֹוָ֑ה וְאַתָּ֨ה נָ֘שָׂ֤אתָ עֲוֺ֖ן חַטָּאתִ֣י סֶֽלָה׃`,`עַל־זֹ֡את יִתְפַּלֵּ֬ל כׇּל־חָסִ֨יד&thinsp;<b>׀</b> אֵלֶיךָ֮ לְעֵ֢ת מְ֫צֹ֥א רַ֗ק לְ֭שֵׁטֶף מַ֣יִם רַבִּ֑ים אֵ֝לָ֗יו לֹ֣א יַגִּֽיעוּ׃`,`אַתָּ֤ה&thinsp;<b>׀</b> סֵ֥תֶר לִי֮ מִצַּ֢ר תִּ֫צְּרֵ֥נִי רׇנֵּ֥י פַלֵּ֑ט תְּס֖וֹבְבֵ֣נִי סֶֽלָה׃`,`אַשְׂכִּֽילְךָ֨&thinsp;<b>׀</b> וְֽאוֹרְךָ֗ בְּדֶֽרֶךְ־ז֥וּ תֵלֵ֑ךְ אִיעֲצָ֖ה עָלֶ֣יךָ עֵינִֽי׃`,`אַל־תִּהְי֤וּ&thinsp;<b>׀</b> כְּס֥וּס כְּפֶרֶד֮ אֵ֤ין הָ֫בִ֥ין בְּמֶתֶג־וָרֶ֣סֶן עֶדְי֣וֹ לִבְל֑וֹם בַּ֝֗ל קְרֹ֣ב אֵלֶֽיךָ׃`,`רַבִּ֥ים מַכְאוֹבִ֗ים לָ֫רָשָׁ֥ע וְהַבּוֹטֵ֥חַ בַּֽיהֹוָ֑ה חֶ֝֗סֶד יְסוֹבְבֶֽנּוּ׃`,`שִׂמְח֬וּ בַיהֹוָ֣ה וְ֭גִילוּ צַדִּיקִ֑ים וְ֝הַרְנִ֗ינוּ כׇּל־יִשְׁרֵי־לֵֽב׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`]},{heading:`מִזְמוֹר מ״א`,verses:[`לַמְנַצֵּ֗חַ מִזְמ֥וֹר לְדָוִֽד׃`,`אַ֭שְׁרֵי מַשְׂכִּ֣יל אֶל־דָּ֑ל בְּי֥וֹם רָ֝עָ֗ה יְֽמַלְּטֵ֥הוּ יְהֹוָֽה׃`,`יְהֹוָ֤ה&thinsp;<b>׀</b> יִשְׁמְרֵ֣הוּ וִ֭יחַיֵּהוּ וְאֻשַּׁ֣ר בָּאָ֑רֶץ וְאַֽל־תִּ֝תְּנֵ֗הוּ בְּנֶ֣פֶשׁ אֹיְבָֽיו׃`,`יְֽהֹוָ֗ה יִ֭סְעָדֶנּוּ עַל־עֶ֣רֶשׂ דְּוָ֑י כׇּל־מִ֝שְׁכָּב֗וֹ הָפַ֥כְתָּ בְחׇלְיֽוֹ׃`,`אֲֽנִי־אָ֭מַרְתִּי יְהֹוָ֣ה חׇנֵּ֑נִי רְפָאָ֥ה נַ֝פְשִׁ֗י כִּי־חָטָ֥אתִי לָֽךְ׃`,`אוֹיְבַ֗י יֹאמְר֣וּ רַ֣ע לִ֑י מָתַ֥י יָ֝מ֗וּת וְאָבַ֥ד שְׁמֽוֹ׃`,`וְאִם־בָּ֤א לִרְא֨וֹת&thinsp;<b>׀</b> שָׁ֤וְא יְדַבֵּ֗ר לִבּ֗וֹ יִקְבׇּץ־אָ֥וֶן ל֑וֹ יֵצֵ֖א לַח֣וּץ יְדַבֵּֽר׃`,`יַ֗חַד עָלַ֣י יִ֭תְלַחֲשׁוּ כׇּל־שֹׂנְאָ֑י עָלַ֓י&thinsp;<b>׀</b> יַחְשְׁב֖וּ רָעָ֣ה לִֽי׃`,`דְּֽבַר־בְּ֭לִיַּעַל יָצ֣וּק בּ֑וֹ וַאֲשֶׁ֥ר שָׁ֝כַ֗ב לֹא־יוֹסִ֥יף לָקֽוּם׃`,`גַּם־אִ֤ישׁ שְׁלוֹמִ֨י&thinsp;<b>׀</b> אֲשֶׁר־בָּטַ֣חְתִּי ב֭וֹ אוֹכֵ֣ל לַחְמִ֑י הִגְדִּ֖יל עָלַ֣י עָקֵֽב׃`,`וְאַתָּ֤ה יְהֹוָ֗ה חׇנֵּ֥נִי וַהֲקִימֵ֑נִי וַאֲשַׁלְּמָ֥ה לָהֶֽם׃`,`בְּזֹ֣את יָ֭דַעְתִּי כִּֽי־חָפַ֣צְתָּ בִּ֑י כִּ֤י לֹֽא־יָרִ֖יעַ אֹיְבִ֣י עָלָֽי׃`,`וַאֲנִ֗י בְּ֭תֻמִּי תָּמַ֣כְתָּ בִּ֑י וַתַּצִּיבֵ֖נִי לְפָנֶ֣יךָ לְעוֹלָֽם׃`,`בָּ֘ר֤וּךְ יְהֹוָ֨ה&thinsp;<b>׀</b> אֱלֹ֘הֵ֤י יִשְׂרָאֵ֗ל מֵֽ֭הָעוֹלָם וְעַ֥ד הָעוֹלָ֗ם אָ֘מֵ֥ן&thinsp;<small>׀</small>&thinsp;וְאָמֵֽן׃`]},{heading:`מִזְמוֹר מ״ב`,verses:[`לַמְנַצֵּ֗חַ מַשְׂכִּ֥יל לִבְנֵי־קֹֽרַח׃`,`כְּאַיָּ֗ל תַּעֲרֹ֥ג עַל־אֲפִֽיקֵי־מָ֑יִם כֵּ֤ן נַפְשִׁ֨י תַעֲרֹ֖ג אֵלֶ֣יךָ אֱלֹהִֽים׃`,`צָמְאָ֬ה נַפְשִׁ֨י&thinsp;<b>׀</b> לֵאלֹהִים֮ לְאֵ֢ל חָ֥֫י מָתַ֥י אָב֑וֹא וְ֝אֵרָאֶ֗ה פְּנֵ֣י אֱלֹהִֽים׃`,`הָֽיְתָה־לִּ֬י דִמְעָתִ֣י לֶ֭חֶם יוֹמָ֣ם וָלָ֑יְלָה בֶּאֱמֹ֥ר אֵלַ֥י כׇּל־הַ֝יּ֗וֹם אַיֵּ֥ה אֱלֹהֶֽיךָ׃`,`אֵ֤לֶּה אֶזְכְּרָ֨ה&thinsp;<b>׀</b> וְאֶשְׁפְּכָ֬ה עָלַ֨י&thinsp;<b>׀</b> נַפְשִׁ֗י כִּ֤י אֶעֱבֹ֨ר&thinsp;<b>׀</b> בַּסָּךְ֮ אֶדַּדֵּ֗ם עַד־בֵּ֥ית<span class="mam-implicit-maqaf">־</span>אֱלֹ֫הִ֥ים בְּקוֹל־רִנָּ֥ה וְתוֹדָ֗ה הָמ֥וֹן חוֹגֵֽג׃`,`מַה־תִּשְׁתּ֬וֹחֲחִ֨י&thinsp;<b>׀</b> נַפְשִׁי֮ וַתֶּהֱמִ֢י עָ֫לָ֥י הוֹחִ֣לִי לֵ֭אלֹהִים כִּי־ע֥וֹד אוֹדֶ֗נּוּ יְשׁוּע֥וֹת פָּנָֽיו׃`,`אֱֽלֹהַ֗י עָלַי֮ נַפְשִׁ֢י תִשְׁתּ֫וֹחָ֥ח עַל־כֵּ֗ן אֶ֭זְכׇּרְךָ מֵאֶ֣רֶץ יַרְדֵּ֑ן וְ֝חֶרְמוֹנִ֗ים מֵהַ֥ר מִצְעָֽר׃`,`תְּהוֹם־אֶל־תְּה֣וֹם ק֭וֹרֵא לְק֣וֹל צִנּוֹרֶ֑יךָ כׇּֽל־מִשְׁבָּרֶ֥יךָ וְ֝גַלֶּ֗יךָ עָלַ֥י עָבָֽרוּ׃`,`יוֹמָ֤ם&thinsp;<b>׀</b> יְצַוֶּ֬ה יְהֹוָ֨ה&thinsp;<b>׀</b> חַסְדּ֗וֹ וּ֭בַלַּיְלָה שִׁירֹ֣ה עִמִּ֑י תְּ֝פִלָּ֗ה לְאֵ֣ל חַיָּֽי׃`,`אוֹמְרָ֤ה&thinsp;<b>׀</b> לְאֵ֥ל סַלְעִי֮ לָמָ֢ה שְׁכַ֫חְתָּ֥נִי לָֽמָּה־קֹדֵ֥ר אֵלֵ֗ךְ בְּלַ֣חַץ אוֹיֵֽב׃`,`בְּרֶ֤צַח&thinsp;<b>׀</b> בְּֽעַצְמוֹתַ֗י חֵרְפ֥וּנִי צוֹרְרָ֑י בְּאׇמְרָ֥ם אֵלַ֥י כׇּל־הַ֝יּ֗וֹם אַיֵּ֥ה אֱלֹהֶֽיךָ׃`,`מַה־תִּשְׁתּ֬וֹחֲחִ֨י&thinsp;<b>׀</b> נַפְשִׁי֮ וּֽמַה־תֶּהֱמִ֢י עָ֫לָ֥י הוֹחִ֣ילִי לֵ֭אלֹהִים כִּי־ע֣וֹד אוֹדֶ֑נּוּ יְשׁוּעֹ֥ת פָּ֝נַ֗י וֵאלֹהָֽי׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`]},{heading:`מִזְמוֹר נ״ט`,verses:[`לַמְנַצֵּ֣חַ אַל־תַּשְׁחֵת֮ לְדָוִ֢ד מִ֫כְתָּ֥ם בִּשְׁלֹ֥חַ שָׁא֑וּל וַֽיִּשְׁמְר֥וּ אֶת־הַ֝בַּ֗יִת לַהֲמִיתֽוֹ׃`,`הַצִּילֵ֖נִי מֵאֹיְבַ֥י&thinsp;<small>׀</small>&thinsp;אֱלֹהָ֑י מִֽמִּתְקוֹמְמַ֥י תְּשַׂגְּבֵֽנִי׃`,`הַ֭צִּילֵנִי מִפֹּ֣עֲלֵי אָ֑וֶן וּֽמֵאַנְשֵׁ֥י דָ֝מִ֗ים הוֹשִׁיעֵֽנִי׃`,`כִּ֤י הִנֵּ֪ה אָרְב֡וּ לְנַפְשִׁ֗י יָג֣וּרוּ עָלַ֣י עַזִּ֑ים לֹֽא־פִשְׁעִ֖י וְלֹא־חַטָּאתִ֣י יְהֹוָֽה׃`,`בְּֽלִי־עָ֭וֺן יְרֻצ֣וּן וְיִכּוֹנָ֑נוּ ע֖וּרָה לִקְרָאתִ֣י וּרְאֵֽה׃`,`וְאַתָּ֤ה יְהֹוָֽה־אֱלֹהִ֥ים&thinsp;<small>׀</small>&thinsp;צְבָא֡וֹת אֱלֹ֘הֵ֤י יִשְׂרָאֵ֗ל הָקִ֗יצָה לִפְקֹ֥ד כׇּֽל־הַגּוֹיִ֑ם אַל־תָּחֹ֨ן כׇּל־בֹּ֖גְדֵי אָ֣וֶן סֶֽלָה׃`,`יָשׁ֣וּבוּ לָ֭עֶרֶב יֶהֱמ֥וּ כַכָּ֗לֶב וִיס֥וֹבְבוּ עִֽיר׃`,`הִנֵּ֤ה&thinsp;<b>׀</b> יַבִּ֘יע֤וּן בְּפִיהֶ֗ם חֲ֭רָבוֹת בְּשִׂפְתֽוֹתֵיהֶ֑ם כִּי־מִ֥י שֹׁמֵֽעַ׃`,`וְאַתָּ֣ה יְ֭הֹוָה תִּשְׂחַק־לָ֑מוֹ תִּ֝לְעַ֗ג לְכׇל־גּוֹיִֽם׃`,`עֻ֭זּוֹ אֵלֶ֣יךָ אֶשְׁמֹ֑רָה כִּֽי־אֱ֝לֹהִ֗ים מִשְׂגַּבִּֽי׃`,`אֱלֹהֵ֣י חַסְדִּ֣י יְקַדְּמֵ֑נִי אֱ֝לֹהִ֗ים יַרְאֵ֥נִי בְשֹׁרְרָֽי׃`,`אַל־תַּהַרְגֵ֤ם&thinsp;<b>׀</b> פֶּֽן־יִשְׁכְּח֬וּ עַמִּ֗י הֲנִיעֵ֣מוֹ בְ֭חֵילְךָ וְהוֹרִידֵ֑מוֹ מָ֖גִנֵּ֣נוּ אֲדֹנָֽי׃`,`חַטַּאת־פִּ֗ימוֹ דְּֽבַר־שְׂפָ֫תֵ֥ימוֹ וְיִלָּכְד֥וּ בִגְאוֹנָ֑ם וּמֵאָלָ֖ה וּמִכַּ֣חַשׁ יְסַפֵּֽרוּ׃`,`כַּלֵּ֥ה בְחֵמָה֮ כַּלֵּ֢ה וְֽאֵ֫ינֵ֥מוֹ וְֽיֵדְע֗וּ כִּֽי־אֱ֭לֹהִים מֹשֵׁ֣ל בְּֽיַעֲקֹ֑ב לְאַפְסֵ֖י הָאָ֣רֶץ סֶֽלָה׃`,`וְיָשֻׁ֣בוּ לָ֭עֶרֶב יֶהֱמ֥וּ כַכָּ֗לֶב וִיס֥וֹבְבוּ עִֽיר׃`,`הֵ֭מָּה יְנִיע֣וּן לֶאֱכֹ֑ל אִם־לֹ֥א יִ֝שְׂבְּע֗וּ וַיָּלִֽינוּ׃`,`וַאֲנִ֤י&thinsp;<b>׀</b> אָשִׁ֣יר עֻזֶּךָ֮ וַאֲרַנֵּ֥ן לַבֹּ֗קֶר חַ֫סְדֶּ֥ךָ כִּֽי־הָיִ֣יתָ מִשְׂגָּ֣ב לִ֑י וּ֝מָנ֗וֹס בְּי֣וֹם צַר־לִֽי׃`,`עֻ֭זִּי אֵלֶ֣יךָ אֲזַמֵּ֑רָה כִּֽי־אֱלֹהִ֥ים מִ֝שְׂגַּבִּ֗י אֱלֹהֵ֥י חַסְדִּֽי׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`]},{heading:`מִזְמוֹר ע״ז`,verses:[`לַמְנַצֵּ֥חַ עַֽל־יְדוּת֗וּן לְאָסָ֥ף מִזְמֽוֹר׃`,`קוֹלִ֣י אֶל־אֱלֹהִ֣ים וְאֶצְעָ֑קָה קוֹלִ֥י אֶל־אֱ֝לֹהִ֗ים וְהַאֲזִ֥ין אֵלָֽי׃`,`בְּי֥וֹם צָרָתִי֮ אֲדֹנָ֢י דָּ֫רָ֥שְׁתִּי יָדִ֤י&thinsp;<b>׀</b> לַ֣יְלָה נִ֭גְּרָה וְלֹ֣א תָפ֑וּג מֵאֲנָ֖ה הִנָּחֵ֣ם נַפְשִֽׁי׃`,`אֶזְכְּרָ֣ה אֱלֹהִ֣ים וְאֶהֱמָ֑יָה אָשִׂ֓יחָה&thinsp;<b>׀</b> וְתִתְעַטֵּ֖ף רוּחִ֣י סֶֽלָה׃`,`אָ֭חַזְתָּ שְׁמֻר֣וֹת עֵינָ֑י נִ֝פְעַ֗מְתִּי וְלֹ֣א אֲדַבֵּֽר׃`,`חִשַּׁ֣בְתִּי יָמִ֣ים מִקֶּ֑דֶם שְׁ֝נ֗וֹת עוֹלָמִֽים׃`,`אֶ֥זְכְּרָ֥ה נְגִינָתִ֗י בַּ֫לָּ֥יְלָה עִם־לְבָבִ֥י אָשִׂ֑יחָה וַיְחַפֵּ֥שׂ רוּחִֽי׃`,`הַֽ֭לְעוֹלָמִים יִזְנַ֥ח&thinsp;<small>׀</small>&thinsp;אֲדֹנָ֑י וְלֹא־יֹסִ֖יף לִרְצ֣וֹת עֽוֹד׃`,`הֶאָפֵ֣ס לָנֶ֣צַח חַסְדּ֑וֹ גָּ֥מַר אֹ֝֗מֶר לְדֹ֣ר וָדֹֽר׃`,`הֲשָׁכַ֣ח חַנּ֣וֹת אֵ֑ל אִם־קָפַ֥ץ בְּ֝אַ֗ף רַחֲמָ֥יו סֶֽלָה׃`,`וָ֭אֹמַר חַלּ֣וֹתִי הִ֑יא שְׁ֝נ֗וֹת יְמִ֣ין עֶלְיֽוֹן׃`,`אֶזְכּ֥וֹר מַעַלְלֵי־יָ֑הּ כִּֽי־אֶזְכְּרָ֖ה מִקֶּ֣דֶם פִּלְאֶֽךָ׃`,`וְהָגִ֥יתִי בְכׇל־פׇּעֳלֶ֑ךָ וּֽבַעֲלִ֖ילוֹתֶ֣יךָ אָשִֽׂיחָה׃`,`אֱ֭לֹהִים בַּקֹּ֣דֶשׁ דַּרְכֶּ֑ךָ מִי־אֵ֥ל גָּ֝ד֗וֹל כֵּאלֹהִֽים׃`,`אַתָּ֣ה הָ֭אֵל עֹ֣שֵׂה פֶ֑לֶא הוֹדַ֖עְתָּ בָעַמִּ֣ים עֻזֶּֽךָ׃`,`גָּאַ֣לְתָּ בִּזְר֣וֹעַ עַמֶּ֑ךָ בְּנֵֽי־יַעֲקֹ֖ב וְיוֹסֵ֣ף סֶֽלָה׃`,`רָ֘א֤וּךָ מַּ֨יִם&thinsp;<b>׀</b> אֱֽלֹהִ֗ים רָא֣וּךָ מַּ֣יִם יָחִ֑ילוּ אַ֝֗ף יִרְגְּז֥וּ תְהֹמֽוֹת׃`,`זֹ֤רְמוּ מַ֨יִם&thinsp;<b>׀</b> עָב֗וֹת ק֭וֹל נָתְנ֣וּ שְׁחָקִ֑ים אַף־חֲ֝צָצֶ֗יךָ יִתְהַלָּֽכוּ׃`,`ק֤וֹל רַעַמְךָ֨&thinsp;<b>׀</b> בַּגַּלְגַּ֗ל הֵאִ֣ירוּ בְרָקִ֣ים תֵּבֵ֑ל רָגְזָ֖ה וַתִּרְעַ֣שׁ הָאָֽרֶץ׃`,`בַּיָּ֤ם דַּרְכֶּ֗ךָ וּֽ֭שְׁבִילְךָ בְּמַ֣יִם רַבִּ֑ים וְ֝עִקְּבוֹתֶ֗יךָ לֹ֣א נֹדָֽעוּ׃`,`נָחִ֣יתָ כַצֹּ֣אן עַמֶּ֑ךָ בְּֽיַד־מֹשֶׁ֥ה וְאַהֲרֹֽן׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`]},{heading:`מִזְמוֹר צ׳`,verses:[`תְּפִלָּה֮ לְמֹשֶׁ֢ה אִֽישׁ־הָאֱלֹ֫הִ֥ים אֲֽדֹנָ֗י מָע֣וֹן אַ֭תָּה הָיִ֥יתָ לָּ֗נוּ בְּדֹ֣ר וָדֹֽר׃`,`בְּטֶ֤רֶם&thinsp;<b>׀</b> הָ֘רִ֤ים יֻלָּ֗דוּ וַתְּח֣וֹלֵֽל אֶ֣רֶץ וְתֵבֵ֑ל וּֽמֵעוֹלָ֥ם עַד־ע֝וֹלָ֗ם אַתָּ֥ה אֵֽל׃`,`תָּשֵׁ֣ב אֱ֭נוֹשׁ עַד־דַּכָּ֑א וַ֝תֹּ֗אמֶר שׁ֣וּבוּ בְנֵֽי־אָדָֽם׃`,`כִּ֤י אֶ֪לֶף שָׁנִ֡ים בְּֽעֵינֶ֗יךָ כְּי֣וֹם אֶ֭תְמוֹל כִּ֣י יַעֲבֹ֑ר וְאַשְׁמוּרָ֥ה בַלָּֽיְלָה׃`,`זְ֭רַמְתָּם שֵׁנָ֣ה יִהְי֑וּ בַּ֝בֹּ֗קֶר כֶּחָצִ֥יר יַחֲלֹֽף׃`,`בַּ֭בֹּקֶר יָצִ֣יץ וְחָלָ֑ף לָ֝עֶ֗רֶב יְמוֹלֵ֥ל וְיָבֵֽשׁ׃`,`כִּי־כָלִ֥ינוּ בְאַפֶּ֑ךָ וּֽבַחֲמָתְךָ֥ נִבְהָֽלְנוּ׃`,`שַׁתָּ֣ עֲוֺנֹתֵ֣ינוּ לְנֶגְדֶּ֑ךָ עֲ֝לֻמֵ֗נוּ לִמְא֥וֹר פָּנֶֽיךָ׃`,`כִּ֣י כׇל־יָ֭מֵינוּ פָּנ֣וּ בְעֶבְרָתֶ֑ךָ כִּלִּ֖ינוּ שָׁנֵ֣ינוּ כְמוֹ־הֶֽגֶה׃`,`יְמֵֽי־שְׁנוֹתֵ֨ינוּ בָהֶ֥ם שִׁבְעִ֪ים שָׁנָ֡ה וְאִ֤ם בִּגְבוּרֹ֨ת&thinsp;<b>׀</b> שְׁמ֘וֹנִ֤ים שָׁנָ֗ה וְ֭רׇהְבָּם עָמָ֣ל וָאָ֑וֶן כִּי־גָ֥ז חִ֝֗ישׁ וַנָּעֻֽפָה׃`,`מִֽי־י֭וֹדֵעַ עֹ֣ז אַפֶּ֑ךָ וּ֝כְיִרְאָתְךָ֗ עֶבְרָתֶֽךָ׃`,`לִמְנ֣וֹת יָ֭מֵינוּ כֵּ֣ן הוֹדַ֑ע וְ֝נָבִ֗א לְבַ֣ב חׇכְמָֽה׃`,`שׁוּבָ֣ה יְ֭הֹוָה עַד־מָתָ֑י וְ֝הִנָּחֵ֗ם עַל־עֲבָדֶֽיךָ׃`,`שַׂבְּעֵ֣נוּ בַבֹּ֣קֶר חַסְדֶּ֑ךָ וּֽנְרַנְּנָ֥ה וְ֝נִשְׂמְחָ֗ה בְּכׇל־יָמֵֽינוּ׃`,`שַׂ֭מְּחֵנוּ כִּימ֣וֹת עִנִּיתָ֑נוּ שְׁ֝נ֗וֹת רָאִ֥ינוּ רָעָֽה׃`,`יֵרָאֶ֣ה אֶל־עֲבָדֶ֣יךָ פׇעֳלֶ֑ךָ וַ֝הֲדָרְךָ֗ עַל־בְּנֵיהֶֽם׃`,`וִיהִ֤י&thinsp;<b>׀</b> נֹ֤עַם אֲדֹנָ֥י אֱלֹהֵ֗ינוּ עָ֫לֵ֥ינוּ וּמַעֲשֵׂ֣ה יָ֭דֵינוּ כּוֹנְנָ֥ה עָלֵ֑ינוּ וּֽמַעֲשֵׂ֥ה יָ֝דֵ֗ינוּ כּוֹנְנֵֽהוּ׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`]},{heading:`מִזְמוֹר ק״ה`,verses:`הוֹד֣וּ לַ֭יהֹוָה קִרְא֣וּ בִשְׁמ֑וֹ הוֹדִ֥יעוּ בָ֝עַמִּ֗ים עֲלִילוֹתָֽיו׃.שִֽׁירוּ־ל֭וֹ זַמְּרוּ־ל֑וֹ שִׂ֝֗יחוּ בְּכׇל־נִפְלְאוֹתָֽיו׃.הִֽ֭תְהַלְלוּ בְּשֵׁ֣ם קׇדְשׁ֑וֹ יִ֝שְׂמַ֗ח לֵ֤ב&thinsp;<b>׀</b> מְבַקְשֵׁ֬י יְהֹוָֽה׃.דִּרְשׁ֣וּ יְהֹוָ֣ה וְעֻזּ֑וֹ בַּקְּשׁ֖וּ פָנָ֣יו תָּמִֽיד׃.זִכְר֗וּ נִפְלְאוֹתָ֥יו אֲשֶׁר־עָשָׂ֑ה מֹ֝פְתָ֗יו וּמִשְׁפְּטֵי־פִֽיו׃.זֶ֭רַע אַבְרָהָ֣ם עַבְדּ֑וֹ בְּנֵ֖י יַעֲקֹ֣ב בְּחִירָֽיו׃.ה֭וּא יְהֹוָ֣ה אֱלֹהֵ֑ינוּ בְּכׇל־הָ֝אָ֗רֶץ מִשְׁפָּטָֽיו׃.זָכַ֣ר לְעוֹלָ֣ם בְּרִית֑וֹ דָּבָ֥ר צִ֝וָּ֗ה לְאֶ֣לֶף דּֽוֹר׃.אֲשֶׁ֣ר כָּ֭רַת אֶת־אַבְרָהָ֑ם וּשְׁב֖וּעָת֣וֹ לְיִשְׂחָֽק׃.וַיַּעֲמִידֶ֣הָ לְיַעֲקֹ֣ב לְחֹ֑ק לְ֝יִשְׂרָאֵ֗ל בְּרִ֣ית עוֹלָֽם׃.לֵאמֹ֗ר לְךָ֗ אֶתֵּ֥ן אֶת־אֶֽרֶץ־כְּנָ֑עַן חֶ֝֗בֶל נַחֲלַתְכֶֽם׃.בִּֽ֭הְיוֹתָם מְתֵ֣י מִסְפָּ֑ר כִּ֝מְעַ֗ט וְגָרִ֥ים בָּֽהּ׃.וַ֭יִּֽתְהַלְּכוּ מִגּ֣וֹי אֶל־גּ֑וֹי מִ֝מַּמְלָכָ֗ה אֶל־עַ֥ם אַחֵֽר׃.לֹא־הִנִּ֣יחַ אָדָ֣ם לְעׇשְׁקָ֑ם וַיּ֖וֹכַח עֲלֵיהֶ֣ם מְלָכִֽים׃.אַֽל־תִּגְּע֥וּ בִמְשִׁיחָ֑י וְ֝לִנְבִיאַ֗י אַל־תָּרֵֽעוּ׃.וַיִּקְרָ֣א רָ֭עָב עַל־הָאָ֑רֶץ כׇּֽל־מַטֵּה־לֶ֥חֶם שָׁבָֽר׃.שָׁלַ֣ח לִפְנֵיהֶ֣ם אִ֑ישׁ לְ֝עֶ֗בֶד נִמְכַּ֥ר יוֹסֵֽף׃.עִנּ֣וּ בַכֶּ֣בֶל רַגְל֑וֹ בַּ֝רְזֶ֗ל בָּ֣אָה נַפְשֽׁוֹ׃.עַד־עֵ֥ת בֹּא־דְבָר֑וֹ אִמְרַ֖ת יְהֹוָ֣ה צְרָפָֽתְהוּ׃.שָׁ֣לַח מֶ֭לֶךְ וַיַּתִּירֵ֑הוּ מֹשֵׁ֥ל עַ֝מִּ֗ים וַֽיְפַתְּחֵֽהוּ׃.שָׂמ֣וֹ אָד֣וֹן לְבֵית֑וֹ וּ֝מֹשֵׁ֗ל בְּכׇל־קִנְיָנֽוֹ׃.לֶאְסֹ֣ר שָׂרָ֣יו בְּנַפְשׁ֑וֹ וּזְקֵנָ֥יו יְחַכֵּֽם׃.וַיָּבֹ֣א יִשְׂרָאֵ֣ל מִצְרָ֑יִם וְ֝יַעֲקֹ֗ב גָּ֣ר בְּאֶֽרֶץ־חָֽם׃.וַיֶּ֣פֶר אֶת־עַמּ֣וֹ מְאֹ֑ד וַ֝יַּעֲצִמֵ֗הוּ מִצָּרָֽיו׃.הָפַ֣ךְ לִ֭בָּם לִשְׂנֹ֣א עַמּ֑וֹ לְ֝הִתְנַכֵּ֗ל בַּעֲבָדָֽיו׃.שָׁ֭לַח מֹשֶׁ֣ה עַבְדּ֑וֹ אַ֝הֲרֹ֗ן אֲשֶׁ֣ר בָּחַר־בּֽוֹ׃.שָֽׂמוּ־בָ֭ם דִּבְרֵ֣י אֹתוֹתָ֑יו וּ֝מֹפְתִ֗ים בְּאֶ֣רֶץ חָֽם׃.שָׁ֣לַֽח חֹ֭שֶׁךְ וַיַּחְשִׁ֑ךְ וְלֹא־מָ֝ר֗וּ אֶת־דְּבָרֽוֹ ׃.הָפַ֣ךְ אֶת־מֵימֵיהֶ֣ם לְדָ֑ם וַ֝יָּ֗מֶת אֶת־דְּגָתָֽם׃.שָׁרַ֣ץ אַרְצָ֣ם צְפַרְדְּעִ֑ים בְּ֝חַדְרֵ֗י מַלְכֵיהֶֽם׃.אָ֭מַר וַיָּבֹ֣א עָרֹ֑ב כִּ֝נִּ֗ים בְּכׇל־גְּבוּלָֽם׃.נָתַ֣ן גִּשְׁמֵיהֶ֣ם בָּרָ֑ד אֵ֖שׁ לֶהָב֣וֹת בְּאַרְצָֽם׃.וַיַּ֣ךְ גַּ֭פְנָם וּתְאֵנָתָ֑ם וַ֝יְשַׁבֵּ֗ר עֵ֣ץ גְּבוּלָֽם׃.אָ֭מַר וַיָּבֹ֣א אַרְבֶּ֑ה וְ֝יֶ֗לֶק וְאֵ֣ין מִסְפָּֽר׃.וַיֹּ֣אכַל כׇּל־עֵ֣שֶׂב בְּאַרְצָ֑ם וַ֝יֹּ֗אכַל פְּרִ֣י אַדְמָתָֽם׃.וַיַּ֣ךְ כׇּל־בְּכ֣וֹר בְּאַרְצָ֑ם רֵ֝אשִׁ֗ית לְכׇל־אוֹנָֽם׃.וַֽ֭יּוֹצִיאֵם בְּכֶ֣סֶף וְזָהָ֑ב וְאֵ֖ין בִּשְׁבָטָ֣יו כּוֹשֵֽׁל׃.שָׂמַ֣ח מִצְרַ֣יִם בְּצֵאתָ֑ם כִּֽי־נָפַ֖ל פַּחְדָּ֣ם עֲלֵיהֶֽם׃.פָּרַ֣שׂ עָנָ֣ן לְמָסָ֑ךְ וְ֝אֵ֗שׁ לְהָאִ֥יר לָֽיְלָה׃.שָׁ֭אַל וַיָּבֵ֣א שְׂלָ֑ו וְלֶ֥חֶם שָׁ֝מַ֗יִם יַשְׂבִּיעֵֽם׃.פָּ֣תַח צ֭וּר וַיָּז֣וּבוּ מָ֑יִם הָ֝לְכ֗וּ בַּצִּיּ֥וֹת נָהָֽר׃.כִּֽי־זָ֭כַר אֶת־דְּבַ֣ר קׇדְשׁ֑וֹ אֶֽת־אַבְרָהָ֥ם עַבְדּֽוֹ׃.וַיּוֹצִ֣א עַמּ֣וֹ בְשָׂשׂ֑וֹן בְּ֝רִנָּ֗ה אֶת־בְּחִירָֽיו׃.וַיִּתֵּ֣ן לָ֭הֶם אַרְצ֣וֹת גּוֹיִ֑ם וַעֲמַ֖ל לְאֻמִּ֣ים יִירָֽשׁוּ׃.בַּעֲב֤וּר&thinsp;<b>׀</b> יִשְׁמְר֣וּ חֻ֭קָּיו וְתוֹרֹתָ֥יו יִנְצֹ֗רוּ הַֽלְלוּ־יָֽהּ׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`.split(`.`)},{heading:`מִזְמוֹר קל״ז`,verses:[`עַ֥ל<span class="mam-implicit-maqaf">־</span>נַהֲר֨וֹת&thinsp;<b>׀</b> בָּבֶ֗ל שָׁ֣ם יָ֭שַׁבְנוּ גַּם־בָּכִ֑ינוּ בְּ֝זׇכְרֵ֗נוּ אֶת־צִיּֽוֹן׃`,`עַֽל־עֲרָבִ֥ים בְּתוֹכָ֑הּ תָּ֝לִ֗ינוּ כִּנֹּרוֹתֵֽינוּ׃`,`כִּ֤י שָׁ֨ם שְֽׁאֵל֪וּנוּ שׁוֹבֵ֡ינוּ דִּבְרֵי־שִׁ֭יר וְתוֹלָלֵ֣ינוּ שִׂמְחָ֑ה שִׁ֥ירוּ לָ֝֗נוּ מִשִּׁ֥יר צִיּֽוֹן׃`,`אֵ֗יךְ נָשִׁ֥יר אֶת־שִׁיר־יְהֹוָ֑ה עַ֝֗ל אַדְמַ֥ת נֵכָֽר׃`,`אִֽם־אֶשְׁכָּחֵ֥ךְ יְֽרוּשָׁלָ֗͏ִם תִּשְׁכַּ֥ח יְמִינִֽי׃`,`תִּדְבַּֽק־לְשׁוֹנִ֨י&thinsp;<b>׀</b> לְחִכִּי֮ אִם־לֹ֢א אֶ֫זְכְּרֵ֥כִי אִם־לֹ֣א אַ֭עֲלֶה אֶת־יְרוּשָׁלַ֑͏ִם עַ֝֗ל רֹ֣אשׁ שִׂמְחָתִֽי׃`,`זְכֹ֤ר יְהֹוָ֨ה&thinsp;<b>׀</b> לִבְנֵ֬י אֱד֗וֹם אֵת֮ י֤וֹם יְֽר֫וּשָׁלָ֥͏ִם הָ֭אֹ֣מְרִים עָ֤רוּ&thinsp;<b>׀</b> עָ֑רוּ עַ֝֗ד הַיְס֥וֹד בָּֽהּ׃`,`בַּת־בָּבֶ֗ל הַשְּׁד֫וּדָ֥ה אַשְׁרֵ֥י שֶׁיְשַׁלֶּם־לָ֑ךְ אֶת־גְּ֝מוּלֵ֗ךְ שֶׁגָּמַ֥לְתְּ לָֽנוּ׃`,`אַשְׁרֵ֤י&thinsp;<b>׀</b> שֶׁיֹּאחֵ֓ז וְנִפֵּ֬ץ אֶֽת־עֹלָלַ֗יִךְ אֶל־הַסָּֽלַע׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`]},{heading:`מִזְמוֹר ק״נ`,verses:[`הַ֥לְלוּ<span class="mam-implicit-maqaf">־</span>יָ֨הּ&thinsp;<b>׀</b> הַֽלְלוּ־אֵ֥ל בְּקׇדְשׁ֑וֹ הַֽ֝לְל֗וּהוּ בִּרְקִ֥יעַ עֻזּֽוֹ׃`,`הַלְל֥וּהוּ בִגְבוּרֹתָ֑יו הַ֝לְל֗וּהוּ כְּרֹ֣ב גֻּדְלֽוֹ׃`,`הַ֭לְלוּהוּ בְּתֵ֣קַע שׁוֹפָ֑ר הַ֝לְל֗וּהוּ בְּנֵ֣בֶל וְכִנּֽוֹר׃`,`הַ֭לְלוּהוּ בְּתֹ֣ף וּמָח֑וֹל הַֽ֝לְל֗וּהוּ בְּמִנִּ֥ים וְעֻגָֽב׃`,`הַלְל֥וּהוּ בְצִלְצְלֵי־שָׁ֑מַע הַֽ֝לְל֗וּהוּ בְּֽצִלְצְלֵ֥י תְרוּעָֽה׃`,`כֹּ֣ל הַ֭נְּשָׁמָה תְּהַלֵּ֥ל יָ֗הּ הַֽלְלוּ־יָֽהּ׃`]},{heading:`פְּסוּקִים לְאַחַר תְּהִלִּים`,verses:[`מִ֥י־יִתֵּ֣ן מִצִּיּוֹן֮ יְשׁוּעַ֢ת יִשְׂרָ֫אֵ֥ל בְּשׁ֣וּב יְ֭הֹוָה שְׁב֣וּת עַמּ֑וֹ יָגֵ֥ל יַ֝עֲקֹ֗ב יִשְׂמַ֥ח יִשְׂרָאֵֽל׃`,`וּתְשׁוּעַ֣ת צַ֭דִּיקִים מֵיְהֹוָ֑ה מָ֝עוּזָּ֗ם בְּעֵ֣ת צָרָֽה׃`,`וַ֥יַּעְזְרֵ֥ם יְהֹוָ֗ה וַֽיְפַ֫לְּטֵ֥ם יְפַלְּטֵ֣ם מֵ֭רְשָׁעִים וְיוֹשִׁיעֵ֑ם כִּי־חָ֥סוּ בֽוֹ׃`],numbered:!1},{heading:`תְּפִלָּה קְצָרָה`,verses:[`רִבּוֹנוֹ שֶׁל עוֹלָם, עִלַּת הָעִלּוֹת וְסִבַּת כָּל הַסִּבּוֹת, אַנְתְּ לְעֵלָּא לְעֵלָּא מִן כֹּלָא, וְלֵית לְעֵלָּא מִנָּךְ, דְּלֵית מַחֲשָׁבָה תְּפִיסָא בָךְ כְּלָל, וּלְךָ דֻמִיָּה תְהִלָּה, וּמְרוֹמַם עַל כָּל בְּרָכָה וּתְהִלָּה.`,`אוֹתְךָ אֶדְרֹשׁ אוֹתְךָ אֲבַקֵּשׁ, שֶׁתַּחְתֹּר חֲתִירָה דֶּרֶךְ כְּבוּשָׁה מֵאִתְּךָ, דֶּרֶךְ כָּל הָעוֹלָמוֹת, עַד הַהִשְׁתַּלְשְׁלוּת שֶׁלִּי בַּמָּקוֹם שֶׁאֲנִי עוֹמֵד, כְּפִי אֲשֶׁר נִגְלָה לְךָ יֹדֵעַ תַּעֲלֻמוֹת, וּבַדֶּרֶךְ וּנְתִיב הַזֶּה תָּאִיר עָלַי אוֹרְךָ, לְהַחֲזִירֵנִי בִּתְשׁוּבָה שְׁלֵמָה לְפָנֶיךָ בֶּאֱמֶת, כְּפִי רְצוֹנְךָ בֶּאֱמֶת, כְּפִי רְצוֹן מִבְחַר הַבְּרוּאִים, לִבְלִי לַחֲשֹׁב בְּמַחֲשַׁבְתִּי שׁוּם מַחֲשֶׁבֶת חוּץ, וְשׁוּם מַחֲשָׁבָה וּבִלְבּוּל שֶׁהוּא נֶגֶד רְצוֹנֶךָ, רַק לִדַּבֵּק בְּמַחֲשָׁבוֹת זַכּוֹת צַחוֹת וּקְדוֹשׁוֹת בַּעֲבוֹדָתְךָ בֶּאֱמֶת בְּהַשָּׂגָתְךָ וּבְתוֹרָתְךָ.`,`הַט לִבִּי אֶל עֵדְוֹתֶיךָ, וְתֵן לִי לֵב טָהוֹר לְעָבְדְּךָ בֶּאֱמֶת. וּמִמְּצֻלוֹת יָם תּוֹצִיאֵנִי לְאוֹר גָּדוֹל חִישׁ קַל מְהֵרָה, תְּשׁוּעַת יְהֹוָה כְּהֶרֶף עַיִן, לֵאוֹר בְּאוֹר הַחַיִּים כָּל יְמֵי הֱיוֹתִי עַל פְּנֵי הָאֲדָמָה. וְאֶזְכֶּה לְחַדֵּשׁ נְעוּרַי הַיָּמִים שֶׁעָבְרוּ בַּחֹשֶׁךְ, לְהַחֲזִירָם אֶל הַקְּדֻשָּׁה, וְתִהְיֶה יְצִיאָתִי מִן הָעוֹלָם כְּבִיאָתִי בְּלֹא חֵטְא. וְאֶזְכֶּה לַחֲזוֹת בְּנֹעַם יְהֹוָה וּלְבַקֵּר בְּהֵיכָלוֹ, כֻּלּוֹ אֹמֵר כָּבוֹד, אָמֵן נֶצַח סֶלָה וָעֶד:`],numbered:!1}]},Ev={"tikkun-haklali":Tv,"perek-shira":{id:`perek-shira`,numbered:!1,title:`פֶּרֶק שִׁירָה`,subtitle:`שירת הבריאה כולה`,chapters:[{heading:`הַקְדָּמָה`,verses:[`אָמַר רַבִּי, כָּל הָעוֹסֵק בְּפֶרֶק שִׁירָה בָּעוֹלָם הַזֶּה, זוֹכֶה לִלְמֹד וּלְלַמֵּד, לִשְׁמֹר וְלַעֲשׂוֹת וּלְקַיֵּם, וְתַלְמוּדוֹ מִתְקַיֵּם בְּיָדוֹ, וְנִצּוֹל מִיֵּצֶר הָרַע, וּמִפֶּגַע רַע, וּמֵחִבּוּט הַקֶּבֶר, וּמִדִּינָהּ שֶׁל גֵּיהִינֹּם, וּמֵחֶבְלוֹ שֶׁל מָשִׁיחַ, וּמַאֲרִיךְ יָמִים, וְזוֹכֶה לִימוֹת הַמָּשִׁיחַ, וּלְחַיֵּי הָעוֹלָם הַבָּא:`,`תַּנְיָא אָמַר רַבִּי אֱלִיעֶזֶר, כָּל הָאוֹמֵר שִׁירָה זוֹ בָּעוֹלָם הַזֶּה, זוֹכֶה וְאוֹמְרוֹ לָעוֹלָם הַבָּא, שֶׁנֶּאֱמַר אָז יָשִׁיר מֹשֶׁה, שָׁר לֹא נֶאֱמַר אֶלָּא יָשִׁיר אוֹתוֹ לֶעָתִיד לָבוֹא:`,`תָּנְיָא רַבִּי אֱלִיעֶזֶר הַגָּדוֹל אוֹמֵר, כָּל הָעוֹסֵק בְּפֶרֶק שִׁירָה זֶה בְּכָל יוֹם, מֵעִיד אֲנִי עָלָיו שֶׁהוּא בֶּן הָעוֹלָם הַבָּא, וְנִצּוֹל מִפֶּגַע רָע, וּמִיֵּצֶר הָרָע, וּמִדִּין קָשֶׁה, וּמִשָּׂטָן, וּמִכָּל מִינֵי מַשְׁחִית וּמַזִּיקִין. גְּמוֹר בְכָל לְבָבְךָ וּבְכָל נַפְשְׁךָ לָדַעַת דְּרָכַי וְלִשְׁמוֹר מִצְוֹתַי וְחֻקָּי. נְצוֹר תּוֹרָתִי בִּלְבָבֶךָ וְנֶגֶד עֵינֶיךָ תִּהְיֶה יִרְאָתִי. שְׁמוֹר פִּיךָ וּלְשׁוֹנְךָ מִכָּל חֵטְא וְאַשְׁמָה, וַאֲנִי אֶהְיֶה עִמְּךָ בְּכָל מָקוֹם שֶׁתֵּלֵךְ, וַאֲלַמֶּדְךָ שֵׂכֶל וּבִינָה מִכָּל דָּבָר. וֶהֱוֵי יוֹדֵעַ שֶׁכָּל מַה שֶּׁבָּרָא הַקָּדוֹשׁ בָּרוּךְ הוּא לֹא בְרָאוֹ כִּי אִם לִכְבוֹדוֹ, שֶׁנֶּאֱמַר כֹּל הַנִּקְרָא בִשְׁמִי וְלִכְבוֹדִי בְרָאתִיו יְצַרְתִּיו אַף עֲשִׂיתִיו.`,`אָמְרוּ חז"ל עַל דָּוִד מֶלֶךְ יִשְׂרָאֵל, בְּשָׁעָה שֶׁסִּיֵּם סֵפֶר תְּהִלִּים זָחָה דַּעְתּוֹ עָלָיו וְאָמַר לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא, יֵשׁ בְּרִיָּה שֶׁבָּרָאתָ בְּעוֹלָמְךָ שֶׁאוֹמֶרֶת שִׁירוֹת וְתִשְׁבָּחוֹת יוֹתֵר מִמֶּנִּי. בְּאוֹתָהּ שָׁעָה נִזְדַּמְנָה לוֹ צְפַרְדֵּעַ אַחַת, וְאָמְרָה לוֹ, דָּוִד אַל תָּזוּחַ דַּעְתְּךָ עָלֶיךָ, שֶׁאֲנִי אוֹמֶרֶת שִׁירוֹת וְתִשְׁבָּחוֹת יוֹתֵר מִמֶּךָּ. וְלֹא עוֹד אֶלָּא כָּל שִׁירָה שֶׁאֲנִי אוֹמֶרֶת מְמַשֶּׁלֶת עָלֶיהָ שְׁלֹשֶׁת אֲלָפִים מְשָׁלִים, שֶׁנֶּאֱמַר וַיְדַבֵּר שְׁלֹשֶׁת אֲלָפִים מָשָׁל וַיְהִי שִׁירוֹ חֲמִשָּׁה וָאָלֶף. וְלֹא עוֹד אֶלָּא שֶׁאֲנִי עוֹסֶקֶת בְּמִצְוָה גְדוֹלָה, וְזוּ הִיא הַמִּצְוָה שֶׁאֲנִי עוֹסֶקֶת בָּהּ, יֵשׁ בִּשְׂפַת הַיָּם מִין אֶחָד שֶׁאֵין פַּרְנָסָתוֹ כִּי אִם מִן הַמַּיִם, וּבְשָׁעָה שֶׁהוּא רָעֵב נוֹטְלֵנִי וְאוֹכְלֵנִי. זוּ הִיא הַמִּצְוָה. לְקַיֵּם מַה שֶּׁנֶּאֱמַר אִם רָעֵב שׂוֹנַאֲךָ הַאֲכִילֵהוּ לֶחֶם, וְאִם צָמֵא הַשְׁקֵהוּ מָיִם, כִּי גֶּחָלִים אַתָּה חוֹתֶה עַל רֹאשׁוֹ, וַיְיָ יְשַׁלֶּם לָךְ. אַל תִּקְרֵי יְשַׁלֶּם לָךְ אֶלָּא יַשְׁלִימֶנּוּ לָךְ:`],numbered:!1},{heading:`פֶּרֶק א׳`,verses:[`<b>שָׁמַיִם</b> אוֹמְרִים: הַשָּׁמַיִם מְסַפְּרִים כְּבוֹד אֵל וּמַעֲשֵׂה יָדָיו מַגִּיד הָרָקִיעַ: <small>(תהילים יט ב)</small>`,`<b>אֶרֶץ</b> אוֹמֶרֶת. לְדָוִד מִזְמוֹר לַיי הָאָרֶץ וּמְלוֹאָהּ תֵּבֵל וְיֹשְׁבֵי בָהּ: <small>(תהילים כד א)</small>`,`ואומר. מִכְּנַף הָאָרֶץ זְמִרֹת שָׁמַעְנוּ צְבִי לַצָדִיק: <small>(ישעיהו כד טז)</small>`,`<b>גַּן עֵדֶן</b> אוֹמֵר. עוּרִי צָפוֹן וּבוֹאִי תֵימָן הָפִיחִי גַנִּי יִזְּלוּ בְשָׂמָיו יָבֹא דוֹדִי לְגַנּוֹ וְיֹאכַל פְּרִי מְגָדַיו: <small>(שיר השירים ד טז)</small>`,`<b>גֵּיהִנֹּם</b> אוֹמֵר. כִּי הִשְׂבִּיעַ נֶפֶשׁ שֹׁקֵקָה וְנֶפֶשׁ רְעֵבָה מִלֵּא טוֹב: <small>(תהילים קז ט)</small>`,`<b>מִדְבַּר</b> אוֹמֵר. יְשֻׂשׂוּם מִדְבָּר וְצִיָּה וְתָגֵל עֲרָבָה וְתִפְרַח כַּחֲבַצָּלֶת: <small>(ישעיהו לה א)</small>`,`<b>שָׂדוֹת</b> אוֹמְרִים. יי בְּחָכְמָה יָסַד אָרֶץ כּוֹנֵן שָׁמַיִם בִּתְבוּנָה: <small>(משלי ג יט)</small>`,`<b>מַיִם</b> אוֹמְרִים. לְקֹול תִּתֹּו הֲמֹון מַיִם בַּשָּׁמַיִם וַיַּעַל נְשִׂאִים מִקְצֵה אָרֶץ בְּרָקִים לַמָּטָר עָשָׂה וַיֹּצֵא רוּחַ מֵאֹצְרֹתָיו: <small>(ירמיה נא טז)</small>`,`<b>יָמִים</b> אוֹמְרִים. מִקֹּלוֹת מַיִם רַבִּים אַדִּירִים מִשְׁבְּרֵי יָם אַדִּיר בַּמָּרוֹם יי: <small>(תהילים צג ד)</small>`,`<b>נַהֲרוֹת</b> אוֹמְרִים. נְהָרוֹת יִמְחֲאוּ כָף יַחַד הָרִים יְרַנֵּנוּ <small>(תהילים צח ח)</small>`,`<b>מַעְיָנוֹת</b> אוֹמְרִים. וְשָׁרִים כְּחֹלְלִים כָּל מַעְיָנַי בָּךְ: <small>(תהילים פז ז)</small>`]},{heading:`פֶּרֶק ב׳`,verses:[`<b>יוֹם</b> אוֹמֵר. יוֹם לְיוֹם יַבִּיעַ אֹמֶר וְלַיְלָה לְּלַיְלָה יְחַוֶּה דָּעַת: <small>(תהילים יט ג)</small>`,`<b>לַיְלָה</b> אוֹמֵר. לְהַגִּיד בַּבֹּקֶר חַסְדֶּךָ וֶאֱמוּנָתְךָ בַּלֵילוֹת: <small>(תהילים צב ג)</small>`,`<b>שֶׁמֶשׁ</b> אוֹמֵר. שֶׁמֶשׁ יָרֵחַ עָמַד זְבֻלָה לְאוֹר חִצֶּיךָ יְהַלֵּכוּ לְנֹגַהּ בְּרַק חֲנִיתֶּךָ: <small>(חבקוק ג יא)</small>`,`<b>יָרֵחַ</b> אוֹמֶרֶת. עָשָׂה יָרֵחַ לְמוֹעֲדִים שֶׁמֶשׁ יָדַע מְבוֹאוֹ: <small>(תהילים קד יט)</small>`,`<b>כּוֹכָבִים</b> אוֹמְרִים. אַתָּה הוּא יי לְבַדֶּךָ אַתָּה עָשִׂיתָ אֶת הַשָּׁמַיִם שְׁמֵי הַשָּׁמַיִם וְכָל צְבָאָם הָאָרֶץ וְכָל אֲשֶׁר עָלֶיהָ הַיַּמִּים וְכָל אֲשֶׁר בָּהֶם וְאַתָּה מְחַיֶּה אֶת כֻּלָּם וּצְבָא הַשָּׁמַיִם לְךָ מִשְׁתַּחֲוִים: <small>(נחמיה ט ו)</small>`,`<b>עָבִים</b> אוֹמְרִים. יָשֶׁת חֹשֶׁךְ סִתְרוֹ סְבִיבוֹתָיו סֻכָּתוֹ חֶשְׁכַת מַיִם עָבֵי שְׁחָקִים: <small>(תהילים יח יב)</small>`,`<b>עַנְנֵי כָּבוֹד</b> אוֹמְרִים. אַף בְּרִי יַטְרִיחַ עָב יָפִיץ עֲנַן אוֹרוֹ: <small>(איוב לז יא)</small>`,`<b>רוּחַ</b> אוֹמֵר. אֹמַר לַצָּפוֹן תֵּנִי וּלְתֵימָן אַל תִּכְלָאִי הָבִיאִי בָנַי מֵרָחוֹק וּבְנוֹתַי מִקְצֵה הָאָרֶץ: <small>(ישעיה מג ו)</small>`,`<b>בְּרָקִים</b> אוֹמְרִים. בְּרָקִים לַמָּטָר עָשָׂה מוֹצֵא רוּחַ מֵאוֹצְרוֹתָיו: <small>(תהילים קלה ז)</small>`,`<b>טַל</b> אוֹמֵר. אֶהְיֶה כַטַּל לְיִשְׂרָאֵל יִפְרַח כַּשּׁוֹשַׁנָּה וְיַךְ שָׁרָשָׁיו כַּלְּבָנוֹן: <small>(הושע יד ו)</small>`,`<b>גְּשָׁמִים</b> אוֹמְרִים. גֶּשֶׁם נְדָבוֹת תָּנִיף אֱלֹהִים נַחֲלָתְךָ וְנִלְאָה אַתָּה כוֹנַנְתָּהּ <small>(תהילים סח י)</small>`]},{heading:`פֶּרֶק ג׳`,verses:[`<b>אִילָנוֹת</b> שֶׁבְּשָׂדֶה אוֹמְרִים. אָז יְרַנְּנוּ עֲצֵי הַיָּעַר מִלִּפְנֵי יי כִּי בָא לִשְׁפּוֹט אֶת הָאָרֶץ: <small>(דברי הימים א טז לג)</small>`,`<b>גֶּפֶן</b> אוֹמֶרֶת. כֹּה אָמַר יי כַּאֲשֶׁר יִמָּצֵא הַתִּירוֹשׁ בָּאֶשְׁכּוֹל וְאָמַר אַל תַּשְׁחִיתֵהוּ כִּי בְרָכָה בּוֹ כֵּן אֶעֱשֶׂה לְמַעַן עֲבָדַי לְבִלְתִּי הַשְׁחִית הַכֹּל: <small>(ישעיה סה ח)</small>`,`<b>תְּאֵנָה</b> אוֹמֶרֶת. נֹצֵר תְּאֵנָה יֹאכַל פִּרְיָהּ: <small>(משלי כז יח)</small>`,`<b>רִמּוֹן</b> אוֹמֵר. כְּפֶלַח הָרִמּוֹן רַקָּתֵךְ מִבַּעַד לְצַמָּתֵךְ: <small>(שיר השירים ד ג)</small>`,`<b>תָּמָר</b> אוֹמֵר. צַדִּיק כַּתָּמָר יִפְרָח כְּאֶרֶז בַּלְּבָנוֹן יִשְׂגֶּה: <small>(תהילים צב יג)</small>`,`<b>תַּפּוּחַ</b> אוֹמֵר. כְּתַפּוּחַ בַּעֲצֵי הַיַּעַר כֵּן דּוֹדִי בֵּין הַבָּנִים בְּצִלּוֹ חִמַּדְתִּי וְיָשַׁבְתִּי וּפִרְיוֹ מָתוֹק לְחִכִּי: <small>(שיר השירים ב ג)</small>`,`<b>שִׁבֹּלֶת חִטִּים</b> אוֹמֶרֶת. שִׁיר הַמַּעֲלוֹת מִמַּעֲמַקִּים קְרָאתִיךָ יי <small>(תהילים קל א)</small>`,`<b>שִׁבֹּלֶת שְׂעוֹרִים</b> אוֹמֶרֶת. תְּפִלָּה לְעָנִי כִי יַעֲטֹף וְלִפְנֵי יי יִשְׁפֹּךְ שִׂיחוֹ <small>(תהילים קב א)</small>`,`<b>שְׁאַר שִׁבּוֹלִים</b> אוֹמְרִים. לָבְשׁוּ כָרִים הַצֹּאן וַעֲמָקִים יַעַטְפוּ בָר יִתְרוֹעֲעוּ אַף יָשִׁירוּ <small>(תהילים סה יד)</small>`,`<b>יְרָקוֹת שֶׁבַּשָּׂדֶה</b> אוֹמְרִים. תְּלָמֶיהָ רַוֵּה נַחֵת גְּדוּדֶהָ בִּרְבִיבִים תְּמֹגְגֶנָּה צִמְחָהּ תְּבָרֵךְ: <small>(תהילים סה יא)</small>`,`<b>דְּשָׁאִים</b> אוֹמְרִים. יְהִי כְבוֹד יי לְעוֹלָם יִשְׂמַח יי בְּמַעֲשָׂיו: <small>(תהילים קד לא)</small>`]},{heading:`פֶּרֶק ד׳`,verses:[`<b>תַּרְנְגוֹל</b> אוֹמֵר. בְּשָׁעָה שֶׁבָּא הַקָּדוֹשׁ בָּרוּךְ הוּא אֵצֶל הַצַּדִּיקִים בְּגַן עֵדֶן, זוֹלְפִים כֹּל אִילָנֵי גַּן עֵדֶן בְּשָׂמִים, וּמְרַנְּנִים וּמְשַׁבְּחִים, וְאָז גַּם הוּא מִתְעוֹרֵר וּמְשַׁבֵּחַ:`,`בְּקוֹל רִאשׁוֹן אוֹמֵר. זֶה דּוֹר דֹּרְשָׁו מְבַקְשֵׁי פָנֶיךָ יַעֲקֹב סֶלָה: שְׂאוּ שְׁעָרִים רָאשֵׁיכֶם וְהִנָּשְׂאוּ פִּתְחֵי עוֹלָם וְיָבוֹא מֶלֶךְ הַכָּבוֹד: מִי זֶה מֶלֶךְ הַכָּבוֹד יי עִזּוּז וְגִבּוֹר יי גִּבּוֹר מִלְחָמָה: <small>(תהילים כד ז-ח)</small>`,`בְּקוֹל שֵׁנִי אוֹמֵר. שְׂאוּ שְׁעָרִים רָאשֵׁיכֶם וּשְׂאוּ פִּתְחֵי עוֹלָם וְיָבֹא מֶלֶךְ הַכָּבוֹד: מִי הוּא זֶה מֶלֶךְ הַכָּבוֹד יי צְבָאוֹת הוּא מֶלֶךְ הַכָּבוֹד סֶלָה: <small>(תהילים כד ט-י)</small>`,`בְּקוֹל שְׁלִישִׁי אוֹמֵר עִמְדוּ צַדִּיקִים וְעִסְקוּ בַּתּוֹרָה, כְּדֵי שֶׁיִּהְיֶה שְׂכַרְכֶם כָּפוּל לָעוֹלָם הַבָּא:`,`בְּקוֹל רְבִיעִי אוֹמֵר. לִישׁוּעָתְךָ קִוִּיתִי יי: <small>(בראשית מט יח)</small>`,`בְּקוֹל חֲמִישִׁי אוֹמֵר. עַד מָתַי עָצֵל תִּשְׁכָּב מָתַי תָּקוּם מִשְּׁנָתֶךָ: <small>(משלי ו ט)</small>`,`בְּקוֹל שִׁישִּׁי אוֹמֵר. אַל תֶּאֱהַב שֵׁנָה פֶּן תִּוָּרֵשׁ פְּקַח עֵינֶיךָ שְׂבַע לָחֶם: <small>(משלי כ יג)</small>`,`בְּקוֹל שְׁבִיעִי אוֹמֵר. עֵת לַעֲשׂוֹת לַיי הֵפֵרוּ תּוֹרָתֶךָ: <small>(תהילים קיט קכו)</small>`,`<b>תַּרְנְגֹלֶת</b> אוֹמֶרֶת. נֹתֵן לֶחֶם לְכָל בָּשָׂר כִּי לְעוֹלָם חַסְדּוֹ: <small>(תהילים קלו כה)</small>`,`<b>יוֹנָה</b> אוֹמֶרֶת. כְּסוּס עָגוּר כֵּן אֲצַפְצֵף אֶהְגֶּה כַּיּוֹנָה דַּלּוּ עֵינַי לַמָּרוֹם אֲדֹנָי עָשְׁקָה לִּי עָרְבֵנִי: <small>(ישעיה לח יד)</small>`,`אוֹמֶרֶת יוֹנָה לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא, רִבּוֹנוֹ שֶׁל עוֹלַם, יִהְיוּ מְזוֹנוֹתַי מְרוֹרִים כְּזַיִת בְּיָדְךָ, וְאַל יִהְיוּ מְתוּקִים כִּדְבַשׁ, עַל יְדֵי בָּשָׂר וָדָם:`,`<b>נֶשֶׁר</b> אוֹמֵר. וְאַתָּה יי אֱלֹהִים צְבָאוֹת אֱלֹהֵי יִשְׂרָאֵל הָקִיצָה לִפְקֹד כָּל הַגּוֹיִם אַל תָּחֹן כָּל בֹּגְדֵי אָוֶן סֶלָה: <small>(תהילים נט ו)</small>`,`<b>עָגוּר</b> אוֹמֵר. הוֹדוּ לַיי בְּכִנּוֹר בְּנֵבֶל עָשׂוֹר זַמְּרוּ לוֹ: <small>(תהילים לג ב)</small>`,`<b>צִפּוֹר</b> אוֹמֵר. גַּם צִפּוֹר מָצְאָה בַיִת וּדְרוֹר קֵן לָהּ אֲשֶׁר שָׁתָה אֶפְרֹחֶיהָ אֶת מִזְבְּחוֹתֶיךָ יי צְבָאוֹת מַלְכִּי וֵאלֹהָי: <small>(תהילים פד ד)</small>`,`<b>סְנוּנִית</b> אוֹמֶרֶת. לְמַעַן יְזַמֶּרְךָ כָבוֹד וְלֹא יִדֹּם יי אֱלֹהַי לְעוֹלָם אוֹדֶךָּ: <small>(תהילים ל יג)</small>`,`<b>טַסִּית</b> אוֹמֶרֶת. עֶזְרִי מֵעִם יי עֹשֵׂה שָׁמַיִם וָאָרֶץ: <small>(תהילים קכא ב)</small>`,`<b>צִיָּה</b> אוֹמֶרֶת. אוֹר זָרֻעַ לַצַּדִּיק וּלְיִשְׁרֵי לֵב שִׂמְחָה: <small>(תהילים צז יב)</small>`,`<b>רְצִפִי</b> אוֹמֵר. נַחֲמוּ נַחֲמוּ עַמִּי יֹאמַר אֱלֹהֵיכֶם: <small>(ישעיה מ א)</small>`,`<b>חֲסִידָה</b> אוֹמֶרֶת. דַּבְּרוּ עַל לֵב יְרוּשָׁלִַם וְקִרְאוּ אֵלֶיהָ כִּי מָלְאָה צְבָאָהּ כִּי נִרְצָה עֲוֹנָהּ כִּי לָקְחָה מִיַּד יי כִּפְלַיִם בְּכָל חַטֹּאתֶיהָ: <small>(ישעיה מ ב)</small>`,`<b>עוֹרֵב</b> אוֹמֵר. מִי יָכִין לָעֹרֵב צֵידוֹ כִּי יְלָדָיו אֶל אֵל יְשַׁוֵּעוּ: <small>(איוב לח מא)</small>`,`<b>זַרְזִיר</b> אוֹמֵר: נוֹדַע בַּגּוֹיִם זַרְעָם וְצֶאֱצָאֵיהֶם בְּתוֹךְ הָעַמִּים כָּל רֹאֵיהֶם יַכִּירוּם כִּי הֵם זֶרַע בֵּרַךְ יי: <small>(ישעיה סא ט)</small>`,`<b>אֲוַז שֶׁבַּבַּיִת</b> אוֹמֶרֶת. הוֹדוּ לַיי קִרְאוּ בִשְׁמוֹ הוֹדִיעוּ בָעַמִּים עֲלִילוֹתָיו: שִׁירוּ לוֹ זַמְּרוּ לוֹ שִׂיחוּ בְּכָל נִפְלְאוֹתָיו: <small>(תהילים קה א-ב)</small>`,`<b>אֲוַז הַבָּר</b> הַמְּשׁוֹטֶטֶת בַּמִּדְבָּר. כְּשֶׁרוֹאֵה אֶת יִשְׂרָאֵל עוֹסְקִים בַּתּוֹרָה אוֹמֶרֶת. קוֹל קוֹרֵא בַּמִּדְבָּר, פָּנוּ דֶּרֶךְ יי, יַשְׁרוּ בַּעֲרָבָה מְסִלָּה לֶאֱלֹהֵינוּ, וְעַל מְצִיאוּת מְזוֹנוֹתֶיהָ בַּמִּדְבָּר אוֹמֶרֶת. אָרוּר הַגֶּבֶר אַשֵּׁר יִבְטַח בָּאָדָם, בָּרוּךְ הַגֶּבֶר אֲשֶׁר יִבְטַח בְּיי וְהָיָה יי מִבְטָחוֹ:`,`<b>פְרוֹגִיוֹת</b> אוֹמְרִים. בִּטְחוּ בַיי עֲדֵי עַד כִּי בְּיָהּ יי צוּר עוֹלָמִים: <small>(ישעיה כו ד)</small>`,`<b>רַחֲמָהּ</b> אוֹמֶרֶת. אֶשְׁרְקָה לָהֶם וַאֲקַבְּצֵם כִּי פְדִיתִים וְרָבוּ כְּמוֹ רָבוּ: <small>(זכריה י ח)</small>`,`<b>צִפֹּרֶת כְּרָמִים</b> אוֹמֶרֶת. אֶשָּׂא עֵינַי אֵל הֶהָרִים מֵאַיִן יָבֹא עֶזְרִי: <small>(תהילים קכא א)</small>`,`<b>חָסִיל</b> אוֹמֵר. יי אֱלֹהַי אַתָּה אֲרוֹמִמְךָ אוֹדֶה שִׁמְךָ כִּי עָשִׂיתָ פֶּלֶא עֵצוֹת מֵרָחוֹק אֱמוּנָה אֹמֶן: <small>(ישעיה כה א)</small>`,`<b>שְׂמָמִית</b> אוֹמֶרֶת. הַלְלוּהוּ בְצִלְצְלֵי שָׁמַע הַלְלוּהוּ בְּצִלְצְלֵי תְרוּעָה: <small>(תהילים קנ ה)</small>`,`<b>זְבוּב</b> אוֹמֵר. בְּשָׁעָה שֶׁאֵין יִשְׂרָאֵל עוֹסְקִים בַּתּוֹרָה, קוֹל אֹמֵר קְרָא וְאָמַר מָה אֶקְרָא כָּל הַבָּשָׂר חָצִיר וְכָל חַסְדּוֹ כְּצִיץ הַשָּׂדֶה: יָבֵשׁ חָצִיר נָבֵל צִיץ כִּי רוּחַ יי נָשְׁבָה בּוֹ אָכֵן חָצִיר הָעָם: יָבֵשׁ חָצִיר נָבֵל צִיץ וּדְבַר אֱלֹהֵינוּ יָקוּם לְעוֹלָם: <small>(ישעיה מ ו-ח)</small>`,`בּוֹרֵא נִיב שְׂפָתָיִם שָׁלוֹם שָׁלוֹם לָרָחוֹק וְלַקָּרוֹב אָמַר יי וּרְפָאתִיו: <small>(ישעיה נז יט)</small>`,`<b>תַּנִּינִים</b> אוֹמְרִים. הַלְלוּ אֶת יי מִן הָאָרֶץ תַּנִּינִים וְכָל תְּהֹמוֹת: <small>(תהילים קמח ז)</small>`,`<b>לִוְיָתַן</b> אוֹמֵר. הוֹדוּ לַיי כִּי טוֹב כִּי לְעוֹלָם חַסְדּוֹ: <small>(תהילים קלו א)</small>`,`<b>דָּגִים</b> אוֹמְרִים. קוֹל יי עַל הַמָּיִם אֵל הַכָּבוֹד הִרְעִים יי עַל מַיִם רַבִּים: <small>(תהילים כט ג)</small>`,`<b>צְפַרְדֵּעַ</b> אוֹמֶרֶת. בָּרוּךְ שֵׁם כְּבוֹד מַלְכוּתוֹ לְעוֹלַם וָעֶד:`]},{heading:`פֶּרֶק ה׳`,verses:[`<b>בְּהֵמָה דַּקָּה טְהוֹרָה</b> אוֹמֶרֶת. מִי כָמֹכָה בָּאֵלִם יי מִי כָּמֹכָה נֶאְדָּר בַּקֹּדֶשׁ נוֹרָא תְהִלֹּת עֹשֵׂה פֶלֶא: <small>(שמות טו יא)</small>`,`<b>בְּהֵמָה גַּסָּה טְהוֹרָה</b> אוֹמֶרֶת. הַרְנִינוּ לֵאלֹהִים עוּזֵּנוּ הָרִיעוּ לֵאלֹהֵי יַעֲקֹב: <small>(תהילים פא ב)</small>`,`<b>בְּהֵמָה דַּקָּה טְמֵאָה</b> אוֹמֶרֶת. הֵיטִיבָה יְיָ לַטּוֹבִים וְלִישָׁרִים בְּלִבּוֹתָם: <small>(תהילים קכה ד)</small>`,`<b>בְּהֵמָה גַּסָּה טְמֵאָה</b> אוֹמֶרֶת. יְגִיעַ כַּפֶּיךָ כִּי תֹאכֵל אַשְׁרֶיךָ וְטוֹב לָךְ: <small>(תהילים קכח ב)</small>`,`<b>גַּמַּל</b> אוֹמֵר. יי מִמָּרוֹם יִשְׁאָג וּמִמְּעוֹן קָדְשׁוֹ יִתֵּן קוֹלוֹ שָׁאֹג יִשְׁאַג עַל נָוֵהוּ: <small>(ירמיה כה ל)</small>`,`<b>סוּס</b> אוֹמֵר. הִנֵּה כְעֵינֵי עֲבָדִים אֶל יַד אֲדוֹנֵיהֶם כְּעֵינֵי שִׁפְחָה אֶל יַד גְּבִרְתָּהּ כֵּן עֵינֵינוּ אֶל יי אֱלֹהֵינוּ עַד שֶׁיְּחָנֵּנוּ: <small>(תהילים קכג ב)</small>`,`<b>פֶּרֶד</b> אוֹמֵר. יוֹדוּךָ יְיָ כָּל מַלְכֵי אָרֶץ כִּי שָׁמְעוּ אִמְרֵי פִיךָ: <small>(תהילים קלח ד)</small>`,`<b>חֲמוֹר</b> אוֹמֵר. לְךָ יְיָ הַגְּדֻלָּה וְהַגְּבוּרָה וְהַתִּפְאֶרֶת וְהַנֵּצַח וְהַהוֹד כִּי כֹל בַּשָּׁמַיִם וּבָאָרֶץ לְךָ יְיָ הַמַּמְלָכָה וְהַמִּתְנַשֵּׂא לְכֹל לְרֹאשׁ: <small>(דברי הימים א' כט יא)</small>`,`<b>שׁוֹר</b> אוֹמֵר. אָז יָשִׁיר משֶׁה וּבְנֵי יִשְׂרָאֵל אֶת הַשִּׁירָה הַזֹּאת לַיי וַיֹּאמְרוּ לֵאמֹר אָשִׁירָה לַּיְיָ כִּי גָאֹה גָּאָה סוּס וְרֹכְבוֹ רָמָה בַיָּם: <small>(שמות טו א)</small>`,`<b>חַיּוֹת הַשָּׂדֶה</b> אוֹמְרִים. בָּרוּךְ הַטּוֹב וְהַמֵּטִיב:`,`<b>צְבִי</b> אוֹמֵר. וַאֲנִי אָשִׁיר עֻזֶּךָ וַאֲרַנֵּן לַבֹּקֶר חַסְדֶּךָ כִּי הָיִיתָ מִשְׂגָּב לִי וּמָנוֹס בְּיוֹם צַר לִי: <small>(תהילים נט יז)</small>`,`<b>פִּיל</b> אוֹמֵר. מַה גָּדְלוּ מַעֲשֶׂיךָ יְיָ מְאֹד עָמְקוּ מַחְשְׁבֹתֶיךָ: <small>(תהילים צב ו)</small>`,`<b>אַרְיֵה</b> אוֹמֵר יְיָ כַּגִּבּוֹר יֵצֵא כְּאִישׁ מִלְחָמוֹת יָעִיר קִנְאָה יָרִיעַ אַף יַצְרִיחַ עַל אֹיְבָיו יִתְגַּבָּר: <small>(ישעיה מב יג)</small>`,`<b>דֹּב</b> אוֹמֵר יִשְׂאוּ מִדְבָּר וְעָרָיו חֲצֵרִים תֵּשֵׁב קֵדָר יָרֹנּוּ ישְׁבֵי סֶלַע מֵרֹאשׁ הָרִים יִצְוָחוּ: <small>(ישעיה מב יא)</small>`,`<b>זְאֵב</b> אוֹמֵר. עַל כָּל דְּבַר פֶּשַׁע עַל שׁוֹר עַל חֲמוֹר עַל שֶׂה עַל שַׂלְמָה עַל כָּל אֲבֵדָה אֲשֶׁר יֹאמַר כִּי הוּא זֶה עַד הָאֱלֹהִים יָבֹא דְּבַר שְׁנֵיהֶם אֲשֶׁר יַרְשִׁיעֻן אֱלֹהִים יְשַׁלֵּם שְׁנַיִם לְרֵעֵהוּ: <small>(שמות כב ח)</small>`,`<b>שׁוּעַל</b> אוֹמֵר. הוֹי בֹּנֶה בֵיתוֹ בְּלֹא צֶדֶק וַעֲלִיּוֹתָיו בְּלֹא מִשְׁפָּט בְּרֵעֵהוּ יַעֲבֹד חִנָּם וּפֹעֲלוֹ לֹא יִתֶּן לוֹ: <small>(ירמיה כב יג)</small>`,`<b>זַרְזִיר</b> אוֹמֵר. רַנְּנוּ צַדִּיקִים בַּיְיָ לַיְשָׁרִים נָאוָה תְהִלָּה: <small>(תהילים לג א)</small>`,`<b>עַכְבָּר</b> אוֹמֵר. אֲרוֹמִמְךָ יְיָ כִּי דִלִּיתָנִי וְלֹא־שִׂמַּחְתָּ אֹיְבַי לִי׃ <small>(תהלים ל ב)</small>`,`<b>חָתוּל</b> אוֹמֵר. אִם־תַּגְבִּיהַּ כַּנֶּשֶׁר וְאִם־בֵּין כּֽוֹכָבִים שִׂים קִנֶּךָ מִשָּׁם אוֹרִֽידְךָ נְאֻם־יְיָ׃ <small>(עובדיה א ד)</small>`,`<b>וּכְשֶׁמַגִיעוֹ</b> אוֹמֵר. אֶרְדּוֹף אוֹיְבַי וְאַשִּׂיגֵם וְלֹא־אָשׁוּב עַד־כַּלּוֹתָם׃ <small>(תהלים יח לח)</small>`,`<b>וְעַכְבָּר</b> אוֹמֵר. וְאַתָּה צַדִּיק עַל כׇּל־הַבָּא עָלַי כִּי־אֱמֶת עָשִׂיתָ וַאֲנִי הִרְשָֽׁעְתִּי׃ <small>(ע"פ נחמיה ט לג)</small>`]},{heading:`פֶּרֶק ו׳`,verses:[`<b>שְׁרָצִים</b> אוֹמְרִים. יִשְׂמַח יִשְׂרָאֵל בְּעֹשָׂיו בְּנֵי צִיּוֹן יָגִילוּ בְמַלְכָּם: <small>(תהילים קמט ב)</small>`,`<b>אֵלִים שֶׁבַּשְּׁרָצִים</b> אוֹמְרִים. אֶשְׁתְּךָ כְּגֶפֶן פֹּרִיָּה בְּיַרְכְּתֵי בֵיתֶךָ בָּנֶיךָ כִּשְׁתִלֵי זֵיתִים סָבִיב לְשֻׁלְחָנֶךָ: <small>(תהילים קכח ג)</small>`,`<b>נָחָשׁ</b> אוֹמֵר. סוֹמֵךְ יְיָ לְכָל הַנֹּפְלִים וְזוֹקֵף לְכָל הַכְּפוּפִים: <small>(תהילים קמה טו)</small>`,`<b>עַקְרַב</b> אוֹמֵר. טוֹב יְיָ לַכֹּל וְרַחֲמָיו עַל כָּל מַעֲשָׂיו: <small>(תהילים קמה ט)</small>`,`<b>שַׁבְּלוּל</b> אוֹמֵר. כְּמוֹ שַׁבְּלוּל תֶּמֶס יַהֲלֹךְ נֵפֶל אֵשֶׁת בַּל חָזוּ שָׁמֶשׁ: <small>(תהילים נח ט)</small>`,`<b>נְמָלָה</b> אוֹמֶרֶת. לֵךְ אֶל נְמָלָה עָצֵל רְאֵה דְרָכֶיהָ וַחֲכָם: <small>(ספר משלי ו ו)</small>`,`<b>חֻלְדָּה</b> אוֹמֶרֶת. כֹּל הַנְּשָׁמָה תְּהַלֵּל יָהּ הַלְלוּיָהּ. <small>(תהילים קנ ו)</small>`,`<b>כְּלָבִים</b> אוֹמְרִים. בֹּאוּ נִשְׁתַּחֲוֶה וְנִכְרָעָה נִבְרְכָה לִפְנֵי יְיָ עֹשֵׂנוּ: <small>(תהילים צה ו)</small>`,`(ילקוט שמעוני פרשת בא רמז קפז) רַבִּי יְשַׁעְיָה תַּלְמִידוֹ שֶׁל רַבִּי חֲנִינָא בֶּן דּוֹסָא הִתְעַנָּה חָמֵשׁ וּשְׁמוֹנִים תַּעֲנִיּוֹת. אָמַר כְּלָבִים שֶׁכָּתוּב בָּהֶם (ישעיה נו יא) וְהַכְּלָבִים עַזֵּי נֶפֶשׁ לֹא יָדְעוּ שָׂבְעָה, יִזְכּוּ לוֹמַר שִׁירָה. עָנָה לוֹ מַלְאָךְ מִן הַשָּׁמַיִם וְאָמַר לוֹ יְשַעְיָה עַד מָתַי אַתָּה מִתְעַנֶּה עַל זֶה הַדָּבָר. שְׁבוּעָה הִיא מִלִּפְנֵי הַמָּקוֹם בָּרוּךְ הוּא מִיּוֹם שֶׁגִּילָּה סוֹדוֹ לַחֲבַקּוּק הַנָּבִיא לֹא גִלָּה דָבָר זֶה לְשׁוּם בְּרִיאָה בָּעוֹלָם. אֶלָּא בִּשְׁבִיל שֶׁתַּלְמִידוֹ שֶׁל אָדָם גָּדוֹל אַתָּה שְׁלָחוּנִי מִן הַשָּׁמַיִם לִזְדַקֵּק אֵלֶיךָ לְהַגִיד לְךָ בַּמֶה זָכוּ הַכְּלָבִים לוֹמַר שִׁירָה. לְפִי שֶׁכָּתוּב בָּהֶם (שמות יא ז) וּלְכֹל בְּנֵי יִשְׂרָאֵל לֹא יֶחֱרַץ כֶּלֶב לְשׁוֹנוֹ. וְלֹא עוֹד אֶלָּא שֶׁזָכוּ לְעַבֵּד עוֹרוֹת מִצּוֹאָתָם שֶׁכּוֹתְבִים בָּהֶם תְּפִילִּין וּמְזוּזוֹת וְסִפְרֵי תּוֹרָה. עַל כֵּן זָכוּ לוֹמַר שִׁירָה. וּלְעִנְיַן הַשְׁאֵלָה שֶּׁשָּׁאַלְתָּ חֲזוֹר לַאֲחֹרֶיךָ וְאַל תּוֹסִיף בַּדָּבָר הַזֶּה עוֹד, כְּמוֹ שֶׁכָּתוּב (משלי כא כג) שׁוֹמֵר פִּיו וּלְשׁוֹנוֹ שׁוֹמֵר מִצָּרוֹת נַפְשׁוֹ. בָּרוּךְ יְיָ לְעוֹלָם אָמֵן וְאָמֵן׃`]},{heading:`בַּקָּשָׁה`,verses:[`רִבּוֹן כָּל הָעוֹלָמִים, יְהִי רָצוֹן מִלְּפָנֶיךָ יי אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי, שֶׁבִּזְכוּת פֶּרֶק שִׁירָה שֶׁקָּרָאתִי, שֶׁהוּא שִׁירַת הַדּוֹמֵם הַצּוֹמֵחַ וְהַחַי, וְהַמַּלְאָכִים הַמְּמֻנִּים עֲלֵיהֶם מֵאֵת הַשֵּׁם יִתְבָּרֵךְ, שֶׁתְּהֵא אֲמִירָתוֹ כְּהַקְרָבַת קָרְבָּן עַל גַּבֵּי הַמִּזְבֵּחַ. שֶׁתְּהֵא שָׁעָה זוּ שְׁעַת רַחֲמִים, שְׁעַת הַקְשָׁבָה, שְׁעַת הַאֲזָנָה, וְנִקְרָאֲךָ וְתַעֲנֵנוּ, נַעְתִּיר לְךָ וְהֵעָתֵר לָנוּ.`,`שֶׁתִּהְיֶה עוֹלָה לְפָנֶיךָ אֲמִירַת פֶּרֶק שִׁירָה כְּאִלּוּ הִשַּׂגְנוּ כֹּל הַסּוֹדוֹת הַנִּפְלָאוֹת וְהַנּוֹרָאוֹת אֲשֶׁר הֵם חֲתוּמִים בּוֹ בְּכֹל תְּנָאָיו. הַחֲזִירֵנוּ בִּתְשׁוּבָה שְׁלֵמָה לְפָנֶיךָ, וְנִזְכֶּה לְמָקוֹם שֶׁהַנְּפָשׁוֹת הָרוּחוֹת וְהַנְשָׁמוֹת נֶחֱצָבוֹת מִשָּׁם, וּכְאִלּוּ עָשִׂינוּ כֹּל אֲשֶׁר מוּטָל עָלֵינוּ לְהַשִּׂיג, בֵּין בְּגִלְגּוּל זֶה בֵּין בְּגִלְגּוּלִים אֲחֵרִים, וּמַלֵּא כֹּל מִשְׁאֲלוֹת לִבֵּנוּ לְטוֹבָה. וְתִשְׁלַח בְּרָכָה הַצְלָחָה וְהַרְוָחָה בְּכֹל מֵעֲשֵׂה יָדֵינוּ, וְנִזְכֶּה לְשׁוֹרֵר לֶעָתִיד לָבוֹא, וְתָשִׁיב שְׁכִינָתְךָ לְעִיר קָדְשְׁךָ בִּמְהֵרָה בְיָמֵינוּ אָמֵן.`],numbered:!1}]},"shir-hashirim":{id:`shir-hashirim`,title:`שִׁיר הַשִּׁירִים`,subtitle:`שיר השירים אשר לשלמה`,chapters:[{heading:`פְּתִיחָה · לְשֵׁם יִחוּד`,verses:[`הֲרֵינִי מְזַמֵּן אֶת פִּי לְהוֹדוֹת וּלְהַלֵּל וּלְשַׁבֵּחַ אֶת בּוֹרְאִי לְשֵׁם יִחוּד קֻדְשָׁא בְּרִיךְ הוּא וּשְׁכִינְתֵּה בִּדְחִילוּ וּרְחִימוּ עַל יְדֵי הַהוּא טָמִיר וְנֶעְלָם בְּשֵׁם כָּל יִשְׂרָאֵל:`],numbered:!1},{heading:`פֶּרֶק א׳`,verses:[`<big>שִׁ֥</big>יר הַשִּׁירִ֖ים אֲשֶׁ֥ר לִשְׁלֹמֹֽה׃`,`יִשָּׁקֵ֙נִי֙ מִנְּשִׁיק֣וֹת פִּ֔יהוּ כִּֽי־טוֹבִ֥ים דֹּדֶ֖יךָ מִיָּֽיִן׃`,`לְרֵ֙יחַ֙ שְׁמָנֶ֣יךָ טוֹבִ֔ים שֶׁ֖מֶן תּוּרַ֣ק שְׁמֶ֑ךָ עַל־כֵּ֖ן עֲלָמ֥וֹת אֲהֵבֽוּךָ׃`,`מׇשְׁכֵ֖נִי אַחֲרֶ֣יךָ נָּר֑וּצָה הֱבִיאַ֨נִי הַמֶּ֜לֶךְ חֲדָרָ֗יו נָגִ֤ילָה וְנִשְׂמְחָה֙ בָּ֔ךְ נַזְכִּ֤ירָה דֹדֶ֙יךָ֙ מִיַּ֔יִן מֵישָׁרִ֖ים אֲהֵבֽוּךָ׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`,`שְׁחוֹרָ֤ה אֲנִי֙ וְֽנָאוָ֔ה בְּנ֖וֹת יְרוּשָׁלָ֑͏ִם כְּאׇהֳלֵ֣י קֵדָ֔ר כִּירִיע֖וֹת שְׁלֹמֹֽה׃`,`אַל־תִּרְא֙וּנִי֙ שֶׁאֲנִ֣י שְׁחַרְחֹ֔רֶת שֶׁשְּׁזָפַ֖תְנִי הַשָּׁ֑מֶשׁ בְּנֵ֧י אִמִּ֣י נִֽחֲרוּ־בִ֗י שָׂמֻ֙נִי֙ נֹטֵרָ֣ה אֶת־הַכְּרָמִ֔ים כַּרְמִ֥י שֶׁלִּ֖י לֹ֥א נָטָֽרְתִּי׃`,`הַגִּ֣ידָה לִּ֗י שֶׁ֤אָֽהֲבָה֙ נַפְשִׁ֔י אֵיכָ֣ה תִרְעֶ֔ה אֵיכָ֖ה תַּרְבִּ֣יץ בַּֽצׇּהֳרָ֑יִם שַׁלָּמָ֤ה אֶֽהְיֶה֙ כְּעֹ֣טְיָ֔ה עַ֖ל עֶדְרֵ֥י חֲבֵרֶֽיךָ׃`,`אִם־לֹ֤א תֵֽדְעִי֙ לָ֔ךְ הַיָּפָ֖ה בַּנָּשִׁ֑ים צְֽאִי־לָ֞ךְ בְּעִקְבֵ֣י הַצֹּ֗אן וּרְעִי֙ אֶת־גְּדִיֹּתַ֔יִךְ עַ֖ל מִשְׁכְּנ֥וֹת הָרֹעִֽים׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`,`לְסֻֽסָתִי֙ בְּרִכְבֵ֣י פַרְעֹ֔ה דִּמִּיתִ֖יךְ רַעְיָתִֽי׃`,`נָאו֤וּ לְחָיַ֙יִךְ֙ בַּתֹּרִ֔ים צַוָּארֵ֖ךְ בַּחֲרוּזִֽים׃`,`תּוֹרֵ֤י זָהָב֙ נַֽעֲשֶׂה־לָּ֔ךְ עִ֖ם נְקֻדּ֥וֹת הַכָּֽסֶף׃`,`עַד־שֶׁ֤הַמֶּ֙לֶךְ֙ בִּמְסִבּ֔וֹ נִרְדִּ֖י נָתַ֥ן רֵיחֽוֹ׃`,`צְר֨וֹר הַמֹּ֤ר&thinsp;<small>׀</small>&thinsp;דּוֹדִי֙ לִ֔י בֵּ֥ין שָׁדַ֖י יָלִֽין׃`,`אֶשְׁכֹּ֨ל הַכֹּ֤פֶר&thinsp;<small>׀</small>&thinsp;דּוֹדִי֙ לִ֔י בְּכַרְמֵ֖י עֵ֥ין גֶּֽדִי׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`הִנָּ֤ךְ יָפָה֙ רַעְיָתִ֔י הִנָּ֥ךְ יָפָ֖ה עֵינַ֥יִךְ יוֹנִֽים׃`,`הִנְּךָ֨ יָפֶ֤ה דוֹדִי֙ אַ֣ף נָעִ֔ים אַף־עַרְשֵׂ֖נוּ רַעֲנָנָֽה׃`,`קֹר֤וֹת בָּתֵּ֙ינוּ֙ אֲרָזִ֔ים רַהִיטֵ֖נוּ בְּרוֹתִֽים׃`]},{heading:`פֶּרֶק ב׳`,verses:[`אֲנִי֙ חֲבַצֶּ֣לֶת הַשָּׁר֔וֹן שׁוֹשַׁנַּ֖ת הָעֲמָקִֽים׃`,`כְּשֽׁוֹשַׁנָּה֙ בֵּ֣ין הַחוֹחִ֔ים כֵּ֥ן רַעְיָתִ֖י בֵּ֥ין הַבָּנֽוֹת׃`,`כְּתַפּ֙וּחַ֙ בַּעֲצֵ֣י הַיַּ֔עַר כֵּ֥ן דּוֹדִ֖י בֵּ֣ין הַבָּנִ֑ים בְּצִלּוֹ֙ חִמַּ֣דְתִּי וְיָשַׁ֔בְתִּי וּפִרְי֖וֹ מָת֥וֹק לְחִכִּֽי׃`,`הֱבִיאַ֙נִי֙ אֶל־בֵּ֣ית הַיָּ֔יִן וְדִגְל֥וֹ עָלַ֖י אַהֲבָֽה׃`,`סַמְּכ֙וּנִי֙ בָּאֲשִׁישׁ֔וֹת רַפְּד֖וּנִי בַּתַּפּוּחִ֑ים כִּי־חוֹלַ֥ת אַהֲבָ֖ה אָֽנִי׃`,`שְׂמֹאלוֹ֙ תַּ֣חַת לְרֹאשִׁ֔י וִימִינ֖וֹ תְּחַבְּקֵֽנִי׃`,`הִשְׁבַּ֨עְתִּי אֶתְכֶ֜ם בְּנ֤וֹת יְרוּשָׁלַ֙͏ִם֙ בִּצְבָא֔וֹת א֖וֹ בְּאַיְל֣וֹת הַשָּׂדֶ֑ה אִם־תָּעִ֧ירוּ&thinsp;<small>׀</small>&thinsp;וְֽאִם־תְּע֥וֹרְר֛וּ אֶת־הָאַהֲבָ֖ה עַ֥ד שֶׁתֶּחְפָּֽץ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`ק֣וֹל דּוֹדִ֔י הִנֵּה־זֶ֖ה בָּ֑א מְדַלֵּג֙ עַל־הֶ֣הָרִ֔ים מְקַפֵּ֖ץ עַל־הַגְּבָעֽוֹת׃`,`דּוֹמֶ֤ה דוֹדִי֙ לִצְבִ֔י א֖וֹ לְעֹ֣פֶר הָאַיָּלִ֑ים הִנֵּה־זֶ֤ה עוֹמֵד֙ אַחַ֣ר כׇּתְלֵ֔נוּ מַשְׁגִּ֙יחַ֙ מִן־הַֽחַלֹּנ֔וֹת מֵצִ֖יץ מִן־הַחֲרַכִּֽים׃`,`עָנָ֥ה דוֹדִ֖י וְאָ֣מַר לִ֑י ק֥וּמִי לָ֛ךְ רַעְיָתִ֥י יָפָתִ֖י וּלְכִי־לָֽךְ׃`,`כִּֽי־הִנֵּ֥ה הַסְּתָ֖ו עָבָ֑ר הַגֶּ֕שֶׁם חָלַ֖ף הָלַ֥ךְ לֽוֹ׃`,`הַנִּצָּנִים֙ נִרְא֣וּ בָאָ֔רֶץ עֵ֥ת הַזָּמִ֖יר הִגִּ֑יעַ וְק֥וֹל הַתּ֖וֹר נִשְׁמַ֥ע בְּאַרְצֵֽנוּ׃`,`הַתְּאֵנָה֙ חָנְטָ֣ה פַגֶּ֔יהָ וְהַגְּפָנִ֥ים&thinsp;<small>׀</small>&thinsp;סְמָדַ֖ר נָ֣תְנוּ רֵ֑יחַ ק֥וּמִי לָ֛ךְ רַעְיָתִ֥י יָפָתִ֖י וּלְכִי־לָֽךְ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`יוֹנָתִ֞י בְּחַגְוֵ֣י הַסֶּ֗לַע בְּסֵ֙תֶר֙ הַמַּדְרֵגָ֔ה הַרְאִ֙ינִי֙ אֶת־מַרְאַ֔יִךְ הַשְׁמִיעִ֖נִי אֶת־קוֹלֵ֑ךְ כִּֽי־קוֹלֵ֥ךְ עָרֵ֖ב וּמַרְאֵ֥יךְ נָאוֶֽה׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`אֶֽחֱזוּ־לָ֙נוּ֙ שֻֽׁעָלִ֔ים שֻׁעָלִ֥ים קְטַנִּ֖ים מְחַבְּלִ֣ים כְּרָמִ֑ים וּכְרָמֵ֖ינוּ סְמָדַֽר׃`,`דּוֹדִ֥י לִי֙ וַאֲנִ֣י ל֔וֹ הָרֹעֶ֖ה בַּשּׁוֹשַׁנִּֽים׃`,`עַ֤ד שֶׁיָּפ֙וּחַ֙ הַיּ֔וֹם וְנָ֖סוּ הַצְּלָלִ֑ים סֹב֩ דְּמֵה־לְךָ֨ דוֹדִ֜י לִצְבִ֗י א֛וֹ לְעֹ֥פֶר הָאַיָּלִ֖ים עַל־הָ֥רֵי בָֽתֶר׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`]},{heading:`פֶּרֶק ג׳`,verses:[`עַל־מִשְׁכָּבִי֙ בַּלֵּיל֔וֹת בִּקַּ֕שְׁתִּי אֵ֥ת שֶֽׁאָהֲבָ֖ה נַפְשִׁ֑י בִּקַּשְׁתִּ֖יו וְלֹ֥א מְצָאתִֽיו׃`,`אָק֨וּמָה נָּ֜א וַאֲסוֹבְבָ֣ה בָעִ֗יר בַּשְּׁוָקִים֙ וּבָ֣רְחֹב֔וֹת אֲבַקְשָׁ֕ה אֵ֥ת שֶֽׁאָהֲבָ֖ה נַפְשִׁ֑י בִּקַּשְׁתִּ֖יו וְלֹ֥א מְצָאתִֽיו׃`,`מְצָא֙וּנִי֙ הַשֹּׁ֣מְרִ֔ים הַסֹּבְבִ֖ים בָּעִ֑יר אֵ֛ת שֶֽׁאָהֲבָ֥ה נַפְשִׁ֖י רְאִיתֶֽם׃`,`כִּמְעַט֙ שֶׁעָבַ֣רְתִּי מֵהֶ֔ם עַ֣ד שֶׁמָּצָ֔אתִי אֵ֥ת שֶֽׁאָהֲבָ֖ה נַפְשִׁ֑י אֲחַזְתִּיו֙ וְלֹ֣א אַרְפֶּ֔נּוּ עַד־שֶׁ֤הֲבֵיאתִיו֙ אֶל־בֵּ֣ית אִמִּ֔י וְאֶל־חֶ֖דֶר הוֹרָתִֽי׃`,`הִשְׁבַּ֨עְתִּי אֶתְכֶ֜ם בְּנ֤וֹת יְרוּשָׁלַ֙͏ִם֙ בִּצְבָא֔וֹת א֖וֹ בְּאַיְל֣וֹת הַשָּׂדֶ֑ה אִם־תָּעִ֧ירוּ&thinsp;<small>׀</small>&thinsp;וְֽאִם־תְּע֥וֹרְר֛וּ אֶת־הָאַהֲבָ֖ה עַ֥ד שֶׁתֶּחְפָּֽץ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`מִ֣י זֹ֗את עֹלָה֙ מִן־הַמִּדְבָּ֔ר כְּתִֽימְר֖וֹת עָשָׁ֑ן מְקֻטֶּ֤רֶת מֹר֙ וּלְבוֹנָ֔ה מִכֹּ֖ל אַבְקַ֥ת רוֹכֵֽל׃`,`הִנֵּ֗ה מִטָּתוֹ֙ שֶׁלִּשְׁלֹמֹ֔ה שִׁשִּׁ֥ים גִּבֹּרִ֖ים סָבִ֣יב לָ֑הּ מִגִּבֹּרֵ֖י יִשְׂרָאֵֽל׃`,`כֻּלָּם֙ אֲחֻ֣זֵי חֶ֔רֶב מְלֻמְּדֵ֖י מִלְחָמָ֑ה אִ֤ישׁ חַרְבּוֹ֙ עַל־יְרֵכ֔וֹ מִפַּ֖חַד בַּלֵּילֽוֹת׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`אַפִּרְי֗וֹן עָ֤שָׂה לוֹ֙ הַמֶּ֣לֶךְ שְׁלֹמֹ֔ה מֵעֲצֵ֖י הַלְּבָנֽוֹן׃`,`עַמּוּדָיו֙ עָ֣שָׂה כֶ֔סֶף רְפִידָת֣וֹ זָהָ֔ב מֶרְכָּב֖וֹ אַרְגָּמָ֑ן תּוֹכוֹ֙ רָצ֣וּף אַהֲבָ֔ה מִבְּנ֖וֹת יְרוּשָׁלָֽ͏ִם׃`,`צְאֶ֧נָה&thinsp;<small>׀</small>&thinsp;וּֽרְאֶ֛ינָה בְּנ֥וֹת צִיּ֖וֹן בַּמֶּ֣לֶךְ שְׁלֹמֹ֑ה בָּעֲטָרָ֗ה שֶׁעִטְּרָה־לּ֤וֹ אִמּוֹ֙ בְּי֣וֹם חֲתֻנָּת֔וֹ וּבְי֖וֹם שִׂמְחַ֥ת לִבּֽוֹ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`]},{heading:`פֶּרֶק ד׳`,verses:[`הִנָּ֨ךְ יָפָ֤ה רַעְיָתִי֙ הִנָּ֣ךְ יָפָ֔ה עֵינַ֣יִךְ יוֹנִ֔ים מִבַּ֖עַד לְצַמָּתֵ֑ךְ שַׂעְרֵךְ֙ כְּעֵ֣דֶר הָֽעִזִּ֔ים שֶׁגָּלְשׁ֖וּ מֵהַ֥ר גִּלְעָֽד׃`,`שִׁנַּ֙יִךְ֙ כְּעֵ֣דֶר הַקְּצוּב֔וֹת שֶׁעָל֖וּ מִן־הָרַחְצָ֑ה שֶׁכֻּלָּם֙ מַתְאִימ֔וֹת וְשַׁכֻּלָ֖ה אֵ֥ין בָּהֶֽם׃`,`כְּח֤וּט הַשָּׁנִי֙ שִׂפְתוֹתַ֔יִךְ וּמִדְבָּרֵ֖ךְ נָאוֶ֑ה כְּפֶ֤לַח הָֽרִמּוֹן֙ רַקָּתֵ֔ךְ מִבַּ֖עַד לְצַמָּתֵֽךְ׃`,`כְּמִגְדַּ֤ל דָּוִיד֙ צַוָּארֵ֔ךְ בָּנ֖וּי לְתַלְפִּיּ֑וֹת אֶ֤לֶף הַמָּגֵן֙ תָּל֣וּי עָלָ֔יו כֹּ֖ל שִׁלְטֵ֥י הַגִּבֹּרִֽים׃`,`שְׁנֵ֥י שָׁדַ֛יִךְ כִּשְׁנֵ֥י עֳפָרִ֖ים תְּאוֹמֵ֣י צְבִיָּ֑ה הָרוֹעִ֖ים בַּשּׁוֹשַׁנִּֽים׃`,`עַ֤ד שֶׁיָּפ֙וּחַ֙ הַיּ֔וֹם וְנָ֖סוּ הַצְּלָלִ֑ים אֵ֤לֶךְ לִי֙ אֶל־הַ֣ר הַמּ֔וֹר וְאֶל־גִּבְעַ֖ת הַלְּבוֹנָֽה׃`,`כֻּלָּ֤ךְ יָפָה֙ רַעְיָתִ֔י וּמ֖וּם אֵ֥ין בָּֽךְ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`אִתִּ֤י מִלְּבָנוֹן֙ כַּלָּ֔ה אִתִּ֖י מִלְּבָנ֣וֹן תָּב֑וֹאִי תָּשׁ֣וּרִי&thinsp;<b>׀</b> מֵרֹ֣אשׁ אֲמָנָ֗ה מֵרֹ֤אשׁ שְׂנִיר֙ וְחֶרְמ֔וֹן מִמְּעֹנ֣וֹת אֲרָי֔וֹת מֵֽהַרְרֵ֖י נְמֵרִֽים׃`,`לִבַּבְתִּ֖נִי אֲחֹתִ֣י כַלָּ֑ה לִבַּבְתִּ֙נִי֙ בְּאַחַ֣ת מֵעֵינַ֔יִךְ בְּאַחַ֥ד עֲנָ֖ק מִצַּוְּרֹנָֽיִךְ׃`,`מַה־יָּפ֥וּ דֹדַ֖יִךְ אֲחֹתִ֣י כַלָּ֑ה מַה־טֹּ֤בוּ דֹדַ֙יִךְ֙ מִיַּ֔יִן וְרֵ֥יחַ שְׁמָנַ֖יִךְ מִכׇּל־בְּשָׂמִֽים׃`,`נֹ֛פֶת תִּטֹּ֥פְנָה שִׂפְתוֹתַ֖יִךְ כַּלָּ֑ה דְּבַ֤שׁ וְחָלָב֙ תַּ֣חַת לְשׁוֹנֵ֔ךְ וְרֵ֥יחַ שַׂלְמֹתַ֖יִךְ כְּרֵ֥יחַ לְבָנֽוֹן׃`,`גַּ֥ן&thinsp;<small>׀</small>&thinsp;נָע֖וּל אֲחֹתִ֣י כַלָּ֑ה גַּ֥ל נָע֖וּל מַעְיָ֥ן חָתֽוּם׃`,`שְׁלָחַ֙יִךְ֙ פַּרְדֵּ֣ס רִמּוֹנִ֔ים עִ֖ם פְּרִ֣י מְגָדִ֑ים כְּפָרִ֖ים עִם־נְרָדִֽים׃`,`נֵ֣רְדְּ&thinsp;<b>׀</b> וְכַרְכֹּ֗ם קָנֶה֙ וְקִנָּמ֔וֹן עִ֖ם כׇּל־עֲצֵ֣י לְבוֹנָ֑ה מֹ֚ר וַאֲהָל֔וֹת עִ֖ם כׇּל־רָאשֵׁ֥י בְשָׂמִֽים׃`,`מַעְיַ֣ן גַּנִּ֔ים בְּאֵ֖ר מַ֣יִם חַיִּ֑ים וְנֹזְלִ֖ים מִן־לְבָנֽוֹן׃`,`ע֤וּרִי צָפוֹן֙ וּב֣וֹאִי תֵימָ֔ן הָפִ֥יחִי גַנִּ֖י יִזְּל֣וּ בְשָׂמָ֑יו יָבֹ֤א דוֹדִי֙ לְגַנּ֔וֹ וְיֹאכַ֖ל פְּרִ֥י מְגָדָֽיו׃`]},{heading:`פֶּרֶק ה׳`,verses:[`בָּ֣אתִי לְגַנִּי֮ אֲחֹתִ֣י כַלָּה֒ אָרִ֤יתִי מוֹרִי֙ עִם־בְּשָׂמִ֔י אָכַ֤לְתִּי יַעְרִי֙ עִם־דִּבְשִׁ֔י שָׁתִ֥יתִי יֵינִ֖י עִם־חֲלָבִ֑י אִכְל֣וּ רֵעִ֔ים שְׁת֥וּ וְשִׁכְר֖וּ דּוֹדִֽים׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`אֲנִ֥י יְשֵׁנָ֖ה וְלִבִּ֣י עֵ֑ר ק֣וֹל&thinsp;<b>׀</b> דּוֹדִ֣י דוֹפֵ֗ק פִּתְחִי־לִ֞י אֲחֹתִ֤י רַעְיָתִי֙ יוֹנָתִ֣י תַמָּתִ֔י שֶׁרֹּאשִׁי֙ נִמְלָא־טָ֔ל קְוֻצּוֹתַ֖י רְסִ֥יסֵי לָֽיְלָה׃`,`פָּשַׁ֙טְתִּי֙ אֶת־כֻּתׇּנְתִּ֔י אֵיכָ֖כָה אֶלְבָּשֶׁ֑נָּה רָחַ֥צְתִּי אֶת־רַגְלַ֖י אֵיכָ֥כָה אֲטַנְּפֵֽם׃`,`דּוֹדִ֗י שָׁלַ֤ח יָדוֹ֙ מִן־הַחֹ֔ר וּמֵעַ֖י הָמ֥וּ עָלָֽיו׃`,`קַ֥מְתִּֽי אֲנִ֖י לִפְתֹּ֣חַ לְדוֹדִ֑י וְיָדַ֣י נָֽטְפוּ־מ֗וֹר וְאֶצְבְּעֹתַי֙ מ֣וֹר עֹבֵ֔ר עַ֖ל כַּפּ֥וֹת הַמַּנְעֽוּל׃`,`פָּתַ֤חְתִּֽי אֲנִי֙ לְדוֹדִ֔י וְדוֹדִ֖י חָמַ֣ק עָבָ֑ר נַפְשִׁי֙ יָֽצְאָ֣ה בְדַבְּר֔וֹ בִּקַּשְׁתִּ֙יהוּ֙ וְלֹ֣א מְצָאתִ֔יהוּ קְרָאתִ֖יו וְלֹ֥א עָנָֽנִי׃`,`מְצָאֻ֧נִי הַשֹּׁמְרִ֛ים הַסֹּבְבִ֥ים בָּעִ֖יר הִכּ֣וּנִי פְצָע֑וּנִי נָשְׂא֤וּ אֶת־רְדִידִי֙ מֵֽעָלַ֔י שֹׁמְרֵ֖י הַחֹמֽוֹת׃`,`הִשְׁבַּ֥עְתִּי אֶתְכֶ֖ם בְּנ֣וֹת יְרוּשָׁלָ֑͏ִם אִֽם־תִּמְצְאוּ֙ אֶת־דּוֹדִ֔י מַה־תַּגִּ֣ידוּ ל֔וֹ שֶׁחוֹלַ֥ת אַהֲבָ֖ה אָֽנִי׃`,`מַה־דּוֹדֵ֣ךְ מִדּ֔וֹד הַיָּפָ֖ה בַּנָּשִׁ֑ים מַה־דּוֹדֵ֣ךְ מִדּ֔וֹד שֶׁכָּ֖כָה הִשְׁבַּעְתָּֽנוּ׃`,`דּוֹדִ֥י צַח֙ וְאָד֔וֹם דָּג֖וּל מֵרְבָבָֽה׃`,`רֹאשׁ֖וֹ כֶּ֣תֶם פָּ֑ז קְוֻצּוֹתָיו֙ תַּלְתַּלִּ֔ים שְׁחֹר֖וֹת כָּעוֹרֵֽב׃`,`עֵינָ֕יו כְּיוֹנִ֖ים עַל־אֲפִ֣יקֵי מָ֑יִם רֹֽחֲצוֹת֙ בֶּֽחָלָ֔ב יֹשְׁב֖וֹת עַל־מִלֵּֽאת׃`,`לְחָיָו֙ כַּעֲרוּגַ֣ת הַבֹּ֔שֶׂם מִגְדְּל֖וֹת מֶרְקָחִ֑ים שִׂפְתוֹתָיו֙ שֽׁוֹשַׁנִּ֔ים נֹטְפ֖וֹת מ֥וֹר עֹבֵֽר׃`,`יָדָיו֙ גְּלִילֵ֣י זָהָ֔ב מְמֻלָּאִ֖ים בַּתַּרְשִׁ֑ישׁ מֵעָיו֙ עֶ֣שֶׁת שֵׁ֔ן מְעֻלֶּ֖פֶת סַפִּירִֽים׃`,`שׁוֹקָיו֙ עַמּ֣וּדֵי שֵׁ֔שׁ מְיֻסָּדִ֖ים עַל־אַדְנֵי־פָ֑ז מַרְאֵ֙הוּ֙ כַּלְּבָנ֔וֹן בָּח֖וּר כָּאֲרָזִֽים׃`,`חִכּוֹ֙ מַֽמְתַקִּ֔ים וְכֻלּ֖וֹ מַחֲמַדִּ֑ים זֶ֤ה דוֹדִי֙ וְזֶ֣ה רֵעִ֔י בְּנ֖וֹת יְרוּשָׁלָֽ͏ִם׃`]},{heading:`פֶּרֶק ו׳`,verses:[`אָ֚נָה הָלַ֣ךְ דּוֹדֵ֔ךְ הַיָּפָ֖ה בַּנָּשִׁ֑ים אָ֚נָה פָּנָ֣ה דוֹדֵ֔ךְ וּנְבַקְשֶׁ֖נּוּ עִמָּֽךְ׃`,`דּוֹדִי֙ יָרַ֣ד לְגַנּ֔וֹ לַעֲרֻג֖וֹת הַבֹּ֑שֶׂם לִרְעוֹת֙ בַּגַּנִּ֔ים וְלִלְקֹ֖ט שֽׁוֹשַׁנִּֽים׃`,`אֲנִ֤י לְדוֹדִי֙ וְדוֹדִ֣י לִ֔י הָרֹעֶ֖ה בַּשּׁוֹשַׁנִּֽים׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`יָפָ֨ה אַ֤תְּ רַעְיָתִי֙ כְּתִרְצָ֔ה נָאוָ֖ה כִּירוּשָׁלָ֑͏ִם אֲיֻמָּ֖ה כַּנִּדְגָּלֽוֹת׃`,`הָסֵ֤בִּי עֵינַ֙יִךְ֙ מִנֶּגְדִּ֔י שֶׁ֥הֵ֖ם הִרְהִיבֻ֑נִי שַׂעְרֵךְ֙ כְּעֵ֣דֶר הָֽעִזִּ֔ים שֶׁגָּלְשׁ֖וּ מִן־הַגִּלְעָֽד׃`,`שִׁנַּ֙יִךְ֙ כְּעֵ֣דֶר הָֽרְחֵלִ֔ים שֶׁעָל֖וּ מִן־הָרַחְצָ֑ה שֶׁכֻּלָּם֙ מַתְאִימ֔וֹת וְשַׁכֻּלָ֖ה אֵ֥ין בָּהֶֽם׃`,`כְּפֶ֤לַח הָרִמּוֹן֙ רַקָּתֵ֔ךְ מִבַּ֖עַד לְצַמָּתֵֽךְ׃`,`שִׁשִּׁ֥ים הֵ֙מָּה֙ מְלָכ֔וֹת וּשְׁמֹנִ֖ים פִּֽילַגְשִׁ֑ים וַעֲלָמ֖וֹת אֵ֥ין מִסְפָּֽר׃`,`אַחַ֥ת הִיא֙ יוֹנָתִ֣י תַמָּתִ֔י אַחַ֥ת הִיא֙ לְאִמָּ֔הּ בָּרָ֥ה הִ֖יא לְיֽוֹלַדְתָּ֑הּ רָא֤וּהָ בָנוֹת֙ וַֽיְאַשְּׁר֔וּהָ מְלָכ֥וֹת וּפִֽילַגְשִׁ֖ים וַֽיְהַלְלֽוּהָ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`מִי־זֹ֥את הַנִּשְׁקָפָ֖ה כְּמוֹ־שָׁ֑חַר יָפָ֣ה כַלְּבָנָ֗ה בָּרָה֙ כַּֽחַמָּ֔ה אֲיֻמָּ֖ה כַּנִּדְגָּלֽוֹת׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`אֶל־גִּנַּ֤ת אֱגוֹז֙ יָרַ֔דְתִּי לִרְא֖וֹת בְּאִבֵּ֣י הַנָּ֑חַל לִרְאוֹת֙ הֲפָֽרְחָ֣ה הַגֶּ֔פֶן הֵנֵ֖צוּ הָרִמֹּנִֽים׃`,`לֹ֣א יָדַ֔עְתִּי נַפְשִׁ֣י שָׂמַ֔תְנִי מַרְכְּב֖וֹת עַמִּ֥י נָדִֽיב׃`]},{heading:`פֶּרֶק ז׳`,verses:[`שׁ֤וּבִי שׁ֙וּבִי֙ הַשּׁ֣וּלַמִּ֔ית שׁ֥וּבִי שׁ֖וּבִי וְנֶחֱזֶה־בָּ֑ךְ מַֽה־תֶּחֱזוּ֙ בַּשּׁ֣וּלַמִּ֔ית כִּמְחֹלַ֖ת הַֽמַּחֲנָֽיִם׃`,`מַה־יָּפ֧וּ פְעָמַ֛יִךְ בַּנְּעָלִ֖ים בַּת־נָדִ֑יב חַמּוּקֵ֣י יְרֵכַ֔יִךְ כְּמ֣וֹ חֲלָאִ֔ים מַעֲשֵׂ֖ה יְדֵ֥י אׇמָּֽן׃`,`שׇׁרְרֵךְ֙ אַגַּ֣ן הַסַּ֔הַר אַל־יֶחְסַ֖ר הַמָּ֑זֶג בִּטְנֵךְ֙ עֲרֵמַ֣ת חִטִּ֔ים סוּגָ֖ה בַּשּׁוֹשַׁנִּֽים׃`,`שְׁנֵ֥י שָׁדַ֛יִךְ כִּשְׁנֵ֥י עֳפָרִ֖ים תׇּאֳמֵ֥י צְבִיָּֽה׃`,`צַוָּארֵ֖ךְ כְּמִגְדַּ֣ל הַשֵּׁ֑ן עֵינַ֜יִךְ בְּרֵכ֣וֹת בְּחֶשְׁבּ֗וֹן עַל־שַׁ֙עַר֙ בַּת־רַבִּ֔ים אַפֵּךְ֙ כְּמִגְדַּ֣ל הַלְּבָנ֔וֹן צוֹפֶ֖ה פְּנֵ֥י דַמָּֽשֶׂק׃`,`רֹאשֵׁ֤ךְ עָלַ֙יִךְ֙ כַּכַּרְמֶ֔ל וְדַלַּ֥ת רֹאשֵׁ֖ךְ כָּאַרְגָּמָ֑ן מֶ֖לֶךְ אָס֥וּר בָּרְהָטִֽים׃`,`מַה־יָּפִית֙ וּמַה־נָּעַ֔מְתְּ אַהֲבָ֖ה בַּתַּֽעֲנוּגִֽים׃`,`זֹ֤את קֽוֹמָתֵךְ֙ דָּֽמְתָ֣ה לְתָמָ֔ר וְשָׁדַ֖יִךְ לְאַשְׁכֹּלֽוֹת׃`,`אָמַ֙רְתִּי֙ אֶעֱלֶ֣ה בְתָמָ֔ר אֹֽחֲזָ֖ה בְּסַנְסִנָּ֑יו וְיִֽהְיוּ־נָ֤א שָׁדַ֙יִךְ֙ כְּאֶשְׁכְּל֣וֹת הַגֶּ֔פֶן וְרֵ֥יחַ אַפֵּ֖ךְ כַּתַּפּוּחִֽים׃`,`וְחִכֵּ֕ךְ כְּיֵ֥ין הַטּ֛וֹב הוֹלֵ֥ךְ לְדוֹדִ֖י לְמֵישָׁרִ֑ים דּוֹבֵ֖ב שִׂפְתֵ֥י יְשֵׁנִֽים׃`,`אֲנִ֣י לְדוֹדִ֔י וְעָלַ֖י תְּשׁוּקָתֽוֹ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`לְכָ֤ה דוֹדִי֙ נֵצֵ֣א הַשָּׂדֶ֔ה נָלִ֖ינָה בַּכְּפָרִֽים׃`,`נַשְׁכִּ֙ימָה֙ לַכְּרָמִ֔ים נִרְאֶ֞ה אִם־פָּֽרְחָ֤ה הַגֶּ֙פֶן֙ פִּתַּ֣ח הַסְּמָדַ֔ר הֵנֵ֖צוּ הָרִמּוֹנִ֑ים שָׁ֛ם אֶתֵּ֥ן אֶת־דֹּדַ֖י לָֽךְ׃`,`הַֽדּוּדָאִ֣ים נָֽתְנוּ־רֵ֗יחַ וְעַל־פְּתָחֵ֙ינוּ֙ כׇּל־מְגָדִ֔ים חֲדָשִׁ֖ים גַּם־יְשָׁנִ֑ים דּוֹדִ֖י צָפַ֥נְתִּי לָֽךְ׃`]},{heading:`פֶּרֶק ח׳`,verses:[`מִ֤י יִתֶּנְךָ֙ כְּאָ֣ח לִ֔י יוֹנֵ֖ק שְׁדֵ֣י אִמִּ֑י אֶֽמְצָאֲךָ֤ בַחוּץ֙ אֶשָּׁ֣קְךָ֔ גַּ֖ם לֹא־יָבֻ֥זוּ לִֽי׃`,`אֶנְהָֽגְךָ֗ אֲבִֽיאֲךָ֛ אֶל־בֵּ֥ית אִמִּ֖י תְּלַמְּדֵ֑נִי אַשְׁקְךָ֙ מִיַּ֣יִן הָרֶ֔קַח מֵעֲסִ֖יס רִמֹּנִֽי׃`,`שְׂמֹאלוֹ֙ תַּ֣חַת רֹאשִׁ֔י וִֽימִינ֖וֹ תְּחַבְּקֵֽנִי׃`,`הִשְׁבַּ֥עְתִּי אֶתְכֶ֖ם בְּנ֣וֹת יְרוּשָׁלָ֑͏ִם מַה־תָּעִ֧ירוּ&thinsp;<small>׀</small>&thinsp;וּֽמַה־תְּעֹ֥רְר֛וּ אֶת־הָאַהֲבָ֖ה עַ֥ד שֶׁתֶּחְפָּֽץ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`מִ֣י זֹ֗את עֹלָה֙ מִן־הַמִּדְבָּ֔ר מִתְרַפֶּ֖קֶת עַל־דּוֹדָ֑הּ תַּ֤חַת הַתַּפּ֙וּחַ֙ עֽוֹרַרְתִּ֔יךָ שָׁ֚מָּה חִבְּלַ֣תְךָ אִמֶּ֔ךָ שָׁ֖מָּה חִבְּלָ֥ה יְלָדַֽתְךָ׃`,`שִׂימֵ֨נִי כַֽחוֹתָ֜ם עַל־לִבֶּ֗ךָ כַּֽחוֹתָם֙ עַל־זְרוֹעֶ֔ךָ כִּֽי־עַזָּ֤ה כַמָּ֙וֶת֙ אַהֲבָ֔ה קָשָׁ֥ה כִשְׁא֖וֹל קִנְאָ֑ה רְשָׁפֶ֕יהָ רִשְׁפֵּ֕י אֵ֖שׁ שַׁלְהֶ֥בֶתְיָֽה׃`,`מַ֣יִם רַבִּ֗ים לֹ֤א יֽוּכְלוּ֙ לְכַבּ֣וֹת אֶת־הָֽאַהֲבָ֔ה וּנְהָר֖וֹת לֹ֣א יִשְׁטְפ֑וּהָ אִם־יִתֵּ֨ן אִ֜ישׁ אֶת־כׇּל־ה֤וֹן בֵּיתוֹ֙ בָּאַהֲבָ֔ה בּ֖וֹז יָב֥וּזוּ לֽוֹ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`,`אָח֥וֹת לָ֙נוּ֙ קְטַנָּ֔ה וְשָׁדַ֖יִם אֵ֣ין לָ֑הּ מַֽה־נַּעֲשֶׂה֙ לַאֲחֹתֵ֔נוּ בַּיּ֖וֹם שֶׁיְּדֻבַּר־בָּֽהּ׃`,`אִם־חוֹמָ֣ה הִ֔יא נִבְנֶ֥ה עָלֶ֖יהָ טִ֣ירַת כָּ֑סֶף וְאִם־דֶּ֣לֶת הִ֔יא נָצ֥וּר עָלֶ֖יהָ ל֥וּחַ אָֽרֶז׃`,`אֲנִ֣י חוֹמָ֔ה וְשָׁדַ֖י כַּמִּגְדָּל֑וֹת אָ֛ז הָיִ֥יתִי בְעֵינָ֖יו כְּמוֹצְאֵ֥ת שָׁלֽוֹם׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`,`כֶּ֣רֶם הָיָ֤ה לִשְׁלֹמֹה֙ בְּבַ֣עַל הָמ֔וֹן נָתַ֥ן אֶת־הַכֶּ֖רֶם לַנֹּטְרִ֑ים אִ֛ישׁ יָבִ֥א בְּפִרְי֖וֹ אֶ֥לֶף כָּֽסֶף׃`,`כַּרְמִ֥י שֶׁלִּ֖י לְפָנָ֑י הָאֶ֤לֶף לְךָ֙ שְׁלֹמֹ֔ה וּמָאתַ֖יִם לְנֹטְרִ֥ים אֶת־פִּרְיֽוֹ׃`,`הַיּוֹשֶׁ֣בֶת בַּגַּנִּ֗ים חֲבֵרִ֛ים מַקְשִׁיבִ֥ים לְקוֹלֵ֖ךְ הַשְׁמִיעִֽנִי׃`,`בְּרַ֣ח&thinsp;<b>׀</b> דּוֹדִ֗י וּֽדְמֵה־לְךָ֤ לִצְבִי֙ א֚וֹ לְעֹ֣פֶר הָֽאַיָּלִ֔ים עַ֖ל הָרֵ֥י בְשָׂמִֽים׃`]}]},"tefilat-rabi-yishmael":{id:`tefilat-rabi-yishmael`,title:`תְּפִלַּת רַבִּי יִשְׁמָעֵאל כֹּהֵן גָּדוֹל`,subtitle:`סגולה נפלאה · נוסח מלא ומנוקד`,numbered:!1,chapters:[{heading:`הַקְדָּמָה`,verses:[`אָמַר רַבִּי יִשְׁמָעֵאל כָּל הָאוֹמֵר בַּקָּשָׁה זוֹ בְּכָל יוֹם פָּנָיו מַזְהִירוֹת וְאֵימָתוֹ מֻטֶּלֶת עַל הַבְּרִיּוֹת וְכָל הַחֲלוֹמוֹת שֶׁלּוֹ מְהֻגָּנִים וְתוֹרָתוֹ תִּהְיֶה מִשְׁתַּמֶּרֶת בְּלִבּוֹ כָּל יְמֵי חַיָּיו וַעֲוֹנוֹת נְעוּרָיו נִמְחָלִים לוֹ וְיִנָּצֵל מִיֵּצֶר הָרָע וּמִלָּשׁוֹן הָרַע וּמִפֶּגַע רַע וּמֵחַיּוֹת רָעוֹת וּמִלִּיסְטִים וּמִנְּחָשִׁים ומעקרבים וּמֵרוּחַ רָעָה וּמִן הַשֵּׁדִים וּמִן הַמַּזִּיקִין וּמִכָּל הָאוֹיְבִים וּמִכָּל הַשּׂוֹנְאִים אוֹתוֹ וְיַרְוִיחַ בְּמַשָּׂא וּמַתָּן שֶׁלּוֹ. אָמַר רַבִּי יִשְׁמָעֵאל “אֲנִי וְרַבִּי עֲקִיבָא עֲרֵבִים אָנוּ שֶׁיִּהְיֶה לוֹ חֵלֶק טוֹב בָּעוֹלָם הַבָּא כְּדִכְתִיב, לְהַנְחִיל אֹהֲבַי יֵשׁ וְאֹצְרֹתֵיהֶם אֲמַלֵּא”. וְזֹאת הַתְּפִלָּה צָרִיךְ לְאָמְרָהּ בְּכַוָּנָה נָכוֹנָה בְּכָל יוֹם אַחַר תְּפִלָּתוֹ וְה’ יְקַבֵּל תְּפִלָּתוֹ אכי”ר :`]},{heading:`תְּהִלִּים ל״ד`,verses:[`א) לְדָוִד בְּשַׁנּוֹתוֹ אֶת טַעְמוֹ לִפְנֵי אֲבִימֶלֶךְ וַיְגָרֲשֵׁהוּ וַיֵּלַךְ:`,`ב) אֲבָרֲכָה אֶת יְהוָה בְּכָל עֵת תָּמִיד תְּהִלָּתוֹ בְּפִי:`,`ג) בַּיהוָה תִּתְהַלֵּל נַפְשִׁי יִשְׁמְעוּ עֲנָוִים וְיִשְׂמָחוּ:`,`ד) גַּדְּלוּ לַיהוָה אִתִּי וּנְרוֹמְמָה שְׁמוֹ יַחְדָּו:`,`ה) דָּרַשְׁתִּי אֶת יְהוָה וְעָנָנִי וּמִכָּל מְגוּרוֹתַי הִצִּילָנִי:`,`ו) הִבִּיטוּ אֵלָיו וְנָהָרוּ וּפְנֵיהֶם אַל יֶחְפָּרוּ:`,`ז) זֶה עָנִי קָרָא וַיהוָה שָׁמֵעַ וּמִכָּל צָרוֹתָיו הוֹשִׁיעוֹ:`,`ח) חֹנֶה מַלְאַךְ יְהוָה סָבִיב לִירֵאָיו וַיְחַלְּצֵם:`,`ט) טַעֲמוּ וּרְאוּ כִּי טוֹב יְהוָה אַשְׁרֵי הַגֶּבֶר יֶחֱסֶה בּוֹ:`,`י) יְראוּ אֶת יְהוָה קְדֹשָׁיו כִּי אֵין מַחְסוֹר לִירֵאָיו:`,`יא) כְּפִירִים רָשׁוּ וְרָעֵבוּ וְדֹרְשֵׁי יְהוָה לֹא יַחְסְרוּ כָל טוֹב:`,`יב) לְכוּ בָנִים שִׁמְעוּ לִי יִרְאַת יְהוָה אֲלַמֶּדְכֶם:`,`יג) מִי הָאִישׁ הֶחָפֵץ חַיִּים אֹהֵב יָמִים לִרְאוֹת טוֹב:`,`יד) נְצֹר לְשׁוֹנְךָ מֵרָע וּשְׂפָתֶיךָ מִדַּבֵּר מִרְמָה:`,`טו) סוּר מֵרָע וַעֲשֵׂה טוֹב בַּקֵּשׁ שָׁלוֹם וְרָדְפֵהוּ:`,`טז) עֵינֵי יְהוָה אֶל צַדִּיקִים וְאָזְנָיו אֶל שַׁוְעָתָם:`,`יז) פְּנֵי יְהוָה בְּעֹשֵׂי רָע לְהַכְרִית מֵאֶרֶץ זִכְרָם:`,`יח) צָעֲקוּ וַיהוָה שָׁמֵעַ וּמִכָּל צָרוֹתָם הִצִּילָם:`,`יט) קָרוֹב יְהוָה לְנִשְׁבְּרֵי לֵב וְאֶת דַּכְּאֵי רוּחַ יוֹשִׁיעַ:`,`כ) רַבּוֹת רָעוֹת צַדִּיק וּמִכֻּלָּם יַצִּילֶנּוּ יְהוָה:`,`כא) שֹׁמֵר כָּל עַצְמוֹתָיו אַחַת מֵהֵנָּה לֹא נִשְׁבָּרָה:`,`כב) תְּמוֹתֵת רָשָׁע רָעָה וְשֹׂנְאֵי צַדִּיק יֶאְשָׁמוּ:`,`כג) פּוֹדֶה יְהוָה נֶפֶשׁ עֲבָדָיו וְלֹא יֶאְשְׁמוּ כָּל הַחֹסִים בּוֹ:`]},{heading:`תְּהִלִּים ע״ב`,verses:[`א) לִשְׁלֹמֹה אֱלֹהִים מִשְׁפָּטֶיךָ לְמֶלֶךְ תֵּן וְצִדְקָתְךָ לְבֶן מֶלֶךְ:`,`ב) יָדִין עַמְּךָ בְצֶדֶק וַעֲנִיֶּיךָ בְמִשְׁפָּט:`,`ג) יִשְׂאוּ הָרִים שָׁלוֹם לָעָם וּגְבָעוֹת בִּצְדָקָה:`,`ד) יִשְׁפֹּט עֲנִיֵּי עָם יוֹשִׁיעַ לִבְנֵי אֶבְיוֹן וִידַכֵּא עוֹשֵׁק:`,`ה) יִירָאוּךָ עִם שָׁמֶשׁ וְלִפְנֵי יָרֵחַ דּוֹר דּוֹרִים:`,`ו) יֵרֵד כְּמָטָר עַל גֵּז כִּרְבִיבִים זַרְזִיף אָרֶץ:`,`ז) יִפְרַח בְּיָמָיו צַדִּיק וְרֹב שָׁלוֹם עַד בְּלִי יָרֵחַ:`,`ח) וְיֵרְדְּ מִיָּם עַד יָם וּמִנָּהָר עַד אַפְסֵי אָרֶץ:`,`ט) לְפָנָיו יִכְרְעוּ צִיִּים וְאֹיְבָיו עָפָר יְלַחֵכוּ:`,`י) מַלְכֵי תַרְשִׁישׁ וְאִיִּים מִנְחָה יָשִׁיבוּ מַלְכֵי שְׁבָא וּסְבָא אֶשְׁכָּר יַקְרִיבוּ:`,`יא) וְיִשְׁתַּחֲווּ לוֹ כָל מְלָכִים כָּל גּוֹיִם יַעַבְדוּהוּ:`,`יב) כִּי יַצִּיל אֶבְיוֹן מְשַׁוֵּעַ וְעָנִי וְאֵין עֹזֵר לוֹ:`,`יג) יָחֹס עַל דַּל וְאֶבְיוֹן וְנַפְשׁוֹת אֶבְיוֹנִים יוֹשִׁיעַ:`,`יד) מִתּוֹךְ וּמֵחָמָס יִגְאַל נַפְשָׁם וְיֵיקַר דָּמָם בְּעֵינָיו:`,`טו) וִיחִי וְיִתֶּן לוֹ מִזְּהַב שְׁבָא וְיִתְפַּלֵּל בַּעֲדוֹ תָמִיד כָּל הַיּוֹם יְבָרֲכֶנְהוּ:`,`טז) יְהִי פִסַּת בַּר בָּאָרֶץ בְּרֹאשׁ הָרִים יִרְעַשׁ כַּלְּבָנוֹן פִּרְיוֹ וְיָצִיצוּ מֵעִיר כְּעֵשֶׂב הָאָרֶץ:`,`יז) יְהִי שְׁמוֹ לְעוֹלָם לִפְנֵי שֶׁמֶשׁ יִנּוֹן שְׁמוֹ וְיִתְבָּרְכוּ בוֹ כָּל גּוֹיִם יְאַשְּׁרוּהוּ:`,`יח) בָּרוּךְ יְהוָה אֱלֹהִים אֱלֹהֵי יִשְׂרָאֵל עֹשֵׂה נִפְלָאוֹת לְבַדּוֹ:`,`יט) וּבָרוּךְ שֵׁם כְּבוֹדוֹ לְעוֹלָם וְיִמָּלֵא כְבוֹדוֹ אֶת כֹּל הָאָרֶץ אָמֵן וְאָמֵן:`,`כ) כָּלּוּ תְפִלּוֹת דָּוִד בֶּן יִשָׁי:`]},{heading:`בַּקָּשׁוֹת`,verses:[`אָנָא ה’ אֱלֹקֵי יִשְׂרָאֵל מֶלֶךְ גָּדוֹל וְנוֹרָא חֲכַם הָרָזִים מְגַלֶּה נִסְתָּרוֹת מַגִּיד תַּעֲלוּמוֹת מוֹשֵׁל בָּעֶלְיוֹנִים וְשַׁלִּיט בַּתַּחְתּוֹנִים קָרוֹב לְכָל קוֹרְאָיו לְכָל אֲשֶׁר יִקְרָאוּהוּ בֶּאֱמֶת מַצִּיל עָנִי וְאֶבְיוֹן מִגּוֹזְלוֹ פְּנֵה אֶל תְּפִילַת עַבְדֶּךָ וְאֶל תַּחֲנוּנָיו כִּי עָנִי וְאֶבְיוֹן אֲנִי.`,`יְהִי רָצוֹן מִלְּפָנֶיךָ ה’ אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ שֶׁתִּשְׁמְרֵנִי מִכָּל רַע כִּי אַתָּה שׁוֹמֵר יִשְׂרָאֵל וַתֹּאמַר לְצָרוֹתַי דַּי ותִפְדֵנִי מִכָּל צָרָה וְצוּקָה וּמִכָּל שְׁמוּעָה רָעָה וּמִכָּל בּוּשָׁה וּכְלִימָה וּמֵחֶרְפַת אָדָם וּמִבִּיזוּי עָם וּמִכָּל נֶגֶף וּמִכָּל מַשְׁחִית וּמַגֵפָה וּמִכְשוֹל וּמִפֶּגַע רָע וּמֵעַיִן הָרַע וּמִלָשוֹן הָרַע וְתַצִילֵנִי מִיֵצֶר הָרַע וּמִכָּל מַשְחִית וּמַזִיק וּמִכָּל רְגָזוֹת וּגְזֵרוֹת שֶׁבָּעוֹלָם וּמִכָּל חֵטְא וָפֶשַע וּמִכָּל עָווֹן וְאַשְׁמָה וָרֶשָׁע אכי”ר.`,`יְהִי רָצוֹן מִלְפָנֶיךָ ה’ אֶלוֹקֵינוּ וֵאלֹקֵי אֲבוֹתֵינוּ שֶׁתָרִיב אֶת רִיבֵי נַפְשִׁי בַּיוֹם וְכָל הַמְקַטְרֶגִים אֶת נַפְשִי בַּלַּיְלָה וְתִנְקוֹם אֶת נִקְמָתִי מֵהֶם וּתְקַצֵר יְמֵיהֶם וּתְמַלֵא אֶת עֲונוֹתֵיהם בְּרָע. וְכּוּלָם כְּרֶגַע יֹאבֵדוּ וּבַעֲגָלָא וּבִּזְמַן קָרִיב יִכָרֵתוּ מִן הָעוֹלָם וְתַשְׁלִיךְ אֵימָה וַחֲשֵכָה גְדוֹלָה וְתַרְדֵמָה עֲצוּמָה וּבֶהָלָה וְשִיגָעוֹן וְעִיוָרוֹן וְתִימְהוֹן לֵבָב עַל כָּל אוֹיְבַי וְשוֹנְאַי וְעַל כָּל צַר וּמַשְטִין וּמְקַטְרֵג עָלַי וְעַל אַנְשֵי בֵיתִי בֵּין אִיש בֵּין אִישָׁה בֵּין שֵד בֵּין מַזִיק בֵּין רוּחִין בִּישִין וְלִילִין כְדִכְתִיב תִּיפּוֹל עֲלֵיהֶם אֵימָתָה וָפַּחַד בִּגְדוֹל זְרוֹעֲךָ יִדְמוּ כָּאָבֶן יִדְמוּ זְרוֹעֲך בִּגְדוֹל וָפַּחַד אֵימָתָה עֲלֵיהֶם תִּיפּוֹל. וְעַל כָּל הַקָמִים עָלַי לְרָעָה מְהֵרָה הָפֵר עֲצָתָם וְקַלְקֵל מַחְשְבוֹתָם וּמוֹרָאֲך וּפַּחְדְךָ יִהְיוּ עֲלֵיהֶם שֶּׁיִּהְיוּ מַשְתִקִים מִלְּפָנַי אִם יִרְאוּנִי בְּעַין רָעָה חָלִילָה.`,`יְהִי רָצוֹן מִלְפָנֶיךָ ה’ אֶלוֹקֵינוּ וֵאלֹקֵי אֲבוֹתֵינוּ שֶתֵאָלַמְנָה שִפְתוֹתָם מִדַבֵּר, וְתֶחְשַכְנָה עֵינֵיהֶם מֵרְאוֹת וְתֶחְרַשְנָה אָזְנֵיהֶם מִשְמוֹע וּמָתְנֵיהֶם תָמִיד הַמְעַד. חַרְבָּם תָּבוֹא בְּלִבָּם וְקַשְתוֹתָם תִּשָבַרְנָה. הֵמָה יֵבוֹשוּ וַאֲנִי לֹא אֶבוֹש הֵמָה יָנוּסוּ וְאֲנִי לֹא אָנוּס כְּדִכְתִיב קוּמָה ה’ וְיָפוּצוּ אוֹיְבֶיךָ וְיָנוּסוּ מְשַנְאֶיךָ מִפָּנֶיךָ אכי”ר.`,`יְהִי רָצוֹן מִלְפָנֶיךָ ה’ אֶלוֹקֵינוּ וֵאלֹקֵי אֲבוֹתֵינוּ שֶתַשְלִיךְ אֵימָה וָפַחַד עַל הַבְּרִיוֹת וְתִגְזוֹר עֲלֵיהֶם לַעֲשוֹת רְצוֹנִי כְּנַפְשִי הַחֲפֵצָה וּבְלֵבָב שָלֵם וְקַיֵּים בָּנוּ מִקְרָא שֶכָתוּב “וְרָאוּ כָּל עַמֵי הָאָרֶץ כִּי שֶם ה’ נִקְרָא עָלֶיךָ וְיָרְאוּ מִמֶּךָּ” וְנֶאֶמַר “לֹא יִתְיַצֵּב אִישׁ בִּפְנֵיכֶם פַּחְדְּכֶם וּמוֹרַאֲכֶם יִתֵּן יְהֹוָה אֱלֹהֵיכֶם עַל פְּנֵי כָל הָאָרֶץ אֲשֶׁר תִּדְרְכוּ בָהּ כַּאֲשֶׁר דִּבֶּר לָכֶם” (דברים יא, כה) אכי”ר:`,`יְהִי רָצוֹן מִלְפָנֶיךָ ה’ אֶלוֹקֵינוּ וֵאלֹקֵי אֲבוֹתֵינוּ אֶלֹקֵי אַבְרָהָם ואֶלֹקֵי יִצְחָק וְאֵלֹקֵי יַעֲקֹב שֶתִפְתַח לִבִּי בְּתוֹרָתֶךָ וְתִיתֶן לִי דֵעָה וּבִינָה וְחָכְמָה וּתְרַחֵם עָלַי וְתָאִיר עֵינַי בְּחָכְמָה בְּחֶמְלָתֶך וּתְלַמְדֵנִי מִידוֹת חָכְמָתֶךָ וּתְבִינֵנִי דְבָרִים עֲמוּקִים בְּתוֹרָתֶךָ וּתְגַלֶה רָזִים סְתוּמִים בְּעֶזְרָתֶךָ לְמַעַן לֹא אֵבוֹש בִּפְנֵי חַכְמֵי עַמֶךָ וְלֹא אֶכָּלֵם בְּתוֹך חֲסִידֵי עֲדָתֶךָ וּתְיַחֵד כַּוָּנַת לִבִּי וַעֲרִיכַת שְפָתַי וְעָזְרֵנִי לִלְמוֹד וּלְלַמֵד לִשְמוֹר לַעֲשוֹת וּלְקֲיֵם אֶת כָּל דִבְרֵי תַלְמוּד תּוֹרָתֶךָ בְּאַהֲבָה אכי”ר.`,`יְהִי רָצוֹן מִלְפָנֶיךָ ה’ אֶלוֹקֵינוּ וֵאלֹקֵי אֲבוֹתֵינוּ אֶלוֹהֵי הַמֶרְכָּבָה, שֶׁתַצִילֵנִי מֵרְעָבוֹן וְצִימָאוֹן וּמֵעֵרוֹם. וְהַטְרִיפֵנִי לֶחֶם חֻקִי בְּכָל יוֹם וּתְפַרְנֵסֵנִי בְּנַחַת וְלא בְּצַעַר בְּהֶתֵּר וְלא בְּאִיסוּר, בְּרֶוַח וְלא בְּצִמְצוּם וּתְמַלֵא מֵעֹשֶׁר מַתְנוֹת יָדֶךָ וְתִשְׁלַח בְּרָכָה וְהַצְלָחָה בְּכָל עֲסָקַי וְעִנְיָנַי וּבְכָל מַעֲשֵׂה יָדַי שֶׁיִהְיוּ לִי וּתְנֵנִי לְאַהֲבָה בְּעֵינֶיךָ וּבְעֵינֵי כָל רוֹאַי וְיוֹדְעַי וּמַכָּרַי אָמֵן כֵּן יְהִי רָצוֹן.`,`יְהִי רָצוֹן מִלִפְנֵיכֶם מַלְאֲכֵי הַשָׂרֵת הַקְדוֹשִׁים וְהַטְהוֹרִים שֶׁתַּעֲשוּ עִמִי חֶסֶד גָדוֹל וְעִם אַנְשֵׁי בֵיתִי וּלְמַעַן קְדוּשַׁת ה’ וּלְמַעַן תוֹרָתוֹ הַקְדוֹשָׁה וְהַטְהוֹרָה וּלְמַעַן קְדֻשַׁתְכֶם תַּעַמְדוּ לִפְנֵי ה’ אֶלהֵי יִשְׂרָאֵל מֶלֶךְ יוֹשֵׁב עַל כִּסֵא רַחֲמִים בְּבַקָשָה וּבְתַחֲנוּנִים לְהַשְׁמִיע אֶת תְפִלָתִי וְאֶת תְּחִנָתִי כְּדֵי לַעֲשוֹת אֶת שְׁאֵלָתִי וּבַקָשָׁתִי בְּכָל יוֹם וָיוֹם וְיִמְחֹל לִי אֶת כָּל עֲוֹנוֹתַי וְחַטאתַי וְאַשְמוֹתַי שֶׁחָטָאתִי וְשֶׁעָוִיתִי וְשֶׁפָּשַׁעְתִּי לְפָנָיו בֵּין בְּאֹנֶס בֵּין בְּרָצוֹן בֵּין בְּשוֹגֵג בֵּין בְּמֵזִיד בֵּין בַּסֵתֶר בֵּין בַּגָלוּי בֵּין בְּמִתְכַּוֵן בֵּין שֶׁלא בְּמִתְכַּוֵן בֵּין בְּדִיבּוּר בֵּין בְּמַחְשָׁבָה בֵּין בְּמַעֲשֶׂה בֵּין בְּהִרְהוּר מֵעַתָּה וְעַד עוֹלָם אָמֵן כֵּן יְהִי רָצוֹן.`,`בְּבָעוּ מִכֶּם בְּמָטוּ מִכֶּם מַלְאֲכֵי הַשָׁרֵת הַקְדוֹשִׁים וְהַטְהוֹרִים וְהַמֻפְרָשִׁים בִּנְקִיוּת, שֶׁתַּעֲשוּ חֵן וָחֶסֶד וְרַחֲמִים גְדוֹלִים בִּזְכוּת הַשֵׁם הַגָדוֹל אכתריא”ל יוֹשֵׁב תְהִילוֹת יִשְׂרָאֵל וּבִזְכוּת שִבְעִים וּשְתַיִם שֵׁמוֹת הַקְדוֹשִׁים וְהַטְהוֹרִים תִּיקְחוּ מַפְתְּחוֹת בִּרְשוּת הקב”ה וְתִפְתְחוּ לִי שַׁעֲרֵי חֵן וָחֶסֶד וְרַחֲמִים וְשַׁעֲרֵי שָׁלוֹם וְשַׁעֲרֵי שַׁלְוָה וְשַׁעֲרֵי חָכְמָה בִּינָה וָדַעַת וְשַׁעֲרֵי עוֹשֶׁר וְכָבוֹד וְשַׁעֲרֵי תְשׁוּבָה וְשַׁעֲרֵי תְשׁוּעָה וְאֶמְצָא חֵן וָחֶסֶד בְּעֵינֵכֶם וּבְעֵינֵי כָל רוֹאַי וְיוֹדְעַי וּמַכָּרַי וְתַצְלִיחוּ אוֹתִי וְתַעַזְרוּ אוֹתִי עַל כָּל עֲסָקַי לְטוֹבָה וּכְשֶׁאֶשְׁכַּב לֹא אֶפְחַד כְּדִכְתִיב “אִם תִשְׁכַּב לֹא תִפְחָד וְשָׁכַבְתָּ וְעָרְבָה שְׁנָתֶךָ”. וְיִהְיוּ חַיַי מְתוּקִים מִדְבַשׁ וְנוֹפֶת צוּפִים וְתִהְיוּ עִמִי לְעֵזֶר וּלְהוֹעִיל וּלְהוֹשִׁיעַ וְלִסְמוֹך כִּתְקוּפַת הַשֶׁמֶש בְּתַמוּז וּכְמְלוּאַת הַלְבָנָה אָמֵן כֵּן יְהִי רָצוֹן.“יִהְיוּ לְרָצוֹן אִמְרֵי פִי וְהֶגְיוֹן לִבִּי לְפָנֶיךָ יְהֹוָה צוּרִי וְגֹאֲלִי” (תהלים יט, טו)`,`אָנָּא ה´ אֱלֹקִים אֱלֹקֵי יִשְׂרָאֵל שַׁלִּיט בָּעֶלְיוֹנִים וּבַתַּחְתּוֹנִים קָרוֹב ה´לְכָל קוֹרְאָיו בֶּאֱמֶת וּבְתָמִים, מַצִּיל עָנִי מֵחָזָק מִמֶּנּוּ וְעָנִי וְאֶבְיוֹן מִגֹּזְלוֹ: קַבֶּל וּשְׁמַע נָא בַּקָּשָׁתִי וְאֶת תְּפִלָּתִי כִּי יָחִיד וְאֶבְיוֹן אֲנִי וְקַבֵּל קוֹל תַּחֲנוּנַי וְהַשְׁלֵךְ אֵימָה וָפַחַד וְרַעַשׁ וּבֶהָלָה וּמְהוּמָה וּשְׁאָגָה וְתַרְדֵּמָה וְשִׁגָּעוֹן וְעִיוַורוֹן וְכָל מִינֵי הַכְנָעָה לְכָל אִישׁ וָאִישׁ מִשִּׁבְעִים אֻמּוֹת. וְנֶזֶק וּמַזִּיק וְלִילִין וְלִילִית וְשֶׁדִּין וְִּשֶדָתִּין וְכָל כַּת דִלְהוֹן וְרְוּחִין דְדַכְרִין שֶמְהֹן וּדְלָא דַכְרִין שֶמְהֹן וְכָל כַּת דִלְהוֹן וְכָל בְּרִיָּה שֶׁיָּקוּמוּ עָלַי לְרָעָה וּמְבַקְּשִׁין רָעָתִי וְיָבוֹאוּ לְהַזִיקֵנִי בְּשׁוּם נֵזֶק שֶׁבָּעוֹלָם הֵן מִנֵּזֶק גּוּף הֵן נֵזֶק נִשְׁמָתִי. הֵן בְּפֹעַל הֵן בְּמַחְשָׁבוֹת רָעוֹת לְטָרְדֵנִי מִן אַהֲבָתְךָ וְיִרְאָתְךָ וְתַצִּילֵנוּ מִכָּל פֶּגַע רַע וּמִכֹּל דָּבָר רַע הַמִּתְרַגְּשׁוֹת וּבָאוֹת לָעוֹלָם וּלְיִצְרָא דַּעֲבֵרָה שֶׁיָּקוּם עָלַי לְהַחְטִיא וְלַטָּמֵא אוֹתִי (פְּלוֹנִי בֶּן פְּלוֹנִית) אָנָּא הַשֵּׁם הַגָּדוֹל קר”ע שָׂטָ”ן בִּגְדֹל זְרוֹעֲךָ יִדְּמוּ כָּאָבֶן, כַּכָּתוּב “תִּפֹּל עֲלֵיהֶם אֵימָתָה וָפַחַד בִּגְדֹל זְרוֹעֲךָ יִדְּמוּ כָּאָבֶן” (פָּסוּק זֶה יֹאמַר ג´ פְּעָמִים) שֶׁלֹּא יִרְאוּנִי וְאִם יִרְאוּנִי לֹא יָזִּיקוּנִי כְּדִכְתִיב “וְאֶת הָאֲנָשִׁים אֲשֶׁר פֶּתַח הַבַּיִת הִכּוּ בַּסַּנְוֵרִים מִקָּטֹן וְעַד גָּדוֹל וַיִּלְאוּ לִמְצֹא הַפָּתַח (בְּרֵאשִׁית יֵט, יא)- הַפָּתַח לִמְצֹא וַיִּלְאוּ גָּדוֹל וְעַד מִקָּטֹן בַּסַּנְוֵרִים הִכּוּ הַבַּיִת פֶּתַח אֲשֶׁר הָאֲנָשִׁים וְאֶת” (פָּסוּק זֶה יֹאמַר ג´ פְּעָמִים).`,`וְאִם יִקְרָאוּנִי לֹא יָגִּיעוּנִי, מֶלֶךְ הַמְּרוֹמָם גְעוֹר בָּהֶם וּסְתוֹם וְחָתוֹם פִּיהֶם כּאַבְנָא. וּקְצוֹץ יְדֵיהֶם וְרַגְלֵיהֶם שֶׁלֹּא יָזּיקוּנִי וְשֶׁלֹּא יִגְרְמוּ לִי רָעָה וַהֲפֹךְ עֲצָתָם רָעָה מִמֶּנִּי שֶׁלֹּא יַבְהִילוּנִי וְלֹא לְכָל אָדָם שֶׁעִמִּי וְאִתִּי בֵּין בַּבָּיִת בֵּין בְּשָׂדֶה בֵּין בְּיַם וּבֵין בַּיַּבָּשָׁה לְנַפְשִׁי וְרוּחִי וְנִשְׁמָתִי וּמְאֹדִי וְיִהְיֶה שְׁמֶךָ הַגָּדוֹל הַגִּבּוֹר וְהַנּוֹרָא וְהֶחָזָק וְהַמְפוֹרָש שֶׁל ע”ב “וַיִּסַּע” “וַיָּבֹא” “וַיֵּט” עִמִּי (פְּלוֹנִי בֶּן פְּלוֹנִית) וְלֹא עִמָּהֶם וְיֵבוֹשׁוּ הֵמָּה וְאֶל אֵבוֹשׁ אָנִי, יֵחָתּוּ הֵמָּה וְאֶל אֶחָת אָנִי, יֵבוֹשׁוּ שׂוֹנְאַי בְּאֵימָה וּפַחַד וּרְעָדָה וּבְחַלְחַלָה וַאֲנִי אֵשֵׁב לָבֶטַח אִתְּךָ בְּשִׂמְחָה וּבְטוּב לְבַב כִּי בְּךָ אֲנִי בּוֹטֵחַ וְהֵם יָפוּצוּ כַּקַּשׁ לִפְנֵי רוּחַ כְּדִכְתִיב “קוּמָה ה’ וְיָפֻצוּ אֹיְבֶיךָ וְיָנֻסוּ מְשַׂנְאֶיךָ מִפָּנֶיךָ (במדבר י, לה)”.`]},{heading:`תְּהִלִּים קכ״א`,verses:[`שִׁיר, לַמַּעֲלוֹת אֶשָּׂא עֵינַי, אֶל הֶהָרִים מֵאַיִן יָבֹא עֶזְרִי עֶזְרִי, מֵעִם יְהוָה עֹשֵׂה שָׁמַיִם וָאָרֶץ. אַל יִתֵּן לַמּוֹט רַגְלֶךָ אַל יָנוּם, שֹׁמְרֶךָ הִנֵּה לֹא-יָנוּם, וְלֹא יִישָׁן שׁוֹמֵר, יִשְׂרָאֵל. יְהוָה שֹׁמְרֶךָ יְהוָה צִלְּךָ, עַל-יַד יְמִינֶךָ. יוֹמָם, הַשֶּׁמֶשׁ לֹא-יַכֶּכָּה וְיָרֵחַ בַּלָּיְלָה. יְהוָה, יִשְׁמָרְךָ מִכָּל רָע יִשְׁמֹר, אֶת נַפְשֶׁךָ. יְהוָה, יִשְׁמָר-צֵאתְךָ וּבוֹאֶךָ מֵעַתָּה וְעַד עוֹלָם.`]},{heading:`סִיּוּם`,verses:[`בְּבַקָּשָׁה מִמְּךָ מטטרון שַׂר הַפָּנִים כִּי שִׁמְךָ כְּשֵׁם רַבְּךָ וְעַזְרִיאֵל וּרְפָאֵל וּמִיכָאֵל וְגַבְרִיאֵל מַלְאֲכֵי הַשָּׁרֵת, שֶׁתַּעַמְדוּ לִפְנֵי מֶלֶךְ מַלְכֵי הַמְּלָכִים הַקָּדוֹשׁ בָּרוּךְ הוּא אֱלֹהֵי הָאֱלֹהִים וַאֲדוֹנֵי הָאֲדוֹנִים שֶׁתְּבַקְשׁוּ עָלַי רַחֲמִים עַל צַד הַחֵן וְהַחֶסֶד וְהָרַחֲמִים לִפְנֵי בָּעַל הָרַחֲמִים לִשְׁמוֹעַ וּלְהַשְׁמִיעַ אֶת תְּפִלָּתִי וְאֶת תַּחֲנוּנַי שֶׁיִּהְיֶה לְרָצוֹן מְקֻבָּל בִּקְדֻשָּׁה וּבְטָהֳרָה וְכָל הַמְּקַטְרְגִים יִהְיוּ מוּכְנָעִים וּמֻשְׁפָּלִים תַּחְתָּי שֶׁלֹּא יִהְיֶה לָהֶם רְשׁוּת לִקְרַב בְּכֹל גְּבוּלִי הֵן בְּעֵת הַתְּפִלָּה הֵן בְּעֵת לִמֻּדָי הֵן בְּכָל שְׁאָר צְרָכַי וְלַעֲשׂוֹת בַּקָּשָׁתִי, וְלִסְלֹחַ וְלִמְחוֹל עָלַי וְעַל עווֹנוֹתַי וְחַטֹּאותָי וְאַשְׁמוֹתַי וּפְשָׁעַי שֶׁחָטָאתִי וְשֶׁעָוִיתִי וְשֶׁפָּשַׁעְתִּי לְפָנֶיךָ בֵּין בְּאוֹנֵס בֵּין בְּרָצוֹן בֵּין בְּשׁוֹגֵג בֵּין בְּמֵזִיד בֵּין בְּהִרְהוּר בֵּין בְּמַחְשָׁבָה בֵּין בְּגִלְגּוּל זֶה וּבֵין בְּגִלְגּוּל אַחַר אֲנִי (פְּלוֹנִי בֶּן פְּלוֹנִית) עֶבֶד ה’, וַעֲשֵׂה לְמַעַן שִׁמְךָ הַגָּדוֹל שֵׁם הַמְּפֹרָשׁ שֶׁהוּא שֵׁם שֶׁל ע”ב (יו”ד ה”י וי”ו ה”י) וְשֶׁל מ”ה (יו”ד ה”א וא”ו ה”א) הַקְּדוֹשִׁים וְהַטְּהוֹרִים וְהַמְפֹאָרִים וְהָמְפוֹרָשִים בִּנְקִיּוּת וּבְטָהֳרָה שֶּׁתִּקְּחוּ אֶת כָּל מַפְתְּחוֹת הַחָכְמָה וְהַבִּינָה וְהַדַּעַת וּמַפְתֵּחַ הַפַּרְנָסָה וְהַכַּלְכָּלָה רֶוַח וְהַצָּלָה, וְהַכְתִּיּרוּנִי בָּהֶם כָּל יְמֵי הֱיוֹתִי עַל הָאֲדָמָה וְתִהְיֶה לִי לְעֵזֶר וּלְהוֹעִיל. כָּל יָמַי יָאִיר קַרְנִי וּמַזָּלִי כַשֶּׁמֶשׁ בִּתְקוּפַת תַּמּוּז וְכַיָּרֵחַ בַּחֲצִי חֹדֶשׁ בְּמִלּוּאָהּ וְתַצְלִיחֵנִי בְּמַעֲשַׂי וּבְכָל דְּרָכַי וַיִּהְיוּ דְבָרַי מְתוּקִים כִּדְבַשׁ וְנֹפֶת צוֹפִים בֱּאָזְנֵי כָּל שׁוֹמְעֵי דְּבָרִי וְהַמַּזְכִּירִים יִזְכְּרוּנִי לַטּוֹב כָּל הַיָּמִים אָמֵן כֵּן יְהִי רָצוֹן.`,`וּמַשְׁבִּיעַ (וּמְבַקֵּשׁ) אֲנִי עָלֶיךָ (מִמֶּךָּ) אהובי”אל הַמַּלְאָךְ הַמְּמֻנֶּה עַל הָאַהֲבָה וְעַל הַחִבָּה לְבַקֵּשׁ עָלַי רַחֲמִים מִלִּפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא שֶׁתִּתְּנֵנִי לְחֵן וּלְחֶסֶד וּלְרַחֲמִים בְּעֵינֵי כָּל רוֹאַי וּבְעֵינֵי כָּל מְאַהֲבָי בֵּין שֶׁהֵם עַל הַשָּׁמַיִם אוֹ מִתַּחַת הַשָּׁמַיִם, וַתְּהִי הַשָּׁעָה הַזֹּאת וְהַיּוֹם הַזֶּה שֶׁאֲנִי מִתְפַּלֵּל לִפְנֵי הקב”ה, עֵת רָצוֹן ועֵת רַחֲמִים ועֵת יְשׁוּעָה וּמְחִילָה וּסְלִיחָה וְכַפָּרָה וּרְפוּאָה שְׁלֵמָה וְחַיִּים טוֹבִים אֵלַי אֲנִי (פְּלוֹנִי בֶּן פְּלוֹנִית) וּמַשְׁבִּיעַ (וּמְבַקֵּשׁ) אֲנִי עָלֶיךָ (מִמֶּךָּ) מטטרו”ן עֶבֶד ה’ שֶׁשִּׁמְךָ יוֹצֵא כְּשֵׁם רַבְּךָ לַעֲשׂוֹת חֶפְצִי וּרְצוֹנִי וְאֵמָתִי מֻטֶּלֶת עַל כָּל הַבְּרִיּוֹת שֶׁיַּזְכִּירוּ אוֹתִי לְטוֹבָה וְשֶׁתִּהְיֶה קוֹמָתִי נָאָה וּפָנַי מַזְהִירוֹת וּמַצְהִיבוֹת וְשֶׁתִּהְיֶה תּוֹרָתִי שְׁמוּרָה וַעֲרוּכָה בְּלִבִּי וְלֹא אֶשְׁכַּח דָּבָר מִכָּל אֲשֶׁר לָמַדְתִּי וְעָתִיד לִלְמֹד וְשֶׁתִּהְיֶה דַּעְתִּי מְיֻשֶּׁבֶת עָלַי וְתַצִּילֵנִי מֵאָדָם רַע וּמִפֶּגַע רַע וַתִּסְגֹּר פִּיּוֹת הַמְדַבְּרִים עָלַי עָתָק וְהַחוֹשְׁבִים רָעָתִי, תִּפּוֹל עֲלֵיהֶם אֵימָתָה וּפַחַד, כִּי אַתָּה שׁוֹמֵעַ תְּפִלָּה, ארארית”א רח”ש תמי”פ בָּרוּךְ אַתָּה שׁוֹמֵעַ תְּפִלָּה, אָמֵן.`]}]},"igeret-haramban":{id:`igeret-haramban`,numbered:!1,title:`אִגֶּרֶת הָרַמְבַּ״ן`,subtitle:`מידת הענווה`,chapters:[{heading:`אִגֶּרֶת הָרַמְבַּ״ן`,verses:[`"שְׁמַע בְּנִי מוּסַר אָבִיךָ, וְאַל תִּטֹּשׁ תּוֹרַת אִמֶּךָ" (משלי א ח).`,`תִּתְנַהֵג תָּמִיד לְדַבֵּר כָּל דְּבָרֶיךָ בְּנַחַת, לְכָל אָדָם וּבְכָל עֵת, וּבַזֶּה תִּנָּצֵל מִן הַכַּעַס, שֶׁהִיא מִדָּה רָעָה לְהַחְטִיא בְּנֵי אָדָם. וְכֵן אָמְרוּ רַבּוֹתֵינוּ ז"ל (נדרים כב ע"א): כָּל הַכּוֹעֵס, כָּל מִינֵי גֵיהִנּוֹם שׁוֹלְטִים בּוֹ, שֶׁנֶּאֱמַר (קהלת יא י): "וְהָסֵר כַּעַס מִלִּבֶּךָ, וְהַעֲבֵר רָעָה מִבְּשָׂרֶךָ". וְאֵין "רָעָה" אֶלָּא גֵיהִנּוֹם, שֶׁנֶּאֱמַר (משלי טז ד): "וְגַם רָשָׁע לְיוֹם רָעָה".`,`וְכַאֲשֶׁר תִּנָּצֵל מִן הַכַּעַס, תַּעֲלֶה עַל לִבְּךָ מִדַּת הָעֲנָוָה, שֶׁהִיא מִדָּה טוֹבָה מִכָּל מִדּוֹת טוֹבוֹת, שֶׁנֶּאֱמַר (משלי כב ד): "עֵקֶב עֲנָוָה, יִרְאַת ה'".`,`וּבַעֲבוּר הָעֲנָוָה, תַּעֲלֶה עַל לִבְּךָ מִדַּת הַיִּרְאָה, כִּי תִתֵּן אֶל לִבְּךָ תָּמִיד: מֵאַיִן בָּאתָ, וּלְאַן אַתָּה הוֹלֵךְ; וְשֶׁאַתָּה רִמָּה וְתוֹלֵעָה בְּחַיֶּיךָ, וְאַף כִּי בְּמוֹתָךְ; וְלִפְנֵי מִי אַתָּה עָתִיד לִתֵּן דִּין וְחֶשְׁבּוֹן, לִפְנֵי מֶלֶךְ הַכָּבוֹד, שֶׁנֶּאֱמַר (דה"ב ו יח): "הִנֵּה שָׁמַיִם וּשְׁמֵי הַשָׁמַיִם לֹא יְכַלְכְּלוּךָ", אַף כִּי לִבּוֹת בְּנֵי אָדָם (ע"פ משלי טו יא). וְנֶאֱמַר (ירמיהו כג כד): "הֲלֹא אֵת הַשָׁמַיִם וְאֵת הָאָרֶץ אֲנִי מָלֵא, נְאֻם ה'".`,`וְכַאֲשֶׁר תַּחֲשֹׁב אֶת כָּל אֵלֶּה, תִּירָא מִבּוֹרְאֶךָ וְתִשָּׁמֵר מִן הַחֵטְא, וּבַמִּדוֹת הָאֵלֶּה תִּהְיֶה שָֹמֵחַ בְּחֶלְקֶךָ. וְכַאֲשֶׁר תִּתְנַהֵג בְּמִדַּת הָעֲנָוָה לְהִתְבּוֹשֵׁשׁ מִכָּל אָדָם, וּלְהִתְפַּחֵד מִמֶּנּוּ וּמִן הַחֵטְא, אָז תִּשְׁרֶה עָלֶיךָ רוּחַ הַשְּׁכִינָה, וְזִיו כְּבוֹדָהּ, וְחַיֵּי עוֹלָם הַבָּא.`,`וְעַתָּה בְּנִי דַע וּרְאֵה, כִּי הַמִּתְגָּאֶה בְּלִבּוֹ עַל הַבְּרִיוֹת, מוֹרֵד הוּא בְּמַלְכוּת שָׁמַיִם, כִּי מִתְפָּאֵר הוּא בִּלְבוּשׁ מַלְכוּת שָׁמַיִם, שֶׁנֶּאֱמַר (תהלים צג א): "ה' מָלָךְ גֵּאוּת לָבֵש", וגו'.`,`וּבַמֶה יִתְגָּאֵה לֵב הָאָדָם? אִם בְּעֹשֶׁר, "ה' מוֹרִישׁ וּמַעֲשִׁיר" (שמ"א ב ז). וְאִם בְּכָבוֹד, הֲלֹא לֵאלֹהִים הוּא, שֶׁנֶּאֱמַר (דה"א כט יב): "וְהָעֹשֶׁר וְהַכָּבוֹד מִלְפָנֶיךָ", וְאֵיךְ מִתְפָּאֵר בִּכְבוֹד קוֹנוֹ? וְאִם מִתְפָּאֵר בְּחָכְמָה: "מֵסִיר שָֹפָה לְנֶאֱמָנִים, וְטַעַם זְקֵנִים יִקַח" (איוב יב כ). נִמְצָא: הַכָּל שָׁוֶה לִפְנֵי הַמָּקוֹם, כִּי בְאַפּוֹ מַשְׁפִּיל גֵּאִים, וּבִרְצוֹנוֹ מַגְבִּיהַ שְׁפָלִים. לָכֵן הַשְׁפִּיל עַצְמְךָ, וִינַשַֹּאֲךָ הַמָּקוֹם.`,`עַל כֵּן אַפָרֵשׁ לְךָ אֵיךְ תִּתְנַהֵג בְּמִדַּת הָעֲנָוָה, לָלֶכֶת בָּהּ תָּמִיד: כָּל דְבָרֶיךָ יִהְיוּ בְּנַחַת, וְרֹאשְׁךָ כָּפוּף; וְעֵינֶךָ יַבִּיטוּ לְמַטָּה לָאָרֶץ, וְלִבְּךָ לְמַעֲלָה; וְאַל תַּבִּיט בִּפְנֵי אָדָם בְּדַבֶּרְךָ עִמוֹ. וְכָל אָדָם יִהְיֶה גָדוֹל מִמְךָ בְּעֵינֶיךָ: אִם חָכָם אוֹ עָשִׁיר הוּא, עָלֶיךָ לְכַבְּדוֹ. וְאִם רָשׁ הוּא, וְאַתָּה עָשִׁיר אוֹ חָכָם מִמֶנוּ, חֲשֹׁב בְּלִבְּךָ כִּי אַתָּה חַיָּב מִמֶנוּ, וְהוּא זַכַּאי מִמְךָ, שֶׁאִם הוּא חוֹטֵא, הוּא שׁוֹגֵג, וְאַתָּה מֵזִיד.`,`בְּכָל דְּבָרֶיךָ וּמַעֲשֶֹיךָ וּמַחְשְׁבוֹתֶיךָ, וּבְכָל עֵת, חֲשׁוֹב בְּלִבָּךְ כְּאִלוּ אַתָּה עוֹמֵד לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא וּשְׁכִינָתוֹ עָלֶיךָ, כִּי כְּבוֹדוֹ מָלֵא הָעוֹלָם. וּדְבָרֶיךָ יִהְיוּ בְּאֵימָה וּבְיִרְאָה, כְּעֶבֶד לִפְנֵי רַבּוֹ.`,`וְתִתְבַּיֵּשׁ מִכָּל אָדָם. וְאִם יִקְרָאֲךָ אִישׁ, אַל תַּעֲנֵהוּ בְּקוֹל רָם, רַק בְּנַחַת כְּעוֹמֵד לִפְנֵי רַבּוֹ.`,`וֶהֱוֵי זָהִיר לִקְרוֹת בַּתּוֹרָה תָּמִיד, אֲשֶׁר תּוּכַל לְקַיְּמָהּ. וְכַאֲשֶׁר תָּקוּם מִן הַסֵּפֶר, תְּחַפֵּשֹ בַּאֲשֶׁר לָמַדְתָּ אִם יֵשׁ בּוֹ דָבָר אֲשֶׁר תּוּכַל לְקַיְּמוֹ. וּתְפַשְׁפֵּשׁ בְּמַעֲשֶֹיךָ בַּבֹּקֶר וּבָעֶרֶב, וּבָזֶה יִהְיוּ כָּל יָמֶיךָ בִּתְשׁוּבָה.`,`וְהַסֵר כָּל דִבְרֵי הָעוֹלָם מִלִבְּךָ בְּעֵת הַתְּפִלָּה, וְהָכֵן לִבְּךָ לִפְנֵי הַמָּקוֹם בָּרוּךְ הוּא. וְטַהֵר רַעֲיוֹנֶיךָ, וַחֲשֹׁב הַדִּבּוּר קֹדֶם שֶׁתּוֹצִיאֶנּוּ מִפִּיךָ.`,`וְכֵן תַּעֲשֶֹה כָּל יְמֵי חַיֵּי הֶבְלֶךָ בְּכָל דָּבָר וְדָבָר, וְלֹא תֶחֱטָא. וּבָזֶּה יִהְיוּ דְּבָרֶיךָ וּמַעֲשֶֹיךָ וּמַחְשְׁבוֹתֶיךָ יְשָׁרִים; וּתְפִלָּתְךָ תִּהְיֶה זַכָּה וּבָרָה וּנְקִיָּה, וּמְכֻוֶּנֶת וּמְקֻבֶּלֶת לִפְנֵי הַמָּקוֹם בָּרוּךְ הוּא, שֶׁנֶּאֱמַר (תהלים י יז): "תָּכִין לִבָּם, תַּקְשִׁיב אָזְנֶךָ".`,`תִּקְרָא הָאִגֶּרֶת הַזֹּאת פַּעַם אַחַת בְּשָׁבוּעַ וְלֹא תִפְחֹת, לְקַיְּמָהּ וְלָלֶכֶת בָּהּ תָּמִיד אַחַר הַשֵּׁם יִתְבָּרַךְ, לְמַעַן תַּצְלִיחַ בְּכָל דְּרָכֶיךָ, וְתִזְכֶּה לָעוֹלָם הַבָּא הַצָּפוּן לַצַּדִּיקִים. וּבְכָל יוֹם שֶׁתִּקְרָאֶנָּה, יַעֲנוּךָ מִן הַשָּׁמַיִם כַּאֲשֶׁר יַעֲלֶה עַל לִבְּךָ לִשְׁאֹל, עַד עוֹלָם. אָמֵן סֶלָה.`]}]},"parshat-haman":{id:`parshat-haman`,title:`פָּרָשַׁת הַמָּן`,subtitle:`סגולה לפרנסה`,note:`כמנהג רבי מנחם מנדל מרימנוב זיע״א`,chapters:[{heading:`תְּפִלָּה קֹדֶם הַפָּרָשָׁה`,verses:[`יְהִי רָצוֹן מִלְּפָנֶיךָ יְהֹוָה אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ שֶׁתַּזְמִין פַּרְנָסָה לְכָל עַמְּךָ בֵּית יִשְׂרָאֵל וּפַרְנָסָתִי וּפַרְנָסַת אַנְשֵׁי בֵיתִי בִּכְלָלָם. בְּנַחַת וְלֹא בְּצַעַר בְּכָבוֹד וְלֹא בְּבִזּוּי בְּהֶתֵּר וְלֹא בְּאִסּוּר כְּדֵי שֶׁנּוּכַל לַעֲבוֹד עֲבוֹדָתֶךָ וְלִלְמוֹד תּוֹרָתֶךָ כְּמוֹ שֶׁזַנְתָּ לַאֲבוֹתֵינוּ מָן בַּמִּדְבָּר בְּאֶרֶץ צִיָּה וַעֲרָבָה:`],numbered:!1},{heading:`פָּרָשַׁת הַמָּן`,verses:`וַיֹּ֤אמֶר יְהֹוָה֙ אֶל־מֹשֶׁ֔ה הִנְנִ֨י מַמְטִ֥יר לָכֶ֛ם לֶ֖חֶם מִן־הַשָּׁמָ֑יִם וְיָצָ֨א הָעָ֤ם וְלָֽקְטוּ֙ דְּבַר־י֣וֹם בְּיוֹמ֔וֹ לְמַ֧עַן אֲנַסֶּ֛נּוּ הֲיֵלֵ֥ךְ בְּתוֹרָתִ֖י אִם־לֹֽא׃.וְהָיָה֙ בַּיּ֣וֹם הַשִּׁשִּׁ֔י וְהֵכִ֖ינוּ אֵ֣ת אֲשֶׁר־יָבִ֑יאוּ וְהָיָ֣ה מִשְׁנֶ֔ה עַ֥ל אֲשֶֽׁר־יִלְקְט֖וּ י֥וֹם&thinsp;<small>׀</small>&thinsp;יֽוֹם׃.וַיֹּ֤אמֶר מֹשֶׁה֙ וְאַהֲרֹ֔ן אֶֽל־כׇּל־בְּנֵ֖י יִשְׂרָאֵ֑ל עֶ֕רֶב וִֽידַעְתֶּ֕ם כִּ֧י יְהֹוָ֛ה הוֹצִ֥יא אֶתְכֶ֖ם מֵאֶ֥רֶץ מִצְרָֽיִם׃.וּבֹ֗קֶר וּרְאִיתֶם֙ אֶת־כְּב֣וֹד יְהֹוָ֔ה בְּשׇׁמְע֥וֹ אֶת־תְּלֻנֹּתֵיכֶ֖ם עַל־יְהֹוָ֑ה וְנַ֣חְנוּ מָ֔ה כִּ֥י תַלִּ֖ינוּ עָלֵֽינוּ׃.וַיֹּ֣אמֶר מֹשֶׁ֗ה בְּתֵ֣ת יְהֹוָה֩ לָכֶ֨ם בָּעֶ֜רֶב בָּשָׂ֣ר לֶאֱכֹ֗ל וְלֶ֤חֶם בַּבֹּ֙קֶר֙ לִשְׂבֹּ֔עַ בִּשְׁמֹ֤עַ יְהֹוָה֙ אֶת־תְּלֻנֹּ֣תֵיכֶ֔ם אֲשֶׁר־אַתֶּ֥ם מַלִּינִ֖ם עָלָ֑יו וְנַ֣חְנוּ מָ֔ה לֹא־עָלֵ֥ינוּ תְלֻנֹּתֵיכֶ֖ם כִּ֥י עַל־יְהֹוָֽה׃.וַיֹּ֤אמֶר מֹשֶׁה֙ אֶֽל־אַהֲרֹ֔ן אֱמֹ֗ר אֶֽל־כׇּל־עֲדַת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל קִרְב֖וּ לִפְנֵ֣י יְהֹוָ֑ה כִּ֣י שָׁמַ֔ע אֵ֖ת תְּלֻנֹּתֵיכֶֽם׃.וַיְהִ֗י כְּדַבֵּ֤ר אַהֲרֹן֙ אֶל־כׇּל־עֲדַ֣ת בְּנֵֽי־יִשְׂרָאֵ֔ל וַיִּפְנ֖וּ אֶל־הַמִּדְבָּ֑ר וְהִנֵּה֙ כְּב֣וֹד יְהֹוָ֔ה נִרְאָ֖ה בֶּעָנָֽן׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>.וַיְדַבֵּ֥ר יְהֹוָ֖ה אֶל־מֹשֶׁ֥ה לֵּאמֹֽר׃.שָׁמַ֗עְתִּי אֶת־תְּלוּנֹּת֮ בְּנֵ֣י יִשְׂרָאֵל֒ דַּבֵּ֨ר אֲלֵהֶ֜ם לֵאמֹ֗ר בֵּ֤ין הָֽעַרְבַּ֙יִם֙ תֹּאכְל֣וּ בָשָׂ֔ר וּבַבֹּ֖קֶר תִּשְׂבְּעוּ־לָ֑חֶם וִֽידַעְתֶּ֕ם כִּ֛י אֲנִ֥י יְהֹוָ֖ה אֱלֹהֵיכֶֽם׃.וַיְהִ֣י בָעֶ֔רֶב וַתַּ֣עַל הַשְּׂלָ֔ו וַתְּכַ֖ס אֶת־הַֽמַּחֲנֶ֑ה וּבַבֹּ֗קֶר הָֽיְתָה֙ שִׁכְבַ֣ת הַטַּ֔ל סָבִ֖יב לַֽמַּחֲנֶֽה׃.וַתַּ֖עַל שִׁכְבַ֣ת הַטָּ֑ל וְהִנֵּ֞ה עַל־פְּנֵ֤י הַמִּדְבָּר֙ דַּ֣ק מְחֻסְפָּ֔ס דַּ֥ק כַּכְּפֹ֖ר עַל־הָאָֽרֶץ׃.וַיִּרְא֣וּ בְנֵֽי־יִשְׂרָאֵ֗ל וַיֹּ֨אמְר֜וּ אִ֤ישׁ אֶל־אָחִיו֙ מָ֣ן ה֔וּא כִּ֛י לֹ֥א יָדְע֖וּ מַה־ה֑וּא וַיֹּ֤אמֶר מֹשֶׁה֙ אֲלֵהֶ֔ם ה֣וּא הַלֶּ֔חֶם אֲשֶׁ֨ר נָתַ֧ן יְהֹוָ֛ה לָכֶ֖ם לְאׇכְלָֽה׃.זֶ֤ה הַדָּבָר֙ אֲשֶׁ֣ר צִוָּ֣ה יְהֹוָ֔ה לִקְט֣וּ מִמֶּ֔נּוּ אִ֖ישׁ לְפִ֣י אׇכְל֑וֹ עֹ֣מֶר לַגֻּלְגֹּ֗לֶת מִסְפַּר֙ נַפְשֹׁ֣תֵיכֶ֔ם אִ֛ישׁ לַאֲשֶׁ֥ר בְּאׇהֳל֖וֹ תִּקָּֽחוּ׃.וַיַּעֲשׂוּ־כֵ֖ן בְּנֵ֣י יִשְׂרָאֵ֑ל וַֽיִּלְקְט֔וּ הַמַּרְבֶּ֖ה וְהַמַּמְעִֽיט׃.וַיָּמֹ֣דּוּ בָעֹ֔מֶר וְלֹ֤א הֶעְדִּיף֙ הַמַּרְבֶּ֔ה וְהַמַּמְעִ֖יט לֹ֣א הֶחְסִ֑יר אִ֥ישׁ לְפִֽי־אׇכְל֖וֹ לָקָֽטוּ׃.וַיֹּ֥אמֶר מֹשֶׁ֖ה אֲלֵהֶ֑ם אִ֕ישׁ אַל־יוֹתֵ֥ר מִמֶּ֖נּוּ עַד־בֹּֽקֶר׃.וְלֹא־שָׁמְע֣וּ אֶל־מֹשֶׁ֗ה וַיּוֹתִ֨רוּ אֲנָשִׁ֤ים מִמֶּ֙נּוּ֙ עַד־בֹּ֔קֶר וַיָּ֥רֻם תּוֹלָעִ֖ים וַיִּבְאַ֑שׁ וַיִּקְצֹ֥ף עֲלֵהֶ֖ם מֹשֶֽׁה׃.וַיִּלְקְט֤וּ אֹתוֹ֙ בַּבֹּ֣קֶר בַּבֹּ֔קֶר אִ֖ישׁ כְּפִ֣י אׇכְל֑וֹ וְחַ֥ם הַשֶּׁ֖מֶשׁ וְנָמָֽס׃.וַיְהִ֣י&thinsp;<b>׀</b> בַּיּ֣וֹם הַשִּׁשִּׁ֗י לָֽקְט֥וּ לֶ֙חֶם֙ מִשְׁנֶ֔ה שְׁנֵ֥י הָעֹ֖מֶר לָאֶחָ֑ד וַיָּבֹ֙אוּ֙ כׇּל־נְשִׂיאֵ֣י הָֽעֵדָ֔ה וַיַּגִּ֖ידוּ לְמֹשֶֽׁה׃.וַיֹּ֣אמֶר אֲלֵהֶ֗ם ה֚וּא אֲשֶׁ֣ר דִּבֶּ֣ר יְהֹוָ֔ה שַׁבָּת֧וֹן שַׁבַּת־קֹ֛דֶשׁ לַֽיהֹוָ֖ה מָחָ֑ר אֵ֣ת אֲשֶׁר־תֹּאפ֞וּ אֵפ֗וּ וְאֵ֤ת אֲשֶֽׁר־תְּבַשְּׁלוּ֙ בַּשֵּׁ֔לוּ וְאֵת֙ כׇּל־הָ֣עֹדֵ֔ף הַנִּ֧יחוּ לָכֶ֛ם לְמִשְׁמֶ֖רֶת עַד־הַבֹּֽקֶר׃.וַיַּנִּ֤יחוּ אֹתוֹ֙ עַד־הַבֹּ֔קֶר כַּאֲשֶׁ֖ר צִוָּ֣ה מֹשֶׁ֑ה וְלֹ֣א הִבְאִ֔ישׁ וְרִמָּ֖ה לֹא־הָ֥יְתָה בּֽוֹ׃.וַיֹּ֤אמֶר מֹשֶׁה֙ אִכְלֻ֣הוּ הַיּ֔וֹם כִּֽי־שַׁבָּ֥ת הַיּ֖וֹם לַיהֹוָ֑ה הַיּ֕וֹם לֹ֥א תִמְצָאֻ֖הוּ בַּשָּׂדֶֽה׃.שֵׁ֥שֶׁת יָמִ֖ים תִּלְקְטֻ֑הוּ וּבַיּ֧וֹם הַשְּׁבִיעִ֛י שַׁבָּ֖ת לֹ֥א יִֽהְיֶה־בּֽוֹ׃.וַֽיְהִי֙ בַּיּ֣וֹם הַשְּׁבִיעִ֔י יָצְא֥וּ מִן־הָעָ֖ם לִלְקֹ֑ט וְלֹ֖א מָצָֽאוּ׃&nbsp;<span class="mam-spi-samekh">{ס}</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.וַיֹּ֥אמֶר יְהֹוָ֖ה אֶל־מֹשֶׁ֑ה עַד־אָ֙נָה֙ מֵֽאַנְתֶּ֔ם לִשְׁמֹ֥ר מִצְוֺתַ֖י וְתוֹרֹתָֽי׃.רְא֗וּ כִּֽי־יְהֹוָה֮ נָתַ֣ן לָכֶ֣ם הַשַּׁבָּת֒ עַל־כֵּ֠ן ה֣וּא נֹתֵ֥ן לָכֶ֛ם בַּיּ֥וֹם הַשִּׁשִּׁ֖י לֶ֣חֶם יוֹמָ֑יִם שְׁב֣וּ&thinsp;<b>׀</b> אִ֣ישׁ תַּחְתָּ֗יו אַל־יֵ֥צֵא אִ֛ישׁ מִמְּקֹמ֖וֹ בַּיּ֥וֹם הַשְּׁבִיעִֽי׃.וַיִּשְׁבְּת֥וּ הָעָ֖ם בַּיּ֥וֹם הַשְּׁבִעִֽי׃.וַיִּקְרְא֧וּ בֵֽית־יִשְׂרָאֵ֛ל אֶת־שְׁמ֖וֹ מָ֑ן וְה֗וּא כְּזֶ֤רַע גַּד֙ לָבָ֔ן וְטַעְמ֖וֹ כְּצַפִּיחִ֥ת בִּדְבָֽשׁ׃.וַיֹּ֣אמֶר מֹשֶׁ֗ה זֶ֤ה הַדָּבָר֙ אֲשֶׁ֣ר צִוָּ֣ה יְהֹוָ֔ה מְלֹ֤א הָעֹ֙מֶר֙ מִמֶּ֔נּוּ לְמִשְׁמֶ֖רֶת לְדֹרֹתֵיכֶ֑ם לְמַ֣עַן&thinsp;<b>׀</b> יִרְא֣וּ אֶת־הַלֶּ֗חֶם אֲשֶׁ֨ר הֶאֱכַ֤לְתִּי אֶתְכֶם֙ בַּמִּדְבָּ֔ר בְּהוֹצִיאִ֥י אֶתְכֶ֖ם מֵאֶ֥רֶץ מִצְרָֽיִם׃.וַיֹּ֨אמֶר מֹשֶׁ֜ה אֶֽל־אַהֲרֹ֗ן קַ֚ח צִנְצֶ֣נֶת אַחַ֔ת וְתֶן־שָׁ֥מָּה מְלֹֽא־הָעֹ֖מֶר מָ֑ן וְהַנַּ֤ח אֹתוֹ֙ לִפְנֵ֣י יְהֹוָ֔ה לְמִשְׁמֶ֖רֶת לְדֹרֹתֵיכֶֽם׃.כַּאֲשֶׁ֛ר צִוָּ֥ה יְהֹוָ֖ה אֶל־מֹשֶׁ֑ה וַיַּנִּיחֵ֧הוּ אַהֲרֹ֛ן לִפְנֵ֥י הָעֵדֻ֖ת לְמִשְׁמָֽרֶת׃.וּבְנֵ֣י יִשְׂרָאֵ֗ל אָֽכְל֤וּ אֶת־הַמָּן֙ אַרְבָּעִ֣ים שָׁנָ֔ה עַד־בֹּאָ֖ם אֶל־אֶ֣רֶץ נוֹשָׁ֑בֶת אֶת־הַמָּן֙ אָֽכְל֔וּ עַד־בֹּאָ֕ם אֶל־קְצֵ֖ה אֶ֥רֶץ כְּנָֽעַן׃.וְהָעֹ֕מֶר עֲשִׂרִ֥ית הָאֵיפָ֖ה הֽוּא׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`.split(`.`)},{heading:`תְּפִלָּה לְאַחַר הַפָּרָשָׁה`,verses:[`אַתָּה הוּא יְהֹוָה לְבַדֶּךָ אַתָּה עָשִׂיתָ אֶת הַשָּׁמַיִם וּשְׁמֵי הַשָּׁמַיִם הָאָרֶץ וְכָל אֲשֶׁר עָלֶיהָ הַיַּמִים וְכָל אֲשֶׁר בָּהֶם וְאַתָּה מְחַיֶּה אֶת כֻּלָּם וְאַתָּה הוּא שֶׁעָשִׂיתָ נִסִּים וְנִפְלָאוֹת גְּדוֹלוֹת תָּמִיד עִם אֲבוֹתֵינוּ גַּם בַּמִּדְבָּר הִמְטַרְתָּ לָהֶם לֶחֶם מִן הַשָּׁמַיִם וּמִצּוּר הַחַלָּמִישׁ הוֹצֵאתָ לָהֶם מַיִם וְגַם נָתַתָּ לָהֶם כָּל צָרְכֵיהֶם שִׂמְלוֹתָם לֹא בָלְתָה מֵעֲלֵיהֶם כֵּן בְּרַחֲמֶיךָ הָרַבִּים וּבַחֲסָדֶיךָ הָעֲצוּמִים תְּזוּנֵנוּ וּתְפַרְנְסֵנוּ וּתְכַלְכְּלֵנוּ וְתַסְפִּיק לָנוּ כָּל צָרְכֵנוּ וְצָרְכֵי עַמְּךָ בֵּית יִשְׂרָאֵל הַמְרוּבִּים בְּמִלּוּי וּבְרֶוַח בְּלִי טֹרַח וְעָמָל גָּדוֹל מִתַּחַת יָדְךָ הַנְּקִיָּה וְלֹא מִתַּחַת יְדֵי בָשָׂר וָדָם:`,`יְהִי רָצוֹן מִלְּפָנֶיךָ יְהֹוָה אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי שֶׁתָּכִין לִי וּלְאַנְשֵׁי בֵיתִי כָּל מַחֲסוֹרֵנוּ וְתַזְמִין לָנוּ כָּל צָרְכֵנוּ לְכָל יוֹם וָיּוֹם מֵחַיֵּינוּ דֵי מַחֲסוֹרֵנוּ וּלְכָל שָׁעָה וְשָׁעָה מִשָּׁעוֹתֵינוּ דֵי סִפּוּקֵנוּ וּלְכָל עֶצֶם מֵעֲצָמֵינוּ דֵי מִחְיָתֵנוּ מִיָּדְךָ הַטוֹבָה וְהָרְחָבָה וְלֹא כְּמִעוּט מִפְעָלֵינוּ וְקוֹצֶר חֲסָדֵינוּ וּמִזְעֵיר גְּמוּלוֹתֵינוּ וְיִהְיוּ מְזוֹנוֹתַי וּמְזוֹנוֹת אַנְשֵׁי בֵיתִי וְזַרְעִי וְזֶרַע זַרְעִי מְסוּרִים בְּיָדְךָ וְלֹא בְּיַד בָּשָׂר וָדָם:`],numbered:!1}]},"ein-od-milvado":{id:`ein-od-milvado`,title:`אֵין עוֹד מִלְּבַדּוֹ`,subtitle:`סגולה לשמירה`,note:`מדברי רבנו חיים מוולוז׳ין · נפש החיים`,numbered:!1,chapters:[{heading:`פְּסוּקֵי אֵין עוֹד מִלְּבַדּוֹ`,verses:[`אַתָּה֙ הׇרְאֵ֣תָ לָדַ֔עַת כִּ֥י יְהֹוָ֖ה ה֣וּא הָאֱלֹהִ֑ים אֵ֥ין ע֖וֹד מִלְּבַדּֽוֹ׃`,`וְיָדַעְתָּ֣ הַיּ֗וֹם וַהֲשֵׁבֹתָ֮ אֶל לְבָבֶ֒ךָ֒ כִּ֤י יְהֹוָה֙ ה֣וּא הָֽאֱלֹהִ֔ים בַּשָּׁמַ֣יִם מִמַּ֔עַל וְעַל הָאָ֖רֶץ מִתָּ֑חַת אֵ֖ין עֽוֹד׃`,`שְׁמַ֖<big>ע</big> יִשְׂרָאֵ֑ל יְהֹוָ֥ה אֱלֹהֵ֖ינוּ יְהֹוָ֥ה&thinsp;<small>׀</small>&thinsp;אֶחָֽ<big>ד</big>׃`]},{heading:`סְגֻלַּת נֶפֶשׁ הַחַיִּים`,verses:[`וּבֶאֱמֶת הוּא עִנְיָן גָּדוֹל וּסְגֻלָּה נִפְלָאָה לְהָסִיר וּלְבַטֵּל מֵעָלָיו כָּל דִּינִין וּרְצוֹנוֹת אֲחֵרִים שֶׁלֹּא יוּכְלוּ לִשְׁלֹט בּוֹ וְלֹא יַעֲשׂוּ שׁוּם רֹשֶׁם כְּלָל. כְּשֶׁהָאָדָם קוֹבֵעַ בְּלִבּוֹ לֵאמֹר הֲלֹא ה׳ הוּא הָאֱלֹקִים הָאֲמִתִּי וְאֵין עוֹד מִלְּבַדּוֹ יִתְבָּרֵךְ שׁוּם כֹּחַ בָּעוֹלָם וְכָל הָעוֹלָמוֹת כְּלָל וְהַכֹּל מָלֵא רַק אַחְדוּתוֹ הַפָּשׁוּט ית״ש. וּמְבַטֵּל בְּלִבּוֹ בִּטּוּל גָּמוּר וְאֵינוֹ מַשְׁגִּיחַ כְּלָל עַל שׁוּם כֹּחַ וְרָצוֹן בָּעוֹלָם. וּמְשַׁעְבֵּד וּמְדַבֵּק טֹהַר מַחְשַׁבְתּוֹ רַק לְאָדוֹן יָחִיד ב״ה. כֵּן יַסְפִּיק הוּא יתב׳ בְּיָדוֹ שֶׁמִּמֵּילָא יִתְבַּטְּלוּ מֵעָלָיו כָּל הַכֹּחוֹת וְהָרְצוֹנוֹת שֶׁבָּעוֹלָם שֶׁלֹּא יוּכְלוּ לִפְעֹל לוֹ שׁוּם דָּבָר כְּלָל.`]}]},"pitum-haketoret":{id:`pitum-haketoret`,title:`פִּטּוּם הַקְּטֹרֶת`,subtitle:`סֵדֶר הַקְּטֹרֶת · נֻסַּח עֵדוֹת הַמִּזְרָח`,numbered:!1,chapters:[{heading:`אַתָּה הוּא ה׳ אֱלֹהֵינוּ`,verses:[`<b>אַתָּה</b> הוּא יְהֹוָה אֱלֹהֵֽינוּ, שֶׁהִקְטִֽירוּ אֲבוֹתֵֽינוּ לְפָנֶֽיךָ אֶת קְטֹֽרֶת הַסַּמִּים, בִּזְמַן שֶׁבֵּית הַמִּקְדָשׁ קַיָּם, כַּאֲשֶׁר צִוִּֽיתָ אוֹתָם עַל־יַד מֹשֶׁה נְבִיאָךְ, כַּכָּתוּב בְּתֽוֹרָתָךְ:`]},{heading:`פָּרָשַׁת הַקְּטֹרֶת`,verses:[`<b>וַיֹּ֩אמֶר֩</b> יְהֹוָ֨ה אֶל־מֹשֶׁ֜ה קַח־לְךָ֣ סַמִּ֗ים נָטָ֤ף | וּשְׁחֵ֙לֶת֙ וְחֶלְבְּנָ֔ה סַמִּ֖ים וּלְבֹנָ֣ה זַכָּ֑ה בַּ֥ד בְּבַ֖ד יִהְיֶֽה׃ וְעָשִׂ֤יתָ אֹתָהּ֙ קְטֹ֔רֶת רֹ֖קַח מַעֲשֵׂ֣ה רוֹקֵ֑חַ מְמֻלָּ֖ח טָה֥וֹר קֹֽדֶשׁ׃ וְשָֽׁחַקְתָּ֣ מִמֶּ֘נָּה֮ הָדֵק֒ וְנָתַתָּ֨ה מִמֶּ֜נָּה לִפְנֵ֤י הָעֵדֻת֙ בְּאֹ֣הֶל מוֹעֵ֔ד אֲשֶׁ֛ר אִוָּעֵ֥ד לְךָ֖ שָׁ֑מָּה קֹ֥דֶשׁ קׇֽדָשִׁ֖ים תִּהְיֶ֥ה לָכֶֽם׃ וְנֶֽאֱמַר וְהִקְטִ֥יר עָלָ֛יו אַהֲרֹ֖ן קְטֹ֣רֶת סַמִּ֑ים בַּבֹּ֣קֶר בַּבֹּ֗קֶר בְּהֵיטִיב֛וֹ אֶת־הַנֵּרֹ֖ת יַקְטִירֶֽנָּה: וּבְהַעֲלֹ֨ת אַהֲרֹ֧ן אֶת־הַנֵּרֹ֛ת בֵּ֥ין הָעַרְבַּ֖יִם יַקְטִירֶ֑נָּה קְטֹ֧רֶת תָּמִ֛יד לִפְנֵ֥י יְהֹוָ֖ה לְדֹרֹתֵיכֶֽם:`]},{heading:`תָּנוּ רַבָּנָן · פִּטּוּם הַקְּטֹרֶת כֵּיצַד`,verses:[`<b>תָּנוּ</b> רַבָּנָן: פִּטּוּם הַקְּטֹֽרֶת כֵּיצַד? שְׁלֹשׁ מֵאוֹת וְשִׁשִּׁים וּשְׁמוֹנָה מָנִים הָיוּ בָהּ. שְׁלֹשׁ מֵאוֹת וְשִׁשִּׁים וַֽחֲמִשָּׁה כְּמִנְיַן יְמוֹת הַחַמָּה, מָנֶה בְּכָל־יוֹם, מַֽחֲצִיתוֹ בַּבֹּֽקֶר וּמַֽחֲצִיתוֹ בָּעֶרֶב. וּשְׁלֹשָׁה מָנִים יְתֵרִים, שֶׁמֵּהֶם מַכְנִיס כֹּהֵן גָּדוֹל, וְנוֹטֵל מֵהֶם מְלֹא חָפְנָיו בְּיוֹם הַכִּפּוּ
