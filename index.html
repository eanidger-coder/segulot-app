 כׇּל־פִּקּוּדָֽיו׃ סְמוּכִ֣ים לָעַ֣ד לְעוֹלָ֑ם עֲ֝שׂוּיִ֗ם בֶּאֱמֶ֥ת וְיָשָֽׁר׃ פְּד֤וּת ׀ שָׁ֘לַ֤ח לְעַמּ֗וֹ צִוָּֽה־לְעוֹלָ֥ם בְּרִית֑וֹ קָד֖וֹשׁ וְנוֹרָ֣א שְׁמֽוֹ׃ רֵ֘אשִׁ֤ית חׇכְמָ֨ה ׀ יִרְאַ֬ת יְהֹוָ֗ה שֵׂ֣כֶל ט֭וֹב לְכׇל־עֹֽשֵׂיהֶ֑ם תְּ֝הִלָּת֗וֹ עֹמֶ֥דֶת לָעַֽד׃ <br><br><small><b>נ֣וֹעַ</b> תָּנ֤וּעַ אֶ֙רֶץ֙ כַּשִּׁכּ֔וֹר וְהִֽתְנוֹדְדָ֖ה כַּמְּלוּנָ֑ה וְכָבַ֤ד עָלֶ֙יהָ֙ פִּשְׁעָ֔הּ וְנָפְלָ֖ה וְלֹא־תֹסִ֥יף קֽוּם׃ וְהָיָה֙ בַּיּ֣וֹם הַה֔וּא יִפְקֹ֧ד יְהֹוָ֛ה עַל־צְבָ֥א הַמָּר֖וֹם בַּמָּר֑וֹם וְעַל־מַלְכֵ֥י הָאֲדָמָ֖ה עַל־הָאֲדָמָֽה׃</small>`],numbered:!0},{heading:`מִזְמוֹר נ״א · חָנֵּנִי אֱלֹהִים`,verses:[`<b>לַמְנַצֵּ֗חַ</b> מִזְמ֥וֹר לְדָוִֽד׃ בְּֽבוֹא־אֵ֭לָיו נָתָ֣ן הַנָּבִ֑יא כַּאֲשֶׁר־בָּ֗֝א אֶל־בַּת־שָֽׁבַע׃ חׇנֵּ֣נִי אֱלֹהִ֣ים כְּחַסְדֶּ֑ךָ כְּרֹ֥ב רַ֝חֲמֶ֗יךָ מְחֵ֣ה פְשָׁעָֽי׃ הֶ֭רֶב כַּבְּסֵ֣נִי מֵעֲוֺנִ֑י וּֽמֵחַטָּאתִ֥י טַהֲרֵֽנִי׃ כִּֽי־פְ֭שָׁעַי אֲנִ֣י אֵדָ֑ע וְחַטָּאתִ֖י נֶגְדִּ֣י תָמִֽיד׃ לְךָ֤ לְבַדְּךָ֨ ׀ חָטָאתִי֮ וְהָרַ֥ע בְּעֵינֶ֗יךָ עָ֫שִׂ֥יתִי לְ֭מַעַן תִּצְדַּ֥ק בְּדׇבְרֶ֗ךָ תִּזְכֶּ֥ה בְשׇׁפְטֶֽךָ׃ הֵן־בְּעָו֥וֹן חוֹלָ֑לְתִּי וּ֝בְחֵ֗טְא יֶחֱמַ֥תְנִי אִמִּֽי׃ הֵן־אֱ֭מֶת חָפַ֣צְתָּ בַטֻּח֑וֹת וּ֝בְסָתֻ֗ם חׇכְמָ֥ה תוֹדִיעֵֽנִי׃ תְּחַטְּאֵ֣נִי בְאֵז֣וֹב וְאֶטְהָ֑ר תְּ֝כַבְּסֵ֗נִי וּמִשֶּׁ֥לֶג אַלְבִּֽין׃ תַּ֭שְׁמִיעֵנִי שָׂשׂ֣וֹן וְשִׂמְחָ֑ה תָּ֝גֵ֗לְנָה עֲצָמ֥וֹת דִּכִּֽיתָ׃ הַסְתֵּ֣ר פָּ֭נֶיךָ מֵחֲטָאָ֑י וְֽכׇל־עֲוֺ֖נֹתַ֣י מְחֵֽה׃ לֵ֣ב טָ֭הוֹר בְּרָא־לִ֣י אֱלֹהִ֑ים וְר֥וּחַ נָ֝כ֗וֹן חַדֵּ֥שׁ בְּקִרְבִּֽי׃ אַל־תַּשְׁלִיכֵ֥נִי מִלְּפָנֶ֑יךָ וְר֥וּחַ קׇ֝דְשְׁךָ֗ אַל־תִּקַּ֥ח מִמֶּֽנִּי׃ הָשִׁ֣יבָה לִּ֭י שְׂשׂ֣וֹן יִשְׁעֶ֑ךָ וְר֖וּחַ נְדִיבָ֣ה תִסְמְכֵֽנִי׃ אֲלַמְּדָ֣ה פֹשְׁעִ֣ים דְּרָכֶ֑יךָ וְ֝חַטָּאִ֗ים אֵלֶ֥יךָ יָשֽׁוּבוּ׃ הַצִּ֘ילֵ֤נִי מִדָּמִ֨ים ׀ אֱֽלֹהִ֗ים אֱלֹהֵ֥י תְּשׁוּעָתִ֑י תְּרַנֵּ֥ן לְ֝שׁוֹנִ֗י צִדְקָתֶֽךָ׃ אֲ֭דֹנָי שְׂפָתַ֣י תִּפְתָּ֑ח וּ֝פִ֗י יַגִּ֥יד תְּהִלָּתֶֽךָ׃ כִּ֤י ׀ לֹא־תַחְפֹּ֣ץ זֶ֣בַח וְאֶתֵּ֑נָה ע֝וֹלָ֗ה לֹ֣א תִרְצֶֽה׃ זִ֥בְחֵ֣י אֱלֹהִים֮ ר֤וּחַ נִשְׁבָּ֫רָ֥ה לֵב־נִשְׁבָּ֥ר וְנִדְכֶּ֑ה אֱ֝לֹהִ֗ים לֹ֣א תִבְזֶֽה׃ הֵיטִ֣יבָה בִ֭רְצוֹנְךָ אֶת־צִיּ֑וֹן תִּ֝בְנֶ֗ה חוֹמ֥וֹת יְרוּשָׁלָֽ‍ִם׃ אָ֤ז תַּחְפֹּ֣ץ זִבְחֵי־צֶ֭דֶק עוֹלָ֣ה וְכָלִ֑יל אָ֤ז יַעֲל֖וּ עַל־מִזְבַּחֲךָ֣ פָרִֽים׃`],numbered:!0,condition:`tikkun-rachel`},{heading:`עַד אָנָה בִּכְיָה · תָּקוּם תְּרַחֵם`,verses:[`תָּקוּם תְּרַחֵם צִיּוֹן, תִּבְנֶה חוֹמוֹת יְרוּשָׁלָיִם:`]},{heading:`מֶלֶךְ רַחֲמָן · תְּפִלַּת נֶחָמָה`,verses:[`<b>אֱלֹהֵינוּ</b> וֵאלֹהֵי אֲבוֹתֵינוּ, מֶלֶךְ רַחֲמָן רַחֵם עָלֵינוּ, טוֹב וּמֵטִיב הִדָּרֶשׁ לָנוּ, שׁוּבָה עָלֵינוּ בַּהֲמוֹן רַחֲמֶיךָ, בִּגְלַל אָבוֹת שֶׁעָשׂוּ רְצוֹנֶךָ, בְּנֵה בֵיתְךָ כְּבַתְּחִלָּה, כּוֹנֵן בֵּית מִקְדָּשְׁךָ עַל מְכוֹנוֹ, הַרְאֵנוּ בְּבִנְיָנוֹ, שַׂמְּחֵנוּ בְּתִקּוּנוֹ, וְהָשֵׁב שְׁכִינָתְךָ לְתוֹכוֹ, וְהָשֵׁב כֹּהֲנִים לַעֲבוֹדָתָם, וּלְוִיִּים לְדוּכָנָם, לְשִׁירָם וּלְזִמְרָם, וְהָשֵׁב יִשְׂרָאֵל לִנְוֵיהֶם. וְשָׁם נַעֲלֶה וְנֵרָאֶה וְנִשְׁתַּחֲוֶה לְפָנֶיךָ: יְהִי רָצוֹן מִלְּפָנֶיךָ יְהֹוָה אֱלֹהֵינוּ וֵאלֹהֵי אֲבֹתֵינוּ, שֶׁתַּעֲלֵנוּ בְּשִׂמְחָה לְאַרְצֵנוּ, וְתִטָּעֵנוּ בִּגְבוּלֵנוּ, וְשָׁם נַעֲשֶׂה לְפָנֶיךָ אֶת קָרְבְּנוֹת חֹבֹתֵינוּ, תְּמִידִים כְּסִדְרָם וּמוּסָפִים כְּהִלְכָתָם:`]},{heading:`מִזְמוֹר קכ״ו · בְּשׁוּב ה׳`,verses:[`<b>שִׁ֗יר</b> הַֽמַּ֫עֲל֥וֹת בְּשׁ֣וּב יְ֭הֹוָה אֶת־שִׁיבַ֣ת צִיּ֑וֹן הָ֝יִ֗ינוּ כְּחֹלְמִֽים׃ אָ֤ז יִמָּלֵ֪א שְׂח֡וֹק פִּינוּ֮ וּלְשׁוֹנֵ֢נוּ רִ֫נָּ֥ה אָ֭ז יֹאמְר֣וּ בַגּוֹיִ֑ם הִגְדִּ֥יל יְ֝הֹוָ֗ה לַעֲשׂ֥וֹת עִם־אֵֽלֶּה׃ הִגְדִּ֣יל יְ֭הֹוָה לַעֲשׂ֥וֹת עִמָּ֗נוּ הָיִ֥ינוּ שְׂמֵחִֽים׃ שׁוּבָ֣ה יְ֭הֹוָה שְׁבִיתֵ֑נוּ שבותנו כַּאֲפִיקִ֥ים בַּנֶּֽגֶב׃ הַזֹּרְעִ֥ים בְּדִמְעָ֗ה בְּרִנָּ֥ה יִקְצֹֽרוּ׃ הָ֘ל֤וֹךְ יֵלֵ֨ךְ ׀ וּבָכֹה֮ נֹשֵׂ֢א מֶשֶׁךְ־הַ֫זָּ֥רַע בֹּא־יָבֹ֥א בְרִנָּ֑ה נֹ֝שֵׂ֗א אֲלֻמֹּתָֽיו׃`],numbered:!0}]},"segula-zivug":{id:`segula-zivug`,title:`תְּפִלָּה לְזִוּוּג`,subtitle:`בַּקָּשָׁה לִמְצִיאַת זִוּוּג הָגוּן`,numbered:!1,chapters:[{heading:`תְּפִלָּה לְזִוּוּג`,verses:[`יְהִי רָצוֹן מִלְּפָנֶיךָ, יְיָ אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי, שֶׁתַּמְצִיא לִי בְּרַחֲמֶיךָ הָרַבִּים וּבַחֲסָדֶיךָ הַגְּדוֹלִים אֶת זִוּוּגִי הָרָאוּי לִי בִּזְמַנּוֹ. זִוּוּג הָגוּן הָרָאוּי לְהוֹלִיד תַּלְמִיד חָכָם, גָּדוֹל בְּתוֹרָה וּבְיִרְאָה, מִזֶּרַע צַדִּיקִים וְאַנְשֵׁי אֱמֶת וְיִרְאֵי חֵטְא, כְּמוֹ שֶׁהִמְצֵאתָ זִוּוּגוֹ שֶׁל אָדָם הָרִאשׁוֹן, וּלְאַבְרָהָם וְיִצְחָק וְיַעֲקֹב וּמֹשֶׁה, כָּל אֶחָד וְאֶחָד זִוּוּגוֹ בְּעִתּוֹ וּבִזְמַנּוֹ. וְאוֹתוֹ אִישׁ שֶׁתַּמְצִיא לִי לְזִוּוּגִי יְהֵא: אִישׁ טוֹב, אִישׁ נָאֶה בְּמַעֲשָׂיו וְנָאֶה בְּמַרְאֵהוּ, בַּעַל מַעֲשִׂים טוֹבִים, בַּעַל חֵן, אִישׁ מַשְׂכִּיל וִירֵא אֱלֹהִים, רוֹדֵף צְדָקָה וְגוֹמֵל חֶסֶד.`,`וְלֹא יְהֵא בּוֹ שׁוּם שֶׁמֶץ פְּסוּל וּמוּם וּפְגָם, וְלֹא יְהֵא כַּעֲסָן וְרַגְזָן, רַק יְהֵא בַּעַל עֲנָוָה וּנְמִיכוּת רוּחַ, בָּרִיא וּבַעַל כֹּחַ. וְאַל יְעַכֵּב אַכְזָרִיּוּת הַבְּרִיּוֹת וְשׂוֹנְאִים וּמַחְשְׁבוֹתֵיהֶם וְתַחְבּוּלוֹתֵיהֶם וּמוֹעֲצוֹתֵיהֶם, לְעַכֵּב אֶת בֶּן זוּגִי הַמּוּכָן לִי. וִיקֻיַּם בִּי מִקְרָא שֶׁכָּתוּב, לֹא יָנוּחַ שֵׁבֶט הָרֶשַׁע עַל גּוֹרַל הַצַּדִּיקִים, וּמִקְרָא שֶׁכָּתוּב, אֶשְׁתְּךָ כְּגֶפֶן פֹּרִיָּה בְּיַרְכְּתֵי בֵיתֶךָ, בָּנֶיךָ כִּשְׁתִלֵי זֵיתִים סָבִיב לְשֻׁלְחָנֶךָ. כִּי אַתָּה הוּא הַמּוֹשִׁיב יְחִידִים בַּיְתָה מוֹצִיא אֲסִירִים בַּכּוֹשָׁרוֹת. יִהְיוּ לְרָצוֹן אִמְרֵי פִי וְהֶגְיוֹן לִבִּי לְפָנֶיךָ, יְיָ צוּרִי וְגוֹאֲלִי.`]}]},"heryon-leyda":{id:`heryon-leyda`,title:`תְּפִלּוֹת לְהֵרָיוֹן וּלְלֵדָה`,subtitle:`בַּקָּשׁוֹת עַל הַהֵרָיוֹן וְעַל הַלֵּדָה`,numbered:!1,chapters:[{heading:`מִזְמוֹר כ׳ · לַמְנַצֵּחַ, יַעַנְךָ ה׳`,verses:[`לַמְנַצֵּ֗חַ מִזְמ֥וֹר לְדָוִֽד׃`,`יַֽעַנְךָ֣ יְ֭הֹוָה בְּי֣וֹם צָרָ֑ה יְ֝שַׂגֶּבְךָ֗ שֵׁ֤ם&thinsp;<b>׀</b> אֱלֹהֵ֬י יַעֲקֹֽב׃`,`יִשְׁלַֽח־עֶזְרְךָ֥ מִקֹּ֑דֶשׁ וּ֝מִצִּיּ֗וֹן יִסְעָדֶֽךָּ׃`,`יִזְכֹּ֥ר כׇּל־מִנְחֹתֶ֑ךָ וְעוֹלָתְךָ֖ יְדַשְּׁנֶ֣ה סֶֽלָה׃`,`יִֽתֶּן־לְךָ֥ כִלְבָבֶ֑ךָ וְֽכׇל־עֲצָתְךָ֥ יְמַלֵּֽא׃`,`נְרַנְּנָ֤ה&thinsp;<b>׀</b> בִּ֘ישׁ֤וּעָתֶ֗ךָ וּבְשֵֽׁם־אֱלֹהֵ֥ינוּ נִדְגֹּ֑ל יְמַלֵּ֥א יְ֝הֹוָ֗ה כׇּל־מִשְׁאֲלוֹתֶֽיךָ׃`,`עַתָּ֤ה יָדַ֗עְתִּי כִּ֤י הוֹשִׁ֥יעַ&thinsp;<small>׀</small>&thinsp;יְהֹוָ֗ה מְשִׁ֫יח֥וֹ יַ֭עֲנֵהוּ מִשְּׁמֵ֣י קׇדְשׁ֑וֹ בִּ֝גְבֻר֗וֹת יֵ֣שַׁע יְמִינֽוֹ׃`,`אֵ֣לֶּה בָ֭רֶכֶב וְאֵ֣לֶּה בַסּוּסִ֑ים וַאֲנַ֓חְנוּ&thinsp;<b>׀</b> בְּשֵׁם־יְהֹוָ֖ה אֱלֹהֵ֣ינוּ נַזְכִּֽיר׃`,`הֵ֭מָּה כָּרְע֣וּ וְנָפָ֑לוּ וַאֲנַ֥חְנוּ קַּ֝֗מְנוּ וַנִּתְעוֹדָֽד׃`,`יְהֹוָ֥ה הוֹשִׁ֑יעָה הַ֝מֶּ֗לֶךְ יַעֲנֵ֥נוּ בְיוֹם־קׇרְאֵֽנוּ׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0},{heading:`מִזְמוֹר ק׳ · מִזְמוֹר לְתוֹדָה`,verses:[`מִזְמ֥וֹר לְתוֹדָ֑ה הָרִ֥יעוּ לַ֝יהֹוָ֗ה כׇּל־הָאָֽרֶץ׃`,`עִבְד֣וּ אֶת־יְהֹוָ֣ה בְּשִׂמְחָ֑ה בֹּ֥אוּ לְ֝פָנָ֗יו בִּרְנָנָֽה׃`,`דְּע֗וּ כִּֽי־יְהֹוָה֮ ה֤וּא אֱלֹ֫הִ֥ים הֽוּא־עָ֭שָׂנוּ וְל֣וֹ אֲנַ֑חְנוּ עַ֝מּ֗וֹ וְצֹ֣אן מַרְעִיתֽוֹ׃`,`בֹּ֤אוּ שְׁעָרָ֨יו&thinsp;<b>׀</b> בְּתוֹדָ֗ה חֲצֵרֹתָ֥יו בִּתְהִלָּ֑ה הוֹדוּ־ל֝֗וֹ בָּרְכ֥וּ שְׁמֽוֹ׃`,`כִּי־ט֣וֹב יְ֭הֹוָה לְעוֹלָ֣ם חַסְדּ֑וֹ וְעַד־דֹּ֥ר וָ֝דֹ֗ר אֱמוּנָתֽוֹ׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0},{heading:`תְּפִלָּה עַל הַהֵרָיוֹן וְהַלֵּדָה`,verses:[`שֶׁבַח נוֹתְנִים לְךָ, אָבִינוּ שֶׁבַּשָּׁמַיִם, לְחֵן וּלְחֶסֶד שֶׁחוֹנַנְתָנוּ, וְלַתִּקְוָה שֶׁאַתָּה נוֹתֵן לְהַרְגִּישׁ בְּלִבִּי חַיִּים חֲדָשִׁים, תָּכְנִיּוֹת חֲדָשׁוֹת נִפְתָּחוֹת לְפָנַי, כְּדֵי לְמַלֵּא וּלְשַׁפֵּר אֶת חָיַי, יְהִי רָצוֹן מִלְּפָנֶיךָ יְיָ שֶׁיִּמְצָא חֵן בְּעֵינֶיךָ הַפְּעֻלָּה הַקְּדוֹשָׁה שֶׁאֲנִי עוֹשֶׂה בְּעֹמֶק נַפְשִׁי, בִּרְצוֹנִי לְהַקְדִּישׁ אֶת יַלְדִּי כְּדֵי לְפָתֵחַ בּוֹ אֶת אַהֲבַת מִצְווֹתֶיךָ וְאֶת שְׁמִירַת תּוֹרָתֶךָ כְּדֵי שֶׁיִּגְדַּל לְאוֹרָהּ, שְׁמַע אֶת תְּפִלָּתִי, בָּרֶךְ מֵעַתָּה פְּרִי בִּטְנִי, שְׁמוֹר עָלָיו וְעָלַי, חַזֶּק אֶת נַפְשִׁי, נֶגֶד תַּאֲווֹת הַגּוֹרְמוֹת לוֹ רַע, וּנְצוֹר גּוּפִי מֵאֲסוֹנוֹת וּמִמַּחֲלוֹת שֶׁעֲלוּלִים לִגְרֹם לוֹ נֶזֶק, כְּדֵי שֶׁיָּבוֹא לָעוֹלָם בָּרִיא וְשָׁלֵם בְּגוּפוֹ וּבְנַפְשׁוֹ עִם חָכְמָה וְתוֹרָה. בְּבִטָּחוֹן בְּךָ וּבְעֶזְרָתֶךָ, אֲחַכֶּה בְּשַׁלְוָה עַד יוֹם בֹּא הַוָּלָד, כִּי אַתָּה מֵרֹאשׁ נִחַמְתָנִי מֵהַמַּכְאוֹבִים עַל יְדֵי הָאֹשֶׁר וְהַתִּקְווֹת שֶׁיָּבוֹאוּ לִי אַחַר כָּךְ. אֲנִי מְשֻׁכְנַעַת כִּי ״קָרוֹב יְיָ לְכָל קוֹרְאָיו לְכָל אֲשֶׁר יִקְרְאוּהוּ בֶּאֱמֶת״, יִהְיוּ לְרָצוֹן אִמְרֵי פִי וְהֶגְיוֹן לִבִּי לְפָנֶיךָ יְיָ צוּרִי וְגוֹאָלִי:`,`יְהִי רָצוֹן מִלְּפָנֶיךָ יְיָ אֱלֹהִי וֵאלֹהֵי אֲבוֹתַי שֶׁתָּקֶל מֵעָלַי (פלונית בת פלונית) אֶת צַעַר עִבּוּרִי וְתוֹסִיף וְתִתֵּן לִי כֹּחַ כָּל יְמֵי הָעִבּוּר שֶׁלֹּא יֻתַּשׁ כֹּחַ הָעֻבָּר וְלֹא כֹּחִי בְּשׁוּם דָּבָר בָּעוֹלָם, וְתַצִּיל אוֹתִי מִפִּתְקָהּ שֶׁל חַוָּה, וִיהִי בְּעֵת כִּי יִמְלְאוּ יָמַי לָלֶדֶת וְלֹא יֵהָפְכוּ עֲלַי צִירֵי לֵדָה, וְיֵצֵא הַוָּלָד לַאֲוִיר הָעוֹלָם כְּרֶגַע קָטָן וְאֵלֵד בְּנָקֵל כְּתַרְנְגֹלֶת בְּקַלּוּת בְּלִי שׁוּם הֶזֵּק לֹא לִי וְלֹא לַוָּלָד, וִיהֵא נוֹלָד בְּשָׁעָה טוֹבָה וּבְמַזָּל טוֹב לְחַיִּים טוֹבִים וּלְשָׁלוֹם וְלִבְרָכָה וְלִבְרִיאוּת, לְחֵן וּלְחֶסֶד וּלְרַחֲמִים לְעֹשֶׁר וְכָבוֹד. וְשֶׁלֹּא אֵלֵד בְּשַׁבָּת כְּדֵי שֶׁלֹּא יִצְטָרְכוּ לְחַלֵּל שַׁבָּת, חַס-וְשָׁלוֹם, בִּשְׁבִילִי. וּתְמַלֵּא כָּל מִשְׁאֲלוֹתַי לְטוֹבָה לַעֲבוֹדָתֶךָ, בְּמִדָּה טוֹבָה יְשׁוּעָה וְרַחֲמִים, וְאַל תְּשִׁיבֵנִי רֵיקָם מִלְּפָנֶיךָ אָמֵן סֶלָה וָעֶד:`,`עֲנֵנוּ ה' עֲנֵנוּ בְּיוֹם צוֹם תַּעֲנִיתֵנוּ כִּי בְצָרָה גְדוֹלָה אֲנָחְנוּ. אַל תֵּפֶן אֶל רִשְׁעֵנוּ וְאַל תַּסְתֵּר פָּנֶיךָ מִמֶּנּוּ וְאַל תִּתְעַלַּם מִתְּחִנָּתֵנוּ. הֱיֵה נָא קָרוֹב לְשַׁוְעָתֵנוּ. יְהִי נָא חַסְדְּךָ לְנַחֲמֵנוּ. טֶרֶם נִקְרָא אֵלֶיךָ עֲנֵנוּ, כַּדָּבָר שֶׁנֶּאֱמַר וְהָיָה טֶרֶם יִקְרָאוּ וַאֲנִי אֶעֱנֶה, עוֹד הֵם מְדַבְּרִים וַאֲנִי אֶשְׁמָע.`,`עֲנֵנוּ ה' עֲנֵנוּ. עֲנֵנוּ אֱלהֵינוּ עֲנֵנוּ. עֲנֵנוּ אָבִינוּ עֲנֵנוּ. עֲנֵנוּ בּורְאֵנוּ עֲנֵנוּ. עֲנֵנוּ גּואֲלֵנוּ עֲנֵנוּ. עֲנֵנוּ דּורְשֵׁנוּ עֲנֵנוּ. עֲנֵנוּ הָאֵל הַנֶּאֱמָן עֲנֵנוּ. עֲנֵנוּ וָתִיק וְחָסִיד עֲנֵנוּ. עֲנֵנוּ זַךְ וְיָשָׁר עֲנֵנוּ. עֲנֵנוּ חַי וְקַיָּם עֲנֵנוּ. עֲנֵנוּ טוב וּמֵטִיב עֲנֵנוּ. עֲנֵנוּ יודֵעַ יֶצֶר עֲנֵנוּ. עֲנֵנוּ כּובֵשׁ כְּעָסִים עֲנֵנוּ. עֲנֵנוּ לובֵשׁ צְדָקות עֲנֵנוּ. עֲנֵנוּ מֶלֶךְ מַלְכֵי הַמְּלָכִים עֲנֵנוּ. עֲנֵנוּ נורָא וְנִשְׂגָּב עֲנֵנוּ. עֲנֵנוּ סולֵחַ וּמוחֵל עֲנֵנוּ. עֲנֵנוּ עונֶה בְּעֵת צָרָה עֲנֵנוּ. עֲנֵנוּ פּודֶה וּמַצִיל עֲנֵנוּ. עֲנֵנוּ צַדִּיק וְיָשָׁר עֲנֵנוּ. עֲנֵנוּ קָרוב לְקורְאָיו עֲנֵנוּ. עֲנֵנוּ רַחוּם וְחַנּוּן עֲנֵנוּ. עֲנֵנוּ שׁומֵעַ אֶל אֶבְיונִים עֲנֵנוּ. עֲנֵנוּ תּומֵךְ תְּמִימִים עֲנֵנוּ. עֲנֵנוּ קָשֶׁה לִכְעוס עֲנֵנוּ. עֲנֵנוּ רַךְ לִרְצות עֲנֵנוּ. עֲנֵנוּ אֱלהֵי אֲבותֵינוּ עֲנֵנוּ. עֲנֵנוּ אֱלהֵי אַבְרָהָם עֲנֵנוּ. עֲנֵנוּ פַּחַד יִצְחָק עֲנֵנוּ. עֲנֵנוּ אֲבִיר יַעֲקב עֲנֵנוּ. עֲנֵנוּ עֶזְרַת הַשְּׁבָטִים עֲנֵנוּ. עֲנֵנוּ מִשְׂגַּב אִמָּהות עֲנֵנוּ. עֲנֵנוּ עונֶה בְּעֵת רָצון עֲנֵנוּ. עֲנֵנוּ אֲבִי יְתומִים עֲנֵנוּ. עֲנֵנוּ דַּיַּן אַלְמָנות עֲנֵנוּ.`,`מִי שֶׁעָנָה לְאַבְרָהָם אָבִינוּ בְּהַר הַמּורִיָּה הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְיִצְחָק בְּנו כְּשֶׁנֶּעֱקַד עַל גַּבֵּי הַמִּזְבֵּחַ הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְיַעֲקב בְּבֵית אֵל הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְיוסֵף בְּבֵית הָאֲסוּרִים הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לַאֲבותֵינוּ עַל יַם סוּף הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְמשֶׁה בְּחורֵב הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְאַהֲרן בַּמַּחְתָּה הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְפִינְחָס בְּקוּמו מִתּוךְ הָעֵדָה הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לִיהושֻׁעַ בַּגִּלְגָּל הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לִשְׁמוּאֵל בַּמִּצְפָּה הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְדָוִד וּשְׁלמה בְּנו בִּירוּשָׁלָיִם הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְאֵלִיָּהוּ בְּהַר הַכַּרְמֶל הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לֶאֱלִישָׁע בִּירִיחו הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְיונָה בִּמְעֵי הַדָּגָה הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְחִזְקִיָּהוּ מֶלֶךְ יְהוּדָה בְּחָלְיו הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לַחֲנַנְיָה מִישָׁאֵל וַעֲזַרְיָה בְּתוךְ כִּבְשַׁן הָאֵשׁ הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְדָנִיֵּאל בְּגוב הָאֲרָיות הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְמָרְדְּכַי וְאֶסְתֵּר בְּשׁוּשַׁן הַבִּירָה הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְעֶזְרָא בַגּולָה הוּא יַעֲנֵנוּ. מִי שֶׁעָנָה לְכָל הַצַּדִּיקִים וְהַחֲסִידִים וְהַתְּמִימִים וְהַיְשָׁרִים הוּא יַעֲנֵנוּ.`,`רַחֲמָנָא דְּעָנֵי לַעֲנִיֵּי עֲנֵינָן. רַחֲמָנָא דְעָנֵי לִתְבִירֵי לִבָּא עֲנֵינָן. רַחֲמָנָא דְּעָנֵי לְמַכִּיכֵי רוּחָא עֲנֵינָן. רַחֲמָנָא עֲנֵינָן. רַחֲמָנָא חוּס. רַחֲמָנָא פְּרוק. רַחֲמָנָא שְׁזִיב. רַחֲמָנָא רְחַם עֲלָן. הַשְׁתָּא בַּעֲגָלָא וּבִזְמַן קָרִיב.`,`לַמְנַצֵּחַ מִזְמוֹר לְדָוִד. יַעַנְךָ אֲדֹנָי בְּיוֹם צָרָה יְשַׂגֶּבְךָ שֵׁם אֱלֹהֵי יַעֲקֹב. יִשְׁלַח עֶזְרְךָ מִקֹּדֶשׁ וּמִצִּיּוֹן יִסְעָדֶךָּ. יִזְכֹּר כָּל מִנְחֹתֶךָ וְעוֹלָתְךָ יְדַשְּׁנֶה סֶלָה. יִתֶּן לְךָ כִלְבָבֶךָ וְכָל עֲצָתְךָ יְמַלֵּא. נְרַנְּנָה בִּישׁוּעָתֶךָ וּבְשֵׁם אֱלֹהֵינוּ נִדְגֹּל יְמַלֵּא אֲדֹנָי כָּל מִשְׁאֲלוֹתֶיךָ. עַתָּה יָדַעְתִּי כִּי הוֹשִׁיעַ אֲדֹנָי מְשִׁיחוֹ יַעֲנֵהוּ מִשְּׁמֵי קָדְשׁוֹ בִּגְבֻרוֹת יֵשַׁע יְמִינוֹ. אֵלֶּה בָרֶכֶב וְאֵלֶּה בַסּוּסִים וַאֲנַחְנוּ בְּשֵׁם אֲדֹנָי אֱלֹהֵינוּ נַזְכִּיר. הֵמָּה כָּרְעוּ וְנָפָלוּ וַאֲנַחְנוּ קַּמְנוּ וַנִּתְעוֹדָד. אֲדֹנָי הוֹשִׁיעָה הַמֶּלֶךְ יַעֲנֵנוּ בְיוֹם קָרְאֵנוּ:`,`יִהְיוּ לְרָצוֹן אִמְרֵי פִי וְהֶגְיוֹן לִבִּי לְפָנֶיךָ אֲדֹנָי צוּרִי וְגוֹאֲלִי.`,`ליטול ידיים ולהגיד: יְהִי רָצוֹן מִלְּפָנֶיךָ יְיָ אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי מֶלֶךְ רַחֲמָן וּמְרַחֵם כְּשֵׁם שֶׁהִצַּלְתַּנִי מֵהַצָּרָה הַגְּדוֹלָה הַזֹּאת, כָּךְ יִכְמְרוּ רַחֲמֶיךָ לְהַצִּיל מִן הַסַּכָּנָה הַזּוֹ לְכָל בְּנוֹת אַבְרָהָם, יִצְחָק וְיַעֲקֹב אֲהוּבֶיךָ, וּכְשֵׁם שֶׁהִצַּלְתַּנִי עַתָּה, כָּךְ עֲשֵׂה עִמִּי אוֹת לְטוֹבָה בְּכָל פַּעַם שֶׁאֵלֵד. אָמֵן כֵּן יְהִי רָצוֹן:`]}]},"midot-lashon":{id:`midot-lashon`,title:`תְּפִלָּה לִשְׁמִירַת הַלָּשׁוֹן`,subtitle:`תְּפִלַּת הֶחָפֵץ חַיִּים`,numbered:!1,chapters:[{heading:`תְּפִלָּה לִשְׁמִירַת הַלָּשׁוֹן`,verses:[`רִבּוֹנוֹ שֶׁל עוֹלָם, יְהִי רָצוֹן מִלְּפָנֶיךָ,`,`אֵל רַחוּם וְחַנוּן, שֶׁתְּזַכֵּנִי הַיּוֹם וּבְכָל יוֹם`,`לִשְׁמוֹר פִּי וּלְשׁוֹנִי מִלָּשׁוֹן-הָרָע וּרְכִילוּת וּמִקַּבָּלָתָם.`,`וְאֶזָּהֵר מִלְדַבֵּר אֲפִלוּ עַל אִישׁ יְחִידִי,`,`וְכָל שֶׁכֵּן מִלְדַבֵּר עַל כְּלַל יִשְׂרָאֵל אוֹ עַל חֵלֶק מֵהֶם.`,`וְכָל שֶׁכֵּן מִלְּהִתְרַעֵם עַל מִדּוֹתָיו שֶׁל הַקָּדוֹשׁ-בָּרוּךְ-הוּא.`,`וְאֶזָּהֵר מִלְּדַבֵּר דִּבְרֵי שֶׁקֶר, חֲנֻפָּה, לֵצָנוּת, מַחֲלֹקֶת, כַּעַס,`,`גַּאֲוָה, אוֹנָאַת-דְּבָרִים, הַלְבָּנַת-פָּנִים, וְכָל דְּבָרִים אֲסוּרִים.`,`וְזַכֵּנִי שֶׁלֹּא לְדַבֵּר כִּי-אִם דָּבָר הַצָּרִיךְ לְעִנְיָנֵי גוּפִי אוֹ נַפְשִׁי.`,`וְשֶׁיִּהְיוּ כָּל מַעֲשַׂי לְשֵׁם שָׁמ הנגשת האפליקציה בוצעה בהתאם להוראות חוק שוויון זכויות לאנשים עם מוגבלות, התשנ"ח-1998, ולתקנות שוויון זכויות לאנשים עם מוגבלות (התאמות נגישות לשירות), התשע"ג-2013. הפיתוח נעשה על פי דרישות התקן הישראלי ת"י 5568 "קווים מנחים לנגישות תכנים באינטרנט", המבוסס על מסמך ההנחיות הבין-לאומי WCAG 2.1, ברמת התאמה AA.

אמצעי הנגישות הקיימים באפליקציה בפועל:

מצב יום ומצב לילה — ניתן לעבור בין תצוגה בהירה לתצוגה כהה בהתאם להעדפת המשתמש ולתנאי התאורה, לצמצום סינוור ולהקלה על העיניים, כולל בשעות הלילה ובקריאה ממושכת.

גודל טקסט מתכוונן — ניתן להגדיל ולהקטין את גודל הכתב לפי צורך, כדי לאפשר קריאה נוחה גם למשתמשים עם ליקויי ראייה; הבחירה נשמרת ומיושמת בכל טקסטי האפליקציה.

ניגודיות צבעים גבוהה — הצבעים והרקעים נבחרו לשמירה על יחסי ניגודיות מיטביים בין הטקסט לרקע, כדי להבטיח קריאוּת גבוהה במצב יום ובמצב לילה כאחד.

מהות האפליקציה ותכליתה. "סְגֻלּוֹת" היא אפליקציה תורנית שנבנתה מתוך אהבת התורה ומתוך רצון לזכות את הרבים. היא מרכזת עשרות תפילות וסגולות מן המקורות הקדושים — ובהם תיקון הכללי, פרק שירה, שיר השירים, פיטום הקטורת, פרשת המן, תיקון חצות, תפילת הדרך ותפילות לזיווג, לרפואה, לפרנסה, לילדים ולעניינים נוספים — ומגישה אותם בצורה מכובדת, נגישה ומדויקת, כדי שכל אדם יוכל להתפלל וללמוד בכל מקום ובכל זמן.

מותר לשימוש אישי ולזיכוי הרבים. השימוש באפליקציה ובתכניה מותר לכל אדם, ללא תשלום, לצורך שימוש אישי, לימוד, תפילה ולזיכוי הרבים. מותר ואף רצוי לשתף את האפליקציה עם אחרים, להמליץ עליה, ולהפיצה לזיכוי הרבים — ובלבד שהדבר נעשה בכבוד הראוי לקדושת התכנים ולא למטרה מסחרית שיש בה משום ניצול או פגיעה. אין לגבות תשלום בעבור עצם השימוש באפליקציה או בעבור התכנים שבה, ואין להציג את האפליקציה או את תכניה כאילו הם פרי יצירה של גורם אחר.

מקור התכנים ורישיונם. הטקסטים הקדושים שבאפליקציה נלקחו ממקורות שהם נחלת הכלל (public domain) וממאגרים פתוחים המתירים שימוש חופשי — בעיקר ממאגר "ספריא" (Sefaria), המופץ ברישיון Creative Commons ייחוס (CC-BY), וממאגר "ויקיטקסט" (Wikitext) שהוא נחלת הכלל. אנו מוקירים תודה למקורות אלה ולעמלם של אלפי מתנדבים שהעמידו את אוצרות הרוח לרשות הציבור. הבאנו את הטקסטים בכבוד, בהגהה ובאחריות, אך ראה סעיף "כפי שהם" להלן.

הטקסטים מובאים "כפי שהם" (as-is). למרות שההגהה והבדיקה נעשו בכובד ראש ובמאמץ רב, התכנים באפליקציה מוגשים "כפי שהם" (as-is), ללא כל אחריות — מפורשת או משתמעת — לשלמותם, לדיוקם המוחלט, לנוסח, לניקוד או לטעמי המקרא. ייתכנו טעויות, השמטות או הבדלי נוסח בין עדות וקהילות. בכל מקום שבו הדיוק חשוב לך — ובפרט בעניינים של הלכה ומנהג — יש לבדוק את הנוסח מול סידור או חומש מודפס מוסמך, ובמקרה של ספק להיוועץ ברב מוסמך. אין להסתמך על נוסח האפליקציה כמקור הלכתי בלעדי.

כיבוד קדושת התכנים. התכנים שבאפליקציה הם דברי קדושה. המשתמש מתחייב לנהוג בהם בכבוד הראוי — לא להשתמש בהם לזלזול, ללעג, לפגיעה או לכל מטרה שיש בה חילול הקודש. באפליקציה נעשה מאמץ מתמיד לשמור על כבוד התכנים בעיצוב, בהגשה ובניסוח, ואנו מבקשים מכל משתמש לנהוג באותה רוח.

פרשנויות, כוונות וסגולות אינן פסק הלכה. ההסברים, הכוונות, ציוני הזמנים (כגון תיקון חצות או ימים שאין בהם תחנון), התיאורים של "סגולה למה", וכל דבר פרשנות או הכוונה שבאפליקציה — נועדו לסייע ולהנגיש בלבד, ואינם מהווים פסק הלכה, הוראה הלכתית או ייעוץ מוסמך מכל סוג. סגולה אינה תחליף לעצה מקצועית — רפואית, נפשית, כספית או משפטית. בכל שאלה של הלכה, מנהג או החלטה מעשית — יש לפנות לרב או למומחה מוסמך. האמור באפליקציה בעניין זמנים ומנהגים מבוסס ברירת מחדל על מסורת עדות המזרח והספרדים; ייתכנו הבדלים בין קהילות ובין פוסקים.

פרטיות — האפליקציה אינה אוספת מידע. אנו מכבדים את פרטיותך באופן מוחלט. האפליקציה אינה אוספת שום מידע אישי. אין צורך בחשבון, אין הרשמה ואין התחברות. אין באפליקציה כלי אנליטיקה, אין פרסומות, אין מנגנוני מעקב ואין רכיבי צד שלישי (SDK) האוספים מידע. כל ההעדפות שלך — ובהן סימניות, מונה 40 יום, מיקום לצורך חישוב זמנים, ובחירות תצוגה — נשמרות מקומית במכשירך בלבד (באחסון המקומי של הדפדפן / המכשיר), ואינן נשלחות לשום מקום. האפליקציה עובדת גם ללא חיבור לאינטרנט (אופליין) באופן מלא.

פעולות היזומות על ידך בלבד. חלק מהפעולות באפליקציה מפעילות אפליקציות חיצוניות, אך רק לפי יוזמתך ובלחיצתך: כפתור "הוסף ליומן Google" פותח את שירות Google אצלך — אנו איננו שולחים מידע כלשהו בשמך; שיתוף בוואטסאפ פותח את WhatsApp עם טקסט מוכן לשליחה על ידך; גיבוי ושחזור הם קובץ שאתה שומר ומנהל אצלך בלבד. שירותים חיצוניים אלה (Google, WhatsApp) כפופים לתנאי השימוש ולמדיניות הפרטיות שלהם עצמם, ואיננו אחראים להם.

נגישות. האפליקציה נבנתה מתוך מחויבות לנגישות, בהתאם לעקרונות התקן הישראלי ת"י 5568 ולתקן WCAG 2.0 ברמה AA — ובכלל זה מצב יום/לילה, שליטה בגודל הטקסט, תמיכה מלאה בכיווניות מימין לשמאל (RTL), מבנה HTML סמנטי וניגודיות גבוהה. אם נתקלת בקושי נגישות כלשהו, נשמח מאוד לשמוע ולתקן — פנה אלינו בכתובת שבתחתית מסמך זה.

קניין רוחני. התכנים הקדושים עצמם הם נחלת הכלל או מופצים ברישיון פתוח כמפורט לעיל. עם זאת, העיצוב, הממשק, סידור התכנים, הקוד, הלוגו והמותג של אפליקציית "סְגֻלּוֹת" הם קניינו של המפתח. אין להעתיק, לשכפל או לעשות שימוש מסחרי ברכיבים אלה ללא רשות. שמות מסחריים של צד שלישי (כגון Google ו-WhatsApp) שייכים לבעליהם.

העדר אחריות והגבלתה. האפליקציה, על כל תכניה ותכונותיה, ניתנת לשימוש "כמות שהיא" (as-is) ו"כפי שהיא זמינה", ללא כל אחריות מכל סוג. המפתח אינו נושא באחריות משפטית לכל נזק, הפסד, אי-דיוק, טעות, תקלה, אובדן מידע או תוצאה כלשהי הנובעים מן השימוש באפליקציה או מאי-יכולת להשתמש בה. השימוש באפליקציה הוא על אחריותך הבלעדית. אין לראות בשום דבר באפליקציה משום ייעוץ מכל סוג. ככל שהדין החל מאפשר, אחריות המפתח מוגבלת למידה המזערית ביותר המותרת בחוק.

זמינות ושינויים. האפליקציה עשויה להתעדכן, להשתנות או להתווסף בה תוכן מעת לעת. אנו רשאים לעדכן תנאי שימוש אלה בכל עת; הנוסח המעודכן יפורסם עם תאריך עדכון חדש, והמשך השימוש לאחר העדכון מהווה הסכמה לו. האפליקציה זמינה כיום כאתר (PWA) וכאפליקציה לאנדרואיד (דרך Google Play, ארוזה בטכנולוגיית Capacitor). גרסת iOS צפויה בהמשך.

תרומה להנצחה (עתידי — טרם פעיל). בעתיד ייתכן ותתווסף אפשרות לתרומה חד-פעמית, וולונטרית לחלוטין, שתאפשר להוסיף שם לרשימת הנצחה "לעילוי נשמת" בתוך האפליקציה. מנגנון זה אינו פעיל כיום, וכאשר יופעל — הוא ייעשה באמצעות עמותה רשומה כדין, בשקיפות ובהתאם לתנאים שיפורסמו במפורש באותה עת. אין בסעיף זה משום התחייבות להפעלתו.

ה`,"segula-zivug":`תְּפִלָּה לִמְצִיאַת הַזִּוּוּג בְּמֵהֵרָה`,"heryon-leyda":`תפילה לרך הנולד ולידה בשלום`,"midot-lashon":`שמור פיך ולשונך מלשון הרע`},ty={"tefilat-rabi-yishmael":`שְׁמוֹת הַקֹּדֶשׁ הַמּוֹפִיעִים בַּתְּפִלָּה — יֵשׁ לְהַרְהֵר בָּהֶם בְּמַחְשָׁבָה בִּלְבַד, וְלֹא לְאָמְרָם בַּפֶּה.`,"parshat-haman":`נָהֲגוּ לְאָמְרָהּ בְּיוֹם ג׳ שֶׁל פָּרָשַׁת בְּשַׁלַּח, וְטוֹב לְאָמְרָהּ בְּכָל יוֹם. אֶת בַּקָּשׁוֹת הַפַּרְנָסָה אֵין אוֹמְרִים בְּשַׁבָּת.`,"pitum-haketoret":`אוֹמְרִים מִתּוֹךְ הַכְּתָב וְלֹא בְּעַל פֶּה, כְּדֵי שֶׁלֹּא לְדַלֵּג אַף אֶחָד מִסַּמְּמָנֶיהָ. שֵׁם מ״ב הַנִּרְמָז בְּ"אָנָּא בְּכֹחַ" מְכֻוָּן בַּמַּחְשָׁבָה בִּלְבַד וְאֵינוֹ נֶהְגֶּה בַּפֶּה.`,"kriat-shema-al-hamita":`אוֹמְרִים סָמוּךְ לַשֵּׁנָה, וְטוֹב לְאַחֵר אֶת בִּרְכַּת הַמַּפִּיל לַסּוֹף. שֵׁם מ״ב שֶׁבְּ"אָנָּא בְּכֹחַ" מְכֻוָּן בַּלֵּב בִּלְבַד.`,"tefilat-hashela":`עִקַּר זְמַנָּהּ בְּעֶרֶב רֹאשׁ חֹדֶשׁ סִיוָן, וּנְכוֹנָה לְכָל עֵת שֶׁמִּתְפַּלְּלִים עַל הַיְּלָדִים.`,"nishmat-kol-chai":`נֶאֱמֶרֶת בְּשַׁחֲרִית שַׁבָּת וְיוֹם טוֹב. כִּסְגֻלָּה — הַמָּצוּי בְּצָרָה מְקַבֵּל עָלָיו בְּלִי נֶדֶר לְאָמְרָהּ אַחַר שֶׁיִּנָּצֵל.`,"bereishit-taman":`מְקֻבָּל מֵהָאֲרִ״י הַקָּדוֹשׁ לְאָמְרוֹ בְּכָל יוֹם אַחַר הַתְּפִלָּה. עִנְיָנוֹ — מַעֲלַת הַשַּׁבָּת וְתִיקּוּן הַבְּרִית.`,"petach-eliyahu":`מנהג ספרדי/עדות-המזרח: אומרים ״פתח אליהו״ כהכנה לתפילה. הרווח והמקובל ביותר — לפני מנחה של שבת (רבים אומרים אותו קודם פתיחת מנחה בשבת).`,"arimat-yedai":`מנהג ספרדי/עדות-המזרח (בן איש חי): לומר את המאמר בכל יום אחר תיקון חצות, מיד לאחר 'פתיחת אליהו זכור לטוב'. מי שלא הספיק אחר חצות הלילה — יאמרו בשחרית קודם התפילה.`,"tefilat-haderech":`מתי: לאחר שיצא מגבול העיר ונסע לפחות שיעור פרסה (כ-4 ק״מ / ~72 דק' הליכה) — לא בתוך העיר. אומרים פעם אחת ביום; ואם בכל יום מהלך שוב, חוזר ואומר.`,"refua-pidyon":`מִי שֶׁבֵּרַךְ לַחוֹלֶה: נֶאֱמָר בְּעֵת עֲלִיָּה לַתּוֹרָה (שֵׁנִי, חֲמִישִׁי וְשַׁבָּת), אוֹ בְּיָחִיד בְּכָל עֵת בְּצֵרוּף שֵׁם הַחוֹלֶה וְשֵׁם אִמּוֹ (פְּלוֹנִי בֶּן פְּלוֹנִית).`,"hipaked-banim":`מנהג ספרדי/מקובלים: אומרים מזמור ק״ב בכוונה, מילה במילה, ומוסיפים אחריו את נוסח 'רִבּוֹנוֹ שֶׁל עוֹלָם... בְּזֶרַע בַּר קַיָּמָא' — בכל יום אחר התפילה, בלי הפסק דיבור בין המזמור לבקשה.`,"midot-kaas":`מנהג ספרדי: אומרים תפילה זו כבקשה אישית — נאה לאמרהּ בבוקר סמוך לתפילה, או בכל עת שחש האדם שהכעס גובר. אין בה קדושת נוסח קבוע ואפשר לאמרהּ בכל לשון ובכל מקום.`,"midot-simcha":`אֶמְצָעִי לְאָמְרָהּ בְּכָל עֵת שֶׁמַּרְגִּישׁ עַצְבוּת אוֹ מָרָה שְׁחוֹרָה, וּבִפְרָט בַּבֹּקֶר לְקַבֵּל אֶת הַיּוֹם בְּשִׂמְחָה. נֹהַג בְּרֶסְלָב לְאָמְרָהּ קֹדֶם הִתְבּוֹדְדוּת.`,"mizmor-letoda":`נאמר יום-יום בפסוקי דזמרא (בנוסח הספרדי לפי סדר הסידור, לאחר 'הודו'). אומרים אותו מעומד ובנעימה של שמחה והודיה. מנהג/סגולה: מזמור של הודאה על נס אישי (כנגד קרבן תודה שאין לנו כיום).`,"tefilat-hateshuva":`נֶהֱגָה לְאָמְרָהּ קֹדֶם הַתְּפִלָּה כְּהַכְשָׁרַת הַלֵּב, אוֹ בְּכָל עֵת שֶׁאָדָם מְבַקֵּשׁ לָשׁוּב בִּתְשׁוּבָה (בִּפְרָט בְּעֶשֶׂרֶת יְמֵי תְּשׁוּבָה וּבְעֶרֶב יוֹם כִּפּוּר).`,"al-yisrael":`נֶאֱמֶרֶת בְּעֵת מִלְחָמָה אוֹ צָרָה, וְכֵן בְּשַׁבָּת וּבְחַג אַחַר קְרִיאַת הַתּוֹרָה. סֵדֶר מוּמְלָץ: תְּפִלָּה לִשְׁלוֹם הַמְּדִינָה, מִי שֶׁבֵּרַךְ לַחַיָּלִים, וְאַחַר כָּךְ מִזְמוֹרֵי תְהִלִּים (כ, פ״ג,…`,"tikkun-chatzot":`מנהג ספרד/עדות המזרח (כתבי האר״י): התיקון נאמר בלילה מחצות הלילה ואילך (כמנהג שעות צרפת — י״ב שעות אחר חצות היום), עדיף מעט לפני חצות מתחילים בקינות ומחצות ואילך עוסקים בתורה.`,"segula-zivug":`אֶפְשָׁר לוֹמְרָהּ עַל עַצְמוֹ אוֹ הוֹרֶה עַל בְּנוֹ/בִּתּוֹ (עם החלפת הלשון לנוכח/נסתר). מנהג נפוץ: אמירה יומית, ויש נוהגים ארבעים יום רצופים בכוונה.`,"heryon-leyda":`מנהג ספרדי (לוח אור החיים / הרב עובדיה יוסף): המזמורים (כ' ו-ק') נאמרים במהלך ההריון, בחודש התשיעי ובזמן הלידה — האם או בני המשפחה.`,"midot-lashon":`נהוג לאומרה בכל בוקר לאחר תפילת שחרית, או קודם הלימוד, כקבלה על עצמו לשמור את הדיבור באותו יום (מנהג נפוץ בבתי כנסת ובחבורות שמירת הלשון).`},ny={"tikkun-haklali":{why:`רַבֵּנוּ נַחְמָן מִבְּרֶסְלֶב זיע״א גִּילָּה שֶׁעֲשָׂרָה מִזְמוֹרִים אֵלּוּ הֵם "הַתִּיקּוּן הַכְּלָלִי" — תִּיקּוּן לְפִגַם הַבְּרִית וּלְכָל הַפְּגָמִים. אָמַר: מִי שֶׁיֹּאמְרֵם וְיִתֵּן פְּרוּטָה לִצְדָקָה — אֶמְשֹׁךְ אוֹתוֹ מִשַּׁעֲרֵי גֵּיהִנֹּם, וַאֲפִלּוּ אִם עָבַר מַה שֶּׁעָבַר.`,source:`לִקּוּטֵי מוֹהֲרַ״ן · סֵפֶר "הַתִּיקּוּן הַכְּלָלִי"`},"perek-shira":{why:`כָּל בְּרִיּוֹת הָעוֹלָם אוֹמְרוֹת שִׁירָה לַבּוֹרֵא. מְקֻבָּל שֶׁכָּל הָאוֹמֵר "פֶּרֶק שִׁירָה" בְּכָל יוֹם — מֻבְטָח לוֹ שֶׁהוּא בֶּן עוֹלָם הַבָּא, וְנִיצוֹל מִכָּל דָּבָר רַע וּמִפֶּגַע, וְזוֹכֶה לְפַרְנָסָה בְּרֶוַח וְלַאֲרִיכוּת יָמִים.`,source:`הַקְדָּמַת "פֶּרֶק שִׁירָה" · מוּבָא בְּסִפְרֵי הַסְּגֻלּוֹת`},"shir-hashirim":{why:`אָמַר רַבִּי עֲקִיבָא: כָּל הַכְּתוּבִים קֹדֶשׁ, וְשִׁיר הַשִּׁירִים קֹדֶשׁ קָדָשִׁים — שִׁיר הָאַהֲבָה שֶׁבֵּין כְּנֶסֶת יִשְׂרָאֵל לְהַקָּדוֹשׁ בָּרוּךְ הוּא. סְגֻלָּה לְזִוּוּג הָגוּן, לְקָרֵב הַגְּאֻלָּה וּלְהַמְשִׁיךְ קְדֻשָּׁה עַל הַנֶּפֶשׁ.`,source:`מִשְׁנָה יָדַיִם ג׳,ה׳ · מִנְהַג לְאָמְרוֹ בְּעֶרֶב שַׁבָּת`},"tefilat-rabi-yishmael":{why:`תְּפִלָּה נִפְלָאָה הַמְיֻחֶסֶת לְרַבִּי יִשְׁמָעֵאל כֹּהֵן גָּדוֹל, הַכְּלוּלָה בְּשֵׁמוֹת הַקֹּדֶשׁ. אָמְרוּ עָלֶיהָ שֶׁהָאוֹמְרָהּ בְּכָל יוֹם — פָּנָיו מַזְהִירוֹת, נִיצוֹל מִיֵּצֶר הָרָע וּמִלָּשׁוֹן הָרָע וּמִכָּל פֶּגַע רָע, וְעֲוֺנוֹתָיו נִמְחָלִים.`,source:`מְיֻחֶסֶת לְרַבִּי יִשְׁמָעֵאל כֹּהֵן גָּדוֹל`},"igeret-haramban":{why:`מִכְתָּב שֶׁכָּתַב הָרַמְבַּ״ן לִבְנוֹ. הָרַמְבַּ״ן עַצְמוֹ הִבְטִיחַ: "תִּקְרָא הָאִגֶּרֶת פַּעַם אַחַת בְּשָׁבוּעַ… לְמַעַן תַּצְלִיחַ בְּכָל דְּרָכֶיךָ, וּבְכָל יוֹם שֶׁתִּקְרָאֶנָּה — יַעֲנוּךָ מִן הַשָּׁמַיִם כַּאֲשֶׁר יַעֲלֶה עַל לִבְּךָ לִשְׁאֹל". סְגֻלָּה לַעֲנָוָה, לְיִרְאַת שָׁמַיִם וּלְהַצְלָחָה.`,source:`אִגֶּרֶת הָרַמְבַּ״ן (אִגֶּרֶת הַמּוּסָר) — לִבְנוֹ`},"parshat-haman":{why:`מְקֻבָּל מֵהָרַה״ק רַבִּי מְנַחֵם מֶנְדְּל מֵרִימָנוֹב זיע״א לוֹמַר אֶת פָּרָשַׁת הַמָּן — סְגֻלָּה גְּדוֹלָה לְפַרְנָסָה. כְּשֵׁם שֶׁהִמְטִיר הַקָּדוֹשׁ בָּרוּךְ הוּא לֶחֶם מִן הַשָּׁמַיִם לְיִשְׂרָאֵל בַּמִּדְבָּר, כֵּן יַמְשִׁיךְ פַּרְנָסָה בְּרֶוַח לָאוֹמְרָהּ בֶּאֱמוּנָה. וְכָתַב הָרְמָ״א: "טוֹב לוֹמַר פָּרָשַׁת הַמָּן" — לְחַזֵּק הָאֱמוּנָה שֶׁהַכֹּל בָּא מִיַּד ה׳.`,source:`רְמָ״א אורח חיים א׳,ה׳ · סְגֻלַּת רַבִּי מְנַחֵם מֶנְדְּל מֵרִימָנוֹב`},"ein-od-milvado":{why:`רַבֵּנוּ חַיִּים מִוּוֹלוֹז׳ין כָּתַב בְּ"נֶפֶשׁ הַחַיִּים" שֶׁסְּגֻלָּה נִפְלָאָה הִיא לְהָסִיר וּלְבַטֵּל מֵעַל הָאָדָם כָּל הַדִּינִים וְהַכּוֹחוֹת, כְּשֶׁקּוֹבֵעַ בְּלִבּוֹ בֶּאֱמוּנָה שְׁלֵמָה שֶׁ"אֵין עוֹד מִלְּבַדּוֹ", שֶׁאֵין שׁוּם כֹּחַ בָּעוֹלָם זוּלָתוֹ יִתְבָּרַךְ, וּמְבַטֵּל בְּלִבּוֹ כָּל כֹּחַ אַחֵר, מִמֵּילָא בְּטֵלִים מֵעָלָיו כָּל הַכּוֹחוֹת שֶׁלֹּא יוּכְלוּ לִפְעוֹל לוֹ דָּבָר.`,source:`נֶפֶשׁ הַחַיִּים, שַׁעַר ג׳ פֶּרֶק י״ב · רַבֵּנוּ חַיִּים מִוּוֹלוֹז׳ין`},"pitum-haketoret":{why:`אָמַר הַזֹּהַר הַקָּדוֹשׁ שֶׁכָּל הַמְּעַיֵּן וְאוֹמֵר פָּרָשַׁת הַקְּטֹרֶת בְּכָל יוֹם — נִיצוֹל מִכָּל דָּבָר רַע וּמִכָּל פֶּגַע, שֶׁהַקְּטֹרֶת עוֹקֶרֶת אֶת הַדִּין וּמַמְשִׁיכָה שֶׁפַע וְרַחֲמִים. וּמְקֻבָּל מֵרַבִּי חַיִּים פָלַאג׳י שֶׁהִיא סְגֻלָּה נִפְלָאָה לַעֲשִׁירוּת, וּמֻבְטָח לְאוֹמְרָהּ שֶׁלֹּא תִּפָּסֵק פַּרְנָסָתוֹ.`,source:`זֹהַר, פָּרָשַׁת וַיַּקְהֵל · מוּבָא בְּכַף הַחַיִּים או״ח · רַבִּי חַיִּים פָלַאג׳י`},"kriat-shema-al-hamita":{why:`אָמְרוּ חֲזַ״ל: כָּל הַקּוֹרֵא קְרִיאַת שְׁמַע עַל מִטָּתוֹ — כְּאִלּוּ אוֹחֵז חֶרֶב שֶׁל שְׁתֵּי פִּיּוֹת בְּיָדוֹ לְהִנָּצֵל מִן הַמַּזִּיקִין. הַסֵּדֶר כֻּלּוֹ — עִם מִזְמוֹר "יוֹשֵׁב בְּסֵתֶר" (שִׁיר שֶׁל פְּגָעִים) וּפְסוּקֵי הַשְּׁמִירָה — סְגֻלָּה לְלַיְלָה שָׁמוּר, לְשֵׁנָה שְׁלֵוָה בְּלֹא חֲלוֹמוֹת רָעִים, וְלִמְסִירַת הַנְּשָׁמָה בְּיַד ה׳.`,source:`בְּרָכוֹת ה׳ · שְׁבוּעוֹת ט״ו · בֶּן אִישׁ חַי, פְּקוּדֵי`},"tefilat-hashela":{why:`תְּפִלָּה שֶׁתִּקֵּן הַשְּׁלָ״ה הַקָּדוֹשׁ, שֶׁכֹּחָהּ בִּתְפִלַּת הָאָב וְהָאֵם עַל עֲתִיד יַלְדֵיהֶם — "הָאָבוֹת מַכְשִׁירִים אֶת הַבָּנִים". עִקַּר זְמַנָּהּ בְּעֶרֶב רֹאשׁ חֹדֶשׁ סִיוָן, חֹדֶשׁ מַתַּן תּוֹרָה, שֶׁבּוֹ שַׁעֲרֵי הַתְּפִלָּה עַל הַזֶּרַע פְּתוּחִים בִּמְיֻחָד. סְגֻלָּה לְבָנִים עוֹסְקִים בַּתּוֹרָה, בְּיִרְאַת שָׁמַיִם וּבְפַרְנָסָה בְּכָבוֹד.`,source:`שְׁנֵי לוּחוֹת הַבְּרִית (הַשְּׁלָ״ה) · רַבִּי יְשַׁעְיָה הַלֵּוִי הוֹרוֹבִיץ`},"nishmat-kol-chai":{why:`"נִשְׁמַת כָּל חַי" הִיא שִׂיא הַשֶּׁבַח וְהַהוֹדָיָה (בִּרְכַּת הַשִּׁיר), שֶׁכֻּלָּהּ שֶׁבַח לַה׳ כְּמֶלֶךְ גּוֹאֵל וּמַצִּיל בְּכָל עֵת צָרָה. מְקֻבָּל בְּשֵׁם הַבֶּן אִישׁ חַי שֶׁהַמָּצוּי בְּצָרָה יְקַבֵּל עָלָיו לְאָמְרָהּ אַחַר שֶׁיִּנָּצֵל — וְקַבָּלָה זוֹ עַצְמָהּ מְסֻגֶּלֶת לִישׁוּעָה.`,source:`פְּסָחִים קי״ח · בֶּן אִישׁ חַי, שָׁנָה ב׳ פָּרָשַׁת תּוֹלְדוֹת`},"birkot-hashachar":{why:`אֲמִירַת בִּרְכוֹת הַשַּׁחַר בְּכַוָּנָה — וּבִפְרָט "אֱלֹהַי נְשָׁמָה" — מְקֻבֶּלֶת כִּסְגֻלָּה לְחִזּוּק הָאֱמוּנָה וְלִשְׁמִירָה מִכָּל פֶּגַע, וְיֵשׁ הַנּוֹהֲגִים לְקַבֵּל אוֹתָן עַל עַצְמָם אַרְבָּעִים יוֹם רְצוּפִים כִּסְגֻלָּה לְפַרְנָסָה, לִרְפוּאָה וּלְזִוּוּג. הַכֹּחַ נוֹבֵעַ מֵהַהוֹדָאָה הַיּוֹמִית הַמְחַדֶּשֶׁת אֶת הַבְּרִית עִם הַבּוֹרֵא בְּפֵתַח הַיּוֹם.`,source:`בֶּן אִישׁ חַי · שֻׁלְחָן עָרוּךְ אוֹרַח חַיִּים סִימָן מ״ו`},"bereishit-taman":{why:`תִּיקּוּן מ״ח מִתִּקּוּנֵי הַזֹּהַר הַקָּדוֹשׁ, מְקֻבָּל מֵרַבֵּנוּ הָאֲרִ״י הַקָּדוֹשׁ לְאָמְרוֹ בְּכָל יוֹם. מִמַּעֲלוֹתָיו: יָרוּם מַזָּלוֹ וְלֹא יִתְמוֹטֵט, יַצְלִיחַ בְּכָל דְּרָכָיו, לֹא יָבוֹא לִידֵי חֶסְרוֹן כִּיס וַעֲנִיּוּת, מוֹעִיל מְאֹד לְתַקֵּן עֲווֹן פְּגַם הַבְּרִית, וְיִזְכֶּה לְיִרְאַת שָׁמַיִם, לַאֲרִיכוּת יָמִים וּלְעוֹלָם הַבָּא.`,source:`תִּיקּוּנֵי הַזֹּהַר, תִּיקּוּן מ״ח · מְקֻבָּל מֵהָאֲרִ״י הַקָּדוֹשׁ`},"petach-eliyahu":{why:`אֲמִירַת "פֶּתַח אֵלִיָּהוּ" קֹדֶם הַתְּפִלָּה מְיַחֶדֶת אֶת הַלֵּב וּמְכַוֶּנֶת אֶת הָאָדָם לְיִחוּד ה' וּלְהַמְשָׁכַת שֶׁפַע דֶּרֶךְ הַסְּפִירוֹת, וּמְסֻגֶּלֶת לפְתֹּחַ שַׁעֲרֵי תְּפִלָּה. הָאֲרִיזַ"ל וְתַלְמִידָיו הִנְהִיגוּהָ כְּהַכְנָה לַתְּפִלָּה, וְכֵן הוּבְאָה בְּסֵפֶר חֲרֵדִים וּבִשְׁעַר הַכַּוָּנוֹת.`,source:`תיקוני הזהר, הקדמה תניינא (דף יז); סדר האמירה עפ"י שער הכוונות לאריז"ל וספר חרדים (ידיעת ה' פ"ו)`},"arimat-yedai":{why:`מַאֲמַר רַשְׁבִּ"י שֶׁבּוֹ נָשָׂא יָדָיו בִּתְפִלָּה וְגִלָּה אֶת סוֹד עֲלִיַּת הַתְּפִלָּה עַד אֵין־סוֹף. אֲמִירָתוֹ בְּכָל יוֹם אַחַר פְּתִיחַת אֵלִיָּהוּ מְתַקֶּנֶת אֶת הַיּוֹם וּמְעוֹרֶרֶת רַחֲמִים עֶלְיוֹנִים, כְּמוֹ שֶׁכָּתַב הַבֶּן אִישׁ חַי: 'מַה טּוֹב וּמַה נָּעִים שֶׁיֹּאמַר הָאָדָם בְּכָל יוֹם'.`,source:`בן איש חי, שנה א', מקץ סי' י"ג (ע"פ זוהר פקודי)`},"tefilat-haderech":{why:`כָּל הַיּוֹצֵא לַדֶּרֶךְ צָרִיךְ לְהִתְפַּלֵּל תְּפִלַּת הַדֶּרֶךְ — סְגֻלָּה לְשָׁמְרוֹ מֵאוֹיֵב וְאוֹרֵב וּלְהַגִּיעוֹ לִמְחוֹז חֶפְצוֹ לְשָׁלוֹם.`,source:`ברכות כט ע"ב (רב חסדא בשם ר' יעקב); שולחן ערוך או"ח ק"י`},"refua-pidyon":{why:`הַמִּי שֶׁבֵּרַךְ הוּא תְּפִלָּה עַתִּיקָה שֶׁבָּהּ הַצִּבּוּר מְבַקֵּשׁ 'רְפוּאַת הַנֶּפֶשׁ וּרְפוּאַת הַגּוּף' לַחוֹלֶה בְּשֵׁם; וּפִדְיוֹן הַנֶּפֶשׁ — נְתִינַת צְדָקָה לְהַמְתִּיק אֶת הַדִּינִים בְּשָׁרְשָׁם — סְגֻלָּה גְּדוֹלָה לְבַטֵּל גְּזֵרָה וּלְהָבִיא רְפוּאָה, כִּי 'צְדָקָה תַּצִּיל מִמָּוֶת'.`,source:`ליקוטי מוהר"ן ק"פ (בעניין סגולת הפדיון) · פלא יועץ ערך פדיון נפש · משנה ברורה בעניין מי שברך לחולה`},"hipaked-banim":{why:`מִזְמוֹר ק"ב נִפְתָּח בַּמִּלִּים 'תְּפִלָּה לְעָנִי כִי יַעֲטֹף', וְהוּא הַמִּזְמוֹר הַמְסֻגָּל לַחֲשׂוּכֵי בָּנִים; דַּרְשׁוּ חֲכָמֵינוּ שֶׁ'הָעַרְעָר' (פסוק יח) רוֹמֵז לְמִי שֶׁמִּתְפַּלֵּל עַל זַרְעוֹ. תְּפִלַּת חַנָּה שֶׁנַּעֲנֵית הִיא הָאָב־טִיפּוּס שֶׁל בַּקָּשַׁת בֵּן, וְעָלֶיהָ לָמְדוּ סֵדֶר הַתְּפִלָּה (ברכות לא ע"א).`,source:`מזמור ק"ב; ברכות לא ע"א (תפילת חנה)`},"midot-kaas":{why:`הַכַּעַס נֶחְשָׁב כַּעֲבוֹדָה זָרָה, וּמְאַבֵּד מִן הָאָדָם אֶת טוּבוֹ; הַתְּפִלָּה מְבַקֶּשֶׁת לְהַחְלִיף אוֹתוֹ בַּעֲנָוָה וּבִסְבִיל­נוּת, לִהְיוֹת 'טוֹב לַכֹּל' וְ'לִמְקַלְלַי נַפְשִׁי תִדּוֹם'.`,source:`רמב"ם הל' דעות ב׳:ג׳ ('הַכַּעַס מִדָּה רָעָה עַד לִמְאֹד'); זוהר; ובלשון התפילה — ליקוטי תפילות (ר' נתן מברסלב) ע"פ ליקו…`},"midot-simcha":{why:`הַשִּׂמְחָה הִיא יְסוֹד הָעֲבוֹדָה וּסְגֻלָּה לְגָרֵשׁ אֶת הָעַצְבוּת, כְּמוֹ שֶׁלִּמְּדָנוּ רַבֵּנוּ: "מִצְוָה גְּדוֹלָה לִהְיוֹת בְּשִׂמְחָה תָּמִיד". תְּפִלָּה זוֹ מְבַקֶּשֶׁת לֵב שָׂמֵחַ וּלְהִתְחַזֵּק כָּל הַיּוֹם בְּשִׂמְחָה, שֶׁהִיא עִקַּר קְדֻשַּׁת יִשְׂרָאֵל.`,source:`ליקוטי מוהר"ן תניינא, כד; מיוסד על ליקוטי תפילות ח"ב תפילה כא`},"mizmor-letoda":{why:`מִזְמוֹר לְתוֹדָה הוּא שִׁיר הַהוֹדָאָה הַיּוֹמִי; אָמְרוּ חֲכָמֵינוּ שֶׁכָּל הַשִּׁירוֹת עֲתִידוֹת לְהִבָּטֵל חוּץ מִמִּזְמוֹר לְתוֹדָה שֶׁאֵינוֹ בָּטֵל לְעוֹלָם. אֲמִירָתוֹ בְּכַוָּנָה מְעוֹרֶרֶת בָּאָדָם רוּחַ שֶׁל תּוֹדָה, שִׂמְחָה וּבִטָּחוֹן בַּה', וְהִיא כְּנֶגֶד קָרְבַּן הַתּוֹדָה שֶׁבָּטֵל בַּחֻרְבָּן.`,source:`מדרש (ויקרא רבה — 'כל השירות עתידות ליבטל חוץ ממזמור לתודה'); טור ושו״ע או״ח סימן נ״א`},"tefilat-hateshuva":{why:`מִזְמוֹר נ״א הוּא מִזְמוֹר הַתְּשׁוּבָה שֶׁאָמַר דָּוִד הַמֶּלֶךְ אַחַר חֶטְאוֹ, וּבוֹ שַׁעַר לְבַקָּשַׁת מְחִילָה וְלֵב נִשְׁבָּר. אֲמִירָתוֹ מְעוֹרֶרֶת אֶת הָאָדָם לַחֲזֹר בִּתְשׁוּבָה וּמַכְשִׁירָה אֶת הַלֵּב לַתְּפִלָּה.`,source:`תהילים נ״א, א-ב (כותרת המזמור); רמב"ם הלכות תשובה פרק ב (עניין הווידוי והחזרה בתשובה)`},"al-yisrael":{why:`בְּעֵת צָרָה מִצְוָה לִזְעֹק וּלְהַרְבּוֹת בִּתְפִלָּה וּבִתְהִלִּים עַל כְּלַל יִשְׂרָאֵל וְעַל מְגִנֵּיהֶם, וּזְכוּת הָרַבִּים גְּדוֹלָה לְעוֹרֵר רַחֲמֵי שָׁמַיִם וְלִישׁוּעָה.`,source:`רמב"ם הלכות תעניות פ"א ה"א–ה"ב (מצות זעקה בעת צרה); שולחן ערוך או"ח סימן תקע"ו`},"tikkun-chatzot":{why:`אֲמִירַת תִּיקּוּן חֲצוֹת בְּבֶכִי עַל חֻרְבַּן בֵּית הַמִּקְדָּשׁ וְגָלוּת הַשְּׁכִינָה מְעוֹרֶרֶת רַחֲמֵי שָׁמַיִם וּמְקָרֶבֶת אֶת הַגְּאֻלָּה; וְהַמְקֻבָּלִים הֶאֱרִיכוּ מְאֹד בְּגֹדֶל מַעֲלַת קִימַת חֲצוֹת כִּי רַבָּה הִיא, וְכָל־מִי שֶׁמִּתְאַבֵּל עַל יְרוּשָׁלַיִם זוֹכֶה וְרוֹאֶה בְּשִׂמְחָתָהּ.`,source:`משנה ברורה סימן א ס"ק ט (בשם המקובלים וכתבי האר"י); ומקורו בזוהר ובתענית ל ע"ב 'כל המתאבל על ירושלים'`},"segula-zivug":{why:`אָמְרוּ חֲכָמֵינוּ שֶׁקָּשֶׁה זִוּוּגוֹ שֶׁל אָדָם כִּקְרִיעַת יַם סוּף, וְהַכֹּל בִּידֵי שָׁמַיִם — לְכָךְ שׁוֹפְכִים לֵב בִּתְפִלָּה שֶׁיַּזְמִין הַקָּדוֹשׁ בָּרוּךְ הוּא אֶת בֶּן/בַּת הַזּוּג הָהָגוּן בְּעִתּוֹ.`,source:`בבלי סוטה ב ע"א (קשה זיווגו כקריעת ים סוף); ונוסח התפילה ע"פ קיצור של"ה וחופת חתנים`},"heryon-leyda":{why:`אָמְרוּ חֲכָמֵינוּ שֶׁ'הַכֹּל בִּידֵי שָׁמַיִם' וְעַל הָאֵם לְהַפְקִיד עֻבָּרָהּ בְּיַד בּוֹרְאוֹ בִּתְפִלָּה; מִזְמוֹר כ' ('יַעַנְךָ ה' בְּיוֹם צָרָה') נֶאֱמָר כְּנֶגֶד תִּשְׁעָה חֳדָשִׁים, וּסְגֻ
