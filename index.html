רִים, וּמַֽחֲזִירָן לְמַכְתֶּֽשֶׁת בְּעֶֽרֶב יוֹם הַכִּפּוּרִים, כְּדֵי לְקַיֵּם מִצְוַת דַקָּה מִן הַדַּקָּה. וְאַחַד־עָשָׂר סַמָּנִים הָיוּ בָהּ, וְאֵֽלּוּ הֵן:`,`<small>א</small> הַצֳּרִי <small>ב</small> וְהַצִּפֹּֽרֶן <small>ג</small> וְהַחֶלְבְּנָה <small>ד</small> וְהַלְּבוֹנָה, מִשְׁקַל שִׁבְעִים שִׁבְעִים מָנֶה. <small>ה</small> מוֹר, <small>ו</small> וּקְצִיעָה <small>ז</small> וְשִׁבֹּֽלֶת נֵרְדְּ <small>ח</small> וְכַרְכֹּם, מִשְׁקַל שִׁשָּׁה עָשָׂר שִׁשָּׁה עָשָׂר מָנֶה. <small>ט</small> קֹשְׁטְ שְׁנֵים עָשָׂר, <small>י</small> קִלּוּפָה שְׁלֹשָׁה, <small>יא</small> קִנָּמוֹן תִּשְׁעָה, בּוֹרִית־כַּרְשִׁינָה תִּשְׁעָה קַבִּין. יֵין קַפְרִיסִין סְאִין תְּלָת וְקַבִּין תְּלָתָא. וְאִם לֹא מָצָא יֵין קַפְרִיסִין, מֵבִיא חֲמַר חִיוָר עַתִּיק. מֶֽלַח סְדוֹמִית, רֽוֹבַע. מַעֲלֶה עָשָׁן, כָּל־שֶׁהוּא. רִבִּי נָתָן הַבַּבְלִי אוֹמֵר: אַף כִּפַּת הַיַּרְדֵּן כָּל־שֶׁהִיא, אִם נָתַן בָּהּ דְּבַשׁ פְּסָלָהּ, וְאִם חִסֵּר אַחַת מִכָּל־סַמְמָנֶֽיהָ, חַיָּיב מִיתָה:`]},{heading:`רַבָּן שִׁמְעוֹן בֶּן גַּמְלִיאֵל · תַּנְיָא רִבִּי נָתָן · תָּנֵי בַר קַפָּרָא`,verses:[`<b>רַבָּן</b> שִׁמְעוֹן בֶּן־גַּמְלִיאֵל אוֹמֵר: הַצֳּרִי אֵינוֹ אֶלָּא שְׁרָף, הַנּוֹטֵף מֵֽעֲצֵי הַקְּטָף. בֹּרִית כַּרְשִׁינָה, לְמָה הִיא בָֽאָה? כְּדֵי לְשַׁפּוֹת בָּהּ אֶת־הַצִּפֹּֽרֶן, כְּדֵי שֶׁתְּהֵא נָאָה. יֵין קַפְרִיסִין, לְמָה הוּא בָא? כְּדֵי לִשְׁרוֹת בּוֹ אֶת־הַצִּפֹּֽרֶן כְּדֵי שֶׁתְּהֵא עַזָּה. וַהֲלֹא מֵי רַגְלַֽיִם יָפִין לָהּ? אֶלָּא שֶׁאֵין מַכְנִיסִין מֵי רַגְלַֽיִם בַּמִּקְדָּשׁ, מִפְּנֵי הַכָּבוֹד:`,`<b>תַּנְיָא</b> רִבִּי נָתָן אוֹמֵר: כְּשֶׁהוּא שׁוֹחֵק, אוֹמֵר: הָדֵק הֵיטֵב, הֵיטֵב הָדֵק. מִפְּנֵי שֶׁהַקּוֹל יָפֶה לַבְּשָׂמִים. פִּטְּמָהּ לַֽחֲצָאִין, כְּשֵׁרָה. לְשָׁלִישׁ וּלְרָבִֽיעַ, לֹא שָׁמַֽעְנוּ. אָמַר רִבִּי יְהוּדָה: זֶה הַכְּלָל, אִם כְּמִדָּתָהּ, כְּשֵׁרָה לַֽחֲצָאִין. וְאִם חִסֵּר אַחַת מִכָּל־סַמְמָנֶֽיהָ, חַיָּיב מִיתָה:`,`<b>תָּנֵי</b> בַר־קַפָּרָא: אַחַת לְשִׁשִּׁים אוֹ לְשִׁבְעִים שָׁנָה, הָֽיְתָה בָֽאָה שֶׁל שִׁירַֽיִם לַֽחֲצָאִין. וְעוֹד תָּנֵי בַר־קַפָּרָא: אִלּוּ הָיָה נוֹתֵן בָּהּ קָרְטוֹב שֶׁל דְּבַשׁ, אֵין אָדָם יָכוֹל לַֽעֲמֹד מִפְּנֵי רֵיחָהּ. וְלָֽמָּה אֵין מְעָֽרְבִין בָּהּ דְּבַשׁ? מִפְּנֵי שֶׁהַתּוֹרָה אָֽמְרָה: כִּ֤י כָל־שְׂאֹר֙ וְכָל־דְּבַ֔שׁ לֹֽא־תַקְטִ֧ירוּ מִמֶּ֛נּוּ אִשֶּׁ֖ה לַֽיהֹוָֽה: יְהֹוָ֣ה צְבָא֣וֹת עִמָּ֑נוּ מִשְׂגָּֽב־לָ֨נוּ אֱלֹהֵ֖י יַֽעֲקֹ֣ב סֶֽלָה׃ יְהֹוָ֥ה צְבָא֑וֹת אַֽשְׁרֵ֥י אָ֝דָ֗ם בֹּטֵ֥חַ בָּֽךְ׃ יְהֹוָ֥ה הוֹשִׁ֑יעָה הַ֝מֶּ֗לֶךְ יַעֲנֵ֥נוּ בְיוֹם־קׇרְאֵֽנוּ: וְעָֽרְבָה֙ לַֽיהֹוָ֔ה מִנְחַ֥ת יְהוּדָ֖ה וִירֽוּשָׁלָ֑‍ִם כִּימֵ֣י עוֹלָ֔ם וּכְשָׁנִ֖ים קַדְמֹנִיֹּֽת:`]},{heading:`אַבַּיֵּי הֲוָה מְסַדֵּר סֵדֶר הַמַּעֲרָכָה`,verses:[`<b>אַבַּיֵּי</b> הֲוָה מְסַדֵּר סֵדֶר הַמַּעֲרָכָה מִשְּׁמָא דִגְמָרָא, וְאַלִבָּא דְאַבָּא שָׁאוּל. מַעֲרָכָה גְּדוֹלָה קוֹדֶמֶת לְמַעֲרָכָה שְׁנִיָּה שֶׁל קְטֹרֶת, וּמַעֲרָכָה שְׁנִיָּה שֶׁל קְטֹרֶת קוֹדֶמֶת לְסִדּוּר שְׁנֵי גְזִירֵי עֵצִים, וְסִדּוּר שְׁנֵי גְזִירֵי עֵצִים קוֹדֵם לְדִישּׁוּן מִזְבַּח הַפְּנִימִי, וְדִישּׁוּן מִזְבַּח הַפְּנִימִי קוֹדֵם לַהֲטָבַת חָמֵשׁ נֵרוֹת, וַהֲטָבַת חָמֵשׁ נֵרוֹת קוֹדֶמֶת לְדַם הַתָּמִיד, וְדַם הַתָּמִיד קוֹדֵם לַהֲטָבַת שְׁתֵּי נֵרוֹת, וַהֲטָבַת שְׁתֵּי נֵרוֹת קוֹדֶמֶת לִקְטֹרֶת, וּקְטֹרֶת לְאֵבָרִים, וְאֵבָרִים לְמִנְחָה, וּמִנְחָה לַחֲבִיתִּין, וַחֲבִיתִּין לִנְסָכִין, וּנְסָכִין לְמוּסָפִין, וּמוּסָפִין לְבָזִיכִין, וּבָזִיכִין קוֹדְמִין לְתָמִיד שֶׁל בֵּין הָעַרְבָּיִם, שֶׁנֶּאֱמַר: וְעָרַ֤ךְ עָלֶ֙יהָ֙ הָֽעֹלָ֔ה וְהִקְטִ֥יר עָלֶ֖יהָ חֶלְבֵ֥י הַשְּׁלָמִֽים: עָלֶיהָ הַשְׁלֵם כָּל הַקָּרְבָּנוֹת כֻּלָּם:`]},{heading:`אָנָּא בְּכֹחַ`,verses:[`אָֽנָּֽא בְּכֹֽחַ. גְּדוּלַת יְמִינֶֽךָ. תַּתִּיר צְרוּרָה: <small>(אב"ג ית"ץ)</small>`,`קַבֵּל רִנַּת. עַמֶּֽךָ שַׂגְּבֵֽנוּ. טַהֲרֵֽנוּ נוֹרָא: <small>(קר"ע שט"ן)</small>`,`נָא גִבּוֹר. דּֽוֹרְשֵֽׁי יִחוּדֶֽךָ. כְּבָבַת שָׁמְרֵם: <small>(נג"ד יכ"ש)</small>`,`בָּֽרְכֵֽם טַהֲרֵם. רַחֲמֵי צִדְקָתֶֽךָ. תָּמִיד גָּמְלֵם: <small>(בט"ר צת"ג)</small>`,`חֲסִין קָדוֹשׁ. בְּרֹב טֽוּבְךָֽ. נַהֵל עֲדָתֶֽךָ: <small>(חק"ב טנ"ע)</small>`,`יָחִיד גֵּאֶה. לְעַמְּךָ פְנֵה. זֽוֹכְרֵֽי קְדֻשָּׁתֶֽךָ: <small>(יג"ל פז"ק)</small>`,`שַׁוְעָתֵֽנוּ קַבֵּל. וּשְׁמַע צַעֲקָתֵֽנוּ. יוֹדֵֽעַ תַּעֲלוּמוֹת: <small>(שק"ו צי"ת)</small>`,`בָּרוּךְ שֵׁם כְּבוֹד מַלְכוּתוֹ לְעוֹלָם וָעֶד:`]},{heading:`רִבּוֹן הָעוֹלָמִים · לָכֵן יְהִי רָצוֹן`,verses:[`<b>רִבּוֹן</b> הָעוֹלָמִים, אַתָּה צִוִיתָנוּ לְהַקְרִיב קָרְבַּן הַתָּמִיד בְּמוֹעֲדוֹ, וְלִהְיוֹת כֹּהֲנִים בַּעֲבוֹדָתָם, וּלְוִיִּם בְּדוּכָנָם, וְיִשְׂרָאֵל בְּמַעֲמָדָם. וְעַתָּה בַּעֲווֹנוֹתֵינוּ חָרַב בֵּית הַמִּקְדָּשׁ וּבֻטַּל הַתָּמִיד, וְאֵין לָנוּ לֹא כֹּהֵן בַּעֲבוֹדָתוֹ וְלֹא לֵוִי בְּדוּכָנוֹ, וְלֹא יִשְׂרָאֵל בְּמַעֲמָדוֹ, וְאַתָּה אָמַרְתָּ: וּֽנְשַׁלְּמָ֥ה פָרִ֖ים שְׂפָתֵֽינוּ:`,`<b>לָכֵן</b> יְהִי רָצוֹן מִלְּפָנֶיךָ יְהֹוָה אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ, שֶׁיְּהֵא שִׂיחַ שִׂפְתוֹתֵינוּ זֶה חָשׁוּב וּמְקֻבָּל וּמְרוּצֶה לְפָנֶיךָ כְּאִילוּ הִקְרַבְנוּ קָרְבַּן הַתָּמִיד בְּמוֹעֲדוֹ וְעָמַדְנוּ עַל מַעֲמָדוֹ, כְּמוֹ שֶׁנֶּאֱמַר: וּֽנְשַׁלְּמָ֥ה פָרִ֖ים שְׂפָתֵֽינוּ׃ וְנֶאֱמַר: וְשָׁחַ֨ט אֹת֜וֹ עַ֣ל יֶ֧רֶךְ הַמִּזְבֵּ֛חַ צָפֹ֖נָה לִפְנֵ֣י יְהֹוָ֑ה וְזָרְק֡וּ בְּנֵי֩ אַהֲרֹ֨ן הַכֹּהֲנִ֧ים אֶת־דָּמ֛וֹ עַל־הַמִּזְבֵּ֖חַ סָבִֽיב: וְנֶאֱמַר: זֹ֣את הַתּוֹרָ֗ה לָֽעֹלָה֙ לַמִּנְחָ֔ה וְלַֽחַטָּ֖את וְלָאָשָׁ֑ם וְלַ֨מִּלּוּאִ֔ים וּלְזֶ֖בַח הַשְּׁלָמִֽים:`]},{heading:`אֵיזֶהוּ מְקוֹמָן שֶׁל זְבָחִים`,verses:[`<b>אֵיזֶהוּ</b> מְקוֹמָן שֶׁל זְבָחִים, קָדְשִׁי קָדָשִׁים שְׁחִיטָתָן בַּצָּפוֹן, פַּר וְשָׂעִיר שֶׁל יוֹם הַכִּפּוּרִים שְׁחִיטָתָן בַּצָּפון, וְקִבּוּל דָּמָן בִּכְלֵי שָׁרֵת בַּצָּפוֹן, וְדָמָן טָעוּן הַזָּיָה עַל בֵּין הַבַּדִּים וְעַל הַפָּרֹכֶת וְעַל מִזְבַּח הַזָּהָב. מַתָּנָה אַחַת מֵהֶן מְעַכֶּבֶת. שִׁיְּירֵי הַדָּם הָיָה שׁוֹפֵךְ עַל יְסוֹד מַעֲרָבִי שֶׁל מִזְבֵּחַ הַחִיצוֹן. אִם לֹא נָתַן, לֹא עִכֵּב:`,`<b>פָּרִים</b> הַנִּשְׂרָפִים וּשְׂעִירִים הַנִּשְׂרָפִים שְׁחִיטָתָן בַּצָּפוֹן, וְקִבּוּל דָּמָן בִּכְלֵי שָׁרֵת בַּצָּפוֹן, וְדָמָן טָעוּן הַזָּיָה עַל הַפָּרֹכֶת וְעַל מִזְבַּח הַזָּהָב. מַתָּנָה אַחַת מֵהֶן מְעַכֶּבֶת. שִׁיְרֵי הַדָּם הָיָה שׁוֹפֵךְ עַל יְסוֹד מַעֲרָבִי שֶׁל מִזְבַּח הַחִיצוֹן. אִם לֹא נָתַן, לֹא עִכֵּב. אֵלּוּ וְאֵלּוּ נִשְׂרָפִין בְּבֵית הַדָּשֶׁן:`,`<b>חַטֹּאת</b> הַצִּבּוּר וְהַיָּחִיד. אֵלּוּ הֵן חַטֹּאת הַצִּבּוּר, שְׂעִירֵי רָאשֵׁי חֳדָשִׁים וְשֶׁל מוֹעֲדוֹת, שְׁחִיטָתָן בַּצָּפוֹן, וְקִבּוּל דָּמָן בִּכְלֵי שָׁרֵת בַּצָּפוֹן, וְדָמָן טָעוּן אַרְבַּע מַתָּנוֹת עַל אַרְבַּע קְרָנוֹת, כֵּיצַד, עָלָה בַכֶּבֶשׁ וּפָנָה לַסּוֹבֵב, וּבָא לוֹ לְקֶרֶן דְּרוֹמִית מִזְרָחִית, מִזְרָחִית צְפוֹנִית, צְפוֹנִית מַעֲרָבִית, מַעֲרָבִית דְּרוֹמִית. שְׁיָרֵי הַדָּם הָיָה שׁוֹפֵךְ עַל יְסוֹד דְרוֹמִי, וְנֶאֱכָלִין לִפָנִים מִן הַקְּלָעִים לְזִכְרֵי כְהֻנָּה בְּכָל מַאֲכָל לְיוֹם וָלַיְלָה עַד חֲצוֹת:`,`<b>הָעוֹלָה</b>, קֹדֶשׁ קָדָשִׁים, שְׁחִיטָתָהּ בַּצָּפוֹן, וְקִבּוּל דָּמָהּ בִּכְלֵי שָׁרֵת בַּצָּפוֹן, וְדָמָהּ טָעוּן שְׁתֵּי מַתָּנוֹת שֶׁהֵן אַרְבַּע, וּטְעוּנָה הֶפְשֵׁט וְנִתּוּחַ וְכָלִיל לָאִשִּׁים:`,`<b>זִבְחֵי</b> שַׁלְמֵי צִבּוּר וַאֲשָׁמוֹת. אֵלּוּ הֵן אֲשָׁמוֹת, אָשָׁם גְּזֵלוֹת, אָשָׁם מְעִילוֹת, אָשָׁם שִׁפְחָה חֲרוּפָה, אָשָׁם נָזִיר, אָשָׁם מְצוֹרָע, אָשָׁם תָּלוּי, שְׁחִיטָתָן בַּצָּפוֹן, וְקִבּוּל דָּמָן בִּכְלִי שָׁרֵת בַּצָּפוֹן, וְדָמָן טָעוּן שְׁתֵּי מַתָּנוֹת שֶׁהֵן אַרְבַּע, וְנֶאֱכָלִין לְפָנִים מִן הַקְּלָעִים לְזִכְרֵי כְהֻנָּה בְּכָל מַאֲכָל לְיוֹם וָלַיְלָה עַד חֲצוֹת:`,`<b>הַתּוֹדָה</b> וְאֵיל נָזִיר, קָדָשִׁים קַלִּים, שְׁחִיטָתָן בְּכָל מָקוֹם בָּעֲזָרָה, וְדָמָן טָעוּן שְׁתֵּי מַתָּנוֹת שֶׁהֵן אַרְבַּע, וְנֶאֱכָלִין בְּכָל הָעִיר, לְכָל אָדָם, בְּכָל מַאֲכָל, לְיוֹם וָלַיְלָה עַד חֲצוֹת. הַמּוּרָם מֵהֶם כַּיּוֹצֵא בָהֶם, אֶלָּא שֶׁהַמּוּרָם נֶאֱכָל לַכֹּהֲנִים לִנְשֵׁיהֶם וְלִבְנֵיהֶם וּלְעַבְדֵיהֶם:`,`<b>שְׁלָמִים</b>, קָדָשִׁים קַלִּים, שְׁחִיטָתָן בְּכָל מָקוֹם בָּעֲזָרָה, וְדָמָן טָעוּן שְׁתֵּי מַתָּנוֹת שֶׁהֵן אַרְבַּע, וְנֶאֱכָלִין בְּכָל הָעִיר לְכָל אָדָם בְּכָל מַאֲכָל לִשְׁנֵי יָמִים וָלַיְלָה אֶחָד. הַמּוּרָם מֵהֶם כַּיּוֹצֵא בָּהֶם, אֶלָּא שֶׁהַמּוּרָם נֶאֱכָל לַכֹּהֲנִים, לִנְשֵׁיהֶם וְלִבְנֵיהֶם וּלְעַבְדֵיהֶם:`,`<b>הַבְּכוֹר</b> וְהַמַּעֲשֵׂר וְהַפֶּסַח, קָדָשִׁים קַלִּים, שְׁחִיטָתָן בְּכָל מָקוֹם בָּעֲזָרָה, וְדָמָן טָעוּן מַתָּנָה אַחַת, וּבִלְבָד שֶׁיִּתֵּן כְּנֶגֶד הַיְסוֹד. שִׁנָּה בַאֲכִילָתָן, הַבְּכוֹר נֶאֱכָל לַכֹּהֲנִים, וְהַמַּעֲשֵׂר לְכָל אָדָם, וְנֶאֱכָלִין בְּכָל הָעִיר בְּכָל מַאֲכָל לִשְׁנֵי יָמִים וָלַיְלָה אֶחָד. הַפֶּסַח אֵינוֹ נֶאֱכָל אֶלָּא בַלַּיְלָה, וְאֵינוֹ נֶאֱכָל אֶלָּא עַד חֲצוֹת, וְאֵינוֹ נֶאֱכָל אֶלָּא לִמְנוּיָו, וְאֵינוֹ נֶאֱכָל אֶלָּא צָלִי:`]},{heading:`רַבִּי יִשְׁמָעֵאל · שְׁלֹשׁ עֶשְׂרֵה מִדּוֹת · יְהוּדָה בֶּן תֵּימָא`,verses:[`<b>רִבִּי</b> יִשְׁמָעֵאל אוֹמֵר: בִּשְׁלֹשׁ עֶשְׂרֵה מִדּוֹת הַתּוֹרָה נִדְרֶשֶׁת: מִקַּל וָחוֹמֶר, מִגְּזֵרָה שָׁוֶה, מִבִּנְיַן אָב וְכָתוּב אֶחָד, וּמִבִּנְיַן אָב וּשְׁנֵי כְתוּבִים, מִכְּלָל וּפְרָט, מִפְּרָט וּכְלָל, כְּלָל וּפְרָט וּכְלָל, אֵי אַתָּה דָן אֶלָּא כְּעֵין הַפְּרָט, מִכְּלָל שֶׁהוּא צָרִיךְ לִפְרָט, וּמִפְּרָט שֶׁהוּא צָרִיךְ לִכְלַל, וְכָל דָּבָר שֶׁהָיָה בִכְלָל וְיָצָא מִן הַכְּלָל לְלַמֵּד, לֹא לְלַמֵּד עַל עַצְמוֹ יָצָא, אֶלָּא לְלַמֵּד עַל הַכְּלָל כֻּלּוֹ יָצָא, וְכָל דָּבָר שֶׁהָיָה בִכְלָל, וְיָצָא לִטְעוֹן טָעוּן אַחֵר שֶׁהוּא כְעִנְיָנוֹ, יָצָא לְהָקֵל וְלֹא לְהַחְמִיר, וְכָל דָּבָר שֶׁהָיָה בִּכְלָל, וְיָצָא לִטְעֹן טָעוּן אַחֵר שֶׁלֹּא כְעִנְיָנוֹ, יָצָא לְהָקֵל וּלְהַחְמִיר, וְכָל דָּבָר שֶׁהָיָה בִּכְלָל, וְיָצָא לִדּוֹן בְּדָבָר חָדָשׁ, אֵי אַתָּה יָכוֹל לְהַחֲזִירוֹ לִכְלָלוֹ עַד שֶׁיַּחֲזִירֶנּוּ הַכָּתוּב לִכְלָלוֹ בְפֵירוּשׁ, וְדָבָר הַלָּמֵד מֵעִנְיָנוֹ, וְדָבָר הַלָּמֵד מִסּוֹפוֹ, וְכַן שְׁנֵי כְתוּבִים הַמַּכְחִישִׁים זֶה אֶת זֶה, עַד שֶׁיָּבֹא הַכָּתוּב הַשְּׁלִישִׁי וְיַכְרִיעַ בְּנֵיהֶם:`,`<b>יְהוּדָה</b> בֶּן תֵּימָא אוֹמֵר, הֱוֵי עַז כַּנָּמֵר, וְקַל כַּנֶּשֶׁר, וְרָץ כַּצְּבִי, וְגִבּוֹר כַּאֲרִי לַעֲשׂוֹת רְצוֹן אָבִיךָ שֶׁבַּשָּׁמַיִם. הוּא הָיָה אוֹמֵר, עַז פָּנִים לַגֵּיהִנָּם, וּבוֹשֶׁת פָּנִים לְגַן עֵדֶן:`]},{heading:`יְהִי רָצוֹן שֶׁתִּבְנֶה בֵּית הַמִּקְדָּשׁ`,verses:[`<b>יְהִי </b> רָצוֹן מִלְּפָנֶיךָ יְהֹוָה אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ, שֶׁתִּבְנֶה בֵּית הַמִּקְדָּשׁ בִּמְהֵרָה בְיָמֵינוּ, וְתֵן חֶלְקֵנוּ בְּתוֹרָתָךְ, לַעֲשׂוֹת חֻקֵּי רְצוֹנָךְ, וּלְעָבְדָךְ בְּלֵבָב שָׁלֵם:`]}]},"kriat-shema-al-hamita":{id:`kriat-shema-al-hamita`,title:`קְרִיאַת שְׁמַע שֶׁעַל הַמִּטָּה`,subtitle:`סֵדֶר הַשְׁכָּבָה · שְׁמִירָה לַלַּיְלָה`,numbered:!1,chapters:[{heading:`לְשֵׁם יִחוּד`,verses:[`<small><b>לְשֵׁם</b> יִחוּד קֻדְשָׁא בְּרִיךְ הוּא וּשְׁכִינְתֵּהּ, בִּדְחִילוּ וּרְחִימוּ, וּרְחִימוּ וּדְחִילוּ, לְיַחֲדָא שֵׁם יוֹ"ד קֵ"י בְּוָא"ו קֵ"י בְּיִחוּדָא שְׁלִים בְּשֵׁם כָּל־יִשְׂרָאֵל. הֲרֵֽינִי מְקַבֵּל עָלַי אֱלָהוּתוּ יִתְבָּרַךְ וְאַהֲבָתוֹ וְיִרְאָתוֹ. וַהֲרֵֽינִי יָרֵא מִמֶּֽנּוּ בְּגִין דְּאִֽיהוּ רַב וְשַׁלִּיט עַל כֹּֽלָּא. וְכֹֽלָּא קַמֵּיהּ כְּלָא. וַהֲרֵֽינִי מַמְלִיכוֹ עַל כָּל־אֵֽבֶר וְאֵֽבֶר וְגִיד וָגִיד מֵרַמַ"ח אֵבָרִים וְשַׁסַ"הּ גִּידִים שֶׁל גּוּפִי וְנַפְשִׁי רוּחִי וְנִשְׁמָתִי. מַלְכוּת גְּמוּרָה וּשְׁלֵמָה. וַהֲרֵֽינִי עֶֽבֶד לְהַשֵּׁם יִתְבָּרַךְ וְהוּא בְרַחֲמָיו יְזַכֵּֽנִי לְעָבְדּוֹ בְּלֵבָב שָׁלֵם וְנֶֽפֶשׁ חֲפֵצָה. אָמֵן כֵּן יְהִי רָצוֹן:</small>`]},{heading:`רִבּוֹנוֹ שֶׁל עוֹלָם · הֲרֵינִי מוֹחֵל`,verses:[`<b>רִבּוֹנוֹ</b> שֶׁל עוֹלָם הֲרֵֽינִי מוֹחֵל וְסוֹלֵֽחַ לְכָל־מִי־שֶׁהִכְעִיס וְהִקְנִיט אוֹתִי אוֹ שֶׁחָטָא כְּנֶגְדִּי. בֵּין בְּגוּפִי בֵּין בְּמָמוֹנִי בֵּין בִּכְבוֹדִי בֵּין בְּכָל־אֲשֶׁר לִי. בֵּין בְּאֽוֹנֶס בֵּין בְּרָצוֹן בֵּין בְּשׁוֹגֵג בֵּין בְּמֵזִיד בֵּין בְּדִבּוּר בֵּין בְּמַעֲשֶׂה. בֵּין בְּגִלְגּוּל זֶה בֵּין בְּגִלְגּוּל אַחֵר. לְכָל־בַּר־יִשְׂרָאֵל. וְלֹא יֵעָנֵשׁ שׁוּם אָדָם בְּסִבָּתִי. יְהִי רָצוֹן מִלְּפָנֶֽיךָ יְהֹוָה אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי שֶׁלֹּא אֶחֱטָא עוֹד. וּמַה־שֶּׁחָטָֽאתִי לְפָנֶֽיךָ מְחוֹק בְּרַחֲמֶֽיךָ הָרַבִּים. אֲבָל לֹא עַל־יְדֵי יִסּוּרִין וְחוֹלָאִים רָעִים. יִ֥הְיֽוּ לְרָצ֨וֹן ׀ אִמְרֵי־פִ֡י וְהֶגְי֣וֹן לִבִּ֣י לְפָנֶ֑יךָ יְ֝הֹוָ֗ה צוּרִ֥י וְגֹאֲלִֽי׃`]},{heading:`בִּרְכַּת הַמַּפִּיל`,verses:[`<b>בָּרוּךְ</b> <small>(אַתָּה יְהֹוָה, אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם)</small> הַמַּפִּיל חֶבְלֵי שֵׁנָה עַל־עֵינָי וּתְנוּמָה עַל־עַפְעַפַּי, וּמֵאִיר לְאִישׁוֹן בַּת־עָֽיִן. יְהִי רָצוֹן מִלְּפָנֶֽיךָ יְהֹוָה אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי שֶׁתַּשְׁכִּיבֵֽנִי לְשָׁלוֹם, וְתַעֲמִידֵֽנִי לְחַיִּים טוֹבִים וּלְשָׁלוֹם, וְתֵן חֶלְקִי בְּתוֹרָתֶֽךָ, וְתַרְגִּילֵֽנִי לִדְבַר מִצְוָה, וְאַל־תַּרְגִּילֵֽנִי לִדְבַר עֲבֵרָה, וְאַל־תְּבִיאֵֽנִי לִידֵי חֵטְא. וְלֹא לִידֵי נִסָּיוֹן וְלֹא לִידֵי בִזָּיוֹן, וְיִשְׁלוֹט בִּי יֵֽצֶר הַטּוֹב וְאַל־יִשְׁלוֹט בִּי יֵֽצֶר הָרָע. וְתַצִּילֵֽנִי מִיֵּֽצֶר הָרָע וּמֵחוֹלָאִים רָעִים, וְאַל־יַבְהִילֽוּנִי חֲלוֹמוֹת רָעִים וְהִרְהוּרִים רָעִים, וּתְהֵא מִטָּתִי שְׁלֵמָה לְפָנֶֽיךָ, וְהָאֵר עֵינַי פֶּן אִישַׁן הַמָּֽוֶת. בָּרוּךְ <small>(אַתָּה יְהֹוָה)</small> הַמֵּאִיר לָעוֹלָם כֻּלּוֹ בִּכְבוֹדוֹ:`]},{heading:`שְׁמַע יִשְׂרָאֵל`,verses:[`<b>שְׁמַ֖<big>ע</big> יִשְׂרָאֵ֑ל יְהֹוָ֥ה אֱלֹהֵ֖ינוּ יְהֹוָ֥ה ׀ אֶחָֽ<big>ד</big></b>׃`,`<small><small>בלחש:</small> בָּרוּךְ שֵּׁם כְּבוֹד מַלְכוּתוֹ לְעוֹלָם וָעֶד:</small>`]},{heading:`שָׁלֹשׁ פָּרָשִׁיּוֹת`,verses:[`<b>וְאָ֣הַבְתָּ֔</b> אֵ֖ת יְהֹוָ֣ה אֱלֹהֶ֑יךָ בְּכׇל־לְבָבְךָ֥ וּבְכׇל־נַפְשְׁךָ֖ וּבְכׇל־מְאֹדֶֽךָ׃ וְהָי֞וּ הַדְּבָרִ֣ים הָאֵ֗לֶּה אֲשֶׁ֨ר אָנֹכִ֧י מְצַוְּךָ֛ הַיּ֖וֹם עַל־לְבָבֶֽךָ׃ וְשִׁנַּנְתָּ֣ם לְבָנֶ֔יךָ וְדִבַּרְתָּ֖ בָּ֑ם בְּשִׁבְתְּךָ֤ בְּבֵיתֶ֙ךָ֙ וּבְלֶכְתְּךָ֣ בַדֶּ֔רֶךְ וּֽבְשׇׁכְבְּךָ֖ וּבְקוּמֶֽךָ׃ וּקְשַׁרְתָּ֥ם לְא֖וֹת עַל־יָדֶ֑ךָ וְהָי֥וּ לְטֹטָפֹ֖ת בֵּ֥ין עֵינֶֽיךָ׃ וּכְתַבְתָּ֛ם עַל־מְזֻז֥וֹת בֵּיתֶ֖ךָ וּבִשְׁעָרֶֽיךָ׃`,`<b>וְהָיָ֗ה</b> אִם־שָׁמֹ֤עַ תִּשְׁמְעוּ֙ אֶל־מִצְוֺתַ֔י אֲשֶׁ֧ר אָנֹכִ֛י מְצַוֶּ֥ה אֶתְכֶ֖ם הַיּ֑וֹם לְאַהֲבָ֞ה אֶת־יְהֹוָ֤ה אֱלֹֽהֵיכֶם֙ וּלְעׇבְד֔וֹ בְּכׇל־לְבַבְכֶ֖ם וּבְכׇל־נַפְשְׁכֶֽם׃ וְנָתַתִּ֧י מְטַֽר־אַרְצְכֶ֛ם בְּעִתּ֖וֹ יוֹרֶ֣ה וּמַלְק֑וֹשׁ וְאָסַפְתָּ֣ דְגָנֶ֔ךָ וְתִֽירֹשְׁךָ֖ וְיִצְהָרֶֽךָ׃ וְנָתַתִּ֛י עֵ֥שֶׂב בְּשָׂדְךָ֖ לִבְהֶמְתֶּ֑ךָ וְאָכַלְתָּ֖ וְשָׂבָֽעְתָּ׃ הִשָּֽׁמְר֣וּ לָכֶ֔ם פֶּ֥ן יִפְתֶּ֖ה לְבַבְכֶ֑ם וְסַרְתֶּ֗ם וַעֲבַדְתֶּם֙ אֱלֹהִ֣ים אֲחֵרִ֔ים וְהִשְׁתַּחֲוִיתֶ֖ם לָהֶֽם׃ וְחָרָ֨ה אַף־יְהֹוָ֜ה בָּכֶ֗ם וְעָצַ֤ר אֶת־הַשָּׁמַ֙יִם֙ וְלֹֽא־יִהְיֶ֣ה מָטָ֔ר וְהָ֣אֲדָמָ֔ה לֹ֥א תִתֵּ֖ן אֶת־יְבוּלָ֑הּ וַאֲבַדְתֶּ֣ם מְהֵרָ֗ה מֵעַל֙ הָאָ֣רֶץ הַטֹּבָ֔ה אֲשֶׁ֥ר יְהֹוָ֖ה נֹתֵ֥ן לָכֶֽם׃ וְשַׂמְתֶּם֙ אֶת־דְּבָרַ֣י אֵ֔לֶּה עַל־לְבַבְכֶ֖ם וְעַֽל־נַפְשְׁכֶ֑ם וּקְשַׁרְתֶּ֨ם אֹתָ֤ם לְאוֹת֙ עַל־יֶדְכֶ֔ם וְהָי֥וּ לְטוֹטָפֹ֖ת בֵּ֥ין עֵינֵיכֶֽם׃ וְלִמַּדְתֶּ֥ם אֹתָ֛ם אֶת־בְּנֵיכֶ֖ם לְדַבֵּ֣ר בָּ֑ם בְּשִׁבְתְּךָ֤ בְּבֵיתֶ֙ךָ֙ וּבְלֶכְתְּךָ֣ בַדֶּ֔רֶךְ וּֽבְשׇׁכְבְּךָ֖ וּבְקוּמֶֽךָ׃ וּכְתַבְתָּ֛ם עַל־מְזוּז֥וֹת בֵּיתֶ֖ךָ וּבִשְׁעָרֶֽיךָ׃ לְמַ֨עַן יִרְבּ֤וּ יְמֵיכֶם֙ וִימֵ֣י בְנֵיכֶ֔ם עַ֚ל הָֽאֲדָמָ֔ה אֲשֶׁ֨ר נִשְׁבַּ֧ע יְהֹוָ֛ה לַאֲבֹתֵיכֶ֖ם לָתֵ֣ת לָהֶ֑ם כִּימֵ֥י הַשָּׁמַ֖יִם עַל־הָאָֽרֶץ׃`,`<b>וַיֹּ֥אמֶר</b> יְהֹוָ֖ה אֶל־מֹשֶׁ֥ה לֵּאמֹֽר׃ דַּבֵּ֞ר אֶל־בְּנֵ֤י יִשְׂרָאֵל֙ וְאָמַרְתָּ֣ אֲלֵהֶ֔ם וְעָשׂ֨וּ לָהֶ֥ם צִיצִ֛ת עַל־כַּנְפֵ֥י בִגְדֵיהֶ֖ם לְדֹרֹתָ֑ם וְנָ֥תְנ֛וּ עַל־צִיצִ֥ת הַכָּנָ֖ף פְּתִ֥יל תְּכֵֽלֶת׃ וְהָיָ֣ה לָכֶם֮ לְצִיצִת֒ וּרְאִיתֶ֣ם אֹת֗וֹ וּזְכַרְתֶּם֙ אֶת־כׇּל־מִצְוֺ֣ת יְהֹוָ֔ה וַעֲשִׂיתֶ֖ם אֹתָ֑ם וְלֹֽא־תָת֜וּרוּ אַחֲרֵ֤י לְבַבְכֶם֙ וְאַחֲרֵ֣י עֵֽינֵיכֶ֔ם אֲשֶׁר־אַתֶּ֥ם זֹנִ֖ים אַחֲרֵיהֶֽם׃ לְמַ֣עַן תִּזְכְּר֔וּ וַעֲשִׂיתֶ֖ם אֶת־כׇּל־מִצְוֺתָ֑י וִהְיִיתֶ֥ם קְדֹשִׁ֖ים לֵאלֹֽהֵיכֶֽם׃ אֲנִ֞י יְהֹוָ֣ה אֱלֹֽהֵיכֶ֗ם אֲשֶׁ֨ר הוֹצֵ֤אתִי אֶתְכֶם֙ מֵאֶ֣רֶץ מִצְרַ֔יִם לִהְי֥וֹת לָכֶ֖ם לֵאלֹהִ֑ים אֲנִ֖י יְהֹוָ֥ה אֱלֹהֵיכֶֽם׃`,`יְהֹוָה אֱלֹהֵיכֶם אֱמֶת.`]},{heading:`יַעְלְזוּ חֲסִידִים · הִנֵּה מִטָּתוֹ · בִּרְכַּת כֹּהֲנִים`,verses:[`<b>יַעְלְז֣וּ</b> חֲסִידִ֣ים בְּכָב֑וֹד יְ֝רַנְּנ֗וּ עַל־מִשְׁכְּבוֹתָֽם׃ רוֹמְמ֣וֹת אֵ֭ל בִּגְרוֹנָ֑ם וְחֶ֖רֶב פִּיפִיּ֣וֹת בְּיָדָֽם׃`,`<b>הִנֵּ֗ה</b> מִטָּתוֹ֙ שֶׁלִּשְׁלֹמֹ֔ה שִׁשִּׁ֥ים גִּבֹּרִ֖ים סָבִ֣יב לָ֑הּ מִגִּבֹּרֵ֖י יִשְׂרָאֵֽל׃ כֻּלָּם֙ אֲחֻ֣זֵי חֶ֔רֶב מְלֻמְּדֵ֖י מִלְחָמָ֑ה אִ֤ישׁ חַרְבּוֹ֙ עַל־יְרֵכ֔וֹ מִפַּ֖חַד בַּלֵּילֽוֹת׃`,`<b>יְבָרֶכְךָ֥</b> יְהֹוָ֖ה וְיִשְׁמְרֶֽךָ׃ יָאֵ֨ר יְהֹוָ֧ה ׀ פָּנָ֛יו אֵלֶ֖יךָ וִֽיחֻנֶּֽךָּ׃ יִשָּׂ֨א יְהֹוָ֤ה ׀ פָּנָיו֙ אֵלֶ֔יךָ וְיָשֵׂ֥ם לְךָ֖ שָׁלֽוֹם׃`]},{heading:`יוֹשֵׁב בְּסֵתֶר עֶלְיוֹן · מִזְמוֹר צ״א`,verses:[`<b>יֹ֭שֵׁב</b> <small>(תהילים צ״א)</small> בְּסֵ֣תֶר עֶלְי֑וֹן בְּצֵ֥ל שַׁ֝דַּ֗י יִתְלוֹנָֽן׃ אֹמַ֗ר לַ֭יהֹוָה מַחְסִ֣י וּמְצוּדָתִ֑י אֱ֝לֹהַ֗י אֶבְטַח־בּֽוֹ׃ כִּ֤י ה֣וּא יַ֭צִּילְךָ מִפַּ֥ח יָק֗וּשׁ מִדֶּ֥בֶר הַוּֽוֹת׃ בְּאֶבְרָת֨וֹ ׀ יָ֣סֶךְ לָ֭ךְ וְתַחַת־כְּנָפָ֣יו תֶּחְסֶ֑ה צִנָּ֖ה וְסֹחֵרָ֣ה אֲמִתּֽוֹ׃ לֹֽא־תִ֭ירָא מִפַּ֣חַד לָ֑יְלָה מֵ֝חֵ֗ץ יָע֥וּף יוֹמָֽם׃ מִ֭דֶּבֶר בָּאֹ֣פֶל יַהֲלֹ֑ךְ מִ֝קֶּ֗טֶב יָשׁ֥וּד צׇהֳרָֽיִם׃ יִפֹּ֤ל מִצִּדְּךָ֨ ׀ אֶ֗לֶף וּרְבָבָ֥ה מִימִינֶ֑ךָ אֵ֝לֶ֗יךָ לֹ֣א יִגָּֽשׁ׃ רַ֭ק בְּעֵינֶ֣יךָ תַבִּ֑יט וְשִׁלֻּמַ֖ת רְשָׁעִ֣ים תִּרְאֶֽה׃ כִּֽי־אַתָּ֣ה יְהֹוָ֣ה מַחְסִ֑י.`]},{heading:`וִדּוּי · אָנָּא ה׳`,condition:`viduy`,verses:[`<b>אָנָּא</b> יְהֹוָה אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ. תָּבֹא לְפָנֶיךָ תְּפִלָּתֵנוּ. וְאַל־תִּתְעַלַּם מַלְכֵּנוּ מִתְּחִנָּתֵנוּ. שֶׁאֵין אֲנַחְנוּ עַזֵּי פָנִים וּקְשֵׁי עֹרֶף לוֹמַר לְפָנֶיךָ יְהֹוָה אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ צַדִּיקִים אֲנַחְנוּ וְלֹא חָטָאנוּ. אֲבָל חָטָאנוּ. עָוִינוּ. פָּשַׁעְנוּ. אֲנַחְנוּ וַאֲבוֹתֵינוּ וְאַנְשֵׁי בֵיתֵנוּ: <b>אָ</b>שַׁמְנוּ. <b>בָּ</b>גַדְנוּ. <b>גָּ</b>זַלְנוּ. <b>דִּ</b>בַּרְנוּ דֹפִי וְלָשׁוֹן הָרָע. <b>הֶ</b>עֱוִינוּ. <b>וְ</b>הִרְשַׁעְנוּ. <b>זַ</b>דְנוּ. <b>חָ</b>מַסְנוּ. <b>טָ</b>פַלְנוּ שֶׁקֶר וּמִרְמָה. <b>יָ</b>עַצְנוּ עֵצוֹת רָעוֹת. <b>כִּ</b>זַּבְנוּ. כָּעַסְנוּ. <b>לַ</b>צְנוּ. <b>מָ</b>רַדְנוּ. מָרִינוּ דְבָרֶיךָ. <b>נִ</b>אַצְנוּ. נִאַפְנוּ. <b>סָ</b>רַרְנוּ. <b>עָ</b>וִינוּ. <b>פָּ</b>שַׁעְנוּ. פָּגַמְנוּ. <b>צָ</b>רַרְנוּ. צִעַרְנוּ אָב וָאֵם. <b>קִ</b>שִּׁינוּ עֹרֶף. <b>רָ</b>שַׁעְנוּ. <b>שִׁ</b>חַתְנוּ. <b>תִּ</b>עַבְנוּ. תָּעִינוּ וְתִעֲתַעְנוּ. וְסַרְנוּ מִמִּצְוֹתֶיךָ וּמִמִּשְׁפָּטֶיךָ הַטּוֹבִים וְלֹא שָׁוָה לָנוּ. וְאַתָּה צַדִּיק עַל־כָּל־הַבָּא עָלֵינוּ. כִּי אֱמֶת עָשִׂיתָ. וַאֲנַחְנוּ הִרְשָׁעְנוּ:`]},{heading:`אָנָּא בְּכֹחַ`,verses:[`אָֽנָּֽא בְּכֹֽחַ. גְּדוּלַת יְמִינֶֽךָ. תַּתִּיר צְרוּרָה: <small>(אב"ג ית"ץ)</small>`,`קַבֵּל רִנַּת. עַמֶּֽךָ שַׂגְּבֵֽנוּ. טַהֲרֵֽנוּ נוֹרָא: <small>(קר"ע שט"ן)</small>`,`נָא גִבּוֹר. דּֽוֹרְשֵֽׁי יִחוּדֶֽךָ. כְּבָבַת שָׁמְרֵם: <small>(נג"ד יכ"ש)</small>`,`בָּֽרְכֵֽם טַהֲרֵם. רַחֲמֵי צִדְקָתֶֽךָ. תָּמִיד גָּמְלֵם: <small>(בט"ר צת"ג)</small>`,`חֲסִין קָדוֹשׁ. בְּרֹב טֽוּבְךָֽ. נַהֵל עֲדָתֶֽךָ: <small>(חק"ב טנ"ע)</small>`,`יָחִיד גֵּאֶה. לְעַמְּךָ פְנֵה. זֽוֹכְרֵֽי קְדֻשָּׁתֶֽךָ: <small>(יג"ל פז"ק)</small>`,`שַׁוְעָתֵֽנוּ קַבֵּל. וּשְׁמַע צַעֲקָתֵֽנוּ. יוֹדֵֽעַ תַּעֲלוּמוֹת: <small>(שק"ו צי"ת)</small>`,`<small><small>בלחש:</small> בָּרוּךְ שֵׁם כְּבוֹד מַלְכוּתוֹ לְעוֹלָם וָעֶד:</small>`]},{heading:`אַתָּה תָקוּם · פְּסוּקֵי סִיּוּם`,verses:[`<b>אַתָּ֣ה</b> תָ֭קוּם תְּרַחֵ֣ם צִיּ֑וֹן כִּי־עֵ֥ת לְ֝חֶֽנְנָ֗הּ כִּי־בָ֥א מוֹעֵֽד׃ בְּיָדְךָ֮ אַפְקִ֢יד ר֫וּחִ֥י פָּדִ֖יתָ אוֹתִ֥י יְהֹוָ֗ה אֵ֣ל אֱמֶֽת׃`]}]},"tefilat-hashela":{id:`tefilat-hashela`,title:`תְּפִלַּת הַשְּׁלָ״ה`,subtitle:`תְּפִלַּת הָאָב עַל הַיְּלָדִים`,numbered:!1,chapters:[{heading:`עִקַּר הַתְּפִלָּה · אַתָּה הוּא ה׳ אֱלֹהֵינוּ`,verses:[`<b>"אַתָּה</b> הוּא יְהֹוָה אֱלֹהֵינוּ עַד שֶׁלּא בָרָאתָ הָעוֹלָם, וְאַתָּה הוּא אֱלֹהֵינוּ מִשֶּׁבָּרָאתָ הָעוֹלָם, וּמֵעוֹלָם וְעַד עוֹלָם אַתָּה אֵל, וּבָרָאתָ עוֹלָמְךָ בְּגִין לְהִשְׁתְּמוֹדָעָא <small>(כדי להודיע)</small> אֱלָהוּתָךְ בְּאֶמְצָעוּת תּוֹרָתְךָ הַקְּדוֹשָׁה כְּמוֹ שֶׁאָמְרוּ רַבּוֹתֵינוּ זִכְרוֹנָם לִבְרָכָה, "בְּרֵאשִׁית", בִּשְׁבִיל תּוֹרָה וּבִשְׁבִיל יִשְׂרָאֵל, כִּי הֵם עַמְּךָ וְנַחֲלָתְךָ אֲשֶׁר בָּחַרְתָּ בָּהֶם מִכָּל הָאֻמּוֹת, וְנָתַתָּ לָהֶם תּוֹרָתְךָ הַקְּדוֹשָׁה, וְקֵרַבְתָּם לְשִׁמְךָ הַגָּדוֹל:`,`<b>וְעַל</b> קִיּוּם הָעוֹלָם וְעַל קִיּוּם הַתּוֹרָה בָּא לָנוּ מִמְּךָ יְהֹוָה אֱלֹהֵינוּ שְׁנֵי צִוּוּיִים, כָּתַבְתָּ בְּתוֹרָתֶךָָ "פְּרוּ וּרְבוּ", וְכָתַבְתָּ בְּתוֹרָתֶךָָ "וְלִמַּדְתֶּם אֹתָם אֶת בְּנֵיכֶם", וְהַכַּוָּנָה בִשְׁתֵּיהֶן אֶחָת, כִּי לֹא לְתֹהוּ בָרָאתָ כִּי אִם לָשֶׁבֶת, וְלִכְבוֹדְךָ בָּרָאתָ יָצַרְתָּ אַף עָשִׂיתָ, כְּדֵי שֶּׁנִהְיֶה אֲנַחְנוּ וְצֶאֱצָאֵינוּ <small>(וְצֶאֱצָאֵי צֶאֱצָאֵינוּ)</small> וְצֶאֱצָאֵי כָּל עַמְּךָ בֵּית יִשְׂרָאֵל יוֹדְעֵי שְׁמֶךָ וְלוֹמְדֵי תוֹרָתֶךָ וּבְכֵן אָבוֹא אֵלֶיךָ יְהֹוָה מֶלֶךְ מַלְכֵי הַמְּלָכִים, וְאַפִּיל תְּחִנָּתִי, וְעֵינַי לְךָ תְלוּיוֹת עַד שֶׁתְּחָנֵּנִי וְתִשְׁמַע תְּפִלָּתִי לְהַזְמִין לִי בָּנִים וּבָנוֹת, וְגַם הֵם יִפְרוּ וְיִרְבּוּ הֵם וּבְנֵיהֶם וּבְנֵי בְנֵיהֶם עַד סוֹף כָּל הדּוֹרוֹת לְתַכְלִית שֶׁהֵם וַאֲנִי כֻּלָּנוּ יַעַסְקוּ בְּתוֹרָתֶךָָ הַקְּדושָׁה לִלְמֹד וּלְלַמֵּד לִשְׁמֹר וְלַעֲשׂות וּלְקַיֵּם אֶת כָּל דִּבְרֵי תַלְמוּד תּוֹרָתְךָ בְּאַהֲבָה, וְהָאֵר עֵינֵינוּ בְּתוֹרָתֶךָ וְדַבֵּק לִבֵּנוּ בְּמִצְוֹתֶיךָ לְאַהֲבָה וּלְיִרְאָה אֶת שְׁמֶךָ:`,`<b>אָבִינוּ</b> אָב הָרַחֲמָן, תֵּן לְכֻלָּנוּ חַיִּים אֲרֻכִּים וּבְרוּכִים, מִי כָמוךָ אָב הָרַחֲמִים זוֹכֵר יְצוּרָיו לְחַיִּים בְּרַחֲמִים, זָכְרֵנוּ לְחַיִּים נִצְחִיִּים כְּמוֹ שֶׁהִתְפַּלֵּל אַבְרָהָם אָבִינוּ "לוּ יִשְׁמָעאֵל יִחְיֶה לְפָנֶיךָ", וּפֵרְשׁוּ רַבּוֹתֵינוּ זִכְרוֹנָם לִבְרָכָה, "בְּיִרְאָתֶךָ":`]},{heading:`בַּקָּשַׁת הָאָב עַל זַרְעוֹ`,verses:[`<b>כִּי</b> עַל כֵּן, בָּאתִי לְבַקֵּשׁ וּלְחַנֵן מִלְּפָנֶיךָ שֶׁיְּהֵא זַרְעִי וְזֶרַע זַרְעִי עַד עוֹלָם זֶרַע כָּשֵׁר, וְאַל יִמָּצֵא בִי וּבְזַרְעִי וּבְזֶרַע זַרְעִי עַד עוֹלָם שׁוּם פְּסוּל וָשֶׁמֶץ, אַךְ שָׁלוֹם וֶאֱמֶת וְטוֹב וְיָשָׁר בְּעֵינֵי אֱלֹהִים וּבְעֵינֵי אָדָם, וְיִהְיוּ בַּעֲלֵי תוֹרָה, מָארֵי <small>(בעלי)</small> מִקְרָא, מָארֵי מִשְׁנָה, מָארֵי תַלְמוּד, מָארֵי רָזָא <small>(סוד)</small>, מָארֵי מִצְוָה, מָארֵי גוֹמְלֵי חֲסָדִים, מָארֵי מִדוֹת תְּרוּמִיּות, וְיַעַבְדוּךָ בְּאַהֲבָה וּבְיִרְאָה פְנִימִית, לֹא יִרְאָה חִיצוֹנִית, וְתֵן לְכָל גְּוִיָּה וּגְּוִיָּה מֵהֶם דֵּי מַחְסוֹרָהּ בְּכָבוֹד, וְתֶן לָהֶם בְּרִיאוּת וְכָבוֹד וָכֹחַ, וְתֶן לָהֶם קוֹמָה וְיֹפִי וְחֵן וָחֶסֶד, וְיִהְיֶה אַהֲבָה וְאַחְוָה וְשָׁלוֹם בֵּינֵיהֶם, וְתַזְמִין לָהֶם זִוּוּגִים הֲגוּנִים מִזֶּרַע תַּלְמִידֵי חֲכָמִים מִזֶּרַע צַדִּיקִים, וְגַם זִוּוּגָם יִהְיוּ כְּמוֹתָם כְּכָל אֲשֶׁר הִתְפַּלַּלְתִּי עֲלֵיהֶם, כִּי זִכָּרוֹן אֶחָד עוֹלֶה לְכָאן וּלְכָאן:`,`<b>אַתָּה</b> יְהֹוָה יוֹדֵעַ כָּל תַּעֲלוּמוֹת, וּלְפָנֶיךָ נִגְלוּ מַצְפּוּנֵי לִבִּי, כִּי כַוָּנָתִי בְּכָל אֵלֶּה לְמַעַן שִׁמְךָ הַגָּדוֹל וְהַקָּדוֹשׁ וּלְמַעַן תּוֹרָתְךָ הַקְּדוֹשָׁה, עַל כֵּן עֲנֵנִי יְהֹוָה עֲנֵנִי בַּעֲבוּר הָאָבוֹת הַקְּדוֹשִׁים אַבְרָהָם יִצְחָק וְיַעֲקֹב, וּבִגְלָלָם תּושִׁיעַ בָּנִים לִהְיוֹת הָעֲנָפִים דּוֹמִים לְשָׁרְשָׁם וּבַעֲבוּר דָּוִד עַבְדְּךָ רֶגֶל רְבִיעִי בַּמֶּרְכָּבָה, הַמְשׁוֹרֵר בְּרוּחַ קָדְשֶׁךָ:`]},{heading:`שִׁיר הַמַּעֲלוֹת · תְּהִלִּים קכ״ח`,verses:[`שִׁ֗יר הַֽמַּ֫עֲל֥וֹת אַ֭שְׁרֵי כׇּל־יְרֵ֣א יְהֹוָ֑ה הַ֝הֹלֵ֗ךְ בִּדְרָכָֽיו׃`,`יְגִ֣יעַ כַּ֭פֶּיךָ כִּ֣י תֹאכֵ֑ל אַ֝שְׁרֶ֗יךָ וְט֣וֹב לָֽךְ׃`,`אֶשְׁתְּךָ֤&thinsp;<b>׀</b> כְּגֶ֥פֶן פֹּרִיָּה֮ בְּיַרְכְּתֵ֢י בֵ֫יתֶ֥ךָ בָּ֭נֶיךָ כִּשְׁתִלֵ֣י זֵיתִ֑ים סָ֝בִ֗יב לְשֻׁלְחָנֶֽךָ׃`,`הִנֵּ֣ה כִי־כֵ֭ן יְבֹ֥רַךְ גָּ֗בֶר יְרֵ֣א יְהֹוָֽה׃`,`יְבָרֶכְךָ֥ יְהֹוָ֗ה מִצִּ֫יּ֥וֹן וּ֭רְאֵה בְּט֣וּב יְרוּשָׁלָ֑͏ִם כֹּ֝֗ל יְמֵ֣י חַיֶּֽיךָ׃`,`וּרְאֵֽה־בָנִ֥ים לְבָנֶ֑יךָ שָׁ֝ל֗וֹם עַל־יִשְׂרָאֵֽל׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0},{heading:`אָנָּא ה׳ שׁוֹמֵעַ תְּפִלָּה · חֲתִימָה`,verses:[`<b>אָנָא</b> יְהֹוָה שׁוֹמֵעַ תְּפִלָּה יְקֻיַּם בָּנוּ הַפָּסוּק וַאֲנִי זֹאת בְּרִיתִי אוֹתָם אָמַר יְהֹוָה רוּחִי אֲשֶׁר עָלֶיךָ וּדְבָרַי אֲשֶׁר שַׂמְתִּי בְּפִיךָ לֹא יָמוּשׁוּ מִפִּיךָ וּמִפִּי זַרְעֲךָ וּמִפִּי זֶרַע זַרְעֲךָ אָמַר יְהֹוָה מֵעַתָּה וְעַד עוֹלָם:`,`<b>יִהְיוּ</b> לְרָצוֹן אִמְרֵי פִי וְהֶגְיוֹן לִבִּי לְפָנֶיךָ יְהֹוָה צוּרִי וְגוֹאֲלִי:`]}]},"nishmat-kol-chai":{id:`nishmat-kol-chai`,title:`נִשְׁמַת כָּל חַי`,subtitle:`שֶׁבַח וְהוֹדָיָה · סְגֻלָּה לִישׁוּעָה`,numbered:!1,chapters:[{heading:`נִשְׁמַת כָּל חַי`,verses:[`נִשְׁמַת כָּל־חַי תְּבָרֵךְ אֶת שִׁמְךָ יְהֹוָה אֱלֹהֵֽינוּ, וְרֽוּחַ כָּל־בָּשָׂר תְּפָאֵר וּתְרוֹמֵם זִכְרְךָ מַלְכֵּֽנוּ תָּמִיד, מִן־הָעוֹלָם וְעַד־הָעוֹלָם אַתָּה אֵל. וּמִבַּלְעָדֶֽיךָ אֵין לָֽנוּ מֶֽלֶךְ גּוֹאֵל וּמוֹשִֽׁיעַ, פּוֹדֶה וּמַצִּיל, וְעוֹנֶה וּמְרַחֵם, בְּכָל־עֵת צָרָה וְצוּקָה, אֵין לָֽנוּ מֶֽלֶךְ עוֹזֵר וְסוֹמֵךְ אֶלָּא אָֽתָּה:`]},{heading:`אֱלֹהֵי הָרִאשׁוֹנִים וְהָאַחֲרוֹנִים`,verses:[`<b>אֱלֹהֵי</b> הָרִאשׁוֹנִים וְהָאַחֲרוֹנִים, אֱלֽוֹהַּ כָּל־בְּרִיּוֹת, אֲדוֹן כָּל־תּוֹלָדוֹת, הַמְּהֻלָּל בְּכָל־הַתִּשְׁבָּחוֹת, הַמְּנַהֵג עוֹלָמוֹ בְּחֶֽסֶד, וּבְרִיּוֹתָיו בְּרַחֲמִים. וַיהֹוָה אֱלֹהִים אֱמֶת, לֹא יָנוּם וְלֹא יִישָׁן, הַמְעוֹרֵר יְשֵׁנִים וְהַמֵּקִיץ נִרְדָּמִים, מְחַיֶּה מֵתִים וְרוֹפֵא חוֹלִים, פּוֹקֵחַ עִוְרִים וְזוֹקֵף כְּפוּפִים, הַמֵּשִֽׂיחַ אִלְּמִים וְהַמְפַעֲנֵֽחַ נֶעֱלָמִים, וּלְךָ לְבַדְּךָ אֲנַֽחְנוּ מוֹדִים:`]},{heading:`וְאִלּוּ פִינוּ מָלֵא שִׁירָה`,verses:[`<b>וְאִלּוּ</b> פִֽינוּ מָלֵא שִׁירָה כַיָּם, וּלְשׁוֹנֵֽנוּ רִנָּה כַּהֲמוֹן גַּלָּיו, וְשִׂפְתוֹתֵֽינוּ שֶֽׁבַח כְּמֶרְחֲבֵי רָקִֽיעַ, וְעֵינֵֽינוּ מְאִירוֹת כַּשֶּֽׁמֶשׁ וְכַיָּרֵֽחַ, וְיָדֵֽינוּ פְרוּשׂוֹת כְּנִשְׁרֵי שָׁמָֽיִם, וְרַגְלֵֽינוּ קַלּוֹת כָּאַיָּלוֹת, אֵין אֲנַֽחְנוּ מַסְפִּיקִין לְהוֹדוֹת לְךָ יְהֹוָה אֱלֹהֵֽינוּ, וּלְבָרֵךְ אֶת־שִׁמְךָ מַלְכֵּֽנוּ, עַל־אַחַת מֵאֶֽלֶף אַלְפֵי אֲלָפִים, וְרוֹב רִבֵּי רִבָבוֹת פְּעָמִים, הַטּוֹבוֹת נִסִּים וְנִפְלָאוֹת שֶׁעָשִֽׂיתָ עִמָּֽנוּ וְעִם אֲבוֹתֵֽינוּ. מִלְּפָנִים מִמִּצְרַֽיִם גְּאַלְתָּֽנוּ יְהֹוָה אֱלֹהֵֽינוּ, מִבֵּית עֲבָדִים פְּדִיתָֽנוּ, בְּרָעָב זַנְתָּֽנוּ וּבְשָׂבָע כִּלְכַּלְתָּֽנוּ, מֵחֶֽרֶב הִצַּלְתָּֽנוּ, מִדֶּֽבֶר מִלַּטְתָּֽנוּ, וּמֵחֳלָאִים רָעִים וְרַבִּים דִּלִּיתָֽנוּ. עַד הֵֽנָּה עֲזָרֽוּנוּ רַחֲמֶֽיךָ, וְלֹא עֲזָבֽוּנוּ חֲסָדֶֽיךָ. עַל כֵּן אֵבָרִים שֶׁפִּלַּֽגְתָּ בָּֽנוּ, וְרֽוּחַ וּנְשָׁמָה שֶׁנָּפַֽחְתָּ בְּאַפֵּֽינוּ, וְלָשׁוֹן אֲשֶׁר שַֽׂמְתָּ בְּפִֽינוּ, הֵן הֵם יוֹדוּ וִיבָֽרְכֽוּ וִישַׁבְּחוּ וִיפָאֲרוּ וִישׁוֹרְרוּ אֶת־שִׁמְךָ מַלְכֵּֽנוּ תָּמִיד. כִּי כָל־פֶּה לְךָ יוֹדֶה, וְכָל־לָשׁוֹן לְךָ תְשַׁבֵּֽחַ, וְכָל־עַֽיִן לְךָ תְצַפֶּה, וְכָל־בֶּֽרֶךְ לְךָ תִכְרַע, וְכָל־קוֹמָה לְפָנֶֽיךָ תִשְׁתַּחֲוֶה, וְהַלְּבָבוֹת יִירָאֽוּךָ, וְהַקֶּֽרֶב וְהַכְּלָיוֹת יְזַמְּרוּ לִשְׁמֶֽךָ, כַּדָּבָר שֶׁנֶּאֱמַר כָּ֥ל עַצְמוֹתַ֨י ׀ תֹּאמַרְנָה֮ יְהֹוָ֗ה מִ֥י כָ֫מ֥וֹךָ מַצִּ֣יל עָ֭נִי מֵחָזָ֣ק מִמֶּ֑נּוּ וְעָנִ֥י וְ֝אֶבְי֗וֹן מִגֹּזְלֽוֹ:`]},{heading:`שַׁוְעַת עֲנִיִּים אַתָּה תִשְׁמַע`,verses:[`<b>שַׁוְעַת</b> עֲנִיִּים אַתָּה תִשְׁמַע, צַעֲקַת הַדַּל תַּקְשִׁיב וְתוֹשִֽׁיעַ. וְכָתוּב רַנְּנ֣וּ צַ֭דִּיקִים בַּֽיהֹוָ֑ה לַ֝יְשָׁרִ֗ים נָאוָ֥ה תְהִלָּֽה:`]},{heading:`בְּפִי יְשָׁרִים תִּתְרוֹמָם`,verses:[`בְּפִי <b>יְ</b>שָׁרִים תִּתְ<b>ר</b>וֹמָם,`,`וּבְשִׂפְתֵי <b>צַ</b>דִּיקִים תִּתְ<b>בָּ</b>רַךְ,`,`וּבִלְשׁוֹן <b>חֲ</b>סִידִים תִּתְ<b>קַ</b>דָּשׁ,`,`וּבְקֶֽרֶב <b>קְ</b>דוֹשִׁים תִּתְ<b>הַ</b>לָּל,`,`<b>בְּמִקְהֲלוֹת</b> רִבְבוֹת עַמְּךָ בֵּית יִשְׂרָאֵל, שֶׁכֵּן חוֹבַת כָּל־הַיְצוּרִים לְפָנֶֽיךָ יְהֹוָה אֱלֹהֵֽינוּ וֵאלֹהֵי אֲבוֹתֵֽינוּ, לְהוֹדוֹת, לְהַלֵּל, לְשַׁבֵּֽחַ, לְפָאֵר, לְרוֹמֵם, לְהַדֵּר וּלְנַצֵּֽחַ, עַל כָּל־דִּבְרֵי שִׁירוֹת וְתִשְׁבְּחוֹת דָּוִד בֶּן־יִשַׁי עַבְדְּךָ מְשִׁיחֶֽךָ. וּבְכֵן`]},{heading:`יִשְׁתַּבַּח שִׁמְךָ לָעַד`,verses:[`<b>יִשְׁתַּבַּח</b> שִׁמְךָ לָעַד מַלְכֵּֽנוּ, הָאֵל הַמֶּֽלֶךְ הַגָּדוֹל וְהַקָּדוֹשׁ, בַּשָּׁמַֽיִם וּבָאָֽרֶץ. כִּי לְךָ נָאֶה יְהֹוָה אֱלֹהֵֽינוּ וֵאלֹהֵי אֲבוֹתֵֽינוּ לְעוֹלָם וָעֶד. <small>א</small> שִׁיר, <small>ב</small> וּשְׁבָחָה, <small>ג</small> הַלֵּל, <small>ד</small> וְזִמְרָה, <small>ה</small> עֹז, <small>ו</small> וּמֶמְשָׁלָה, <small>ז</small> נֶֽצַח, <small>ח</small> גְּדֻלָּה, <small>ט</small> גְּבוּרָה, <small>י</small> תְּהִלָּה, <small>יא</small> וְתִפְאֶֽרֶת, <small>יב</small> קְדֻשָּׁה, <small>יג</small> וּמַלְכוּת. בְּרָכוֹת וְהוֹדָאוֹת, לְשִׁמְךָ הַגָּדוֹל וְהַקָּדוֹשׁ, וּמֵעוֹלָם וְעַד עוֹלָם אַתָּה אֵל. בָּרוּךְ אַתָּה יְהֹוָה, מֶֽלֶךְ גָּדוֹל וּמְהֻלָּל בַּתִּשְׁבָּחוֹת, אֵל הַהוֹדָאוֹת, אֲדוֹן הַנִּפְלָאוֹת, בּוֹרֵא כָּל־הַנְּשָׁמוֹת, רִבּוֹן כָּל־הַמַּעֲשִׂים, הַבּוֹחֵר בְּשִׁירֵי זִמְרָה, מֶֽלֶךְ אֵל חַי הָעוֹלָמִים, אָמֵן:`]}]},"birkot-hashachar":{id:`birkot-hashachar`,title:`בִּרְכוֹת הַשַּׁחַר`,subtitle:`הוֹדָאַת הַבֹּקֶר · נֻסַּח עֵדוֹת הַמִּזְרָח`,numbered:!1,chapters:[{heading:`מוֹדֶה אֲנִי`,verses:[`<b>מוֹדֶה</b> אֲנִי לְפָנֶיךָ מֶלֶךְ חַי וְקַיָּם שֶהֶחֱזַרְתָּ בִּי נִשְׁמָתִי בְחֶמְלָה, רַבָּה אֱמוּנָתֶךָ:`]},{heading:`עַל נְטִילַת יָדַיִם וַאֲשֶׁר יָצַר`,verses:[`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, אֲשֶׁר קִדְּשָׁנוּ בְּמִצְוֹתָיו וְצִוָּנוּ עַל נְטִילַת יָדָיִם:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, אֲשֶׁר יָצַר אֶת הָאָדָם בְּחָכְמָה, וּבָרָא בוֹ נְקָבִים נְקָבִים, חֲלוּלִים חֲלוּלִים, גָּלוּי וְיָדוּעַ לִפְנֵי כִסֵּא כְבוֹדֶךָ, שֶׁאִם יִסָּתֵם אֶחָד מֵהֶם, אוֹ אִם יִפָּתֵח אֶחָד מֵהֶם, אֵי אֶפְשָׁר לְהִתְקַיֵּם אַפִלּוּ שָׁעָה אֶחָת. בָּרוּךְ אַתָּה יְהֹוָה, רוֹפֵא כָל־בָּשָׂר וּמַפְלִיא לַעֲשׂוֹת:`]},{heading:`אֱלֹהַי נְשָׁמָה`,verses:[`<b>אֱלֹהַי</b>, נְשָׁמָה שֶׁנָּתַתָּ בִּי טְהוֹרָה, אַתָּה בְרָאתָהּ, אַתָּה יְצַרְתָּהּ, אַתָּה נְפַחְתָּהּ בִּי, וְאַתָּה מְשַׁמְּרָהּ בְּקִרְבִּי, וְאַתָּה עָתִיד לִטְּלָהּ מִמֶּנִּי, וּלְהַחֲזִירָהּ בִּי לֶעָתִיד לָבוֹא, כָּל־זְמַן שֶׁהַנְּשָׁמָה בְקִרְבִּי, מוֹדֶה <small>( מוֹדָה)</small> אֲנִי לְפָנֶיךָ יְהֹוָה אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי, רִבּוֹן כָּל־הַמַּעֲשִׂים אֲדוֹן כָּל־הַנְּשָׁמוֹת. בָּרוּךְ אַתָּה יְהֹוָה, הַמַּחֲזִיר נְשָׁמוֹת לִפְגָרִים מֵתִים:`]},{heading:`בִּרְכוֹת הַשַּׁחַר`,verses:[`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, הַנוֹתֵן לַשֶּׂכְוִי בִינָה, לְהַבְחִין בֵּין יוֹם וּבֵין לָיְלָה:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, פּוֹקֵחַ עִוְרִים:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, מַתִּיר אֲסוּרִים:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, זוֹקֵף כְּפוּפִים:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, מַלְבִּישׁ עֲרֻמִּים:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, הַנּוֹתֵן לַיָּעֵף כֹּחַ:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, רוֹקַע הָאָרֶץ עַל הַמָּיִם:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, הַמֵּכִין מִצְעֲדֵי גָבֶר:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, שֶׁעָשָׂה לִי כָּל־צָרְכִּי:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, אוֹזֵר יִשְׂרָאֵל בִּגְבוּרָה:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, עוֹטֵר יִשְׂרָאֵל בְּתִפְאָרָה:`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, שֶׁלֹּא עָשַׂנִי גוֹי: <small>האשה אומרת: <b>גּוֹיָה</b></small>`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, שֶׁלֹּא עָשַׂנִי עָבֶד: <small>האשה אומרת: <b>שִׁפְחָה</b></small>`,`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, שֶׁלֹּא עָשַׂנִי אִשָּׁה:`,`<b>בָּרוּךְ</b> שֶׁעָשַׂנִי כִּרְצוֹנוֹ:`]},{heading:`הַמַּעֲבִיר חֶבְלֵי שֵׁנָה · יְהִי רָצוֹן`,verses:[`<b>בָּרוּךְ</b> אַתָּה יְהוָֹה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, הַמַּעֲבִיר חֶבְלֵי שֵׁנָה מֵעֵינָי וּתְנוּמָה מֵעַפְעַפָּי. וִיהִי רָצוֹן מִלְפָנֶיךָ יְהֹוָה, אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי, שֶׁתַרְגִּילֵנִי בְּתוֹרָתֶךָ, וְתַדְבִּיקֵנִי בְּמִצְוֹתֶיךָ, וְאַל תְּבִיאֵנִי לִידֵי חֵטְא, וְלֹא לִידֵי עָוֹן, וְלֹא לִידֵי נִסָיוֹן, וְלֹא לִידֵי בִזָּיוֹן, וְתַרְחִיקֵנִי מִיֵּצֶר הָרָע, וְתַדְבִּיקֵנִי בְּיֵצֶר הַטּוֹב, וְכוֹף אֶת־יִצְרִי לְהִשְׁתַּעְבֶּד לָּךְ, וּתְנֵנִי הַיּוֹם וּבְכָל־יוֹם לְחֵן וּלְחֶסֶד וּלְרַחֲמִים בְּעֵינֶיךָ וּבְעֵינֵי כָל־רוֹאַי, וְגָמְלֵנִי חֲסָדִים טוֹבִים. בָּרוּךְ אַתָּה יְהֹוָה, גּוֹמֵל חֲסָדִים טוֹבִים לְעַמּוֹ יִשְׂרָאֵל:`,`<b>יְהִי</b> רָצוֹן מִלְּפָנֶיךָ יְהֹוָה, אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי, שֶׁתַּצִּילֵנִי הַיּוֹם וּבְכָל יוֹם וָיוֹם, מֵעַזֵּי פָנִים, וּמֵעַזּוּת פָּנִים, מֵאָדָם רָע, מִיֵּצֶר רָע, מֵחָבֵר רָע, מִשָּׁכֵן רָע, מִפֶּגַע רָע, מֵעַיִן הָרָע, וּמִלָּשׁוֹן הָרָע, מִדִּין קָשֶׁה, וּמִבַּעַל דִּין קָשֶׁה, בֵּין שֶׁהוּא בֶן־בְּרִית, וּבֵין שֶׁאֵינוֹ בֶן־בְּרִית:`]},{heading:`בִּרְכוֹת הַתּוֹרָה`,verses:[`<b>בָּרוּךְ</b> אַתָּה יְהֹוָה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, אֲשֶׁר קִדְּשָׁנוּ בְּמִצְוֹתָיו וְצִוָּנוּ עַל דִּבְרֵי תוֹרָה:`,`<b>וְהַעֲרֵב</b> נָא, יְהֹוָה אֱלֹהֵֽינוּ, אֶת־דִּבְרֵי תוֹרָתְךָ בְּפִינוּ וּבְפִיפִיּוֹת עַמְּךָ בֵּית יִשְׂרָאֵל, וְנִהְיֶה אֲנַחְנוּ וְצֶאֱצָאֵינוּ, וְצֶאֱצָאֵי צֶאֱצָאֵינוּ, כֻּלָּנוּ יוֹדְעֵי שְׁמֶךָ, וְלוֹמְדֵי תוֹרָתְךָ לִשְׁמָהּ. בָּרוּךְ אַתָּה יְהֹוָה, הַמְלַמֵּד תּוֹרָה לְעַמּוֹ יִשְׂרָאֵל:`,`<b>בָּרוּךְ</b> אַתָּה יְהֹוָה, אֱלֹהֵֽינוּ מֶֽלֶךְ הָעוֹלָם, אֲשֶׁר בָּחַר בָּנוּ מִכָּל־הָעַמִּים וְנָתַן לָנוּ אֶת־תּוֹרָתוֹ. בָּרוּךְ אַתָּה יְהֹוָה נוֹתֵן הַתּוֹרָה:`]},{heading:`בִּרְכַּת כֹּהֲנִים`,verses:[`<b>וַיְדַבֵּ֥ר</b> יְהֹוָ֖ה אֶל־מֹשֶׁ֥ה לֵּאמֹֽר׃ דַּבֵּ֤ר אֶֽל־אַהֲרֹן֙ וְאֶל־בָּנָ֣יו לֵאמֹ֔ר כֹּ֥ה תְבָרְכ֖וּ אֶת־בְּנֵ֣י יִשְׂרָאֵ֑ל אָמ֖וֹר לָהֶֽם׃ יְבָרֶכְךָ֥ יְהֹוָ֖ה וְיִשְׁמְרֶֽךָ׃ יָאֵ֨ר יְהֹוָ֧ה ׀ פָּנָ֛יו אֵלֶ֖יךָ וִֽיחֻנֶּֽךָּ׃ יִשָּׂ֨א יְהֹוָ֤ה ׀ פָּנָיו֙ אֵלֶ֔יךָ וְיָשֵׂ֥ם לְךָ֖ שָׁלֽוֹם׃ וְשָׂמ֥וּ אֶת־שְׁמִ֖י עַל־בְּנֵ֣י יִשְׂרָאֵ֑ל וַאֲנִ֖י אֲבָרְכֵֽם׃`],numbered:!0}]},"bereishit-taman":{id:`bereishit-taman`,title:`בְּרֵאשִׁית תַּמָּן`,subtitle:`תִּיקּוּן מ״ח מִתִּקּוּנֵי הַזֹּהַר`,numbered:!1,chapters:[{heading:`וִיהִי נֹעַם`,verses:[`וִיהִ֤י&thinsp;<b>׀</b> נֹ֤עַם אֲדֹנָ֥י אֱלֹהֵ֗ינוּ עָ֫לֵ֥ינוּ וּמַעֲשֵׂ֣ה יָ֭דֵינוּ כּוֹנְנָ֥ה עָלֵ֑ינוּ וּֽמַעֲשֵׂ֥ה יָ֝דֵ֗ינוּ כּוֹנְנֵֽהוּ׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`]},{heading:`בְּרֵאשִׁית תַּמָּן · תִּיקּוּן מ״ח`,verses:[`בְּרֵאשִׁית תַּמָּן תְּרֵ״י תַּמָּן שַׁבָּ״ת, כְּגַוְונָא דָא בְּ' רֵאשִׁי״ת בָּ״רָא שִׁי״ת, וְאִינוּן תְּרֵי שַׁבָּתוֹת, עֲלַיְיהוּ אִתְּמַר 'וְשָׁמְרוּ בְנֵי יִשְׂרָאֵל אֶת הַשַּׁבָּת לַעֲשׂוֹת אֶת הַשַּׁבָּת' וְגוֹמֵר, תְּרֵין זִמְנִין אַדְכִּיר הָכָא שַׁבָּת, לָקֳבֵל שְׁכִינְתָּא עִלָּאָה וְתַתָּאָה; 'לְדֹרֹתָם', מַאי לְדֹרֹתָם, אֶלָּא זַכָּאָה אִיהוּ מָאן דְּעָבִיד לוֹן דִּירָה בְּשַׁבָּת בִּתְרֵי בָתֵּי לִבָּא, וְאִתְפְּנֵי מִתַּמָּן יֵצֶר הָרָע דְּאִיהוּ חִלּוּל שַׁבָּת, בְּרִית עוֹלָם דָּא צַדִּיק, דְּשַׁרְיָין תַּרְוַיְיהוּ עֲלֵיהּ, חַד לְאַמְלָאָה לֵיהּ וְחַד לְאִתְמַלְיָא מִינֵיהּ.`,`'בְּנֵי יִשְׂרָאֵל' אִינוּן תְּרֵין כֻּלְיָין נֶצַח וָהוֹד, בְּנוֹי דְּיִשְׂרָאֵל סָבָא עַמּוּדָא דְאֶמְצָעִיתָא, תְּלַת 'שְׁבִיעִי' 'שְׁבִיעִי' 'שְׁבִיעִי' אִלֵּין תְּלַת אֲבָהָן, עֹנֶג שַׁבָּת 'וְנָ״הָר יוֹצֵא מֵעֵדֶ״ן לְהַשְׁקוֹת אֶת הַגָּ״ן', 'וְנָהָר', אִית נָהָר וְאִית נָהָר, אִית נָהָר דְּאִתְקְרֵי נָהָר פְּלָגָיו, וְאִית נָהָר דְּאִתְקְרֵי נַחַל קְדוּמִים, עֵדֶן עִלָּאָה עֲלֵיהּ אִתְּמַר 'עַיִן לֹא רָאֲתָה אלהי״ם זוּלָתֶךָ', הַאי נָהָר אִיהוּ ו', דְּנָפִיק מֵעֵדֶן עִלָּאָה דְאִיהוּ א', וְאַעֲבַר בֵּין אַבָּא וְאִימָּא, וְאָזִיל חֲמֵשׁ מֵאוֹת שָׁנָה, וּמָטֵי עַד צַדִּיק שְׁבִיעִי, וּמִתַּמָּן אַשְׁקֵי לְגִנְּתָא דְאִיהִי שְׁכִינְתָּא תַּתָּאָה.`,`זַכָּאָה אִיהוּ מָאן דְּנָטִיר דִּירָה לְשַׁבָּת דְּאִיהוּ לִבָּא, דְלָא אִתְקְרִיב תַּמָּן עֲצִיבוּ דִטְחוֹל, וְכַעַס דְּמָרָה דְאִיהוּ נוּרָא דְגֵיהִנָּם, דַּעֲלָהּ אִתְּמַר 'לֹא תְבַעֲרוּ אֵשׁ בְּכֹל מוֹשְׁבוֹתֵיכֶם בְּיוֹם הַשַּׁבָּת', וְהָכִי הוּא וַדַּאי דְּכָל מָאן דְּכָעִיס כְּאִלּוּ אוֹקִיד נוּרָא דְגֵיהִנָּם, אַרְבָּעִים מְלָאכוֹת חָסֵר חַד אִינוּן לָקֳבֵל אַרְבָּעִים מַלְקִיּוֹת חָסֵר חַד בְּשַׁבָּת, וְאִינוּן עֲשָׂרָה דְלָקָה אָדָם וַעֲשָׂרָה לְחַוָּה וַעֲשָׂרָה לְנָחָשׁ וְתִשְׁעָה לְאַרְעָא, וּבְגִין דָּא אָמְרוּ מָארֵי מַתְנִיתִין 'אֵין לוֹקִין בְּשַׁבָּת', דְּאִלֵּין מְלָאכוֹת אִינוּן חֲשִׁיבִין לְיִשְׂרָאֵל לָקֳבֵל מַלְקִיּוֹת.`,`'יְצִיאוֹת הַשַּׁבָּת שְׁתַּיִם', אִינוּן עֲקִירָה וְהַנָּחָה, דְעָבִיד לוֹן בְּבַת אַחַת, מָאן דְּאַעֲקַר חֵפֶץ מֵאַתְרֵיהּ וְאַנַּח לֵיהּ לְבַר מֵאַתְרֵיהּ וּמֵרְשׁוּתֵיהּ, כְּאִלּוּ אַעֲקַר אִילָנָא דְחַיֵּי דְּאִיהוּ אוֹת בְּרִית, וְאַנַּח לֵיהּ בִּרְשׁוּ נוּכְרָאָה, מָאן דְּעָבִיד דָּא גָרִים דְּאִעֲקַר נִשְׁמָתֵיהּ מֵרְשׁוּת דִּילָהּ, וְאַנַּח לָהּ בִּרְשׁוּ אָחֳרָא דְאִיהִי מָרָה וּטְחוֹל, וְדָא גָרַם לְיִשְׂרָאֵל דְּאִתְעַקְרוּ מֵאַרְעָא דְיִשְׂרָאֵל, וְאִתְגַּלִּיאוּ בְּאַרְעָא נוּכְרָאָה דְאִיהִי רְשׁוּת הָרַבִּים, וְהָכִי אִיהוּ מָאן דְּאַעִיל אוֹת בְּרִית קֹדֶשׁ דִּילֵיהּ בִּרְשׁוּ נוּכְרָאָה, שַׁבְּתַא״י אִיהוּ טְחוֹל, חַמָּ״ה אִתְּתָא בִּישָׁא מָרָה, שַׁבְּתַא״י עֲלֵיהּ אִתְּמַר 'וְהַבּוֹר רֵק אֵין בּוֹ מָיִם', 'מַיִם אֵין בּוֹ אֲבָל נְחָשִׁים וְעַקְרַבִּים יֶשׁ בּוֹ', וְאִיהוּ רָעָב וְצִמָּאוֹן וְקִינָה וְהֶסְפֵּד וַחֲשׁוֹכָא וְקִבְלָא, וְאִיהִי גָלוּתָא לְיִשְׂרָאֵל. וּצְרִיכִין יִשְׂרָאֵל לְמֶעֱבַד לָהּ שִׁנּוּי בְּכֹלָּא וְהָא אוּקְמוּהָ, וְאִיהוּ דִבּוּר דְּחוֹל דְּאִיהוּ אָסוּר בְּשַׁבָּת, וְכַד לָא אַשְׁכַּחַת אֲתַר לְשַׁרְיָא תַּמָּן, אִיהִי בָרְחַת, כְּגַוְונָא דְשִׁפְחָה דְאַבְרָהָם דְּאִתְּמַר בָּהּ 'מִפְּנֵי שָׂרַי גְּבִרְתִּי אָנֹכִי בֹּרַחַת'.`,`טְחוֹל עֲלָהּ אִתְּמַר 'שַׁל נְעָלֶיךָ מֵעַל רַגְלֶיךָ', נַעַל מְטוּנָף דְּטִפָּה סְרוּחָה; 'כִּי הַמָּקוֹם אֲשֶׁר אַתָּה עוֹמֵד עָלָיו אַדְמַת קֹדֶשׁ הוּא', דָא שַׁבָּת, וַעֲלֵיהּ אָמְרַת שְׁכִינְתָּא 'פָּשַׁטְתִּי אֶת כֻּתָּנְתִּי אֵיכָכָה אֶלְבָּשֶׁנָּה, רָחַצְתִּי אֶת רַגְלַי אֵיכָכָה אֲטַנְּפֵם', וּבְגִין דָּא צָרִיךְ בַּר נַשׁ בְּשַׁבָּת לְשַׁנּוּיֵי בִּלְבוּשִׁין בִּשְׁרַגָּא בְּמַאֲכָלִין, וְצָרִיךְ לְמֶהֱוֵי מוֹסִיף מֵחוֹל עַל הַקֹּדֶשׁ, וְכָל הַמּוֹסִיף מוֹסִיפִין לֵיהּ נֶפֶשׁ יְתֵירָה בְּשַׁבָּת, וְכָל הַגּוֹרֵעַ גּוֹרְעִין לֵיהּ הַהִיא נֶפֶשׁ יְתֵירָה חַס וְשָׁלוֹם.`]}]},"petach-eliyahu":{id:`petach-eliyahu`,title:`פֶּתַח אֵלִיָּהוּ`,subtitle:`מִתִּקּוּנֵי הַזֹּהַר · קֹדֶם הַתְּפִלָּה`,numbered:!1,chapters:[{heading:`פָּתַח אֵלִיָּהוּ · אַנְתְּ הוּא חַד`,verses:[`פָּתַח אֵלִיָּהוּ הַנָּבִיא זָכוּר לְטוֹב וְאָמַר: רִבּון עָלְמִין דְּאַנְתְּ הוּא חָד וְלָא בְּחֻשְׁבָּן, אַנְתְּ הוּא עִלָּאָה עַל כָּל עִלָּאִין סְתִימָא עַל כָּל סְתִימִין, לֵית מַחֲשָׁבָה תְּפִיסָא בָּךְ כְּלָל; אַנְתְּ הוּא דְּאַפַּקְתְּ עֶשֶׂר תִּקּוּנִין וְקָרֵינָן לוֹן עֶשֶׂר סְפִירָן, לְאַנְהָגָא בְהוֹן עָלְמִין סְתִימִין דְּלָא אִתְגַּלְיָן וְעָלְמִין דְּאִתְגַּלְיָן, וּבְהוֹן אִתְכַּסִּיאַת מִבְּנֵי נָשָׁא. וְאַנְתְּ הוּא דְקָשִׁיר לוֹן וּמְיַחֵד לוֹן. וּבְגִין דְּאַנְתְּ מִלְּגָאו כָּל מָאן דְּאַפְרִישׁ חַד מִן חַבְרֵיהּ מֵאִלֵּין עֶשֶׂר אִתְחַשִׁיב לֵיהּ כְּאִלּוּ אַפְרִישׁ בָּךְ. וְאִלֵּין עֶשֶׂר סְפִירָן אִנּוּן אַזְלִין כְּסִדְרָן חַד אָרִיךְ וְחָד קָצֵר וְחַד בֵּינונִי. וְאַנְתְּ הוּא דְּאַנְהִיג לוֹן. וְלֵית מָאן דְּאַנְהִיג לָךְ לָא לְעֵילָּא וְלָא לְתַתָּא וְלָא מִכָּל סִטְרָא. לְבוּשִׁין תַּקַּנְתְּ לוֹן דְּמִנַּיְהוּ פַרְחִין נִשְׁמָתִין לִבְנֵי נָשָׁא. וְכַמָּה גוּפִין תַּקַּנְתְּ לוֹן דְּאִתְקְרִיאוּ גוּפָא לְגַבֵּי לְבוּשִׁין דִּמְכַסְיָן עֲלֵיהוֹן וְאִתְקְרִיאוּ בְּתִקּוּנָא דָא. חֶסֶד דְּרוֹעָא יְמִינָא. גְּבוּרָה דְרוֹעָא שְׂמָאלָא. תִּפְאֶרֶת גּוּפָא. נֶצַח וְהוֹד תְּרֵין שׁוֹקִין. יְסוֹד סִיּוּמָא דְּגוּפָא אוֹת בְּרִית קֹדֶשׁ. מַלְכוּת פֶּה תּוֹרָה שֶׁבְּעַל פֶּה קָרֵינָן לָהּ. חָכְמָה מוֹחָא אִיהִי מַחֲשָׁבָה מִלְּגָאו. בִּינָה לִבָּא וּבָהּ הַלֵּב מֵבִין. וְעַל אִלֵּין תְּרֵין כְּתִיב הַנִּסְתָּרוֹת לה' אֱלהֵינוּ. כֶּתֶר עֶלְיון אִיהוּ כֶּתֶר מַלְכוּת. וְעָלֵיהּ אִתְמַר מַגִּיד מֵרֵאשִׁית אַחֲרִית. וְאִיהוּ קַרְקַפְתָּא דִתְפִלֵּי. מִלְּגָאו אִיהוּ אוֹת יו״ד אוֹת הֵ״א אוֹת וָא״ו וְאוֹת הֵ״א דְּאִיהוּ אֹרַח אֲצִילוּת. אִיהוּ שַׁקְיוּ דְּאִילָנָא בִּדְרוֹעוֹי וְעַנְפּוֹי. כְּמַיָּא דְאַשְׁקֵי לְאִילָנָא וְאִתְרַבֵּי בְּהַהוּא שַׁקְיוּ:`]},{heading:`רִבּוֹן עָלְמִין · עִלַּת הָעִלּוֹת`,verses:[`רִבּוֹן עָלְמִין אַנְתְּ הוּא עִלַּת הָעִלּוֹת וְסִבַּת הַסִּבּוֹת דְאַשְׁקֵי לְאִילָנָא בְּהַהוּא נְבִיעוּ. וְהַהוּא נְבִיעוּ אִיהוּ כְּנִשְׁמְתָא לְגוּפָא דְּאִיהוּ חַיִּים לְגוּפָא. וּבָךְ לֵית דִּמְיוֹן וְלֵית דִּיּוּקְנָא (דְּגוּפָא) מִכָּל מַה דִלְגָאו וּלְבַר. וּבָרָאתָ שְׁמַיָּא וְאַרְעָא. וְאַפַּקְתְּ מִנְּהוֹן שִׁמְשָׁא וְסִיהֲרָא וְכוֹכְבַיָּא וּמַזָּלֵי. וּבְאַרְעָא אִילָנִין וּדְשָׁאִין וְגִנְּתָא דְעֵדֶן וְעִשְׂבִּין וְחֵיוָן וְעוֹפִין וְנוּנִין וּבְעִירִין וּבְנֵי נָשָׁא. לְאִשְׁתְּמוֹדְעָא בְּהוֹן עִלָּאִין וְאֵיךְ יִתְנַהֲגוּן בְּהוֹן עִלָּאִין וְתַתָּאִין. וְאֵיךְ אִשְׁתְּמוֹדְעָן מֵעִלָּאֵי וְתַתָּאֵי וְלֵית דְּיָדַע בָּךְ כְּלָל. וּבַר מִנָּךְ לֵית יִחוּדָא בְּעִלָּאֵי וְתַתָּאֵי. וְאַנְתְּ אִשְׁתְּמוֹדָע אָדוֹן עַל כּלָּא. וְכָל סְפִירָן כָּל חַד אִית לֵיהּ שֵׁם יְדִיעַ. וּבְהוֹן אִתְקְרִיאוּ מַלְאָכַיָּא. וְאַנְתְּ לֵית לָךְ שֵׁם יְדִיעַ דְּאַנְתְּ הוּא מְמַלֵּא כָּל שְׁמָהָן וְאַנְתְּ הוּא שְׁלִימוּ דְּכֻלְהוּ. וְכַד אַנְתְּ תִּסְתַּלָּק מִנְּהוֹן. אִשְׁתְּאָרוּ כֻּלְּהוּ שְׁמָהָן כְּגוּפָא בְלָא נִשְׁמָתָא. אַנְתְּ חַכִּים וְלָאו בְּחָכְמָה יְדִיעָא. אַנְתְּ הוּא מֵבִין וְלָאו מִבִּינָה יְדִיעָא. לֵית לָךְ אֲתָר יְדִיעָא. אֶלָּא לְאִשְׁתְּמוֹדְעָא תֻּקְפָךְ וְחֵילָךְ לִבְנֵי נָשָׁא. וּלְאַחְזָאָה לוֹן אֵיךְ אִתְנְהִיג עָלְמָא בְדִינָא.`]},{heading:`דִּין, מִשְׁפָּט, צֶדֶק · חֲתִימָה`,verses:[`וּבְרַחֲמֵי דְאִינוּן צֶדֶק וּמִשְׁפָּט כְּפוּם עוֹבָדֵיהוֹן דִּבְנֵי נָשָׁא. דִּין אִיהוּ גְבוּרָה. מִשְׁפָּט עַמּוּדָא דְאֶמְצָעִיתָא. צֶדֶק מַלְכוּתָא קַדִּישָׁא מאֹזְנֵי צֶדֶק תְּרֵין סַמְכֵי קְשׁוט. הִין צֶדֶק אוֹת בְּרִית. כּלָּא לְאַחְזָאָה אֵיךְ אִתְנְהִיג עָלְמָא. אֲבָל לָאו דְּאִית לָךְ צֶדֶק יְדִיעָא דְּאִיהוּ דִין. וְלָאו מִשְׁפָּט יְדִיעָא דְאִיהוּ רַחֲמֵי. וְלָאו מִכָּל אִלֵּין מִדּוֹת כְּלָל. קוּם רִבִּי שִׁמְעוֹן וְיִתְחַדְּשׁוּן מִלִּין עַל יְדָךְ. דְהָא רְשׁוּתָא אִית לָךְ לְגַלָּאָה רָזִין טְמִירִין עַל יְדָךְ מַה דְלָא אִתְיְהִיב רְשׁוּ לְגַלָּאָה לְשׁוּם בַּר נָשׁ עַד כְּעָן.`]}]},"arimat-yedai":{id:`arimat-yedai`,title:`אֲרִימִית יְדָאי בִּצְלוֹתִין`,subtitle:`מַאֲמַר רַשְׁבִּ״י · כֹּחַ הַתְּפִלָּה`,numbered:!1,chapters:[{heading:`מַאֲמַר רַבִּי שִׁמְעוֹן`,verses:[`<b>אָמַר</b> רִבִּי שִׁמְעוֹן: אֲרִימִית יְדָאי בִּצְלוֹתִין לְעֵֽלָא, דְּכַד רְעוּתָא עִלָּאָה לְעֵֽלָא לְעֵֽלָא קַיְמָא עַל הַהוּא רְעוּתָא דְּלָא אִתְיְדַע וְלָא אִתְפַס כְּלָל לְעָֽלְמִֽין, רֵישָׁא דְסָתִים יַתִּיר לְעֵֽלָא, וְהַהוּא רֵישָׁא אַפִּיק מָאי דְּאַפִּיק וְלָא יְדִֽיעַ, וְנָהִיר מָאי דְּנָהִיר כֹּֽלָּא בִּסְתִֽימוּ, רְעוּ דְּמַחֲשָׁבָה עִלָּאָה לְמִרְדַּף אֲבַּתְרֵיהּ וּלְאִתְנַהֲרָא מִנֵּיהּ. חָד פְּרִֽיסוּ אִתְפְּרִיס, וּמִגּוֹ הַהוּא פְרִיסָא בִּרְדִיפוּ דְּהַהִיא מַחֲשָׁבָה עִלָּאָה מָטֵי וְלָא מָטֵי, עַד הַהוּא פְרִיסָא נָהִיר מָאי דְּנָהִיר, וּכְדֵין הַהוּא מַחֲשָׁבָה עִלָּאָה נָהִיר בִּנְהִירוּ סָתִים דְּלָא יְדִֽיעַ, וְהַהוּא מַחֲשָׁבָה לָא יָדַע, כְּדֵין בָּטַשׁ הַאי נְהִֽירוּ דְמַחֲשָׁבָה דְּלָא אִתְיְדַע בִּנְהִֽירוּ דְפַרְסָא דְּקָיְמָא דְּנָהִיר מִמָּה דְלָא יְדִֽיעַ וְלָא אִתְיְדַע וְלָא אִתְגַּלְיָא, וּכְדֵין דָּא נְהִֽירוּ דְמַחֲשָׁבָה דְּלָא אִתְיְדַע בָּטַשׁ בִּנְהִֽירוּ דִפְרִסָא וְנַהֲרִין כַּחֲדָא, וְאִתְעֲבִֽידוּ תִּשְׁעָה הֵיכָלִין. וְהֵיכָלִין לָאו אִנּוּן נְהוֹרִין, וְלָאו אִנּוּן רוּחִין, וְלָאו אִנּוּן נִשְׁמָתִין, וְלָא אִית מָאן דְּקַיְמָא בְהוּ. רְעוּתָא דְכָל־תִּשְׁעָה נְהוֹרִין דְּקַיְמֵי כֻלְּהוּ בְּמַחֲשָׁבָה, דְּאִֽיהוּ חָד מִנַּֽיְהוּ בְּחוּשְׁבָּנָא, כֻלְּהוּ לְמִרְדַּף בַּתְרַֽיְהוּ, בְּשַׁעְתָּא דְקַיְמֵי בְמַחֲשָׁבָה וְלָא מִתְדַּבְּקָן וְלָא אִתְיְדָֽעוּ, וְאִלֵּין לָא קַיְמֵי לָא בִרְעוּתָא וְלָא בְמַחֲשָׁבָה עִלָּאָה תַּפְסִין בָּהּ וְלָא תַּפְסִין, בְּאִלֵּין קַיְמֵי כָּל־רָזֵי דִמְהֵימְנוּתָא. וְכָל־אִנּוּן נְהוֹרִין מֵרָזָא דְמַחֲשָׁבָה עִלָּאָה וּלְתַתָּא, כֻּלְּהוּ אִקְּרוּן אֵין סוֹף. עַד הָכָא מָטוּ נְהוֹרִין, וְלָא מָטוּן וְלָא אִתְיְדָֽעוּ, לָאו הָכָא רְעוּתָא וְלָא מַחֲשָׁבָה כַּד נָהִיר מַחֲשָׁבָה וְלָא אִתְיְדַע מִמָּאן דְּנָהִיר, כְּדֵין אִתְלַבַּשׁ וְאַסְתִּים גּוֹ בִינָה, וְנָהִיר לְמָאן דְּנָהִיר, וְאָעִיל דָּא בְדָא, עַד דְּאִתְכְּלִֽילוּ כֻּלְּהוּ כַּחֲדָא. וּבְרָזָא דְקָרְבָּנָא כַּד סָלִיק, כֹּלָּא אִתְקְשַׁר דָּא בְדָא, וְנָהִיר דָּא בְדָא, כְּדֵין קַיְמֵי כֻלְּהוּ בִּסְלִֽיקוּ וּמַחֲשָׁבָה אִתְעַטָּר בְּאֵין סוֹף. הַהוּא נְהִֽירוּ דְּאִתְנְהִיר מִנֵּיהּ מַחֲשָׁבָה עִלָּאָה (דְּלָא אִתְיְדַע בָּהּ כְּלָל) אִקְּרֵי אֵין סוֹף, דְּמִנֵּיהּ אִשְׁתַּכַּח וְקַיְמָא וְנָהִיר לְמָאן דְּנָהִיר, וְעַל דָּא כֹּֽלָּא קָאִים. זַכָּאָה חוּלָקֵיהוֹן דְּצַדִּיקַיָא בְּעָֽלְמָא דֵין וּבְעָֽלְמָא דְאָתֵי:`]}]},"tefilat-haderech":{id:`tefilat-haderech`,title:`תְּפִלַּת הַדֶּרֶךְ`,subtitle:`תְּפִלַּת הַנּוֹסֵעַ · נֻסַּח עֵדוֹת הַמִּזְרָח`,numbered:!1,chapters:[{heading:`תְּפִלַּת הַדֶּרֶךְ`,verses:[`<b>יְהִי</b> רָצוֹן מִלְּפָנֶֽיךָ יְהֹוָה אֱלֹהֵֽינוּ וֵאלֹהֵי אֲבוֹתֵֽינוּ, שֶׁתּוֹלִיכֵֽנוּ לְשָׁלוֹם, וְתַצְעִידֵֽנוּ לְשָׁלוֹם, וְתִסְמְכֵֽנוּ לְשָׁלוֹם, <small>( וְתַחֲזִירֵֽנוּ לְשָׁלוֹם),</small> וְתַצִּילֵֽנוּ מִכַּף כָּל־אוֹיֵב וְאוֹרֵב בַּדֶּֽרֶךְ, וְתִשְׁלַח בְּרָכָה בְּמַעֲשֵׂה יָדֵֽינוּ, וְתִתְּנֵֽנוּ לְחֵן וּלְחֶֽסֶד וּלְרַחֲמִים בְּעֵינֶֽיךָ וּבְעֵינֵי כָל־רוֹאֵֽינוּ. בָּרוּךְ (אַתָּה יְהֹוָה) שׁוֹמֵֽעַ תְּפִלָּה:`]},{heading:`פְּסוּקֵי שְׁמִירָה לַדֶּרֶךְ`,verses:[`<small><b>וְיַעֲקֹ֖ב</b> הָלַ֣ךְ לְדַרְכּ֑וֹ וַיִּפְגְּעוּ־ב֖וֹ מַלְאֲכֵ֥י אֱלֹהִֽים׃ וַיֹּ֤אמֶר יַעֲקֹב֙ כַּאֲשֶׁ֣ר רָאָ֔ם מַחֲנֵ֥ה אֱלֹהִ֖ים זֶ֑ה וַיִּקְרָ֛א שֵֽׁם־הַמָּק֥וֹם הַה֖וּא מַֽחֲנָֽיִם׃</small>`,`<small><b>וַיִּסָּ֑עוּ</b> וַיְהִ֣י ׀ חִתַּ֣ת אֱלֹהִ֗ים עַל־הֶֽעָרִים֙ אֲשֶׁר֙ סְבִיב֣וֹתֵיהֶ֔ם וְלֹ֣א רָֽדְפ֔וּ אַחֲרֵ֖י בְּנֵ֥י יַעֲקֹֽב׃ לִישׁוּעָתְךָ֖ קִוִּ֥יתִי יְהֹוָֽה׃ </small>`,`<small><b>יְבָרֶכְךָ֥</b> יְהֹוָ֖ה וְיִשְׁמְרֶֽךָ׃ יָאֵ֨ר יְהֹוָ֧ה ׀ פָּנָ֛יו אֵלֶ֖יךָ וִֽיחֻנֶּֽךָּ׃ יִשָּׂ֨א יְהֹוָ֤ה ׀ פָּנָיו֙ אֵלֶ֔יךָ וְיָשֵׂ֥ם לְךָ֖ שָׁלֽוֹם׃ </small>`,`<small><b>הִנֵּ֨ה</b> אָנֹכִ֜י שֹׁלֵ֤חַ מַלְאָךְ֙ לְפָנֶ֔יךָ לִשְׁמָרְךָ֖ בַּדָּ֑רֶךְ וְלַהֲבִ֣יאֲךָ֔ אֶל־הַמָּק֖וֹם אֲשֶׁ֥ר הֲכִנֹֽתִי׃ </small>`,`<small><b>הַמַּלְאָךְ֩</b> הַגֹּאֵ֨ל אֹתִ֜י מִכׇּל־רָ֗ע יְבָרֵךְ֮ אֶת־הַנְּעָרִים֒ וְיִקָּרֵ֤א בָהֶם֙ שְׁמִ֔י וְשֵׁ֥ם אֲבֹתַ֖י אַבְרָהָ֣ם וְיִצְחָ֑ק וְיִדְגּ֥וּ לָרֹ֖ב בְּקֶ֥רֶב הָאָֽרֶץ׃ </small>`]}]},"refua-pidyon":{id:`refua-pidyon`,title:`תְּפִלָּה לִרְפוּאָה וּפִדְיוֹן נֶפֶשׁ`,subtitle:`מִי שֶׁבֵּרַךְ לַחוֹלֶה וְסֵדֶר הַפִּדְיוֹן`,numbered:!1,chapters:[{heading:`מִי שֶׁבֵּרַךְ לַחוֹלֶה`,verses:[`מִי שֶׁבֵּרַךְ אֲבוֹתֵינוּ אַבְרָהָם יִצְחָק וְיַעֲקֹב משֶׁה וְאַהֲרֹן דָּוִד וּשְׁלֹמֹה הוּא יְבָרֵךְ אֶת הַחוֹלֶה <small>(פב"פ)</small> בַּעֲבוּר <small>(שפב"פ)</small> יִתֵּן מַתָּנָה בַּעֲבוּרוֹ, בִּשְׂכַר זֶה הַקָּדוֹשׁ בָּרוּךְ הוּא יְמַלֵּא רַחֲמִים עָלָיו לְהַחֲלִימוֹ וּלְרַפְּאֹתוֹ וּלְהַחֲזִיקוֹ וּלְהַחֲיוֹתוֹ, וְיִשְׁלַח לוֹ מְהֵרָה רְפוּאָה שְׁלֵמָה מִן הַשָּׁמַיִם לְרַמַ"ח אֵבָרָיו וּשְׁסָ"ה גִּידָיו בְּתוֹךְ שְׁאָר חוֹלֵי יִשְׂרָאֵל, רְפוּאַת הַנֶּפֶשׁ וּרְפוּאַת הַגּוּף (<small>בשבת</small> שַׁבָּת הִיא מִלִזְּעוֹק וּרְפוּאָה קְרוֹבָה לָבוֹא). (<small>ביו"ט</small> יוֹם טוֹב הוא מִלִזְּעוֹק וּרְפוּאָה קְרוֹבָה לָבוֹא), הַשְׁתָּא בַּעֲגָלָא וּבִזְמַן קָרִיב. וְנֹאמַר אָמֵן:`,`מִי שֶׁבֵּרַךְ אֲבוֹתֵינוּ אַבְרָהָם יִצְחָק וְיַעֲקֹב משֶׁה וְאַהֲרֹן דָּוִד וּשְׁלֹמֹה הוּא יְבָרֵךְ אֶת הַחוֹלַנִּית <small>(פב"פ)</small> בַּעֲבוּר <small>(שפב"פ)</small> יִתֵּן מַתָּנָה בַּעֲבוּרָהּ, בִּשְׂכַר זֶה הַקָּדוֹשׁ בָּרוּךְ הוּא יְמַלֵּא רַחֲמִים עָלֶיהָ לְהַחֲלִימָהּ וּלְרַפְּאֹתָהּ וּלְהַחֲזִיקָהּ וּלְהַחֲיוֹתָהּ, וְיִשְׁלַח לָהּ מְהֵרָה רְפוּאָה שְׁלֵמָה מִן הַשָּׁמַיִם לְכָל אֵבָרֶיה וּלְכָל גִּידֶיהָ בְּתוֹךְ שְׁאָר חוֹלֵי יִשְׂרָאֵל, רְפוּאַת הַנֶּפֶשׁ וּרְפוּאַת הַגּוּף (<small>בשבת</small> שַׁבָּת הִיא מִלִזְּעוֹק וּרְפוּאָה קְרוֹבָה לָבוֹא). (<small>ביו"ט</small> יוֹם טוֹב הוא מִלִזְּעוֹק וּרְפוּאָה קְרוֹבָה לָבוֹא), הַשְׁתָּא בַּעֲגָלָא וּבִזְמַן קָרִיב. וְנֹאמַר אָמֵן:`]},{heading:`בַּקָּשַׁת רְפוּאָה · רְפָאֵנוּ`,verses:[`<b>רְפָאֵֽנוּ</b> יְהֹוָה וְנֵֽרָפֵא, הֽוֹשִׁיעֵֽנוּ וְנִוָּשֵֽׁעָה, כִּי תְהִלָּתֵֽנוּ אָֽתָּה, וְהַֽעֲלֵה אֲרוּכָה וּמַרְפֵּא לְכָל־תַּֽחֲלוּאֵֽינוּ וּלְכָל־מַכְאוֹבֵֽינוּ וּלְכָל־מַכּוֹתֵֽינוּ. כִּי אֵל רוֹפֵא רַחְמָן וְנֶֽאֱמָן אָֽתָּה: בָּרוּךְ אַתָּה יֹהֹוֹהֹ, רוֹפֵא חוֹלֵי עַמּוֹ יִשְׂרָאֵל:`]},{heading:`סְגֻלַּת הַפִּדְיוֹן`,verses:[`בְּעִנְיַן סְגֻלַּת הַפִּדְיוֹן. מָעוֹת הֵם בְּחִינַת דִּינִין, כְּמוֹ שֶׁאָמְרוּ: וְאֶת כָּל הַיְקוּם אֲשֶׁר בְּרַגְלֵיהֶם, זֶה מָמוֹנוֹ שֶׁל אָדָם שֶׁמַּעֲמִידוֹ עַל רַגְלָיו, (פסחים קיט). נִמְצָא, הַמָּעוֹת הֵם בְּחִינַת רַגְלִין. וְזֶה בְּחִינַת (ישעיהו מ״א:ב׳): צֶדֶק יִקְרָאֵהוּ לְרַגְלוֹ. וְצֶדֶק מַלְכוּתָא קַדִּישָׁא, וּמַלְכוּת הוּא בְּחִינַת דִּינִין, כִּי דִּינָא דְּמַלְכוּתָא דִּינָא. וְעַל כֵּן מָעוֹת הֵם בְּחִינַת דִּינִין. וְצָרִיךְ לְהַמְתִּיק הַדִּינִין בְּשָׁרְשָׁן, וְשֹׁרֶשׁ הַדִּינִין בְּבִינָה, כְּמוֹ שֶׁכָּתוּב (משלי ח׳:י״ד): אֲנִי בִינָה, לִי גְּבוּרָה. וְעַל כֵּן עַל־יְדֵי שֶׁמַּנִּיחִין הַיָּדַיִם עַל הַמָּעוֹת נִמְתָּקִין הַדִּינִין, כִּי יֵשׁ בַּבִּינָה שָׁלֹשׁ יָדַיִם, הַיְנוּ שֶׁיֵּשׁ שָׁם שְׁתֵּי יָדַיִם: יָד הַגְּדוֹלָה וְיָד הַחֲזָקָה, וּכְלָלוּת הַיָּדַיִם הוּא יָד הָרָמָה. וְעַל־כֵּן עַל־יְדֵי שֶׁבָּא הַמָּעוֹת, שֶׁהוּא הַדִּינִין, לְהַיָּדַיִם, שֶׁהֵם בְּחִינַת שָׁלֹשׁ יָדַיִם שֶׁבַּבִּינָה, נִמְתָּקִין הַדִּינִין בְּשָׁרְשָׁן, כִּי שָׁרְשָׁן הוּא בִּינָה שֶׁשָּׁם הַשָּׁלֹשׁ יָדַיִם הַנַּ"ל. וְצָרִיךְ לְהַמְתִּיק הַדִּין שֶׁבְּזֶה הָעוֹלָם הָעֲשִׂיָּה עַל־יְדֵי הַשְּׁלֹשָׁה יָדַיִם שֶׁיֵּשׁ בְּכָל עוֹלָם וְעוֹלָם מֵהַשְּׁלֹשָׁה עוֹלָמוֹת שֶׁלְּמַעְלָה מִזֶּה הָעוֹלָם הָעֲשִׂיָּה, הַיְנוּ: אֲצִילוּת בְּרִיאָה יְצִירָה, וּכְשֶׁמַּמְתִּיק הַדִּין שֶׁל עוֹלַם הָעֲשִׂיָּה בְּשָׁלֹשׁ יָדַיִם שֶׁבַּיְצִירָה, נִמְתָּק עַל־יְדֵי שֵׁם שֶׁל מ"ב אב"ג וְכוּ', כִּי מ"ב בְּגִימַטְרִיָּא שָׁלֹשׁ פְּעָמִים יָד. וּבְעוֹלַם הַבְּרִיאָה נִמְתָּק עַל־יְדֵי שֵׁם אקי"ק וְשֵׁם יק"ו שֶׁשְּׁנֵיהֶם גַּם כֵּן גִּימַטְרִיָּא מ"ב, שָׁלֹשׁ פְּעָמִים יָד. וּלְמַעְלָה בְּעוֹלַם הָאֲצִילוּת, נִמְתָּק עַל יְדֵי מ"ב אוֹתִיּוֹת שֶׁל שֵׁם מ"ה, הַיְנוּ: פָּשׁוּט וּמִלּוּי וּמִלּוּי דְּמִלּוּי, שֶׁכֻּלָּם יַחַד הֵם מ"ב אוֹתִיּוֹת, שָׁלֹשׁ פְּעָמִים יָד. וְצָרִיךְ לִרְאוֹת שֶׁלֹּא יִהְיֶה קַמְצָן, שֶׁלֹּא יִשָּׁאֵר אֶצְלוֹ דִּינִין, וְלָזֶה צָרִיךְ חָכְמָה יְתֵרָה, לָדַעַת כַּמָּה זֶה צָרִיךְ לִתֵּן שֶׁלֹּא יִשָּׁאֵר אֶצְלוֹ דִּינִין:`]}]},"hipaked-banim":{id:`hipaked-banim`,title:`תְּפִלָּה לְהִפָּקֵד בְּבָנִים`,subtitle:`בַּקָּשַׁת רַחֲמִים לְזֶרַע שֶׁל קַיָּמָא`,numbered:!1,chapters:[{heading:`מִזְמוֹר ק״ב · תְּפִלָּה לְעָנִי`,verses:`תְּ֭פִלָּה לְעָנִ֣י כִֽי־יַעֲטֹ֑ף וְלִפְנֵ֥י יְ֝הֹוָ֗ה יִשְׁפֹּ֥ךְ שִׂיחֽוֹ׃.יְ֭הֹוָה שִׁמְעָ֣ה תְפִלָּתִ֑י וְ֝שַׁוְעָתִ֗י אֵלֶ֥יךָ תָבֽוֹא׃.אַל־תַּסְתֵּ֬ר פָּנֶ֨יךָ&thinsp;<b>׀</b> מִמֶּנִּי֮ בְּי֢וֹם צַ֫ר<span class="mam-implicit-maqaf">־</span>לִ֥י הַטֵּֽה־אֵלַ֥י אׇזְנֶ֑ךָ בְּי֥וֹם אֶ֝קְרָ֗א מַהֵ֥ר עֲנֵֽנִי׃.כִּֽי־כָל֣וּ בְעָשָׁ֣ן יָמָ֑י וְ֝עַצְמוֹתַ֗י כְּמוֹקֵ֥ד נִחָֽרוּ׃.הוּכָּה־כָעֵ֣שֶׂב וַיִּבַ֣שׁ לִבִּ֑י כִּֽי־שָׁ֝כַ֗חְתִּי מֵאֲכֹ֥ל לַחְמִֽי׃.מִקּ֥וֹל אַנְחָתִ֑י דָּבְקָ֥ה עַ֝צְמִ֗י לִבְשָׂרִֽי׃.דָּ֭מִיתִי לִקְאַ֣ת מִדְבָּ֑ר הָ֝יִ֗יתִי כְּכ֣וֹס חֳרָבֽוֹת׃.שָׁקַ֥דְתִּי וָאֶהְיֶ֑ה כְּ֝צִפּ֗וֹר בּוֹדֵ֥ד עַל־גָּֽג׃.כׇּל־הַ֭יּוֹם חֵרְפ֣וּנִי אוֹיְבָ֑י מְ֝הוֹלָלַ֗י בִּ֣י נִשְׁבָּֽעוּ׃.כִּי־אֵ֭פֶר כַּלֶּ֣חֶם אָכָ֑לְתִּי וְ֝שִׁקֻּוַ֗י בִּבְכִ֥י מָסָֽכְתִּי׃.מִפְּנֵֽי־זַעַמְךָ֥ וְקִצְפֶּ֑ךָ כִּ֥י נְ֝שָׂאתַ֗נִי וַתַּשְׁלִיכֵֽנִי׃.יָ֭מַי כְּצֵ֣ל נָט֑וּי וַ֝אֲנִ֗י כָּעֵ֥שֶׂב אִיבָֽשׁ׃.וְאַתָּ֣ה יְ֭הֹוָה לְעוֹלָ֣ם תֵּשֵׁ֑ב וְ֝זִכְרְךָ֗ לְדֹ֣ר וָדֹֽר׃.אַתָּ֣ה תָ֭קוּם תְּרַחֵ֣ם צִיּ֑וֹן כִּי־עֵ֥ת לְ֝חֶֽנְנָ֗הּ כִּי־בָ֥א מוֹעֵֽד׃.כִּי־רָצ֣וּ עֲ֭בָדֶיךָ אֶת־אֲבָנֶ֑יהָ וְֽאֶת־עֲפָרָ֥הּ יְחֹנֵֽנוּ׃.וְיִֽירְא֣וּ ג֭וֹיִם אֶת־שֵׁ֣ם יְהֹוָ֑ה וְֽכׇל־מַלְכֵ֥י הָ֝אָ֗רֶץ אֶת־כְּבוֹדֶֽךָ׃.כִּי־בָנָ֣ה יְהֹוָ֣ה צִיּ֑וֹן נִ֝רְאָ֗ה בִּכְבוֹדֽוֹ׃.פָּ֭נָה אֶל־תְּפִלַּ֣ת הָעַרְעָ֑ר וְלֹא־בָ֝זָ֗ה אֶת־תְּפִלָּתָֽם׃.תִּכָּ֣תֶב זֹ֭את לְד֣וֹר אַחֲר֑וֹן וְעַ֥ם נִ֝בְרָ֗א יְהַלֶּל־יָֽהּ׃.כִּֽי־הִ֭שְׁקִיף מִמְּר֣וֹם קׇדְשׁ֑וֹ יְ֝הֹוָ֗ה מִשָּׁמַ֤יִם&thinsp;<b>׀</b> אֶל־אֶ֬רֶץ הִבִּֽיט׃.לִ֭שְׁמֹעַ אֶנְקַ֣ת אָסִ֑יר לְ֝פַתֵּ֗חַ בְּנֵ֣י תְמוּתָֽה׃.לְסַפֵּ֣ר בְּ֭צִיּוֹן שֵׁ֣ם יְהֹוָ֑ה וּ֝תְהִלָּת֗וֹ בִּירוּשָׁלָֽ͏ִם׃.בְּהִקָּבֵ֣ץ עַמִּ֣ים יַחְדָּ֑ו וּ֝מַמְלָכ֗וֹת לַעֲבֹ֥ד אֶת־יְהֹוָֽה׃.עִנָּ֖ה בַדֶּ֥רֶךְ כֹּחִ֗י קִצַּ֥ר יָמָֽי׃.אֹמַ֗ר אֵלִ֗י אַֽל־תַּ֭עֲלֵנִי בַּחֲצִ֣י יָמָ֑י בְּד֖וֹר דּוֹרִ֣ים שְׁנוֹתֶֽיךָ׃.לְ֭פָנִים הָאָ֣רֶץ יָסַ֑דְתָּ וּֽמַעֲשֵׂ֖ה יָדֶ֣יךָ שָׁמָֽיִם׃.הֵ֤מָּה&thinsp;<b>׀</b> יֹאבֵדוּ֮ וְאַתָּ֢ה תַ֫עֲמֹ֥ד וְ֭כֻלָּם כַּבֶּ֣גֶד יִבְל֑וּ כַּלְּב֖וּשׁ תַּחֲלִיפֵ֣ם וְֽיַחֲלֹֽפוּ׃.וְאַתָּה־ה֑וּא וּ֝שְׁנוֹתֶ֗יךָ לֹ֣א יִתָּֽמּוּ׃.בְּנֵֽי־עֲבָדֶ֥יךָ יִשְׁכּ֑וֹנוּ וְ֝זַרְעָ֗ם לְפָנֶ֥יךָ יִכּֽוֹן׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`.split(`.`),numbered:!0},{heading:`נֶדֶר חַנָּה`,verses:[`וַתִּדֹּ֨ר נֶ֜דֶר וַתֹּאמַ֗ר יְהֹוָ֨ה צְבָא֜וֹת אִם־רָאֹ֥ה תִרְאֶ֣ה&thinsp;<b>׀</b> בׇּעֳנִ֣י אֲמָתֶ֗ךָ וּזְכַרְתַּ֙נִי֙ וְלֹא־תִשְׁכַּ֣ח אֶת־אֲמָתֶ֔ךָ וְנָתַתָּ֥ה לַאֲמָתְךָ֖ זֶ֣רַע אֲנָשִׁ֑ים וּנְתַתִּ֤יו לַֽיהֹוָה֙ כׇּל־יְמֵ֣י חַיָּ֔יו וּמוֹרָ֖ה לֹא־יַעֲלֶ֥ה עַל־רֹאשֽׁוֹ׃`],numbered:!0}]},"midot-kaas":{id:`midot-kaas`,title:`תְּפִלָּה לְהִנָּצֵל מִן הַכַּעַס`,subtitle:`לְתַקֵּן מִדַּת הַכַּעַס וְלִזְכּוֹת לַעֲנָוָה`,numbered:!1,chapters:[{heading:`בַּקָּשָׁה לְהִנָּצֵל מִן הַכַּעַס`,verses:[`וּתְזַכֵּנִי לְמִדַּת עֲנָוָה בֶּאֱמֶת לַאֲמִתּוֹ, וְנַפְשִׁי כֶּעָפָר לַכֹּל תִּהְיֶה, וְאֶזְכֶּה לֵידַע שִׁפְלוּתִי בֶּאֱמֶת. וְתַצִּילֵנִי בְּרַחֲמֶיךָ הָרַבִּים מִן הַכַּעַס, שֶׁלֹּא אֶכְעוֹס לְעוֹלָם עַל שׁוּם דָּבָר, וְלֹא אֶהְיֶה קַפְּדָן כְּלָל, וְלֹא יְהֵא בְּלִבִּי שׁוּם כַּעַס וְהַקְפָּדָה בָּעוֹלָם כְּלָל, רַק אֶזְכֶּה לִדָּבֵק בְּמִדּוֹתֶיךָ לִהְיוֹת טוֹב לַכֹּל, וְלִמְקַלְלַי נַפְשִׁי תִדּוֹם. וְהַצִּילֵנוּ בְּרַחֲמֶיךָ הָרַבִּים מִן הָעֲנִיּוּת וּמִן הַחוֹסֶר, וְתַזְמִין פַּרְנָסָתֵנוּ קוֹדֶם שֶׁנִּצְטָרֵךְ לָהֶם בְּרֶוַח וְלֹא בְּצִמְצוּם, בְּהֶתֵּר וְלֹא בְּאִסּוּר, בְּכָבוֹד וְלֹא בְּבִזּוּי, בְּנַחַת וְלֹא בְּצַעַר, מִתַּחַת יָדְךָ הָרְחָבָה וְהַמְּלֵאָה, בְּאֹפֶן שֶׁאוּכַל לַעֲשׂוֹת רְצוֹנְךָ בֶּאֱמֶת כָּל יְמֵי חַיַּי מֵעַתָּה וְעַד עוֹלָם:`]}]},"midot-simcha":{id:`midot-simcha`,title:`תְּפִלָּה לְשִׂמְחָה`,subtitle:`לִזְכּוֹת לְשִׂמְחָה וּלְהִנָּצֵל מֵעַצְבוּת`,numbered:!1,chapters:[{heading:`תְּפִלָּה לְשִׂמְחָה`,verses:[`מָלֵא רַחֲמִים, בּוֹרֵא רְפוּאוֹת, אֲדוֹן הַנִּפְלָאוֹת, חֶדְוַת יְשׁוּעוֹת יַעֲקֹב, תֵּן שִׂמְחָה בְּלִבִּי, כִּי אַתָּה יוֹדֵעַ תַּעֲלוּמוֹת לֵב,`,`וְאַתָּה יוֹדֵעַ בְּכַמָּה דְרָכִים וּבְכַמָּה תַּחְבּוּלוֹת מִתְגַּבֵּר הַבַּעַל־דָּבָר וְחֵילוֹתָיו עָלֵינוּ בְּכָל עֵת, לְהַמְשִׁיךְ עַצְבוּת חַס וְשָׁלוֹם עָלֵינוּ,`,`וְהוּא בְּתַחְבּוּלוֹתָיו עָרֹם יַעֲרִים הוּא וּמְרַמֶּה אוֹתָנוּ, וּמִתְלַבֵּשׁ עַצְמוֹ בְּמִצְוֹת, עַד שֶׁנִּדְמֶה לָנוּ שֶׁיֵּשׁ לָנוּ עַצְבוּת מֵעֲוֹנוֹתֵינוּ,`,`וּבֶאֱמֶת בְּכָל זֶה הוּא פּוֹרֵשׂ רֶשֶׁת לְרַגְלֵינוּ, כִּי כְּבָר לִמַּדְתָּנוּ שֶׁעַל־זֶה צְרִיכִין לְיַחֵד שָׁעָה אַחַת בְּיוֹם, לְשַׁבֵּר לִבֵּנוּ וּלְפָרֵשׁ שִׂיחָתֵנוּ לְפָנֶיךָ עַל כָּל מַה שֶּׁעָבַר עָלֵינוּ,`,`אֲבָל כָּל הַיּוֹם כֻּלּוֹ צְרִיכִין לְהִתְחַזֵּק בְּשִׂמְחָה, וּלְהַכְרִיחַ עַצְמֵנוּ בְּכָל כֹּחוֹתֵינוּ לָבוֹא לְשִׂמְחָה גְּדוֹלָה שֶׁהִיא עִקָּר קְדֻשַּׁת יִשְׂרָאֵל.`]}]},"mizmor-letoda":{id:`mizmor-letoda`,title:`מִזְמוֹר לְתוֹדָה`,subtitle:`שִׁיר הַהוֹדָיָה · תְּהִלִּים ק׳`,numbered:!1,chapters:[{heading:`מִזְמוֹר לְתוֹדָה`,verses:[`מִזְמ֥וֹר לְתוֹדָ֑ה הָרִ֥יעוּ לַ֝יהֹוָ֗ה כׇּל־הָאָֽרֶץ׃`,`עִבְד֣וּ אֶת־יְהֹוָ֣ה בְּשִׂמְחָ֑ה בֹּ֥אוּ לְ֝פָנָ֗יו בִּרְנָנָֽה׃`,`דְּע֗וּ כִּֽי־יְהֹוָה֮ ה֤וּא אֱלֹ֫הִ֥ים הֽוּא־עָ֭שָׂנוּ וְל֣וֹ אֲנַ֑חְנוּ עַ֝מּ֗וֹ וְצֹ֣אן מַרְעִיתֽוֹ׃`,`בֹּ֤אוּ שְׁעָרָ֨יו&thinsp;<b>׀</b> בְּתוֹדָ֗ה חֲצֵרֹתָ֥יו בִּתְהִלָּ֑ה הוֹדוּ־ל֝֗וֹ בָּרְכ֥וּ שְׁמֽוֹ׃`,`כִּי־ט֣וֹב יְ֭הֹוָה לְעוֹלָ֣ם חַסְדּ֑וֹ וְעַד־דֹּ֥ר וָ֝דֹ֗ר אֱמוּנָתֽוֹ׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0}]},"tefilat-hateshuva":{id:`tefilat-hateshuva`,title:`תְּפִלַּת הַתְּשׁוּבָה`,subtitle:`מִזְמוֹר נ״א · לֵב טָהוֹר`,numbered:!1,chapters:[{heading:`לַמְנַצֵּחַ מִזְמוֹר לְדָוִד`,verses:[`לַמְנַצֵּ֗חַ מִזְמ֥וֹר לְדָוִֽד׃`,`בְּֽבוֹא־אֵ֭לָיו נָתָ֣ן הַנָּבִ֑יא כַּאֲשֶׁר־בָּ֝֗א אֶל־בַּת־שָֽׁבַע׃`,`חׇנֵּ֣נִי אֱלֹהִ֣ים כְּחַסְדֶּ֑ךָ כְּרֹ֥ב רַ֝חֲמֶ֗יךָ מְחֵ֣ה פְשָׁעָֽי׃`,`הֶ֭רֶב כַּבְּסֵ֣נִי מֵעֲוֺנִ֑י וּֽמֵחַטָּאתִ֥י טַהֲרֵֽנִי׃`,`כִּֽי־פְ֭שָׁעַי אֲנִ֣י אֵדָ֑ע וְחַטָּאתִ֖י נֶגְדִּ֣י תָמִֽיד׃`,`לְךָ֤ לְבַדְּךָ֨&thinsp;<b>׀</b> חָטָאתִי֮ וְהָרַ֥ע בְּעֵינֶ֗יךָ עָ֫שִׂ֥יתִי לְ֭מַעַן תִּצְדַּ֥ק בְּדׇבְרֶ֗ךָ תִּזְכֶּ֥ה בְשׇׁפְטֶֽךָ׃`,`הֵן־בְּעָו֥וֹן חוֹלָ֑לְתִּי וּ֝בְחֵ֗טְא יֶחֱמַ֥תְנִי אִמִּֽי׃`,`הֵן־אֱ֭מֶת חָפַ֣צְתָּ בַטֻּח֑וֹת וּ֝בְסָתֻ֗ם חׇכְמָ֥ה תוֹדִיעֵֽנִי׃`,`תְּחַטְּאֵ֣נִי בְאֵז֣וֹב וְאֶטְהָ֑ר תְּ֝כַבְּסֵ֗נִי וּמִשֶּׁ֥לֶג אַלְבִּֽין׃`,`תַּ֭שְׁמִיעֵנִי שָׂשׂ֣וֹן וְשִׂמְחָ֑ה תָּ֝גֵ֗לְנָה עֲצָמ֥וֹת דִּכִּֽיתָ׃`,`הַסְתֵּ֣ר פָּ֭נֶיךָ מֵחֲטָאָ֑י וְֽכׇל־עֲוֺ֖נֹתַ֣י מְחֵֽה׃`,`לֵ֣ב טָ֭הוֹר בְּרָא־לִ֣י אֱלֹהִ֑ים וְר֥וּחַ נָ֝כ֗וֹן חַדֵּ֥שׁ בְּקִרְבִּֽי׃`,`אַל־תַּשְׁלִיכֵ֥נִי מִלְּפָנֶ֑יךָ וְר֥וּחַ קׇ֝דְשְׁךָ֗ אַל־תִּקַּ֥ח מִמֶּֽנִּי׃`,`הָשִׁ֣יבָה לִּ֭י שְׂשׂ֣וֹן יִשְׁעֶ֑ךָ וְר֖וּחַ נְדִיבָ֣ה תִסְמְכֵֽנִי׃`,`אֲלַמְּדָ֣ה פֹשְׁעִ֣ים דְּרָכֶ֑יךָ וְ֝חַטָּאִ֗ים אֵלֶ֥יךָ יָשֽׁוּבוּ׃`,`הַצִּ֘ילֵ֤נִי מִדָּמִ֨ים&thinsp;<b>׀</b> אֱֽלֹהִ֗ים אֱלֹהֵ֥י תְשׁוּעָתִ֑י תְּרַנֵּ֥ן לְ֝שׁוֹנִ֗י צִדְקָתֶֽךָ׃`,`אֲ֭דֹנָי שְׂפָתַ֣י תִּפְתָּ֑ח וּ֝פִ֗י יַגִּ֥יד תְּהִלָּתֶֽךָ׃`,`כִּ֤י&thinsp;<b>׀</b> לֹא־תַחְפֹּ֣ץ זֶ֣בַח וְאֶתֵּ֑נָה ע֝וֹלָ֗ה לֹ֣א תִרְצֶֽה׃`,`זִ֥בְחֵ֣י אֱלֹהִים֮ ר֤וּחַ נִשְׁבָּ֫רָ֥ה לֵב־נִשְׁבָּ֥ר וְנִדְכֶּ֑ה אֱ֝לֹהִ֗ים לֹ֣א תִבְזֶֽה׃`,`הֵיטִ֣יבָה בִ֭רְצוֹנְךָ אֶת־צִיּ֑וֹן תִּ֝בְנֶ֗ה חוֹמ֥וֹת יְרוּשָׁלָֽ͏ִם׃`,`אָ֤ז תַּחְפֹּ֣ץ זִבְחֵי־צֶ֭דֶק עוֹלָ֣ה וְכָלִ֑יל אָ֤ז יַעֲל֖וּ עַל־מִזְבַּחֲךָ֣ פָרִֽים׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0}]},"al-yisrael":{id:`al-yisrael`,title:`תְּפִלָּה עַל עַם יִשְׂרָאֵל`,subtitle:`תְּהִלִּים וּתְפִלּוֹת לִשְׁלוֹם יִשְׂרָאֵל וְחַיָּלָיו`,numbered:!1,chapters:[{heading:`מִזְמוֹר פ״ג · אֱלֹהִים אַל דֳּמִי לָךְ`,verses:[`שִׁ֖יר מִזְמ֣וֹר לְאָסָֽף׃`,`אֱלֹהִ֥ים אַל־דֳּמִי־לָ֑ךְ אַל־תֶּחֱרַ֖שׁ וְאַל־תִּשְׁקֹ֣ט אֵֽל׃`,`כִּֽי־הִנֵּ֣ה א֭וֹיְבֶיךָ יֶהֱמָי֑וּן וּ֝מְשַׂנְאֶ֗יךָ נָ֣שְׂאוּ רֹֽאשׁ׃`,`עַֽל־עַ֭מְּךָ יַעֲרִ֣ימוּ ס֑וֹד וְ֝יִתְיָעֲצ֗וּ עַל־צְפוּנֶֽיךָ׃`,`אָמְר֗וּ לְ֭כוּ וְנַכְחִידֵ֣ם מִגּ֑וֹי וְלֹֽא־יִזָּכֵ֖ר שֵֽׁם־יִשְׂרָאֵ֣ל עֽוֹד׃`,`כִּ֤י נוֹעֲצ֣וּ לֵ֣ב יַחְדָּ֑ו עָ֝לֶ֗יךָ בְּרִ֣ית יִכְרֹֽתוּ׃`,`אׇהֳלֵ֣י אֱ֭דוֹם וְיִשְׁמְעֵאלִ֗ים מוֹאָ֥ב וְהַגְרִֽים׃`,`גְּבָ֣ל וְ֭עַמּוֹן וַעֲמָלֵ֑ק פְּ֝לֶ֗שֶׁת עִם־יֹ֥שְׁבֵי צֽוֹר׃`,`גַּם־אַ֭שּׁוּר נִלְוָ֣ה עִמָּ֑ם הָ֤יֽוּ<span class="mam-implicit-maqaf">־</span>זְר֖וֹעַ לִבְנֵי־ל֣וֹט סֶֽלָה׃`,`עֲשֵֽׂה־לָהֶ֥ם כְּמִדְיָ֑ן כְּֽסִיסְרָ֥א כְ֝יָבִ֗ין בְּנַ֣חַל קִישֽׁוֹן׃`,`נִשְׁמְד֥וּ בְֽעֵין־דֹּ֑אר הָ֥יוּ דֹ֝֗מֶן לָאֲדָמָֽה׃`,`שִׁיתֵ֣מוֹ נְ֭דִיבֵימוֹ כְּעֹרֵ֣ב וְכִזְאֵ֑ב וּֽכְזֶ֥בַח וּ֝כְצַלְמֻנָּ֗ע כׇּל־נְסִיכֵֽימוֹ׃`,`אֲשֶׁ֣ר אָ֭מְרוּ נִ֣ירְשָׁה לָּ֑נוּ אֵ֝֗ת נְא֣וֹת אֱלֹהִֽים׃`,`אֱֽלֹהַ֗י שִׁיתֵ֥מוֹ כַגַּלְגַּ֑ל כְּ֝קַ֗שׁ לִפְנֵי־רֽוּחַ׃`,`כְּאֵ֥שׁ תִּבְעַר־יָ֑עַר וּ֝כְלֶהָבָ֗ה תְּלַהֵ֥ט הָרִֽים׃`,`כֵּ֭ן תִּרְדְּפֵ֣ם בְּסַעֲרֶ֑ךָ וּבְסוּפָתְךָ֥ תְבַהֲלֵֽם׃`,`מַלֵּ֣א פְנֵיהֶ֣ם קָל֑וֹן וִיבַקְשׁ֖וּ שִׁמְךָ֣ יְהֹוָֽה׃`,`יֵבֹ֖שׁוּ וְיִבָּהֲל֥וּ עֲדֵי־עַ֗ד וְֽיַחְפְּר֥וּ וְיֹאבֵֽדוּ׃`,`וְֽיֵדְע֗וּ כִּי־אַתָּ֬ה שִׁמְךָ֣ יְהֹוָ֣ה לְבַדֶּ֑ךָ עֶ֝לְי֗וֹן עַל־כׇּל־הָאָֽרֶץ׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0},{heading:`מִזְמוֹר כ׳ · יַעַנְךָ ה׳ בְּיוֹם צָרָה`,verses:[`לַמְנַצֵּ֗חַ מִזְמ֥וֹר לְדָוִֽד׃`,`יַֽעַנְךָ֣ יְ֭הֹוָה בְּי֣וֹם צָרָ֑ה יְ֝שַׂגֶּבְךָ֗ שֵׁ֤ם&thinsp;<b>׀</b> אֱלֹהֵ֬י יַעֲקֹֽב׃`,`יִשְׁלַֽח־עֶזְרְךָ֥ מִקֹּ֑דֶשׁ וּ֝מִצִּיּ֗וֹן יִסְעָדֶֽךָּ׃`,`יִזְכֹּ֥ר כׇּל־מִנְחֹתֶ֑ךָ וְעוֹלָתְךָ֖ יְדַשְּׁנֶ֣ה סֶֽלָה׃`,`יִֽתֶּן־לְךָ֥ כִלְבָבֶ֑ךָ וְֽכׇל־עֲצָתְךָ֥ יְמַלֵּֽא׃`,`נְרַנְּנָ֤ה&thinsp;<b>׀</b> בִּ֘ישׁ֤וּעָתֶ֗ךָ וּבְשֵֽׁם־אֱלֹהֵ֥ינוּ נִדְגֹּ֑ל יְמַלֵּ֥א יְ֝הֹוָ֗ה כׇּל־מִשְׁאֲלוֹתֶֽיךָ׃`,`עַתָּ֤ה יָדַ֗עְתִּי כִּ֤י הוֹשִׁ֥יעַ&thinsp;<small>׀</small>&thinsp;יְהֹוָ֗ה מְשִׁ֫יח֥וֹ יַ֭עֲנֵהוּ מִשְּׁמֵ֣י קׇדְשׁ֑וֹ בִּ֝גְבֻר֗וֹת יֵ֣שַׁע יְמִינֽוֹ׃`,`אֵ֣לֶּה בָ֭רֶכֶב וְאֵ֣לֶּה בַסּוּסִ֑ים וַאֲנַ֓חְנוּ&thinsp;<b>׀</b> בְּשֵׁם־יְהֹוָ֖ה אֱלֹהֵ֣ינוּ נַזְכִּֽיר׃`,`הֵ֭מָּה כָּרְע֣וּ וְנָפָ֑לוּ וַאֲנַ֥חְנוּ קַּ֝֗מְנוּ וַנִּתְעוֹדָֽד׃`,`יְהֹוָ֥ה הוֹשִׁ֑יעָה הַ֝מֶּ֗לֶךְ יַעֲנֵ֥נוּ בְיוֹם־קׇרְאֵֽנוּ׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0},{heading:`מִזְמוֹר צ״א · יֹשֵׁב בְּסֵתֶר`,verses:[`יֹ֭שֵׁב בְּסֵ֣תֶר עֶלְי֑וֹן בְּצֵ֥ל שַׁ֝דַּ֗י יִתְלוֹנָֽן׃`,`אֹמַ֗ר לַ֭יהֹוָה מַחְסִ֣י וּמְצוּדָתִ֑י אֱ֝לֹהַ֗י אֶבְטַח־בּֽוֹ׃`,`כִּ֤י ה֣וּא יַ֭צִּילְךָ מִפַּ֥ח יָק֗וּשׁ מִדֶּ֥בֶר הַוּֽוֹת׃`,`בְּאֶבְרָת֨וֹ&thinsp;<b>׀</b> יָ֣סֶךְ לָ֭ךְ וְתַחַת־כְּנָפָ֣יו תֶּחְסֶ֑ה צִנָּ֖ה וְסֹחֵרָ֣ה אֲמִתּֽוֹ׃`,`לֹֽא־תִ֭ירָא מִפַּ֣חַד לָ֑יְלָה מֵ֝חֵ֗ץ יָע֥וּף יוֹמָֽם׃`,`מִ֭דֶּבֶר בָּאֹ֣פֶל יַהֲלֹ֑ךְ מִ֝קֶּ֗טֶב יָשׁ֥וּד צׇהֳרָֽיִם׃`,`יִפֹּ֤ל מִצִּדְּךָ֨&thinsp;<b>׀</b> אֶ֗לֶף וּרְבָבָ֥ה מִימִינֶ֑ךָ אֵ֝לֶ֗יךָ לֹ֣א יִגָּֽשׁ׃`,`רַ֭ק בְּעֵינֶ֣יךָ תַבִּ֑יט וְשִׁלֻּמַ֖ת רְשָׁעִ֣ים תִּרְאֶֽה׃`,`כִּֽי־אַתָּ֣ה יְהֹוָ֣ה מַחְסִ֑י עֶ֝לְי֗וֹן שַׂ֣מְתָּ מְעוֹנֶֽךָ׃`,`לֹא־תְאֻנֶּ֣ה אֵלֶ֣יךָ רָעָ֑ה וְ֝נֶ֗גַע לֹא־יִקְרַ֥ב בְּאׇהֳלֶֽךָ׃`,`כִּ֣י מַ֭לְאָכָיו יְצַוֶּה־לָּ֑ךְ לִ֝שְׁמׇרְךָ֗ בְּכׇל־דְּרָכֶֽיךָ׃`,`עַל־כַּפַּ֥יִם יִשָּׂא֑וּנְךָ פֶּן־תִּגֹּ֖ף בָּאֶ֣בֶן רַגְלֶֽךָ׃`,`עַל־שַׁ֣חַל וָפֶ֣תֶן תִּדְרֹ֑ךְ תִּרְמֹ֖ס כְּפִ֣יר וְתַנִּֽין׃`,`כִּ֤י בִ֣י חָ֭שַׁק וַאֲפַלְּטֵ֑הוּ אֲ֝שַׂגְּבֵ֗הוּ כִּֽי־יָדַ֥ע שְׁמִֽי׃`,`יִקְרָאֵ֨נִי&thinsp;<b>׀</b> וְֽאֶעֱנֵ֗הוּ עִמּֽוֹ־אָנֹכִ֥י בְצָרָ֑ה אֲ֝חַלְּצֵ֗הוּ וַאֲכַבְּדֵֽהוּ׃`,`אֹ֣רֶךְ יָ֭מִים אַשְׂבִּיעֵ֑הוּ וְ֝אַרְאֵ֗הוּ בִּישׁוּעָתִֽי׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0},{heading:`מִזְמוֹר קכ״א · אֶשָּׂא עֵינַי`,verses:[`שִׁ֗יר לַֽמַּ֫עֲל֥וֹת אֶשָּׂ֣א עֵ֭ינַי אֶל־הֶהָרִ֑ים מֵ֝אַ֗יִן יָבֹ֥א עֶזְרִֽי׃`,`עֶ֭זְרִי מֵעִ֣ם יְהֹוָ֑ה עֹ֝שֵׂ֗ה שָׁמַ֥יִם וָאָֽרֶץ׃`,`אַל־יִתֵּ֣ן לַמּ֣וֹט רַגְלֶ֑ךָ אַל־יָ֝נ֗וּם שֹׁמְרֶֽךָ׃`,`הִנֵּ֣ה לֹֽא־יָ֭נוּם וְלֹ֣א יִישָׁ֑ן שׁ֝וֹמֵ֗ר יִשְׂרָאֵֽל׃`,`יְהֹוָ֥ה שֹׁמְרֶ֑ךָ יְהֹוָ֥ה צִ֝לְּךָ֗ עַל־יַ֥ד יְמִינֶֽךָ׃`,`יוֹמָ֗ם הַשֶּׁ֥מֶשׁ לֹֽא־יַכֶּ֗כָּה וְיָרֵ֥חַ בַּלָּֽיְלָה׃`,`יְֽהֹוָ֗ה יִשְׁמׇרְךָ֥ מִכׇּל־רָ֑ע יִ֝שְׁמֹ֗ר אֶת־נַפְשֶֽׁךָ׃`,`יְֽהֹוָ֗ה יִשְׁמׇר־צֵאתְךָ֥ וּבוֹאֶ֑ךָ מֵ֝עַתָּ֗ה וְעַד־עוֹלָֽם׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0},{heading:`מִזְמוֹר ק״ל · מִמַּעֲמַקִּים`,verses:[`שִׁ֥יר הַֽמַּעֲל֑וֹת מִמַּעֲמַקִּ֖ים קְרָאתִ֣יךָ יְהֹוָֽה׃`,`אֲדֹנָי֮ שִׁמְעָ֢ה בְק֫וֹלִ֥י תִּהְיֶ֣ינָה אׇ֭זְנֶיךָ קַשֻּׁב֑וֹת לְ֝ק֗וֹל תַּחֲנוּנָֽי׃`,`אִם־עֲוֺנ֥וֹת תִּשְׁמׇר־יָ֑הּ אֲ֝דֹנָ֗י מִ֣י יַעֲמֹֽד׃`,`כִּֽי־עִמְּךָ֥ הַסְּלִיחָ֑ה לְ֝מַ֗עַן תִּוָּרֵֽא׃`,`קִוִּ֣יתִי יְ֭הֹוָה קִוְּתָ֣ה נַפְשִׁ֑י וְֽלִדְבָר֥וֹ הוֹחָֽלְתִּי׃`,`נַפְשִׁ֥י לַאדֹנָ֑י מִשֹּׁמְרִ֥ים לַ֝בֹּ֗קֶר שֹׁמְרִ֥ים לַבֹּֽקֶר׃`,`יַחֵ֥ל יִשְׂרָאֵ֗ל אֶל־יְ֫הֹוָ֥ה כִּֽי־עִם־יְהֹוָ֥ה הַחֶ֑סֶד וְהַרְבֵּ֖ה עִמּ֣וֹ פְדֽוּת׃`,`וְ֭הוּא יִפְדֶּ֣ה אֶת־יִשְׂרָאֵ֑ל מִ֝כֹּ֗ל עֲוֺנֹתָֽיו׃&nbsp;<span class="mam-spi-pe">{פ}</span><br>`],numbered:!0},{heading:`שַׁעֲרֵי רַחֲמִים`,verses:[`<b>תֵּעָנוּ</b> וְתֵעָֽתְרוּ בְּרַחֲמִים֯ מִ֯ן הַשָּׁמַיִם. תְּקֻבַּל צַעֲקַתְכֶם. תִּשָּׁמַע תְּפִלַּתְכֶם בְּרָצוֹן. וְיֵעָנֶה קוֹל עֲתִירַתְכֶם. וְיִפְתַּח יְהֹוָה אֱלֹהֵינוּ לָֽנוּ וּלְכָל־יִשְׂרָאֵל אַחֵינוּ בְּכָל־מָקוֹם שֶׁהֵם: <small>(יכוין שהם חמישים כנגד חמישים שערי בינה)</small> שַׁעֲרֵי אוֹרָה. שַׁעֲרֵי אַהֲבָה וְאַחְוָה. שַׁעֲרֵי בְרָכָה. שַׁעֲרֵי בֵית מִקְדָּשׁוֹ. שַׁעֲרֵי גְאֻלָּה. שַׁעֲרֵי גִילָה. שַׁעֲרֵי דִיצָה. שַׁעֲרֵי דֵעָה וְהַשְׂכֵּל. שַׁעֲרֵי הוֹד וְהָדָר. שַׁעֲרֵי הַצְלָחָה וְהַרְוָחָה. שַׁעֲרֵי וַעַד טוֹב. שַׁעֲרֵי וָתִיקוּת. שַׁעֲרֵי זָכִיּוֹת. שַׁעֲרֵי זְרִיזוּת. שַׁעֲרֵי חֶדְוָה. שַׁעֲרֵי חָכְמָה. שַׁעֲרֵי חֵן וָחֶסֶד. שַׁעֲרֵי חַיִּים טוֹבִים. שַׁעֲרֵי טָהֳרָה. שַׁעֲרֵי טַל וּמָטָר לִבְרָכָה. שַׁעֲרֵי יְשׁוּעָה. שַׁעֲרֵי כַפָּרָה. שַׁעֲרֵי כַלְכָּלָה. שַׁעֲרֵי כָבוֹד. שַׁעֲרֵי לִמּוּד תּוֹרָה לִשְׁמָהּ. שַׁעֲרֵי לֵב טוֹב. שַׁעֲרֵי מָזוֹן. שַׁעֲרֵי מְחִילָה. שַׁעֲרֵי נֶחָמָה. שַׁעֲרֵי נְעִימוּת. שַׁעֲרֵי סוֹדוֹת֯ תּ֯וֹרָתוֹ. שַׁעֲרֵי סְלִיחָה. שַׁעֲרֵי עֶזְרָה. שַׁעֲרֵי פְדוּת. שַׁעֲרֵי פִרְיָה וְרִבְיָה. שַׁעֲרֵי פַרְנָסָה טוֹבָה. שַׁעֲרֵי צְדָקָה. שַׁעֲרֵי צָהֳלָה. שַׁעֲרֵי קוֹמְמִיּוּת. שַׁעֲרֵי קִבּוּל תְּפִלּוֹת. שַׁעֲרֵי קִבּוּץ גָּלֻיּוֹת. שַׁעֲרֵי רְפוּאָה שְׁלֵמָה. שַׁעֲרֵי רַחֲמִים. שַׁעֲרֵי רָצוֹן. שַׁעֲרֵי שָׁלוֹם. שַׁעֲרֵי שַׁלְוָה. שַׁעֲרֵי תוֹרָה. שַׁעֲרֵי תְפִלָּה. שַׁעֲרֵי תְשׁוּעָה. שַׁעֲרֵי תְשׁוּבָה. וְיָסִיר מִתּוֹכְכֶם קִנְאָה וְשִׂנְאָה וְתַחְרוּת. וִיקַיֵּם בָּכֶם֯ מִ֯קְרָא שֶׁכָּתוּב: יְהֹוָה אֱלֹהֵי אֲבוֹתֵכֶם יֹסֵף עֲלֵיכֶם כָּכֶם אֶלֶף פְּעָמִים, וִיבָרֵךְ אֶתְכֶם כַּאֲשֶׁר דִּבֶּר לָכֶם. וְיִכְתָּבְכֶם (הָאֵל) בְּסֵפֶר חַיִּים טוֹבִים, וְכֵן יְהִי רָצוֹן וְנֹאמַר אָמֵן. <small>(אמן)</small>`]}]},"tikkun-chatzot":{id:`tikkun-chatzot`,title:`תִּיקּוּן חֲצוֹת`,subtitle:`תִּיקּוּן רָחֵל וְלֵאָה · נֻסַּח עֵדוֹת הַמִּזְרָח`,numbered:!1,chapters:[{heading:`אָנָּא ה׳ · וִדּוּי`,verses:[`<b>אָנָּא</b> יְהֹוָה אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ. תָּבֹא לְפָנֶיךָ תְּפִלָּתֵנוּ. וְאַל תִּתְעַלַּם מַלְכֵּנוּ מִתְּחִנָּתֵנוּ. שֶׁאֵין אֲנַחְנוּ עַזֵּי פָנִים וּקְשֵׁי עֹרֶף לוֹמַר לְפָנֶיךָ יְהֹוָה אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ צַדִּיקִים אֲנַחְנוּ וְלא חָטָאנוּ. אֲבָל חָטָאנוּ. עָוִינוּ. פָּשַׁעְנוּ. אֲנַחְנוּ וַאֲבוֹתֵינוּ וְאַנְשֵׁי בֵיתֵנוּ: <b>אָ</b>שַׁמְנוּ. <b>בָּ</b>גַדְנוּ. <b>גָּ</b>זַלְנוּ. <b>דִּ</b>בַּרְנוּ דֹפִי וְלָשׁון הָרָע. <b>הֶ</b>עֱוִינוּ. <b>וְ</b>הִרְשַׁעְנוּ. <b>זַ</b>דְנוּ. <b>חָ</b>מַסְנוּ. <b>טָ</b>פַלְנוּ שֶׁקֶר וּמִרְמָה. <b>יָ</b>עַצְנוּ עֵצוֹת רָעוֹת. <b>כִּ</b>זַּבְנוּ. כָּעַסְנוּ. <b>לַ</b>צְנוּ. <b>מָ</b>רַדְנוּ. מָרִינוּ דְבָרֶיךָ. <b>נִ</b>אַצְנוּ. נִאַפְנוּ. <b>סָ</b>רַרְנוּ. <b>עָ</b>וִינוּ. <b>פָּ</b>שַׁעְנוּ. פָּגַמְנוּ. <b>צָ</b>רַרְנוּ. צִעַרְנוּ אָב וָאֵם. <b>קִ</b>שִּׁינוּ עֹרֶף. <b>רָ</b>שַׁעְנוּ. <b>שִׁ</b>חַתְנוּ. <b>תִּ</b>עַבְנוּ. תָּעִינוּ וְתִעֲתַעְנוּ. וְסַרְנוּ מִמִּצְוֹתֶיךָ וּמִמִּשְׁפָּטֶיךָ הַטּוֹבִים וְלֹא שָׁוָה לָנוּ. וְאַתָּה צַדִּיק עַל כָּל הַבָּא עָלֵינוּ. כִּי אֱמֶת עָשִׂיתָ. וַאֲנַחְנוּ הִרְשָׁעְנוּ:`],condition:`tikkun-rachel`},{heading:`מַה נֹּאמַר לְפָנֶיךָ`,verses:[`<b>מַה־נֹּאמַר</b> לְפָנֶיךָ יוֹשֵׁב מָרוֹם, וּמַה־נְסַפֵּר לְפָנֶיךָ שׁוֹכֵן שְׁחָקִים, הֲלֹא כָּל־הַנִּסְתָּרוֹת וְהַנִּגְלוֹת אַתָּה יוֹדֵעַ, אַתָּה יוֹדֵעַ רָזֵי עוֹלָם, וְתַעֲלוּמוֹת סִתְרֵי כָּל־חָי, אַתָּה חוֹפֵשׂ כָּל־חַדְרֵי בָטֶן, רוֹאֶה כְלָיוֹת וְלֵב, אֵין דָּבָר נֶעְלָם מִמְּךָּ, וְאֵין נִסְתָּר מִנֶּגֶד עֵינֶיךָ: יְהִי רָצוֹן מִלְּפָנֶיךָ, יְהֹוָה אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ, שֶתִמְחוֹל לָנוּ אֶת־כָּל־חַטְּאוֹתֵינוּ, וּתְכַפֵּר לָנוּ אֶת־כָּל־עֲוֹנוֹתֵינוּ, וְתִמְחוֹל וְתִסְלַח לְכָל־פְּשָׁעֵינוּ:`]},{heading:`תִּיקּוּן רָחֵל · עַל נַהֲרוֹת בָּבֶל`,verses:[`<b>עַ֥ל נַהֲר֨וֹת</b> ׀ בָּבֶ֗ל שָׁ֣ם יָ֭שַׁבְנוּ גַּם־בָּכִ֑ינוּ בְּ֝זׇכְרֵ֗נוּ אֶת־צִיּֽוֹן׃ עַֽל־עֲרָבִ֥ים בְּתוֹכָ֑הּ תָּ֝לִ֗ינוּ כִּנֹּרוֹתֵֽינוּ׃ כִּ֤י שָׁ֨ם שְֽׁאֵל֢וּנוּ שׁוֹבֵ֡ינוּ דִּבְרֵי־שִׁ֭יר וְתוֹלָלֵ֣ינוּ שִׂמְחָ֑ה שִׁ֥ירוּ לָ֗֝נוּ מִשִּׁ֥יר צִיּֽוֹן׃ אֵ֗יךְ נָשִׁ֥יר אֶת־שִׁיר־יְהֹוָ֑ה עַ֗֝ל אַדְמַ֥ת נֵכָֽר׃ אִֽם־אֶשְׁכָּחֵ֥ךְ יְֽרוּשָׁלָ֗‍ִם תִּשְׁכַּ֥ח יְמִינִֽי׃ תִּדְבַּֽק־לְשׁוֹנִ֨י ׀ לְחִכִּי֮ אִם־לֹ֢א אֶ֫זְכְּרֵ֥כִי אִם־לֹ֣א אַ֭עֲלֶה אֶת־יְרוּשָׁלַ֑‍ִם עַ֗֝ל רֹ֣אשׁ שִׂמְחָתִֽי׃ זְכֹ֤ר יְהֹוָ֨ה ׀ לִבְנֵ֬י אֱד֗וֹם אֵת֮ י֤וֹם יְֽרוּשָׁ֫לָ֥‍ִם הָ֭אֹ֣מְרִים עָ֤רוּ ׀ עָ֑רוּ עַ֗֝ד הַיְס֥וֹד בָּֽהּ׃ בַּת־בָּבֶ֗ל הַשְּׁד֫וּדָ֥ה אַשְׁרֵ֥י שֶׁיְשַׁלֶּם־לָ֑ךְ אֶת־גְּ֝מוּלֵ֗ךְ שֶׁגָּמַ֥לְתְּ לָֽנוּ׃ אַשְׁרֵ֤י ׀ שֶׁיֹּאחֵ֓ז וְנִפֵּ֬ץ אֶֽת־עֹ֝לָלַ֗יִךְ אֶל־הַסָּֽלַע׃`],numbered:!0,condition:`tikkun-rachel`},{heading:`מִזְמוֹר ע״ט · אֱלֹהִים בָּאוּ גוֹיִם`,verses:[`<b>מִזְמ֗וֹר</b> לְאָ֫סָ֥ף אֱֽלֹהִ֡ים בָּ֤אוּ גוֹיִ֨ם ׀ בְּֽנַחֲלָתֶ֗ךָ טִ֭מְּאוּ אֶת־הֵיכַ֣ל קׇדְשֶׁ֑ךָ שָׂ֖מוּ אֶת־יְרֽוּשָׁלַ֣‍ִם לְעִיִּֽים׃ נָתְנ֡וּ אֶת־נִבְלַ֬ת עֲבָדֶ֗יךָ מַ֭אֲכָל לְע֣וֹף הַשָּׁמָ֑יִם בְּשַׂ֥ר חֲ֝סִידֶ֗יךָ לְחַיְתוֹ־אָֽרֶץ׃ שָׁפְכ֬וּ דָמָ֨ם ׀ כַּמַּ֗יִם סְֽבִ֘יב֤וֹת יְֽרוּשָׁלָ֗‍ִם וְאֵ֣ין קוֹבֵֽר׃ הָיִ֣ינוּ חֶ֭רְפָּה לִשְׁכֵנֵ֑ינוּ לַ֥עַג וָ֝קֶ֗לֶס לִסְבִיבוֹתֵֽינוּ׃ עַד־מָ֣ה יְ֭הֹוָה תֶּאֱנַ֣ף לָנֶ֑צַח תִּבְעַ֥ר כְּמוֹ־אֵ֗֝שׁ קִנְאָתֶֽךָ׃ שְׁפֹ֤ךְ חֲמָתְךָ֗ אֶֽל־הַגּוֹיִם֮ אֲשֶׁ֢ר לֹא־יְדָ֫ע֥וּךָ וְעַ֥ל מַמְלָכ֑וֹת אֲשֶׁ֥ר בְּ֝שִׁמְךָ֗ לֹ֣א קָרָֽאוּ׃ כִּ֭י אָכַ֣ל אֶֽת־יַעֲקֹ֑ב וְֽאֶת־נָוֵ֥הוּ הֵשַֽׁמּוּ׃ אַֽל־תִּזְכׇּר־לָנוּ֮ עֲוֺנֹ֢ת רִאשֹׁ֫נִ֥ים מַ֭הֵר יְקַדְּמ֣וּנוּ רַחֲמֶ֑יךָ כִּ֖י דַלּ֣וֹנוּ מְאֹֽד׃ עׇזְרֵ֤נוּ ׀ אֱלֹ֘הֵ֤י יִשְׁעֵ֗נוּ עַֽל־דְּבַ֥ר כְּבֽוֹד־שְׁמֶ֑ךָ וְהַצִּילֵ֥נוּ וְכַפֵּ֥ר עַל־חַ֝טֹּאתֵ֗ינוּ לְמַ֣עַן שְׁמֶֽךָ׃ לָ֤מָּה ׀ יֹאמְר֣וּ הַגּוֹיִם֮ אַיֵּ֢ה אֱֽלֹהֵ֫יהֶ֥ם יִוָּדַ֣ע בַּגֹּיִ֣ים לְעֵינֵ֑ינוּ נִ֝קְמַ֗ת דַּֽם־עֲבָדֶ֥יךָ הַשָּׁפֽוּךְ׃ תָּ֤ב֣וֹא לְפָנֶיךָ֮ אֶנְקַ֢ת אָ֫סִ֥יר כְּגֹ֥דֶל זְרוֹעֲךָ֑ ה֝וֹתֵ֗ר בְּנֵ֣י תְמוּתָֽה׃ וְהָ֘שֵׁ֤ב לִשְׁכֵנֵ֣ינוּ שִׁ֭בְעָתַיִם אֶל־חֵיקָ֑ם חֶרְפָּ֘תָ֤ם אֲשֶׁ֖ר חֵרְפ֣וּךָ אֲדֹנָֽי׃ וַאֲנַ֤חְנוּ עַמְּךָ֨ ׀ וְצֹ֥אן מַרְעִיתֶךָ֮ נ֤וֹדֶ֥ה לְּךָ֗ לְע֫וֹלָ֥ם לְד֥וֹר וָדֹ֑ר נְ֝סַפֵּ֗ר תְּהִלָּתֶֽךָ׃`],numbered:!0,condition:`tikkun-rachel`},{heading:`אֵיכָה ה׳ · זְכֹר ה׳`,verses:[`<b>זְכֹ֤ר</b>יְהֹוָה֙ מֶֽה־הָ֣יָה לָ֔נוּ הַבִּ֖יטָה וּרְאֵ֥ה אֶת־חֶרְפָּתֵֽנוּ׃ נַחֲלָתֵ֙נוּ֙ נֶֽהֶפְכָ֣ה לְזָרִ֔ים בָּתֵּ֖ינוּ לְנׇכְרִֽים׃ יְתוֹמִ֤ים הָיִ֙ינוּ֙ וְאֵ֣ין אָ֔ב אִמֹּתֵ֖ינוּ כְּאַלְמָנֽוֹת׃ מֵימֵ֙ינוּ֙ בְּכֶ֣סֶף שָׁתִ֔ינוּ עֵצֵ֖ינוּ בִּמְחִ֥יר יָבֹֽאוּ׃ עַ֤ל צַוָּארֵ֙נוּ֙ נִרְדָּ֔פְנוּ יָגַ֖עְנוּ וְלֹ֥א הֽוּנַֽח־לָֽנוּ׃ מִצְרַ֙יִם֙ נָתַ֣נּוּ יָ֔ד אַשּׁ֖וּר לִשְׂבֹּ֥עַֽ לָֽחֶם׃ אֲבֹתֵ֤ינוּ חָֽטְאוּ֙ וְאֵינָ֔ם וַאֲנַ֖חְנוּ עֲוֺנֹתֵיהֶ֥ם סָבָֽלְנוּ׃ עֲבָדִים֙ מָ֣שְׁלוּ בָ֔נוּ פֹּרֵ֖ק אֵ֥ין מִיָּדָֽם׃ בְּנַפְשֵׁ֙נוּ֙ נָבִ֣יא לַחְמֵ֔נוּ מִפְּנֵ֖י חֶ֥רֶב הַמִּדְבָּֽר׃ עוֹרֵ֙נוּ֙ כְּתַנּ֣וּר נִכְמָ֔רוּ מִפְּנֵ֖י זַלְעֲפ֥וֹת רָעָֽב׃ נָשִׁים֙ בְּצִיּ֣וֹן עִנּ֔וּ בְּתֻלֹ֖ת בְּעָרֵ֥י יְהוּדָֽה׃ שָׂרִים֙ בְּיָדָ֣ם נִתְל֔וּ פְּנֵ֥י זְקֵנִ֖ים לֹ֥א נֶהְדָּֽרוּ׃ בַּחוּרִים֙ טְח֣וֹן נָשָׂ֔אוּ וּנְעָרִ֖ים בָּעֵ֥ץ כָּשָֽׁלוּ׃ זְקֵנִים֙ מִשַּׁ֣עַר שָׁבָ֔תוּ בַּחוּרִ֖ים מִנְּגִינָתָֽם׃ שָׁבַת֙ מְשׂ֣וֹשׂ לִבֵּ֔נוּ נֶהְפַּ֥ךְ לְאֵ֖בֶל מְחֹלֵֽנוּ׃ נָֽפְלָה֙ עֲטֶ֣רֶת רֹאשֵׁ֔נוּ אֽוֹי־נָ֥א לָ֖נוּ כִּ֥י חָטָֽאנוּ׃ עַל־זֶ֗ה הָיָ֤ה דָוֶה֙ לִבֵּ֔נוּ עַל־אֵ֖לֶּה חָשְׁכ֥וּ עֵינֵֽינוּ׃ עַ֤ל הַר־צִיּוֹן֙ שֶׁשָּׁמֵ֔ם שׁוּעָלִ֖ים הִלְּכוּ־בֽוֹ׃ אַתָּ֤ה יְהֹוָה֙ לְעוֹלָ֣ם תֵּשֵׁ֔ב כִּסְאֲךָ֖ לְד֥וֹר וָדֽוֹר׃ לָ֤מָּה לָנֶ֙צַח֙ תִּשְׁכָּחֵ֔נוּ תַּֽעַזְבֵ֖נוּ לְאֹ֥רֶךְ יָמִֽים׃ הֲשִׁיבֵ֨נוּ יְהֹוָ֤ה ׀ אֵלֶ֙יךָ֙ וְֽנָשׁ֔וּבָה חַדֵּ֥שׁ יָמֵ֖ינוּ כְּק
